<!doctype html>
<notebook theme="ink">
  <title>Boy's Surface</title>

  <script id="title" type="text/markdown">
# Boy's Surface
  </script>

  <script id="imports" type="text/x-typescript">
import { createWebGPUContext } from './lib/webgpu-canvas.js';
import { createCameraController } from './lib/camera-controller.js';
import { expandable } from './lib/expandable.js';
import { createFrameLoop } from './lib/frame-loop.js';
import { meshFromFunction } from './mesh.js';
import { peelShaderCode, compositeShaderCode } from './shaders.js';
import { createRenderer } from './renderer.js';
import { interval } from './lib/range-slider.js';
  </script>

  <script id="intro" type="text/markdown">
An implementation of [Boy's surface](https://en.wikipedia.org/wiki/Boy%27s_surface), an immersion of the real projective plane in three-dimensional Euclidean space. The parameterization is based on a formula by Robert Bryant and Rob Kusner. This is a WebGPU port of [an earlier version](https://rreusser.github.io/boys-surface/).
  </script>

  <script id="gpu-context" type="text/x-typescript">
const { device, canvasFormat } = await createWebGPUContext();
  </script>

  <script id="state" type="text/x-typescript">
const state = {
  initialized: false,
  canvas: null as HTMLCanvasElement | null,
  gpuContext: null as GPUCanvasContext | null,
  camera: null as ReturnType<typeof createCameraController> | null,
  frame: null as { cancel: () => void } | null,
  dirty: true,
  expandedState: { expanded: false },
  renderer: null as ReturnType<typeof createRenderer> | null,
  renderParams: {
    rmin: 0,
    rmax: 1,
    opacity: 0.9,
    gridOpacity: 0.25,
    gridWidth: 0.5,
    cartoonEdgeWidth: 1.5,
    cartoonEdgeOpacity: 1,
    specular: 1,
    uClipMin: 0,
    uClipMax: 1,
    vClipMin: -3.15,
    vClipMax: 3.15,
    invertClipU: 0,
    invertClipV: 0,
    peelLayers: 4,
  }
};
  </script>

  <script id="update-params" type="text/x-typescript">
state.renderParams.rmin = rRange.range[0];
state.renderParams.rmax = rRange.range[1];
state.renderParams.opacity = opacity;
state.renderParams.gridOpacity = gridOpacity;
state.renderParams.cartoonEdgeOpacity = cartoonEdgeOpacity;
state.renderParams.vClipMin = vClip.range[0];
state.renderParams.vClipMax = vClip.range[1];
state.renderParams.invertClipV = vClip.invert ? 1 : 0;
state.dirty = true;
  </script>

  <script id="main" type="text/x-typescript">
controlsContainer;

const mesh = meshFromFunction((u, v) => [u, v], {
  resolution: [301, 301],
  uDomain: [1e-4, 1 - 1e-4],
  vDomain: [-Math.PI, Math.PI]
});

if (!state.initialized) {
  const canvas = document.createElement('canvas');
  canvas.id = 'surface-canvas';
  canvas.style.width = '100%';
  canvas.style.height = '100%';

  const gpuContext = canvas.getContext('webgpu')!;
  gpuContext.configure({ device, format: canvasFormat, alphaMode: 'premultiplied' });

  state.canvas = canvas;
  state.gpuContext = gpuContext;
  state.camera = createCameraController(canvas, {
    distance: 5,
    phi: 3.5,
    theta: 0.2,
    center: [0, -1, 0],
  });

  state.renderer = createRenderer(device, canvasFormat, {
    peel: peelShaderCode,
    composite: compositeShaderCode
  });
  state.renderer.initMesh(mesh);

  state.initialized = true;
}

const canvas = state.canvas!;
const gpuContext = state.gpuContext!;
const camera = state.camera!;
const renderer = state.renderer!;
const container = html`<div id="surface-container" style="position: relative; width: 100%; height: 100%;"></div>`;
container.appendChild(canvas);

const resizeCanvas = () => {
  const rect = container.getBoundingClientRect();
  if (rect.width === 0 || rect.height === 0) return;
  const dpr = devicePixelRatio;
  const newWidth = Math.floor(rect.width * dpr);
  const newHeight = Math.floor(rect.height * dpr);
  if (canvas.width !== newWidth || canvas.height !== newHeight) {
    canvas.width = newWidth;
    canvas.height = newHeight;
    gpuContext.configure({ device, format: canvasFormat, alphaMode: 'premultiplied' });
    state.dirty = true;
    camera.taint();
  }
};

const resizeObserver = new ResizeObserver(resizeCanvas);
resizeObserver.observe(container);

let visible = true;
const intersectionObserver = new IntersectionObserver(entries => {
  visible = entries[0].intersectionRatio > 0;
});
intersectionObserver.observe(container);

if (state.frame) {
  state.frame.cancel();
  state.frame = null;
}
camera.taint();

state.frame = createFrameLoop((timestamp) => {
  if (!visible) return;

  const w = canvas.width;
  const h = canvas.height;
  if (w === 0 || h === 0) return;

  const rendered = renderer.render(gpuContext, state.renderParams, camera, w, h, state.dirty);
  if (rendered) {
    state.dirty = false;
  }
});

invalidation.then(() => {
  if (state.frame) {
    state.frame.cancel();
    state.frame = null;
  }
  resizeObserver.disconnect();
  intersectionObserver.disconnect();
});

const figure = html`
  <figure id="main-figure" style="max-width: 100%; margin: 0; height: 100%;">
    ${container}
  </figure>
`;

const figureWidth = Math.min(width, 640);
const figureHeight = Math.round(Math.max(500, figureWidth * 1.0));

display(expandable(figure, {
  wide: true,
  width: figureWidth,
  height: figureHeight,
  controls: '#surface-controls',
  state: state.expandedState,
  onResize: (content, w, h, expanded) => {
    container.style.width = `${w}px`;
    container.style.height = `${h}px`;
    resizeCanvas();
  }
}));
  </script>

  <script id="controls" type="text/x-typescript">
const controlsContainer = html`<div id="surface-controls" class="controls-panel"></div>`;

function ctrl(input: HTMLElement) {
  controlsContainer.appendChild(input);
  return Generators.input(input);
}

const rRangeInput = interval([0, 1], { label: "r range", value: [0, 1], step: 0.001, invertible: true });
controlsContainer.appendChild(rRangeInput);
const rRange = Generators.input(rRangeInput);

const vClipInput = interval([-3.15, 3.15], { label: "θ range", value: [-3.15, 3.15], step: 0.01, invertible: true });
controlsContainer.appendChild(vClipInput);
const vClip = Generators.input(vClipInput);

const opacity = ctrl(Inputs.range([0, 1], { label: "Surface opacity", value: 0.9, step: 0.01 }));
const gridOpacity = 0.25;
const cartoonEdgeOpacity = 1;

display(controlsContainer);
  </script>

  <script id="equations" type="text/markdown">
Given a complex variable ${tex`w = r e^{i\theta}`} parameterizing a disk in the complex plane, the surface coordinates are

${tex.block`\begin{aligned}
g_1 &= -\tfrac{3}{2}\,\mathrm{Im}\!\left[\frac{w(1 - w^4)}{w^6 + \sqrt{5}\,w^3 - 1}\right] \\[6pt]
g_2 &= -\tfrac{3}{2}\,\mathrm{Re}\!\left[\frac{w(1 + w^4)}{w^6 + \sqrt{5}\,w^3 - 1}\right] \\[6pt]
g_3 &= \mathrm{Im}\!\left[\frac{1 + w^6}{w^6 + \sqrt{5}\,w^3 - 1}\right] - \tfrac{1}{2}
\end{aligned}`}

The final surface position is then normalized:

${tex.block`(x, y, z) = \frac{1}{g_1^2 + g_2^2 + g_3^2}\begin{pmatrix} g_1 \\ g_2 \\ g_3 \end{pmatrix}`}
  </script>

  <script id="notes" type="text/markdown">
The vertex shader receives a surface parameterized by ${tex`(r, \theta)`} coordinates, where ${tex`r`} is the radial distance and ${tex`\theta`} is the angle in the complex plane. It evaluates Boy's surface function using complex arithmetic and normalizes the result. Transparency is achieved through depth peeling.
  </script>
