  <title>Denali Terrain</title>

  <script id="viewer" type="module">
    import { TerrainMap } from './mapviewer/terrain-viewer.js';
    import { createGPULines } from 'npm:webgpu-instanced-lines';
    import simplify from 'npm:simplify-js';
    import { expandable } from './lib/expandable.js';
    import { createSnapshotButton } from './lib/snapshot.js';
    import { ElevationProfile } from './elevation-profile.js';
    import { gpx as gpxToGeoJSON } from 'npm:@tmcw/togeojson';
    import { createMemoryWidget } from './mapviewer/debug/memory-tracker.js';
    import { loadH264Encoder } from './lib/h264-mp4-encoder.js';

    const canvas = document.createElement('canvas');
    canvas.className = 'terrain';

    const viewer = await TerrainMap.create(canvas, {
      ...config,
      font: {
        atlas: './mapviewer/fonts/roboto-regular.png',
        metadata: './mapviewer/fonts/roboto-regular.json',
      },
      createGPULines,
      simplifyFn: simplify,
    });

    const slopeLegend = html`<div class="slope-legend" style="display: none">
      <div class="slope-legend-title">Slope angle</div>
      <div class="slope-legend-blocks">
        <div style="background: rgb(255, 199, 0)"></div>
        <div style="background: rgb(255, 140, 0)"></div>
        <div style="background: rgb(255, 77, 0)"></div>
        <div style="background: rgb(191, 0, 0)"></div>
        <div style="background: rgb(102, 0, 153)"></div>
        <div style="background: rgb(0, 51, 204)"></div>
        <div style="background: rgb(0, 0, 0)"></div>
      </div>
      <div class="slope-legend-labels">
        <span>26-29°</span>
        <span>30-31°</span>
        <span>32-34°</span>
        <span>35-45°</span>
        <span>46-50°</span>
        <span>51-59°</span>
        <span>60°+</span>
      </div>
    </div>`;
    const elevationLabel = html`<div class="elevation-label"></div>`;

    canvas.addEventListener('mousemove', (e) => {
      const hit = viewer.raycast(e.clientX, e.clientY);
      if (hit) {
        const elev = viewer.queryElevationMercator(hit.worldPos[0], hit.worldPos[2]);
        if (elev != null) {
          const feet = Math.round(elev * 3.28084);
          elevationLabel.textContent = `${feet.toLocaleString()} ft`;
          elevationLabel.style.opacity = '1';
        } else {
          elevationLabel.style.opacity = '0';
        }
      } else {
        elevationLabel.style.opacity = '0';
      }
    });
    canvas.addEventListener('mouseleave', () => {
      elevationLabel.style.opacity = '0';
    });

    const elevationProfile = new ElevationProfile();
    const profilePanel = elevationProfile.createDOM();

    viewer.on('elevationrefine', () => {
      const activeId = elevationProfile.activeLayerId;
      if (!activeId) return;
      // Auto-close if layer was removed
      if (!viewer.getLayer(activeId)) {
        elevationProfile.hide();
        return;
      }
      const data = viewer.getLayerElevationProfile(activeId);
      if (data) elevationProfile.update(data);
    });

    // The on-map hover marker for the elevation profile is rendered via
    // WebGPU (see HoverMarker), so it's intrinsically clipped to the map
    // canvas and lives in the same render pass as the rest of the map.
    elevationProfile.onHover = (point) => {
      if (!point) {
        viewer.setHoverPoint(null);
        return;
      }
      const id = elevationProfile.activeLayerId;
      const layer = id && viewer.getLayer(id);
      const lc = layer?.paint?.['line-color'] || [1, 0.53, 0, 1];
      viewer.setHoverPoint({
        mercatorX: point.mercatorX,
        mercatorY: point.mercatorY,
        elevation: point.elevation,
        color: lc,
      });
    };

    // Toggle the elevation profile for a line layer.
    function toggleElevationProfile(layerId) {
      if (elevationProfile.activeLayerId === layerId) {
        elevationProfile.hide();
        return;
      }
      const layer = viewer.getLayer(layerId);
      const data = viewer.getLayerElevationProfile(layerId);
      if (!layer || !data) return;
      elevationProfile.show(layerId, layerId, data, layer.paint['line-color']);
    }

    // Mountain-icon buttons in the layer panel reflect the active profile.
    // The panel is rebuilt on layer add/delete, so we track current buttons
    // in a Map and refresh their .active class whenever the profile changes.
    const profileToggleButtons = new Map();
    elevationProfile.onActiveChange = (activeId) => {
      for (const [id, btn] of profileToggleButtons) {
        btn.classList.toggle('active', id === activeId);
      }
    };

    // Tapping a route on the map toggles its elevation profile. The viewer
    // emits 'linetap' only when the pointer release stays inside its dead
    // zone, so plain pan/orbit gestures don't trigger this.
    viewer.on('linetap', (hit) => toggleElevationProfile(hit.id));

    const container = html`<div style="position: relative">`;
    container.appendChild(canvas);
    container.appendChild(elevationLabel);
    container.appendChild(slopeLegend);
    container.appendChild(viewer.attribution);
    container.appendChild(profilePanel);

    const memoryWidget = createMemoryWidget(viewer.memoryTracker);
    // Hidden by default — toggled from the Debug section in the controls.
    memoryWidget.style.display = 'none';
    container.appendChild(memoryWidget);
    invalidation.then(() => memoryWidget.destroy());

    const dropOverlay = html`<div class="drop-overlay" style="display:none">Drop GeoJSON or GPX file</div>`;
    container.appendChild(dropOverlay);

    // Compass rose: shows current bearing, click to orient north
    const compassBtn = html`<button class="compass-rose" title="Orient north">
      <svg viewBox="0 0 28 28" width="24" height="24" style="display:block">
        <path d="M14 4L17.5 14L14 12L10.5 14Z" fill="#D32F2F"/>
        <path d="M14 24L10.5 14L14 16L17.5 14Z" fill="#9E9E9E"/>
      </svg>
    </button>`;
    container.appendChild(compassBtn);

    const compassSvg = compassBtn.querySelector('svg');
    function updateCompass() {
      if (!compassBtn.isConnected) return;
      compassSvg.style.transform = `rotate(${viewer.bearing}deg)`;
      requestAnimationFrame(updateCompass);
    }
    requestAnimationFrame(updateCompass);

    compassBtn.addEventListener('click', () => {
      const startBearing = viewer.bearing;
      let diff = -startBearing;
      // Normalize to [-180, 180] for shortest rotation
      diff = ((diff + 180) % 360 + 360) % 360 - 180;
      const t0 = performance.now();
      function animate(now) {
        const t = Math.min(1, (now - t0) / 300);
        const ease = t * t * (3 - 2 * t);
        viewer.bearing = startBearing + diff * ease;
        if (t < 1) requestAnimationFrame(animate);
      }
      requestAnimationFrame(animate);
    });

    // Snapshot button: triggers a redraw, awaits the busy→idle edge
    // (tile fetches, lighting bakes, and the paint that follows them
    // all settled), then captures canvas.toDataURL synchronously and
    // downloads it. Using viewer.awaitIdle() instead of a single rAF
    // means the captured image always reflects the fully-loaded scene.
    const snapshotBtn = createSnapshotButton(canvas, {
      filename: 'denali.png',
      onSnapshot: () => viewer.triggerRedraw(),
      awaitReady: () => viewer.awaitIdle(),
    });

    display(expandable(container, {
      id: 'terrain-viewer',
      wide: true,
      width: 640,
      height: 600,
      toggleOffset: [-12, -12],
      controls: '.terrain-controls',
      buttons: [snapshotBtn],
      onResize(el, w, h) {
        canvas.style.width = `${w}px`;
        canvas.style.height = `${h}px`;
        viewer.triggerRedraw();
      }
    }));

    invalidation.then(() => { elevationProfile.destroy(); viewer.destroy(); });
  </script>

  <script id="controls" type="module">
    import SunCalc from 'npm:suncalc';
    import { createSunCalendar } from './lib/sun-calendar.js';

    const controlsContainer = html`<div class="terrain-controls"></div>`;

    function formatTime(decimal) {
      const h = Math.floor(decimal) % 24;
      const m = Math.round((decimal % 1) * 60);
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    }

    // The sun-calendar widget below owns date / time / timezone state and
    // hands us a UTC `Date` whenever the user interacts. This `updateSunDirection`
    // converts that to the (x=east, y=up, z=south) sun direction the
    // terrain renderer expects.
    let sunCalendarEl; // assigned when we build the env section below
    function updateSunDirection() {
      const utcDate = sunCalendarEl ? sunCalendarEl.getUtcDate() : null;
      if (!utcDate) return;
      const { lat, lon } = viewer.getViewLocation();
      const sunPos = SunCalc.getPosition(utcDate, lat, lon);
      const alt = sunPos.altitude;
      const az = sunPos.azimuth;
      viewer.settings.sunDirection = [
        -Math.cos(alt) * Math.sin(az),
        Math.sin(alt),
        Math.cos(alt) * Math.cos(az)
      ];
    }

    function addControl(parent, input, onInput) {
      parent.appendChild(input);
      input.addEventListener('input', () => onInput(input.value));
    }

    function createSection(title, { open = false, trailing = null } = {}) {
      const section = html`<div class="ctrl-section"></div>`;
      const header = html`<div class="ctrl-section-header"></div>`;
      const chevron = html`<span class="ctrl-chevron">&#9654;</span>`;
      header.appendChild(chevron);
      header.appendChild(html`<span class="ctrl-section-title">${title}</span>`);
      if (trailing) header.appendChild(trailing);
      section.appendChild(header);
      const body = html`<div class="ctrl-section-body"></div>`;
      if (!open) body.style.display = 'none';
      else section.classList.add('open');
      section.appendChild(body);
      header.addEventListener('click', (e) => {
        if (e.target.closest('button')) return;
        const isOpen = section.classList.toggle('open');
        body.style.display = isOpen ? '' : 'none';
      });
      return { section, body };
    }

    // Layer panel
    const drawBtn = html`<button class="draw-path-btn" title="Draw a path on the terrain">Draw path</button>`;
    const { section: layerPanel, body: layerList } = createSection('Layers', { open: false, trailing: drawBtn });
    controlsContainer.appendChild(layerPanel);

    const eyeOpenSVG = `<svg viewBox="0 0 20 20" width="16" height="16" style="display:block"><path d="M10 4C4.5 4 1 10 1 10s3.5 6 9 6 9-6 9-6-3.5-6-9-6z" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="10" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>`;
    const eyeClosedSVG = `<svg viewBox="0 0 20 20" width="16" height="16" style="display:block"><path d="M10 4C4.5 4 1 10 1 10s3.5 6 9 6 9-6 9-6-3.5-6-9-6z" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.35"/><circle cx="10" cy="10" r="3" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.35"/><line x1="4" y1="16" x2="16" y2="4" stroke="currentColor" stroke-width="1.5"/></svg>`;

    function hexFromColor(rgba) {
      if (!rgba) return '#ff8800';
      return '#' + [rgba[0], rgba[1], rgba[2]].map(c => Math.round(c * 255).toString(16).padStart(2, '0')).join('');
    }

    function addColorProp(container, label, currentColor, onChange) {
      const row = html`<div class="layer-prop"><label>${label}</label><input type="color" class="layer-color" value="${hexFromColor(currentColor)}"></div>`;
      row.querySelector('input').addEventListener('input', (e) => onChange(e.target.value));
      container.appendChild(row);
      return row;
    }

    function addRangeProp(container, label, value, min, max, step, onChange) {
      const row = html`<div class="layer-prop"><label>${label}</label><input type="range" min="${min}" max="${max}" step="${step}" value="${value}"><span class="layer-prop-value">${value}</span></div>`;
      const input = row.querySelector('input');
      const span = row.querySelector('.layer-prop-value');
      input.addEventListener('input', () => { span.textContent = input.value; onChange(Number(input.value)); });
      container.appendChild(row);
      return row;
    }

    function addCheckboxProp(container, label, checked, onChange) {
      const row = html`<div class="layer-prop"><label>${label}</label><input type="checkbox" class="layer-checkbox"></div>`;
      const input = row.querySelector('input');
      input.checked = !!checked;
      input.addEventListener('change', () => onChange(input.checked));
      container.appendChild(row);
      return row;
    }

    function rebuildLayerPanel() {
      layerList.innerHTML = '';
      profileToggleButtons.clear();

      // Imagery row (no expandable props, just eye toggle)
      const imgRow = html`<div class="layer-row">
        <button class="layer-eye" title="Toggle visibility"></button>
        <span class="layer-name">Imagery</span>
      </div>`;
      const imgEye = imgRow.querySelector('.layer-eye');
      imgEye.innerHTML = viewer.settings.showImagery ? eyeOpenSVG : eyeClosedSVG;
      imgEye.addEventListener('click', function() {
        viewer.settings.showImagery = !viewer.settings.showImagery;
        this.innerHTML = viewer.settings.showImagery ? eyeOpenSVG : eyeClosedSVG;
      });
      layerList.appendChild(imgRow);

      // Feature layers
      for (const entry of viewer.getLayers()) {
        const item = html`<div class="layer-item"></div>`;
        const row = html`<div class="layer-row"></div>`;

        let layerVisible = entry.visible;
        const eyeBtn = html`<button class="layer-eye" title="Toggle visibility"></button>`;
        eyeBtn.innerHTML = layerVisible ? eyeOpenSVG : eyeClosedSVG;
        eyeBtn.addEventListener('click', () => {
          layerVisible = !layerVisible;
          viewer.setLayerVisibility(entry.id, layerVisible);
          eyeBtn.innerHTML = layerVisible ? eyeOpenSVG : eyeClosedSVG;
        });
        row.appendChild(eyeBtn);

        const chevron = html`<span class="layer-chevron">&#9654;</span>`;
        row.appendChild(chevron);

        row.appendChild(html`<span class="layer-name">${entry.id}</span>`);

        if (entry.type === 'line') {
          const profileToggle = html`<button class="layer-profile-toggle" title="Toggle elevation profile"></button>`;
          profileToggle.innerHTML = `<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"><path d="M1.5 13 L5.5 6 L8 9.5 L10.5 5.5 L14.5 13 Z"/></svg>`;
          if (elevationProfile.activeLayerId === entry.id) profileToggle.classList.add('active');
          profileToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleElevationProfile(entry.id);
          });
          row.appendChild(profileToggle);
          profileToggleButtons.set(entry.id, profileToggle);
        }

        const del = html`<button class="layer-delete" title="Remove layer">&times;</button>`;
        del.addEventListener('click', () => {
          viewer.removeLayer(entry.id);
          rebuildLayerPanel();
        });
        row.appendChild(del);
        item.appendChild(row);

        // Expandable properties
        const props = html`<div class="layer-props" style="display:none"></div>`;
        const id = entry.id;
        const paint = entry.paint;

        if (entry.type === 'line') {
          const colorRow = addColorProp(props, 'Color', paint['line-color'], v => viewer.setLayerPaint(id, 'line-color', v));
          addColorProp(props, 'Border', paint['line-border-color'], v => viewer.setLayerPaint(id, 'line-border-color', v));
          addRangeProp(props, 'Width', paint['line-width'], 1, 12, 0.5, v => viewer.setLayerPaint(id, 'line-width', v));
          addRangeProp(props, 'Border width', paint['line-border-width'], 0, 6, 0.5, v => viewer.setLayerPaint(id, 'line-border-width', v));
          const setColorRowEnabled = (enabled) => {
            colorRow.classList.toggle('layer-prop-disabled', !enabled);
            colorRow.querySelector('input').disabled = !enabled;
          };
          setColorRowEnabled(!paint['line-slope-shading']);
          addCheckboxProp(props, 'Slope shading', paint['line-slope-shading'], v => {
            viewer.setLayerPaint(id, 'line-slope-shading', v);
            setColorRowEnabled(!v);
          });
          const dlBtn = html`<button class="layer-download-btn">Download GeoJSON</button>`;
          dlBtn.addEventListener('click', () => {
            const geojson = viewer.getLayerGeoJSON(id);
            if (!geojson) return;
            const blob = new Blob([JSON.stringify(geojson, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${id}.geojson`;
            a.click();
            URL.revokeObjectURL(url);
          });
          props.appendChild(dlBtn);
          const profBtn = html`<button class="layer-download-btn">Elevation profile</button>`;
          profBtn.addEventListener('click', () => toggleElevationProfile(id));
          props.appendChild(profBtn);
        } else if (entry.type === 'circle') {
          addColorProp(props, 'Fill', paint['circle-color'], v => viewer.setLayerPaint(id, 'circle-color', v));
          addColorProp(props, 'Stroke', paint['circle-stroke-color'], v => viewer.setLayerPaint(id, 'circle-stroke-color', v));
          addRangeProp(props, 'Radius', paint['circle-radius'], 1, 12, 0.5, v => viewer.setLayerPaint(id, 'circle-radius', v));
          addRangeProp(props, 'Stroke width', paint['circle-stroke-width'], 0, 6, 0.5, v => viewer.setLayerPaint(id, 'circle-stroke-width', v));
        } else if (entry.type === 'text') {
          addColorProp(props, 'Color', paint['text-color'], v => viewer.setLayerPaint(id, 'text-color', v));
          addColorProp(props, 'Halo', paint['text-halo-color'], v => viewer.setLayerPaint(id, 'text-halo-color', v));
          addRangeProp(props, 'Halo width', paint['text-halo-width'], 0, 4, 0.25, v => viewer.setLayerPaint(id, 'text-halo-width', v));
        }

        item.appendChild(props);

        // Toggle expand/collapse on chevron or name click
        chevron.addEventListener('click', () => {
          const open = item.classList.toggle('open');
          props.style.display = open ? '' : 'none';
        });
        row.querySelector('.layer-name').addEventListener('click', () => {
          const open = item.classList.toggle('open');
          props.style.display = open ? '' : 'none';
        });
        row.querySelector('.layer-name').style.cursor = 'pointer';

        layerList.appendChild(item);
      }

    }
    rebuildLayerPanel();
    drawBtn.addEventListener('click', () => enterDrawMode());

    // Pen drawing tool
    const drawState = { active: false, points: [], previewEntry: null, nextLayerId: 1, drawItem: null, pointCount: null };

    const drawOverlay = html`<div class="draw-overlay" style="display:none">Click to add points. Double-click or Enter to finish. Esc to cancel. ⌘Z to undo.</div>`;
    viewer.canvas.parentElement.appendChild(drawOverlay);

    function enterDrawMode() {
      const pendingId = `drawn-path-${drawState.nextLayerId}`;
      drawState.active = true;
      drawState.points = [];
      drawState.previewEntry = null;
      viewer.canvas.classList.add('drawing');
      drawOverlay.style.display = '';

      // Add in-progress layer item to the panel
      const item = html`<div class="layer-item draw-active"></div>`;
      const row = html`<div class="layer-row"></div>`;
      row.appendChild(html`<span class="layer-name" style="flex:1">${pendingId}</span>`);
      drawState.pointCount = html`<span class="draw-point-count">0 pts</span>`;
      row.appendChild(drawState.pointCount);
      const undoBtn = html`<button class="draw-action-btn" title="Undo last point"></button>`;
      undoBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h7a3 3 0 0 1 0 6H8"/><path d="M6 10L3 7l3-3"/></svg>`;
      undoBtn.addEventListener('click', async () => {
        if (drawState.points.length > 0) {
          drawState.points.pop();
          updateDrawItemCount();
          await updatePreview();
        }
      });
      row.appendChild(undoBtn);
      const doneBtn = html`<button class="draw-action-btn draw-done-btn" title="Finish path"></button>`;
      doneBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5l3.5 3.5 6.5-8"/></svg>`;
      doneBtn.addEventListener('click', () => finishDrawing());
      row.appendChild(doneBtn);
      const cancelBtn = html`<button class="draw-action-btn" title="Cancel"></button>`;
      cancelBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l8 8M12 4l-8 8"/></svg>`;
      cancelBtn.addEventListener('click', () => cancelDrawing());
      row.appendChild(cancelBtn);
      item.appendChild(row);
      drawState.drawItem = item;

      // Insert before the draw button (last child of layerList)
      layerList.appendChild(item);
    }

    function updateDrawItemCount() {
      if (drawState.pointCount) {
        drawState.pointCount.textContent = `${drawState.points.length} pts`;
      }
    }

    function exitDrawMode() {
      drawState.active = false;
      drawState.points = [];
      viewer.canvas.classList.remove('drawing');
      drawOverlay.style.display = 'none';
      if (drawState.drawItem) {
        drawState.drawItem.remove();
        drawState.drawItem = null;
        drawState.pointCount = null;
      }
    }

    async function updatePreview() {
      if (drawState.previewEntry) {
        viewer.removeLineLayer(drawState.previewEntry.id);
        drawState.previewEntry = null;
      }
      if (drawState.points.length >= 2) {
        const geojson = {
          type: 'FeatureCollection',
          features: [{
            type: 'Feature',
            geometry: {
              type: 'LineString',
              coordinates: drawState.points.map(p => [p.lon, p.lat, p.elev]),
            },
            properties: {},
          }],
        };
        drawState.previewEntry = await viewer.addLineLayer('__draw_preview', geojson, {
          'line-color': '#2196F3',
          'line-width': 4,
          'line-border-color': '#0D47A1',
          'line-border-width': 1.5,
          'atmosphere-opacity': 0.5,
        });
      }
    }

    async function finishDrawing() {
      if (drawState.previewEntry) {
        viewer.removeLineLayer('__draw_preview');
        drawState.previewEntry = null;
      }
      if (drawState.points.length >= 2) {
        const id = `drawn-path-${drawState.nextLayerId++}`;
        const geojson = {
          type: 'FeatureCollection',
          features: [{
            type: 'Feature',
            geometry: {
              type: 'LineString',
              coordinates: drawState.points.map(p => [p.lon, p.lat, p.elev]),
            },
            properties: {},
          }],
        };
        await viewer.addLineLayer(id, geojson, {
          'line-color': '#2196F3',
          'line-width': 4,
          'line-border-color': '#0D47A1',
          'line-border-width': 1.5,
          'atmosphere-opacity': 0.5,
        });
        rebuildLayerPanel();
      }
      exitDrawMode();
    }

    function cancelDrawing() {
      if (drawState.previewEntry) {
        viewer.removeLineLayer('__draw_preview');
        drawState.previewEntry = null;
      }
      exitDrawMode();
    }

    // Point placement via pointer events
    let pointerDownPos = null;
    viewer.canvas.addEventListener('pointerdown', (e) => {
      if (!drawState.active) return;
      pointerDownPos = { x: e.clientX, y: e.clientY };
    });

    viewer.canvas.addEventListener('pointerup', async (e) => {
      if (!drawState.active || !pointerDownPos) return;
      const dx = e.clientX - pointerDownPos.x;
      const dy = e.clientY - pointerDownPos.y;
      pointerDownPos = null;
      if (Math.sqrt(dx * dx + dy * dy) > 5) return; // was a drag

      const hit = viewer.raycast(e.clientX, e.clientY);
      if (!hit) return;

      const mx = hit.worldPos[0];
      const mz = hit.worldPos[2];
      // Convert Mercator back to lon/lat
      const lon = (mx - 0.5) * 360;
      const lat = (2 * Math.atan(Math.exp(Math.PI * (1 - 2 * mz))) - Math.PI / 2) * 180 / Math.PI;
      const elev = viewer.queryElevationMercator(mx, mz) || 0;

      drawState.points.push({ lon, lat, elev, mx, mz });
      updateDrawItemCount();
      await updatePreview();
    });

    viewer.canvas.addEventListener('dblclick', async (e) => {
      if (!drawState.active) return;
      e.preventDefault();
      // The dblclick fires after two pointerup events, so we have a duplicate last point
      if (drawState.points.length > 1) drawState.points.pop();
      await finishDrawing();
    });

    document.addEventListener('keydown', async (e) => {
      if (!drawState.active) return;
      if (e.key === 'Escape') {
        cancelDrawing();
      } else if (e.key === 'Enter') {
        await finishDrawing();
      } else if (e.key === 'z' && (e.metaKey || e.ctrlKey)) {
        e.preventDefault();
        if (drawState.points.length > 0) {
          drawState.points.pop();
          await updatePreview();
        }
      }
    });
    // Drag-and-drop file import
    let dragCounter = 0;
    container.addEventListener('dragover', (e) => {
      e.preventDefault();
    });
    container.addEventListener('dragenter', (e) => {
      e.preventDefault();
      dragCounter++;
      dropOverlay.style.display = '';
    });
    container.addEventListener('dragleave', (e) => {
      dragCounter--;
      if (dragCounter <= 0) {
        dragCounter = 0;
        dropOverlay.style.display = 'none';
      }
    });
    container.addEventListener('drop', async (e) => {
      e.preventDefault();
      dragCounter = 0;
      dropOverlay.style.display = 'none';
      const file = e.dataTransfer.files[0];
      if (!file) return;
      const text = await file.text();
      const name = file.name;
      const ext = name.split('.').pop().toLowerCase();
      let geojson;
      if (ext === 'gpx') {
        const doc = new DOMParser().parseFromString(text, 'text/xml');
        geojson = gpxToGeoJSON(doc);
      } else if (ext === 'geojson' || ext === 'json') {
        geojson = JSON.parse(text);
      } else {
        return;
      }
      const id = name.replace(/\.[^.]+$/, '').replace(/[^a-zA-Z0-9_-]/g, '-');
      await viewer.addLineLayer(id, geojson, {
        'line-color': '#4CAF50',
        'line-width': 4,
        'line-border-color': '#1B5E20',
        'line-border-width': 1.5,
        'atmosphere-opacity': 0.5,
      });
      rebuildLayerPanel();
    });

    // Analysis section
    const { section: analysis, body: analysisContent } = createSection('Analysis', { open: false });
    controlsContainer.appendChild(analysis);

    addControl(analysisContent,
      Inputs.range([0.0, 2], { value: viewer.settings.verticalExaggeration, step: 0.01, label: "Vertical exaggeration" }),
      v => { viewer.settings.verticalExaggeration = v; }
    );
    addControl(analysisContent,
      Inputs.range([0, 1], { value: viewer.settings.contourOpacity, step: 0.01, label: "Contour opacity" }),
      v => { viewer.settings.contourOpacity = v; }
    );
    addControl(analysisContent,
      Inputs.range([0, 1], { value: viewer.settings.slopeAngleOpacity, step: 0.01, label: "Slope angle opacity" }),
      v => {
        viewer.settings.slopeAngleOpacity = v;
        slopeLegend.style.display = v > 0 ? '' : 'none';
      }
    );
    addControl(analysisContent,
      Inputs.range([0, 1], { value: viewer.settings.slopeAspectOpacity, step: 0.01, label: "Slope aspect opacity" }),
      v => { viewer.settings.slopeAspectOpacity = v; }
    );

    // Slope aspect rose: concentric rings for Above/Near/Below treeline
    {
      const ns = 'http://www.w3.org/2000/svg';
      const size = 200;
      const cx = size / 2, cy = 80;
      const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
      const rings = [
        { key: 'slopeAspectMaskAbove', label: 'Above', rInner: 0, rOuter: 18 },
        { key: 'slopeAspectMaskNear', label: 'Near', rInner: 18, rOuter: 36 },
        { key: 'slopeAspectMaskBelow', label: 'Below', rInner: 36, rOuter: 54 },
      ];
      const labelR = 68;
      const masks = { slopeAspectMaskAbove: 0, slopeAspectMaskNear: 0, slopeAspectMaskBelow: 0 };

      const svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
      svg.setAttribute('width', size);
      svg.setAttribute('height', size);
      svg.style.display = 'block';
      svg.style.margin = '0 auto';

      for (const ring of rings) {
        for (let i = 0; i < 8; i++) {
          const a0 = (i * 45 - 22.5 - 90) * Math.PI / 180;
          const a1 = (i * 45 + 22.5 - 90) * Math.PI / 180;

          const path = document.createElementNS(ns, 'path');
          let d;
          if (ring.rInner === 0) {
            const x0 = cx + ring.rOuter * Math.cos(a0);
            const y0 = cy + ring.rOuter * Math.sin(a0);
            const x1 = cx + ring.rOuter * Math.cos(a1);
            const y1 = cy + ring.rOuter * Math.sin(a1);
            d = `M${cx},${cy}L${x0.toFixed(1)},${y0.toFixed(1)}L${x1.toFixed(1)},${y1.toFixed(1)}Z`;
          } else {
            const ix0 = cx + ring.rInner * Math.cos(a0), iy0 = cy + ring.rInner * Math.sin(a0);
            const ox0 = cx + ring.rOuter * Math.cos(a0), oy0 = cy + ring.rOuter * Math.sin(a0);
            const ix1 = cx + ring.rInner * Math.cos(a1), iy1 = cy + ring.rInner * Math.sin(a1);
            const ox1 = cx + ring.rOuter * Math.cos(a1), oy1 = cy + ring.rOuter * Math.sin(a1);
            d = `M${ix0.toFixed(1)},${iy0.toFixed(1)}L${ox0.toFixed(1)},${oy0.toFixed(1)}L${ox1.toFixed(1)},${oy1.toFixed(1)}L${ix1.toFixed(1)},${iy1.toFixed(1)}Z`;
          }

          path.setAttribute('d', d);
          path.setAttribute('stroke-width', '0.5');
          path.style.cursor = 'pointer';
          path.style.transition = 'fill 0.1s';

          const ringKey = ring.key;
          const bit = i;
          path.addEventListener('click', () => {
            masks[ringKey] ^= (1 << bit);
            path.style.fill = (masks[ringKey] & (1 << bit)) ? '#59D91A' : '';
            viewer.settings[ringKey] = masks[ringKey];
          });
          path.addEventListener('mouseenter', () => {
            if (!(masks[ringKey] & (1 << bit))) path.style.fill = document.documentElement.classList.contains('theme-is-dark') ? '#3d3d3d' : '#eee';
          });
          path.addEventListener('mouseleave', () => {
            if (!(masks[ringKey] & (1 << bit))) path.style.fill = '';
          });

          svg.appendChild(path);
        }
      }

      for (let i = 0; i < 8; i++) {
        const la = (i * 45 - 90) * Math.PI / 180;
        const text = document.createElementNS(ns, 'text');
        text.setAttribute('x', (cx + labelR * Math.cos(la)).toFixed(1));
        text.setAttribute('y', (cy + labelR * Math.sin(la)).toFixed(1));
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('dominant-baseline', 'central');
        text.setAttribute('font-size', '10');
        text.setAttribute('font-family', 'system-ui, sans-serif');
        text.setAttribute('fill', 'currentColor');
        text.setAttribute('pointer-events', 'none');
        text.textContent = dirs[i];
        svg.appendChild(text);
      }

      // Leader-line callouts: a marker dot inside each ring, connected
      // by a thin line to a label below the rose. Markers all sit on the
      // 200° (S-SSW) radial so the three vertical leaders fan slightly
      // and don't overlap.
      const calloutAngle = 200;
      const ca = (calloutAngle - 90) * Math.PI / 180;
      const calloutCfg = [
        { r: (rings[0].rInner + rings[0].rOuter) / 2, ly: 145, text: 'Above Treeline' },
        { r: (rings[1].rInner + rings[1].rOuter) / 2, ly: 165, text: 'Near Treeline' },
        { r: (rings[2].rInner + rings[2].rOuter) / 2, ly: 185, text: 'Below Treeline' },
      ];
      const labelStartX = 116;
      for (const c of calloutCfg) {
        const mx = cx + c.r * Math.cos(ca);
        const my = cy + c.r * Math.sin(ca);

        const dot = document.createElementNS(ns, 'circle');
        dot.setAttribute('cx', mx.toFixed(1));
        dot.setAttribute('cy', my.toFixed(1));
        dot.setAttribute('r', '1.5');
        dot.setAttribute('class', 'aspect-rose-dot');
        dot.setAttribute('pointer-events', 'none');
        svg.appendChild(dot);

        const line = document.createElementNS(ns, 'polyline');
        line.setAttribute('points', `${mx.toFixed(1)},${my.toFixed(1)} ${mx.toFixed(1)},${c.ly} ${(labelStartX - 2).toFixed(1)},${c.ly}`);
        line.setAttribute('class', 'aspect-rose-leader');
        line.setAttribute('pointer-events', 'none');
        svg.appendChild(line);

        const text = document.createElementNS(ns, 'text');
        text.setAttribute('x', labelStartX);
        text.setAttribute('y', c.ly);
        text.setAttribute('dominant-baseline', 'central');
        text.setAttribute('font-size', '9');
        text.setAttribute('font-family', 'system-ui, sans-serif');
        text.setAttribute('fill', 'currentColor');
        text.setAttribute('pointer-events', 'none');
        text.textContent = c.text;
        svg.appendChild(text);
      }

      const wrapper = html`<div class="aspect-rose"></div>`;
      const label = html`<label style="font-size: 12px; font-weight: 500; font-family: system-ui, sans-serif;">Slope aspect</label>`;
      wrapper.appendChild(label);
      wrapper.appendChild(svg);
      analysisContent.appendChild(wrapper);
    }
    const treelineLowerInput = Inputs.range([0, 13000], { value: viewer.settings.treelineLower, step: 50, label: "Lower treeline (ft)" });
    addControl(analysisContent, treelineLowerInput, v => { viewer.settings.treelineLower = v; });
    const treelineUpperInput = Inputs.range([0, 13000], { value: viewer.settings.treelineUpper, step: 50, label: "Upper treeline (ft)" });
    addControl(analysisContent, treelineUpperInput, v => { viewer.settings.treelineUpper = v; });

    const treelineRecomputeBtn = html`<button class="layer-download-btn">Estimate from current view</button>`;
    treelineRecomputeBtn.addEventListener('click', () => {
      const tl = viewer.estimateTreelineForCurrentView();
      treelineLowerInput.value = tl.lower;
      treelineLowerInput.dispatchEvent(new Event('input', { bubbles: true }));
      treelineUpperInput.value = tl.upper;
      treelineUpperInput.dispatchEvent(new Event('input', { bubbles: true }));
    });
    analysisContent.appendChild(treelineRecomputeBtn);

    // Lighting section: ordered top-down as the user reads — global
    // atmosphere first, then the master lighting toggle, then the three
    // per-effect strength sliders, then sun-disk / sample quality, with
    // the time-of-day calendar at the bottom.
    const { section: lightingSection, body: lightingContent } = createSection('Lighting');
    controlsContainer.appendChild(lightingSection);

    addControl(lightingContent,
      Inputs.range([0.05, 1], { value: viewer.settings.atmosphereDensity, step: 0.01, label: "Atmosphere density" }),
      v => { viewer.settings.atmosphereDensity = v; }
    );
    addControl(lightingContent,
      Inputs.range([0, 1], { value: viewer.settings.hillshadeStrength, step: 0.01, label: "Hillshade strength" }),
      v => { viewer.settings.hillshadeStrength = v; }
    );
    addControl(lightingContent,
      Inputs.range([0, 1], { value: viewer.settings.aoStrength, step: 0.01, label: "AO strength" }),
      v => { viewer.settings.aoStrength = v; }
    );
    addControl(lightingContent,
      Inputs.range([0, 1], { value: viewer.settings.shadowStrength, step: 0.01, label: "Cast shadow strength" }),
      v => { viewer.settings.shadowStrength = v; }
    );
    addControl(lightingContent,
      Inputs.range([0.05, 5], { value: viewer.settings.sunRadiusDeg, step: 0.01, label: "Sun radius (°)" }),
      v => { viewer.settings.sunRadiusDeg = v; }
    );
    addControl(lightingContent,
      Inputs.range([1, 16], { value: viewer.settings.shadowSamples, step: 1, label: "Shadow samples" }),
      v => { viewer.settings.shadowSamples = v; }
    );

    // Time-of-day controls at the bottom of the lighting section.
    sunCalendarEl = createSunCalendar(SunCalc, {
      getLocation: () => {
        const { lat, lon } = viewer.getViewLocation();
        return [lat, lon];
      },
      onChange: () => { updateSunDirection(); updateSunTimes(); },
    });
    lightingContent.appendChild(sunCalendarEl);

    // Astronomical times display — buttons that snap the calendar's
    // time slider to sunrise / golden-hour / noon / sunset for the
    // currently selected date and timezone.
    const sunTimesEl = html`<div class="sun-times"></div>`;
    lightingContent.appendChild(sunTimesEl);

    // Convert a UTC Date to the wall-clock minute-of-day in the
    // calendar's selected timezone.
    function wallMinutes(utcDate, tz) {
      const parts = new Intl.DateTimeFormat('en-US', {
        timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: false,
      }).formatToParts(utcDate);
      const h = parseInt(parts.find(p => p.type === 'hour').value, 10) % 24;
      const m = parseInt(parts.find(p => p.type === 'minute').value, 10);
      return h * 60 + m;
    }

    function updateSunTimes() {
      if (!sunTimesEl || !sunCalendarEl) return;
      const utcDate = sunCalendarEl.getUtcDate();
      if (!utcDate) return;
      const tz = sunCalendarEl.getTimezone();
      // Anchor at solar noon UTC for the selected calendar date so that
      // SunCalc.getTimes returns the day's sunrise / sunset for the
      // user's chosen day rather than slipping a day across the IDL.
      const dayKey = new Intl.DateTimeFormat('en-CA', {
        timeZone: tz, year: 'numeric', month: '2-digit', day: '2-digit',
      }).format(utcDate);
      const [yyyy, mm, dd] = dayKey.split('-').map(Number);
      const noonUtc = new Date(Date.UTC(yyyy, mm - 1, dd, 12, 0, 0));
      const { lat, lon } = viewer.getViewLocation();
      const times = SunCalc.getTimes(noonUtc, lat, lon);
      const events = [
        ['Sunrise', times.sunrise],
        ['AM golden', times.goldenHourEnd],
        ['Noon', times.solarNoon],
        ['PM golden', times.goldenHour],
        ['Sunset', times.sunset],
      ];
      sunTimesEl.innerHTML = '';
      for (const [label, date] of events) {
        if (!date || isNaN(+date)) continue;
        const minutes = wallMinutes(date, tz);
        const hrs = minutes / 60;
        const btn = html`<button class="sun-time-btn"><span class="sun-time-label">${label}</span><span class="sun-time-value">${formatTime(hrs)}</span></button>`;
        btn.addEventListener('click', () => sunCalendarEl.setTimeMinutes(minutes));
        sunTimesEl.appendChild(btn);
      }
    }

    // Now that updateSunTimes / sunTimesEl exist, default the timezone
    // to Alaska (Denali). This fires the calendar's onChange handler,
    // which is now safe to call.
    sunCalendarEl.setTimezone('America/Anchorage');
    updateSunDirection();
    updateSunTimes();

    // Sun position and the sunrise/noon/sunset times depend on lat/lon, so
    // recompute both whenever the camera settles on a new view.
    viewer.on('moveend', () => { updateSunDirection(); updateSunTimes(); });

    const { section: debug, body: debugContent } = createSection('Debug');
    controlsContainer.appendChild(debug);

    addControl(debugContent,
      Inputs.range([10, 90], { value: Math.round(viewer.fov), step: 1, label: "FOV (degrees)" }),
      v => { viewer.fov = v; }
    );
    addControl(debugContent,
      Inputs.range([0.2, 4], { value: 1 / viewer.settings.densityThreshold, step: 0.01, label: "Terrain detail" }),
      v => { viewer.settings.densityThreshold = 1 / v; }
    );
    addControl(debugContent,
      Inputs.range([0.2, 4], { value: 1 / viewer.settings.imageryDensityThreshold, step: 0.01, label: "Imagery detail" }),
      v => { viewer.settings.imageryDensityThreshold = 1 / v; }
    );
    addControl(debugContent,
      Inputs.toggle({ label: "Show memory overlay" }),
      v => { memoryWidget.style.display = v ? '' : 'none'; }
    );
    addControl(debugContent,
      Inputs.toggle({ label: "Show tile borders" }),
      v => { viewer.settings.showTileBorders = v; }
    );
    addControl(debugContent,
      Inputs.toggle({ label: "Show wireframe" }),
      v => { viewer.settings.showWireframe = v; }
    );
    addControl(debugContent,
      Inputs.toggle({ label: "Freeze coverage" }),
      v => { viewer.settings.freezeCoverage = v; }
    );
    addControl(debugContent,
      Inputs.toggle({ label: "Show collision boxes" }),
      v => { viewer.settings.showCollisionBoxes = v; }
    );

    // Memory tuning. Defaults are auto-detected from device class
    // (see detectQualityDefaults in mapviewer/settings.ts) — these
    // controls are escape hatches for testing other budgets on a
    // given device.
    addControl(debugContent,
      Inputs.range([10, 200], { value: viewer.settings.maxTerrainTiles, step: 1, label: `Max terrain tiles (auto: ${viewer.settings.qualityPreset})` }),
      v => { viewer.settings.maxTerrainTiles = Math.round(v); }
    );
    addControl(debugContent,
      Inputs.range([100, 1000], { value: viewer.settings.memoryBudgetMB ?? 1000, step: 25, label: "Memory budget (MB)" }),
      v => { viewer.settings.memoryBudgetMB = v >= 1000 ? null : v; }
    );
    addControl(debugContent,
      Inputs.toggle({ label: "Aggressive memory reclaim", value: viewer.settings.aggressiveMemoryReclaim }),
      v => { viewer.settings.aggressiveMemoryReclaim = v; }
    );

    // ── Record section ─────────────────────────────────────────────
    // Renders a 24-hour timelapse from the current view by stepping the
    // sun calendar's time slider through 0..1440 minutes in even
    // increments, awaiting viewer.awaitIdle() per frame so all tile
    // fetches and lighting bakes settle, then encoding to MP4.
    const { section: record, body: recordContent } = createSection('Record');
    controlsContainer.appendChild(record);

    const recordState = { frames: 240, fps: 30, qp: 22 };
    addControl(recordContent,
      Inputs.range([24, 1440], { value: recordState.frames, step: 1, label: "Frames" }),
      v => { recordState.frames = Math.round(v); }
    );
    addControl(recordContent,
      Inputs.range([10, 60], { value: recordState.fps, step: 1, label: "FPS" }),
      v => { recordState.fps = Math.round(v); }
    );
    addControl(recordContent,
      Inputs.range([10, 51], { value: recordState.qp, step: 1, label: "Quality (lower = better)" }),
      v => { recordState.qp = Math.round(v); }
    );

    const recordBtn = html`<button class="draw-path-btn record-btn">Record 24h timelapse</button>`;
    const recordStatus = html`<span class="record-status" style="margin-left:8px; font:11px system-ui,sans-serif; color:#666;"></span>`;
    const recordRow = html`<div style="padding:4px 0;"></div>`;
    recordRow.appendChild(recordBtn);
    recordRow.appendChild(recordStatus);
    recordContent.appendChild(recordRow);

    let recording = false;
    recordBtn.addEventListener('click', async () => {
      if (recording) return;
      recording = true;
      recordBtn.disabled = true;
      const origText = recordBtn.textContent;
      recordBtn.textContent = 'Recording…';

      // Save current time so we can restore it after the loop. The
      // sun-calendar widget owns the source of truth, but we derive
      // minutes-of-day from the UTC date + selected timezone.
      const savedUtc = sunCalendarEl.getUtcDate();
      const savedMinutes = wallMinutes(savedUtc, sunCalendarEl.getTimezone());

      // Force-even canvas dimensions (h264 requires even macroblocks).
      const w = canvas.width - (canvas.width & 1);
      const h = canvas.height - (canvas.height & 1);

      try {
        const HME = await loadH264Encoder();
        const enc = await HME.createH264MP4Encoder();
        enc.outputFilename = 'denali-timelapse.mp4';
        enc.width = w;
        enc.height = h;
        enc.frameRate = recordState.fps;
        enc.quantizationParameter = recordState.qp;
        enc.initialize();

        // Off-DOM 2D canvas to read pixels back from the WebGPU canvas.
        // toDataURL would force a base64 round-trip per frame; drawImage
        // + getImageData skips it.
        const tmp = document.createElement('canvas');
        tmp.width = w;
        tmp.height = h;
        const tmpCtx = tmp.getContext('2d', { willReadFrequently: true });

        const totalFrames = recordState.frames;
        const t0 = performance.now();
        const device = viewer._gpu.device;
        for (let i = 0; i < totalFrames; i++) {
          const minutes = Math.round((i / totalFrames) * 1440);
          sunCalendarEl.setTimeMinutes(minutes);
          // Defensive: also taint the camera so the very first iteration
          // can't shortcut through isIdle in case settings.dirty was
          // already cleared by a concurrent frame.
          viewer.triggerRedraw();
          await viewer.awaitIdle();
          await device.queue.onSubmittedWorkDone();
          // Read the canvas via toBlob → createImageBitmap. drawImage
          // and createImageBitmap-from-canvas both come back as ALL
          // BLACK on a WebGPU canvas (the swap-chain texture is
          // consumed by the compositor and not exposed to those reader
          // paths), but the toBlob / toDataURL code path explicitly
          // captures the rendered content. Slower (PNG roundtrip per
          // frame) but the only reliable readback we have without
          // re-architecting the renderer to also write to an off-canvas
          // capture texture.
          const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
          const bitmap = await createImageBitmap(blob);
          tmpCtx.drawImage(bitmap, 0, 0, w, h);
          bitmap.close();
          const imageData = tmpCtx.getImageData(0, 0, w, h);
          enc.addFrameRgba(imageData.data);
          const pct = (((i + 1) / totalFrames) * 100).toFixed(1);
          const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
          recordStatus.textContent = `Frame ${i + 1} / ${totalFrames} (${pct}%, ${elapsed}s)`;
        }

        recordStatus.textContent = 'Finalizing MP4…';
        enc.finalize();
        const bytes = enc.FS.readFile(enc.outputFilename);
        enc.delete();

        const blob = new Blob([bytes], { type: 'video/mp4' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'denali-timelapse.mp4';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        const sec = ((performance.now() - t0) / 1000).toFixed(1);
        recordStatus.textContent = `Done — ${(bytes.length / 1024 / 1024).toFixed(2)} MB in ${sec}s`;
      } catch (err) {
        console.error('record failed', err);
        recordStatus.textContent = `Error: ${err.message}`;
      } finally {
        // Restore the user's original time selection.
        sunCalendarEl.setTimeMinutes(savedMinutes);
        recording = false;
        recordBtn.disabled = false;
        recordBtn.textContent = origText;
      }
    });

    display(controlsContainer);
  </script>

  <script id="intro" type="text/markdown">
This notebook implements an interactive 3D terrain viewer from scratch using [WebGPU](https://developer.mozilla.org/en-US/docs/Web/API/WebGPU_API). It connects to a couple different data sources to render worldwide terrain an imagery, but it's definitely got some issues, so although it implements some fun tools like slope shading and physically ([more or less](https://epsg.io/3857)) accurate shadowing, I can't emphasize strongly enough that you really shouldn't be using this as any sort of guidance for outdoor activities.

Elevation data is served by [Mapterhorn](https://mapterhorn.com/), which aggregates over 150 open elevation datasets, see [mapterhorn.com/attribution](https://mapterhorn.com/attribution/) for the full list of sources. Satellite imagery is the [Sentinel-2 cloudless](https://s2maps.eu/) mosaic by EOX. Peak locations are sourced from [OpenStreetMap](https://www.openstreetmap.org/copyright). The West Buttress route comes from [OpenStreetMap](https://www.openstreetmap.org/), and the FKT route comes from [Jack Kuenzle's 2023 FKT](https://www.strava.com/activities/9223277277).

The renderer implements terrain, imagery, basic GeoJSON features (no vector tiles!), and single-scattering atmospheric lighting. The atmosphere uses Rayleigh and Mie scattering, inspired by [wwwtyro/glsl-atmosphere](https://github.com/wwwtyro/glsl-atmosphere) and [GPU Gems 2, Chapter 16](https://developer.nvidia.com/gpugems/gpugems2/part-ii-shading-lighting-and-shadows/chapter-16-accurate-atmospheric-scattering).

But let's be clear, this is a totally half-baked one-off ad hoc renderer. It uses way too much data and it'll probably crash your phone. But it's kinda fun to tinker with anyway.
  </script>
