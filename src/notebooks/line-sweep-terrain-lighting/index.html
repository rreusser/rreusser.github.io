  <title>Line Sweep Terrain Lighting</title>

  <script id="intro" type="text/markdown">
    # Line-Sweep Terrain Lighting

    Lighting is often a pretty expensive computation in computer graphics. Diffuse shading is simple, but effects like shadowing and ambient occlusion add significant cost and complexity. This post walks through a simple algorithm for heightfield shading. It's definitely not novel, but the devil is really in the details here.

    One approach for terrain lighting is to shoot rays. [Rye Terrell's terrain shading](https://wwwtyro.net/2019/03/21/advanced-map-shading.html) uses Amanatides-Woo voxel traversal to march rays from each pixel toward the sun — 128 samples per pixel, averaged for soft shadows. The results are beautiful, but the cost is high and it still suffers from tile-boundary discontinuities, which Terrell addresses by brute-force rendering 3×3 tiles (768×768) and extracting the center.

    A much cheaper alternative is a line sweep. [Karim Naaji's Line-Sweep Ambient Occlusion](https://karim.naaji.fr/lsao.html) sweeps entire rows of the grid in a single pass, tracking the horizon with a running maximum. Each pixel is visited exactly once per sweep direction, making the whole operation O(n) per direction. LSAO sweeps at 45° increments and applies an exponential or rational distance falloff to produce soft ambient-occlusion-style shading.

    This article builds on the line-sweep idea and adapts it for direct terrain lighting:

    - generalize the sweep to **arbitrary directions** by reducing any angle to a canonical octant.
    - replace the distance falloff with a **geometric shadow test** — a pixel is in shadow when intervening terrain blocks the line of sight to the sun — giving physically motivated hard shadows rather than ambient occlusion.
    - add a **parent-tile pre-pass** that assembles a half-resolution horizon buffer from ancestor tiles, warming up each ray before it enters the computation tile so that shadows from terrain beyond the boundary propagate correctly without rendering oversized tiles.
    - incorporate the sun's finite angular size to produce a geometric **penumbra**, using a smooth cutoff in altitude and multiple azimuthal samples.
  </script>

  <script id="horizon-tracking-intro" type="text/markdown">
    ## Horizon tracking

    The core primitive behind all of this is a 1-D sweep that tracks the upper convex hull of elevations seen so far along each ray. As the sweep advances left to right, each new elevation is compared against the current horizon — the line connecting the convex hull vertices. Any column whose elevation falls below the horizon is in shadow.
  </script>

  <script id="horizon-tracking-anim" type="module">
    // Animated 1-D horizon-tracking diagram. Generates a smooth random
    // elevation profile, then sweeps left-to-right tracking the upper
    // convex hull (running max of heights). The pink line shows the
    // current horizon; the red dot is the sweep cursor.
    const htW = 640,
      htH = 200,
      htN = 32,
      htPad = 20;
    const htStepX = (htW - 2 * htPad) / (htN - 1);

    function makeProfile() {
      const h = new Float32Array(htN);
      const nHarm = 4;
      const amps = [],
        phases = [],
        freqs = [];
      for (let k = 0; k < nHarm; k++) {
        amps.push((0.5 + 0.5 * Math.random()) / (k + 1));
        phases.push(Math.random() * Math.PI * 2);
        freqs.push((k + 1) * (1 + Math.random() * 0.3));
      }
      for (let i = 0; i < htN; i++) {
        let v = 0;
        for (let k = 0; k < nHarm; k++)
          v +=
            amps[k] *
            Math.cos(((freqs[k] * i) / htN) * Math.PI * 2 + phases[k]);
        h[i] = v;
      }
      let mn = Infinity,
        mx = -Infinity;
      for (let i = 0; i < htN; i++) {
        if (h[i] < mn) mn = h[i];
        if (h[i] > mx) mx = h[i];
      }
      const range = mx - mn || 1;
      for (let i = 0; i < htN; i++)
        h[i] = 10 + ((htH - 40) * (h[i] - mn)) / range;
      return h;
    }

    const svgNS = "http://www.w3.org/2000/svg";
    const htDispW = Math.min(htW, width);
    const htDispH = htDispW * (htH / htW);
    const htSvg = html`<svg
      width=${htDispW}
      height=${htDispH}
      style="display:block; background:#fff; max-width:100%;"
      viewBox="0 0 ${htW} ${htH}"
    ></svg>`;

    function pxI(i) {
      return htPad + i * htStepX;
    }
    function pyH(h) {
      return htH - htPad - h;
    }

    function mkSvgEl(tag, attrs) {
      const el = document.createElementNS(svgNS, tag);
      for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
      return el;
    }

    // Grid lines (rebuilt per profile so they stop at terrain height).
    const gridGroup = mkSvgEl("g", {});
    htSvg.appendChild(gridGroup);

    // Shadow regions (filled below horizon, above terrain).
    const shadowPath = mkSvgEl("path", {
      fill: "rgba(0,0,0,0.12)",
      stroke: "none",
    });
    htSvg.appendChild(shadowPath);

    // Terrain polyline.
    const terrainPath = mkSvgEl("polyline", {
      fill: "none",
      stroke: "#222",
      "stroke-width": 2.5,
      "stroke-linejoin": "round",
      "stroke-linecap": "round",
    });
    htSvg.appendChild(terrainPath);

    // Horizon line (pink).
    const horizonPath = mkSvgEl("polyline", {
      fill: "none",
      stroke: "rgba(240,140,160,0.7)",
      "stroke-width": 2.5,
      "stroke-linejoin": "round",
      "stroke-linecap": "round",
    });
    htSvg.appendChild(horizonPath);

    // Hull vertex dots (pink, drawn at each convex hull point).
    const hullDotsGroup = mkSvgEl("g", {});
    htSvg.appendChild(hullDotsGroup);

    // Sweep cursor dot.
    const cursorDot = mkSvgEl("circle", {
      r: 4,
      fill: "#e44",
      stroke: "#fff",
      "stroke-width": 1.5,
    });
    htSvg.appendChild(cursorDot);

    let profile = makeProfile();
    let step = 0;
    let hull = []; // upper convex hull: array of {i, h}

    function reset() {
      profile = makeProfile();
      step = 0;
      hull = [];
      terrainPath.setAttribute(
        "points",
        Array.from(profile)
          .map((h, i) => `${pxI(i)},${pyH(h)}`)
          .join(" "),
      );
      while (gridGroup.firstChild) gridGroup.removeChild(gridGroup.firstChild);
      for (let i = 0; i < htN; i++) {
        gridGroup.appendChild(
          mkSvgEl("line", {
            x1: pxI(i),
            y1: htH,
            x2: pxI(i),
            y2: pyH(profile[i]),
            stroke: "#999",
            "stroke-width": 0.75,
            "stroke-dasharray": "2 4",
          }),
        );
      }
    }

    // Interpolate the hull line height at a given sample index.
    function hullAt(idx) {
      if (hull.length === 0) return 0;
      if (idx <= hull[0].i) return hull[0].h;
      if (idx >= hull[hull.length - 1].i) return hull[hull.length - 1].h;
      for (let k = 0; k < hull.length - 1; k++) {
        if (idx <= hull[k + 1].i) {
          const t = (idx - hull[k].i) / (hull[k + 1].i - hull[k].i);
          return hull[k].h + t * (hull[k + 1].h - hull[k].h);
        }
      }
      return hull[hull.length - 1].h;
    }

    function advance() {
      if (step >= htN) {
        reset();
        return;
      }
      const h = profile[step];

      // Update the upper convex hull. Pop any vertex that falls on or
      // below the line from the second-to-last vertex to the new point.
      while (hull.length >= 2) {
        const a = hull[hull.length - 2];
        const b = hull[hull.length - 1];
        const cross = (b.i - a.i) * (h - a.h) - (step - a.i) * (b.h - a.h);
        if (cross >= 0) hull.pop();
        else break;
      }
      hull.push({ i: step, h });

      // Horizon polyline through hull vertices.
      horizonPath.setAttribute(
        "points",
        hull.map((v) => `${pxI(v.i)},${pyH(v.h)}`).join(" "),
      );

      // Hull vertex dots.
      while (hullDotsGroup.firstChild)
        hullDotsGroup.removeChild(hullDotsGroup.firstChild);
      for (const v of hull) {
        hullDotsGroup.appendChild(
          mkSvgEl("circle", {
            cx: pxI(v.i),
            cy: pyH(v.h),
            r: 3,
            fill: "rgba(240,140,160,0.85)",
            stroke: "#fff",
            "stroke-width": 1,
          }),
        );
      }

      // Shadow bars: where the hull line is above the terrain.
      let d = "";
      for (let i = 0; i <= step; i++) {
        const hh = hullAt(i);
        if (hh > profile[i] + 0.5) {
          d += `M${pxI(i)},${pyH(hh)} L${pxI(i)},${pyH(profile[i])} `;
        }
      }
      shadowPath.setAttribute("d", d);

      cursorDot.setAttribute("cx", pxI(step));
      cursorDot.setAttribute("cy", pyH(h));
      step++;
    }

    reset();
    const interval = 250;
    const pauseAfter = 1500;
    function tick() {
      advance();
      if (step >= htN) {
        setTimeout(() => {
          reset();
          advance();
          tick();
        }, pauseAfter);
      } else {
        setTimeout(tick, interval);
      }
    }
    tick();

    display(
      html`<figure>
        ${htSvg}
        <figcaption>
          The pink line shows the current horizon; pink dots mark the vertices
          of the convex hull; the red dot is the sweep cursor.
        </figcaption>
      </figure>`,
    );
  </script>

  <script id="traversal-intro" type="text/markdown">
    ## Arbitrary-direction traversal

    The shadow sweep needs to visit every pixel in the grid exactly once for a given direction. The key constraint is **conservation**: regardless of angle, every pixel must receive a total deposit weight of exactly 1.0. Without this, shadows would brighten or darken depending on the sweep direction.

    The idea is to fill the grid with a family of parallel rays, each advancing one pixel at a time along the dominant axis. A ray generally falls _between_ two pixel rows, so I split its contribution: if the ray sits at fractional position `f` between rows, the lower row gets weight `(1−f)` and the upper row gets `f`. Adjacent rays are spaced one pixel apart vertically, so at every column the two rays straddling a given pixel contribute complementary weights that sum to 1 — guaranteeing exact conservation.

    Only a single **canonical octant** needs to be implemented — directions where the ray advances in +x with a slope between 0 and 1. Any other angle reduces to this case by swapping axes (when the y-component dominates) and/or flipping an axis (when a component is negative). The canonical sweep runs over the transformed coordinates; deposits are mapped back to the original buffer.
  </script>

  <script id="result" type="module">

  <script id="stats" type="module">
    // Conservation check (computed but not displayed — useful for debugging).
    let maxDev = 0;
    for (let i = 0; i < result.accum.length; i++) {
      const dev = Math.abs(result.accum[i] - 1);
      if (dev > maxDev) maxDev = dev;
    }
    const conserved = maxDev < 1e-5;
    conserved;

  <script id="canvas-setup" type="module">
    const cwPx = Math.min(640, width);
    const chPx = Math.round((cwPx * gridH) / gridW);
    const canvas = html`<canvas
      width=${gridW}
      height=${gridH}
      style="width:${cwPx}px; height:${chPx}px; image-rendering:pixelated; display:block;"
    ></canvas>`;

    const SVG_NS = "http://www.w3.org/2000/svg";
    const overlaySvg = document.createElementNS(SVG_NS, "svg");
    overlaySvg.setAttribute("width", cwPx);
    overlaySvg.setAttribute("height", chPx);
    overlaySvg.setAttribute("viewBox", `0 0 ${gridW} ${gridH}`);
    overlaySvg.style.cssText =
      "position:absolute; left:0; top:0; pointer-events:none; overflow:visible;";
    const rayGroup = document.createElementNS(SVG_NS, "g");
    rayGroup.style.display = "none";
    overlaySvg.appendChild(rayGroup);

    // Draggable handle — positioned on the circle edge at current angle.
    // Sizes are in viewBox units; convert from screen pixels.
    const vbScale = gridW / cwPx;
    const handleR = Math.min(gridW, gridH) * 0.4;
    const handleG = document.createElementNS(SVG_NS, "g");
    handleG.setAttribute("style", "pointer-events:auto; cursor:grab; touch-action:none;");
    const haloC = document.createElementNS(SVG_NS, "circle");
    haloC.setAttribute("r", String(24 * vbScale));
    haloC.setAttribute("fill", "rgba(70,130,220,0.18)");
    handleG.appendChild(haloC);
    const hitC = document.createElementNS(SVG_NS, "circle");
    hitC.setAttribute("r", String(28 * vbScale));
    hitC.setAttribute("fill", "#000");
    hitC.setAttribute("fill-opacity", "0");
    handleG.appendChild(hitC);
    const dotC = document.createElementNS(SVG_NS, "circle");
    dotC.setAttribute("r", String(8 * vbScale));
    dotC.setAttribute("fill", "#4682dc");
    dotC.setAttribute("stroke", "#fff");
    dotC.setAttribute("stroke-width", String(3 * vbScale));
    handleG.appendChild(dotC);
    overlaySvg.appendChild(handleG);

    function placeHandle(deg) {
      const rad = (deg * Math.PI) / 180;
      const hx = gridW / 2 - handleR * Math.cos(rad);
      const hy = gridH / 2 + handleR * Math.sin(rad);
      handleG.setAttribute("transform", `translate(${hx}, ${hy})`);
    }
    // Don't reference angleDeg here — it would make this cell
    // reactive, destroying the handle on every angle change.

    let angleDragging = false;
    function angleFromEvent(e) {
      const rect = overlaySvg.getBoundingClientRect();
      const sx = gridW / rect.width;
      const sy = gridH / rect.height;
      const mx = (e.clientX - rect.left) * sx;
      const my = (e.clientY - rect.top) * sy;
      let deg = (Math.atan2(my - gridH / 2, -(mx - gridW / 2)) * 180) / Math.PI;
      if (deg < 0) deg += 360;
      return Math.round(deg * 2) / 2;
    }
    handleG.addEventListener("pointerdown", (e) => {
      if (e.button !== 0) return;
      angleDragging = true;
      rayGroup.style.display = "";
      try { handleG.setPointerCapture(e.pointerId); } catch (_) {}
      handleG.style.cursor = "grabbing";
      e.preventDefault();
      e.stopPropagation();
    });
    handleG.addEventListener("pointermove", (e) => {
      if (!angleDragging) return;
      const stepped = angleFromEvent(e);
      const m = window.__angleDegMut;
      if (m.value !== stepped) m.value = stepped;
      e.stopPropagation();
    });
    const endAngleDrag = (e) => {
      if (!angleDragging) return;
      angleDragging = false;
      rayGroup.style.display = "none";
      try { handleG.releasePointerCapture(e.pointerId); } catch (_) {}
      handleG.style.cursor = "grab";
      e.stopPropagation();
    };
    handleG.addEventListener("pointerup", endAngleDrag);
    handleG.addEventListener("pointercancel", endAngleDrag);

    const container = html`<div style="position:relative; display:inline-block; border:1px solid #888;"></div>`;
    container.appendChild(canvas);
    container.appendChild(overlaySvg);

    display(
      html`<figure>
        ${container}
        <figcaption>
          Drag the yellow handle to sweep through all 360°. The left half shows
          each ray depositing with uniform weight (visible banding where rays
          overlap or leave gaps); the right half shows the
          <code>(1−f, f)</code> interpolation scheme, which produces an even
          fill. While dragging, thin lines show each ray's traversal path.
        </figcaption>
      </figure>`,
    );
    canvas;
  </script>

  <script id="render" type="module">
    const ctx = canvas.getContext("2d");
    const img = ctx.createImageData(gridW, gridH);
    const px = img.data;
    const splitX = Math.floor(gridW / 2);

    for (let y = 0; y < gridH; y++) {
      for (let x = 0; x < gridW; x++) {
        const i = y * gridW + x;
        const j = i * 4;
        const src = x < splitX ? resultOff : resultOn;
        let r = Math.max(0, Math.min(255, src.rAcc[i] * 255));
        let g = Math.max(0, Math.min(255, src.gAcc[i] * 255));
        let b = Math.max(0, Math.min(255, src.bAcc[i] * 255));
        if (showRayStarts && resultOn.start[i]) {
          r = 0;
          g = 0;
          b = 0;
        }
        px[j] = r;
        px[j + 1] = g;
        px[j + 2] = b;
        px[j + 3] = 255;
      }
    }
    ctx.putImageData(img, 0, 0);

    // Reposition the drag handle.
    placeHandle(angleDeg);

    // Rebuild SVG ray lines. Each ray is a straight line in the
    // canonical reparameterized grid; we map entry/exit back to
    // original coords and draw a thin line.
    while (rayGroup.firstChild) rayGroup.removeChild(rayGroup.firstChild);
    const theta = (angleDeg * Math.PI) / 180;
    const rdx = Math.cos(theta);
    const rdy = -Math.sin(theta);
    const adx = Math.abs(rdx);
    const ady = Math.abs(rdy);
    const rswap = ady > adx;
    const rflipX = rdx < 0;
    const rflipY = rdy < 0;
    const rvW = rswap ? gridH : gridW;
    const rvH = rswap ? gridW : gridH;
    const rndx = rswap ? ady : adx;
    const rndy = rswap ? adx : ady;
    let rm = rndx === 0 ? 0 : rndy / rndx;
    if (rm < 1e-12) rm = 0;
    else if (rm > 1 - 1e-12) rm = 1;
    const rbMin = -Math.ceil(rm * (rvW - 1));
    const rbMax = rvH - 1;
    const toXY = (cx, cy) => {
      let ox = rswap ? cy : cx;
      let oy = rswap ? cx : cy;
      if (rflipX) ox = gridW - 1 - ox;
      if (rflipY) oy = gridH - 1 - oy;
      return [ox + 0.5, oy + 0.5];
    };
    const bCenter = (() => {
      const oxC = Math.floor(gridW / 2);
      const oyC = Math.floor(gridH / 2);
      const oxP = rflipX ? gridW - 1 - oxC : oxC;
      const oyP = rflipY ? gridH - 1 - oyC : oyC;
      const cxC = rswap ? oyP : oxP;
      const cyC = rswap ? oxP : oyP;
      return Math.round(cyC - rm * cxC);
    })();
    for (let b = rbMin; b <= rbMax; b++) {
      let cxStart = -1;
      let cxEnd = -1;
      for (let cx = 0; cx < rvW; cx++) {
        const y = b + rm * cx;
        const yi = Math.floor(y);
        if (yi >= 0 && yi < rvH) {
          if (cxStart < 0) cxStart = cx;
          cxEnd = cx;
        } else if (yi + 1 >= 0 && yi + 1 < rvH) {
          if (cxStart < 0) cxStart = cx;
          cxEnd = cx;
        }
      }
      if (cxStart < 0) continue;
      const [x1, y1] = toXY(cxStart, b + rm * cxStart);
      const [x2, y2] = toXY(cxEnd, b + rm * cxEnd);
      const line = document.createElementNS(SVG_NS, "line");
      const isCenter = b === bCenter;
      line.setAttribute("x1", x1);
      line.setAttribute("y1", y1);
      line.setAttribute("x2", x2);
      line.setAttribute("y2", y2);
      line.setAttribute("stroke", isCenter ? "red" : "rgba(0,0,0,0.15)");
      line.setAttribute("stroke-width", String(gridW / Math.min(640, width)));
      rayGroup.appendChild(line);
    }
  </script>

  <script id="hard-shadow-intro" type="text/markdown">
    ## Hard-threshold shadows

    With the traversal machinery in place, I can apply it to direct sunlight. Where LSAO applies a distance falloff to produce soft ambient-occlusion-style shading, I replace this with a geometric shadow test: a pixel is in shadow when terrain between it and the sun blocks the line of sight. The result is a binary lit/shadow decision per pixel, appropriate for direct sunlight.

    Each ray sweeps _away_ from the sun (azimuth+180°), so shadows fall along the direction of travel. At each step I interpolate the terrain height at the ray's sub-pixel position and ask: does a ray from the sun at altitude `α` clear all the terrain seen so far? The trick that makes this O(1) per step is to add a height ramp to each elevation — define `G_k = h_k + k·d_step·tan(α)`, where `d_step` is the metric length of one canonical step. In this tilted coordinate system, the sun's line of sight becomes horizontal, and the shadow test reduces to checking whether `G` at the current pixel exceeds the running maximum of `G` over all previous pixels on the ray.

    A few implementation details matter for quality:

    - **Interpolation symmetry.** The terrain sample and the shadow deposit must use the same `(1−f, f)` weights. Any mismatch produces striations on hillsides.
    - **Pixel size.** At Web Mercator zoom `z` and latitude `lat`, the pixel size in meters is `40075016.686·cos(lat) / (2^z · tileSize)`. The canonical step length is `√(1 + m²) · pixelSize`.
  </script>

  <script id="srgb-helper" type="module">
    // Linear → sRGB gamma encoding. All per-pixel rendering below
    // interprets `tone * lit` (etc.) as a linear radiance and runs the
    // result through this before writing to the canvas, so what appears
    // on screen is a correct gamma encoding of the physical computation.
    const linearToSrgb = (x) => {
      if (x <= 0) return 0;
      if (x >= 1) return 1;
      return x <= 0.0031308 ? 12.92 * x : 1.055 * Math.pow(x, 1 / 2.4) - 0.055;
    };
    linearToSrgb;
  </script>

          Drag the yellow handle to change the sun direction.
        </figcaption>
      </figure>`,
    );
    ssCanvas;
  </script>

  <script id="shadow-simple-result" type="module">
    // Shadow computed WITHOUT parent/horizon data — comp tile only.
    // Uses its own independent sun direction from simpleSunDir.
    const shadowSimpleResult = sweepShadow(
      elevation.N,
      elevation.N,
      elevation.heights,
      simpleSunDir.az,
      simpleSunDir.alt,
      elevation.pixelSizeM,
      null,
      0,
    );
    shadowSimpleResult;
  </script>

  <script id="shadow-simple-render" type="module">
    const ssCtx = ssCanvas.getContext("2d");
    const ssImg = ssCtx.createImageData(elevation.N, elevation.N);
    const ssPx = ssImg.data;
    const ssH = elevation.heights;
    const ssMin = elevation.elevMin;
    const ssRange = elevation.elevMax - elevation.elevMin || 1;

    for (let i = 0; i < ssH.length; i++) {
      const j = i * 4;
      const tone = 0.1 + 0.8 * ((ssH[i] - ssMin) / ssRange);
      const shade = Math.min(1, Math.max(0, shadowSimpleResult[i]));
      const lit = 1 - 0.94 * shade;
      const v = Math.round(linearToSrgb(tone * lit) * 255);
      ssPx[j] = v;
      ssPx[j + 1] = v;
      ssPx[j + 2] = v;
      ssPx[j + 3] = 255;
    }
    ssCtx.putImageData(ssImg, 0, 0);
  </script>

  <script id="parent-tile-intro" type="text/markdown">
    ## Parent-tile pre-pass

    A fundamental limitation of per-tile line-sweep methods — including LSAO — is that a sweep starting at the tile edge has no knowledge of terrain beyond it. Shadows cast by mountains just outside the boundary are clipped, producing visible seams between tiles.

    I resolve this by assembling a half-resolution horizon buffer from four z−1 ancestor tiles, covering the computation tile and one tile width of surrounding terrain in each direction. Before the main sweep, a pre-pass walks each ray through this coarser buffer, warming up the running maximum so that by the time the ray enters the computation tile, it already carries the horizon contributed by surrounding terrain.
  </script>

  <script id="tile-coords" type="module">
    // Reference tile for the interactive shadow / AO / soft-shadow
    // figures below. Northern Arizona / Grand Canyon area, served
    // live from https://tiles.mapterhorn.com.
    const tile = { z: 13, x: 1590, y: 3188 };
    tile;
  </script>

  <script id="terrarium-decode" type="module">
    // Decode a Terrarium-encoded webp tile into a Float32Array of heights.
    async function fetchTerrarium(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`tile fetch failed: ${url} (${res.status})`);
      const blob = await res.blob();
      const bitmap = await createImageBitmap(blob);
      const N = bitmap.width;
      const c = document.createElement("canvas");
      c.width = N;
      c.height = N;
      const cctx = c.getContext("2d");
      cctx.drawImage(bitmap, 0, 0);
      const bytes = cctx.getImageData(0, 0, N, N).data;
      const heights = new Float32Array(N * N);
      let hMin = Infinity,
        hMax = -Infinity;
      for (let i = 0; i < N * N; i++) {
        const r = bytes[i * 4],
          g = bytes[i * 4 + 1],
          b = bytes[i * 4 + 2];
        const h = r * 256 + g + b / 256 - 32768;
        heights[i] = h;
        if (h < hMin) hMin = h;
        if (h > hMax) hMax = h;
      }
      return { N, heights, hMin, hMax };
    }
    fetchTerrarium;
  </script>

  <script id="tile-elevation" type="module">
    const tileElevation = await (async () => {
      const url = `https://tiles.mapterhorn.com/${tile.z}/${tile.x}/${tile.y}.webp`;
      const { N, heights, hMin, hMax } = await fetchTerrarium(url);
      const nMerc = Math.PI * (1 - (2 * (tile.y + 0.5)) / (1 << tile.z));
      const lat = Math.atan(Math.sinh(nMerc));
      const pixelSizeM = (40075016.686 * Math.cos(lat)) / ((1 << tile.z) * N);
      return {
        label: `mapterhorn ${tile.z}/${tile.x}/${tile.y}`,
        heights,
        N,
        pixelSizeM,
        elevMin: hMin,
        elevMax: hMax,
        lat,
      };
    })();
    tileElevation;
  </script>

  <script id="tile-horizon" type="module">
    // Fetch four z-1 parent tiles — guaranteed to physically cover the 3×3
    // neighbourhood around our computation tile — and assemble them into a
    // half-resolution horizon buffer of size (3·N/2) × (3·N/2) parent pixels,
    // centred on the computation tile so that comp pixel (0, 0) lands at
    // horizon pixel (N/2, N/2).
    //
    // The computation tile is at parent pixel offset
    //   (tile.x mod 2) * (PN/2), (tile.y mod 2) * (PN/2)
    // within its parent. We extract a 3·PN/2-wide window whose centre aligns
    // with that offset inside the 2·PN-wide block of four parents.
    const tileHorizon = await (async () => {
      const parentZ = tile.z - 1;
      const qx = Math.floor((tile.x - 1) / 2);
      const qy = Math.floor((tile.y - 1) / 2);

      // Tolerate missing parents: if one of the four z−1 tiles isn't
      // in the on-disk pyramid, substitute zero-filled heights. The
      // figures degrade gracefully — the missing quadrants of the
      // parent ring just read as flat ground rather than throwing.
      async function fetchParent(px, py) {
        try {
          const url = `https://tiles.mapterhorn.com/${parentZ}/${px}/${py}.webp`;
          return await fetchTerrarium(url);
        } catch (_) {
          return null;
        }
      }

      const [p00, p10, p01, p11] = await Promise.all([
        fetchParent(qx, qy),
        fetchParent(qx + 1, qy),
        fetchParent(qx, qy + 1),
        fetchParent(qx + 1, qy + 1),
      ]);
      const ref = p00 || p10 || p01 || p11;
      if (!ref)
        throw new Error(
          `tileHorizon: no z${parentZ} parents downloaded for tile ${tile.z}/${tile.x}/${tile.y}`,
        );
      const PN = ref.N;
      const BN = 2 * PN;
      const zeroTile = new Float32Array(PN * PN);

      // Assemble the 2×2 parent block into a BN × BN buffer.
      const block = new Float32Array(BN * BN);
      function place(p, bx, by) {
        const ox = bx * PN,
          oy = by * PN;
        const h = p ? p.heights : zeroTile;
        for (let j = 0; j < PN; j++) {
          const src = j * PN;
          const dst = (oy + j) * BN + ox;
          block.set(h.subarray(src, src + PN), dst);
        }
      }
      place(p00, 0, 0);
      place(p10, 1, 0);
      place(p01, 0, 1);
      place(p11, 1, 1);

      // Extract the 3·PN/2 horizon window. Its top-left corner sits half a
      // parent-tile-width before the computation tile in both axes.
      const HN = Math.floor((3 * PN) / 2);
      // Position of the computation tile's top-left corner inside the 2×2 block,
      // in parent pixels.
      const compTileXInBlock = (tile.x - 2 * qx) * (PN / 2);
      const compTileYInBlock = (tile.y - 2 * qy) * (PN / 2);
      const startX = compTileXInBlock - PN / 2;
      const startY = compTileYInBlock - PN / 2;

      const heights = new Float32Array(HN * HN);
      let hMin = Infinity,
        hMax = -Infinity;
      for (let j = 0; j < HN; j++) {
        const srcRow = (startY + j) * BN + startX;
        const dstRow = j * HN;
        for (let i = 0; i < HN; i++) {
          const h = block[srcRow + i];
          heights[dstRow + i] = h;
          if (h < hMin) hMin = h;
          if (h > hMax) hMax = h;
        }
      }

      return {
        label: `mapterhorn parents of ${tile.z}/${tile.x}/${tile.y}`,
        heights,
        HN,
        compTileSize: tileElevation.N,
        startX,
        startY,
        hMin,
        hMax,
      };
    })();
    tileHorizon;
  </script>

  <script id="geometry-elevation" type="module">
    // Three primitives scattered on flat ground inside the comp tile
    // (cone, cylinder, hemisphere — exercising linear, vertical-wall, and
    // curved shadow edges), plus a set of tall pillars and cones placed
    // in the surrounding parent ring so the parent-tile figure's pre-pass
    // has something to cast shadows from across the tile boundary.
    const geometryElevation = (() => {
      const N = 512;
      const pixelSizeM = 0.5;
      const ground = 0;

      // Positions and radii given in metres; the comp tile is 256 m × 256 m.
      const cone = { cx: 80, cy: 92, r: 36 }; // 45° slope, peak == r
      const cyl = { cx: 184, cy: 72, r: 28, h: 36 };
      const hemi = { cx: 132, cy: 180, r: 40 };

      const heights = new Float32Array(N * N);
      let hMax = 0;
      for (let j = 0; j < N; j++) {
        const ym = (j + 0.5) * pixelSizeM;
        for (let i = 0; i < N; i++) {
          const xm = (i + 0.5) * pixelSizeM;
          let h = 0;

          const dxc = xm - cone.cx,
            dyc = ym - cone.cy;
          const rc = Math.sqrt(dxc * dxc + dyc * dyc);
          if (rc < cone.r) h = Math.max(h, cone.r - rc);

          const dxl = xm - cyl.cx,
            dyl = ym - cyl.cy;
          const rl = Math.sqrt(dxl * dxl + dyl * dyl);
          // 1-pixel-wide linear ramp at the silhouette.
          const tl = Math.max(
            0,
            Math.min(1, (cyl.r + 0.5 * pixelSizeM - rl) / pixelSizeM),
          );
          if (tl > 0) h = Math.max(h, tl * cyl.h);

          const dxh = xm - hemi.cx,
            dyh = ym - hemi.cy;
          const d2 = dxh * dxh + dyh * dyh;
          if (d2 < hemi.r * hemi.r)
            h = Math.max(h, Math.sqrt(hemi.r * hemi.r - d2));

          heights[j * N + i] = ground + h;
          if (h > hMax) hMax = h;
        }
      }

      // Parent-ring horizon buffer at half resolution. Covers world
      // [-256, 512] m × [-256, 512] m with HN = 3·N/2 = 768 pixels at
      // 1 m/px. Comp pixel (0, 0) lands at horizon pixel (N/2, N/2).
      const HN = Math.floor((3 * N) / 2);
      const horizonPxSize = pixelSizeM * 2;

      // Tall pillars (cylinders) scattered through the parent ring. Each
      // drops a hard-edged shadow into the comp tile at low sun angles.
      const horPillars = [
        { cx: -80, cy: 60, r: 18, h: 110 },
        { cx: 140, cy: -90, r: 14, h: 95 },
        { cx: 330, cy: 90, r: 16, h: 80 },
        { cx: 60, cy: 330, r: 14, h: 70 },
        { cx: -100, cy: 280, r: 12, h: 60 },
        { cx: 380, cy: 360, r: 16, h: 85 },
      ];
      // A couple of 45° cones for a softer (linearly tapered) blocker.
      const horCones = [
        { cx: 370, cy: -70, r: 70 },
        { cx: -160, cy: 170, r: 55 },
      ];

      const horizonHeights = new Float32Array(HN * HN);
      let horMax = 0;
      for (let j = 0; j < HN; j++) {
        const ym = (j - N / 2 + 0.5) * horizonPxSize;
        for (let i = 0; i < HN; i++) {
          const xm = (i - N / 2 + 0.5) * horizonPxSize;
          let h = 0;

          for (const p of horPillars) {
            const dx = xm - p.cx,
              dy = ym - p.cy;
            const r = Math.sqrt(dx * dx + dy * dy);
            const t = Math.max(
              0,
              Math.min(1, (p.r + 0.5 * horizonPxSize - r) / horizonPxSize),
            );
            if (t > 0) h = Math.max(h, t * p.h);
          }
          for (const c of horCones) {
            const dx = xm - c.cx,
              dy = ym - c.cy;
            const r = Math.sqrt(dx * dx + dy * dy);
            if (r < c.r) h = Math.max(h, c.r - r);
          }

          horizonHeights[j * HN + i] = h;
          if (h > horMax) horMax = h;
        }
      }

      return {
        label: `geometry ${N}×${N}`,
        heights,
        N,
        pixelSizeM,
        elevMin: ground,
        elevMax: ground + hMax,
        lat: 0,
        horizon: {
          HN,
          heights: horizonHeights,
          hMin: 0,
          hMax: horMax,
        },
      };
    })();
    geometryElevation;
  </script>

  <script id="elevation" type="module">
    // Switch between sources; reactive on `source`.
    const elevation = source === "geometry" ? geometryElevation : tileElevation;
    // (source values: "terrain" | "geometry")
    elevation;
  </script>

  <script id="elevation-horizon" type="module">
    // Pick a horizon buffer matching the active elevation source.
    //
    // * For the tile source, use the assembled parent-tile data (tileHorizon).
    // * For the geometry source, the surrounding physical world is flat
    //   ground at elevation 0, so a zero-filled buffer of the same shape
    //   is physically correct.
    const elevationHorizon = (() => {
      const N = elevation.N;
      if (elevation === tileElevation) {
        return { HN: tileHorizon.HN, heights: tileHorizon.heights };
      }
      if (elevation.horizon) {
        return elevation.horizon;
      }
      const HN = Math.floor((3 * N) / 2);
      return { HN, heights: new Float32Array(HN * HN) };
    })();
    elevationHorizon;
  </script>

  <script id="horizon-visualization" type="module">
    // Render the computation tile stamped into an HN × HN frame with the
    // same half-resolution layout as the compute-shader horizon buffer (comp
    // pixel (0, 0) at horizon pixel (N/2, N/2), red outline around comp-tile
    // region).
    const N = elevation.N;
    const HN = elevationHorizon.HN;

    // Shared hypsometric ramp: use horizon stats for the tile source, comp
    // tile stats for synthetic sources (where horizon is all zeros).
    let gMin, gMax;
    if (elevation === tileElevation) {
      gMin = Math.min(elevation.elevMin, tileHorizon.hMin);
      gMax = Math.max(elevation.elevMax, tileHorizon.hMax);
    } else {
      gMin = elevation.elevMin;
      gMax = elevation.elevMax;
    }
    const gRange = gMax - gMin || 1;
    const shade = (h) => {
      const t = Math.max(0, Math.min(1, (h - gMin) / gRange));
      return Math.round((0.15 + 0.8 * t) * 255);
    };

    const horizonImg = new ImageData(HN, HN);
    const horizonPx = horizonImg.data;

    for (let j = 0; j < HN; j++) {
      for (let i = 0; i < HN; i++) {
        const v = shade(elevationHorizon.heights[j * HN + i]);
        const k = (j * HN + i) * 4;
        horizonPx[k] = v;
        horizonPx[k + 1] = v;
        horizonPx[k + 2] = v;
        horizonPx[k + 3] = 255;
      }
    }

    // Comp tile stamp: 2×2-average down to the horizon-pixel resolution so
    // its scale matches the surrounding parent data.
    const half = N >> 1;
    const originX = N >> 1;
    const originY = N >> 1;
    for (let j = 0; j < half; j++) {
      for (let i = 0; i < half; i++) {
        const i0 = 2 * i,
          j0 = 2 * j;
        const a = elevation.heights[j0 * N + i0];
        const b = elevation.heights[j0 * N + i0 + 1];
        const c = elevation.heights[(j0 + 1) * N + i0];
        const d = elevation.heights[(j0 + 1) * N + i0 + 1];
        const v = shade(0.25 * (a + b + c + d));
        const k = ((originY + j) * HN + (originX + i)) * 4;
        horizonPx[k] = Math.min(255, v + 8);
        horizonPx[k + 1] = v;
        horizonPx[k + 2] = Math.max(0, v - 16);
        horizonPx[k + 3] = 255;
      }
    }

    for (let i = 0; i < half; i++) {
      const edges = [
        [originX + i, originY],
        [originX + i, originY + half - 1],
        [originX, originY + i],
        [originX + half - 1, originY + i],
      ];
      for (const [x, y] of edges) {
        const k = (y * HN + x) * 4;
        horizonPx[k] = 220;
        horizonPx[k + 1] = 40;
        horizonPx[k + 2] = 40;
        horizonPx[k + 3] = 255;
      }
    }

    const disp = Math.max(1, Math.floor(512 / HN));
    const horizonCanvas = html`<canvas
      width=${HN}
      height=${HN}
      style="width:${HN * disp}px; height:${HN *
      disp}px; image-rendering:pixelated; border:1px solid #888; display:block;"
    ></canvas>`;
    horizonCanvas.getContext("2d").putImageData(horizonImg, 0, 0);

    // Keep horizonCanvas alive for reactive deps but don't display it
    // as a separate figure — it's merged into the shadow canvas below.
    horizonCanvas;
  </script>

  <script id="shadow-result" type="module">
    const horizonTouched = new Uint8Array(
      elevationHorizon.HN * elevationHorizon.HN,
    );
    const shadowResult = sweepShadow(
      elevation.N,
      elevation.N,
      elevation.heights,
      sunAzimuth,
      sunAltitude,
      elevation.pixelSizeM,
      elevationHorizon.heights,
      elevationHorizon.HN,
      horizonTouched,
    );
    shadowResult;
  </script>

  <script id="shadow-canvas-setup" type="module">
    // Merged figure: HN × HN canvas showing surrounding parent terrain
    // with the shadow-rendered comp tile in the centre. Displayed at
    // 640 × 640 CSS pixels.
    const shadowHN = elevationHorizon.HN;
    const shadowDispPx = Math.min(640, width);
    const shadowCanvas = html`<canvas
      width=${shadowHN}
      height=${shadowHN}
      style="display:block; width:${shadowDispPx}px; height:${shadowDispPx}px; image-rendering:pixelated;"
    ></canvas>`;

    const shadowFigure = mountSunHandle({
      canvas: shadowCanvas,
      ...parentSunDirAccessor,
    });
    shadowFigure.appendChild(createSourceToggleBadge());

    display(
      html`<figure>
        ${shadowFigure}
        <figcaption>
          The red outline marks the computation-tile region; blue tinting shows
          which parent pixels were touched by the warmup. Drag the yellow handle
          to change the sun direction.
        </figcaption>
      </figure>`,
    );
    shadowCanvas;
  </script>

  <script id="shadow-render" type="module">
    // Merged render: HN × HN canvas with parent terrain surrounding the
    // comp tile, and the CPU shadow result composited into the centre.
    const srN = elevation.N;
    const srHN = elevationHorizon.HN;
    const shadowCtx = shadowCanvas.getContext("2d");
    const shadowImg = shadowCtx.createImageData(srHN, srHN);
    const shadowPx = shadowImg.data;

    // Shared hypsometric ramp across the whole figure: include the
    // horizon's min/max (for both the tile source and any synthetic
    // source that ships a populated horizon) so comp and parent tones
    // sit on the same scale.
    let gMinS = elevation.elevMin;
    let gMaxS = elevation.elevMax;
    if (elevation === tileElevation) {
      gMinS = Math.min(gMinS, tileHorizon.hMin);
      gMaxS = Math.max(gMaxS, tileHorizon.hMax);
    } else if (elevation.horizon && elevation.horizon.hMax !== undefined) {
      gMinS = Math.min(gMinS, elevation.horizon.hMin ?? 0);
      gMaxS = Math.max(gMaxS, elevation.horizon.hMax);
    }
    const gRangeS = gMaxS - gMinS || 1;
    const toneOf = (h) => {
      const t = Math.max(0, Math.min(1, (h - gMinS) / gRangeS));
      return 0.1 + 0.8 * t;
    };

    // Central computation-tile region, in horizon-pixel coordinates.
    const halfN = srN >> 1;
    const ox = srN >> 1;
    const oy = srN >> 1;

    // Background: parent / horizon elevation data. Surrounding pixels
    // (outside the central computation tile) get a darkening cast so the
    // red-boxed centre reads clearly.
    const horH = elevationHorizon.heights;
    const surroundDarken = 0.4;
    for (let j = 0; j < srHN; j++) {
      const inCenterJ = j >= oy && j < oy + halfN;
      for (let i = 0; i < srHN; i++) {
        const inCenter = inCenterJ && i >= ox && i < ox + halfN;
        let tone = toneOf(horH[j * srHN + i]);
        if (!inCenter) tone *= surroundDarken;
        const v = Math.round(linearToSrgb(tone) * 255);
        const k = (j * srHN + i) * 4;
        shadowPx[k] = v;
        shadowPx[k + 1] = v;
        shadowPx[k + 2] = v;
        shadowPx[k + 3] = 255;
      }
    }

    // Centre tile: shadow-composited hypsometric at half resolution.
    // Each horizon pixel covers a 2×2 block of comp pixels; we average
    // both the tone and the shadow value over those four samples.
    const hh = elevation.heights;
    for (let j = 0; j < halfN; j++) {
      for (let i = 0; i < halfN; i++) {
        const i0 = 2 * i,
          j0 = 2 * j;
        const idx00 = j0 * srN + i0;
        const idx10 = idx00 + 1;
        const idx01 = idx00 + srN;
        const idx11 = idx01 + 1;
        const avgTone =
          0.25 *
          (toneOf(hh[idx00]) +
            toneOf(hh[idx10]) +
            toneOf(hh[idx01]) +
            toneOf(hh[idx11]));
        const avgShade =
          0.25 *
          (shadowResult[idx00] +
            shadowResult[idx10] +
            shadowResult[idx01] +
            shadowResult[idx11]);
        const lit = 1 - 0.94 * Math.min(1, Math.max(0, avgShade));
        const v = Math.round(linearToSrgb(avgTone * lit) * 255);
        const k = ((oy + j) * srHN + (ox + i)) * 4;
        shadowPx[k] = v;
        shadowPx[k + 1] = v;
        shadowPx[k + 2] = v;
        shadowPx[k + 3] = 255;
      }
    }

    // Tint parent pixels touched by the warmup.
    for (let j = 0; j < srHN; j++) {
      for (let i = 0; i < srHN; i++) {
        if (i >= ox && i < ox + halfN && j >= oy && j < oy + halfN) continue;
        const t = horizonTouched[j * srHN + i];
        if (!t) continue;
        const k = (j * srHN + i) * 4;
        shadowPx[k] = Math.round(shadowPx[k] * 0.7);
        shadowPx[k + 1] = Math.round(shadowPx[k + 1] * 0.7);
        shadowPx[k + 2] = Math.min(255, Math.round(shadowPx[k + 2] * 0.7 + 70));
      }
    }

    // Red border around the centre tile (2 horizon-pixels wide).
    const bw = 2;
    for (let j = 0; j < halfN; j++) {
      const onEdgeJ = j < bw || j >= halfN - bw;
      for (let i = 0; i < halfN; i++) {
        if (!(onEdgeJ || i < bw || i >= halfN - bw)) continue;
        const k = ((oy + j) * srHN + (ox + i)) * 4;
        shadowPx[k] = 220;
        shadowPx[k + 1] = 50;
        shadowPx[k + 2] = 50;
        shadowPx[k + 3] = 255;
      }
    }

    shadowCtx.putImageData(shadowImg, 0, 0);
  </script>

  <script id="penumbra-hover" type="module">
    // Mouse-driven sun position for the penumbra analysis figure below.
    // Stashed on `window` so the figure cell (a separate scope) can mutate
    // it from its mouse handlers.
    const penumbraHoverMut = Mutable({ x: 16, y: 19 });
    const penumbraHover = penumbraHoverMut;
    const penumbraHoverAccessor = (() => { const m = penumbraHoverMut; return { get: () => m.value, set: (v) => { m.value = v; } }; })();
  </script>

  <script id="penumbra-elev-version" type="module">
    // Version counter for the penumbra figure's height field. The
    // height field itself lives at `window.__penumbraElev` and is
    // mutated in place by the figure's click-drag handler; bumping this
    // counter triggers a reactive re-render of the figure cell.
    const penumbraElevVersionMut = Mutable(0);
    window.__penumbraElevVersionMut = penumbraElevVersionMut;
    const penumbraElevVersion = penumbraElevVersionMut;
    penumbraElevVersion;
  </script>

  <script id="penumbra-intro" type="text/markdown">
    ## Penumbra

    The hard-threshold shadow from a point sun produces perfectly sharp edges, but real sunlight has a finite angular diameter (~0.53°), creating a geometric penumbra — a gradual transition from full shadow to full light. I plan to incorporate this in two ways: a smooth cutoff in the altitude direction, and multiple azimuthal samples to soften the shadow edge laterally.
  </script>

  <script id="penumbra-controls" type="module">
    const penumbraAngleEl = Inputs.range([0, 30], {
      label: "sun diameter (°)",
      value: 10,
      step: 0.5,
    });
    display(penumbraAngleEl);
  </script>

  <script id="penumbra-figure" type="module">
    import { createPenumbraFigure } from "./penumbra-figure.js";
    const _ver = penumbraElevVersion;
    const penumbraFigure = createPenumbraFigure({
      html,
      sunAccessor: penumbraHoverAccessor,
      angleEl: penumbraAngleEl,
      width,
    });
    display(penumbraFigure);
  </script>

  <script id="relief-intro" type="text/markdown">
    ## Relief shading

    The shadow map captures cast shadows, but even fully lit surfaces vary in brightness depending on their orientation. Relief shading separates the terrain slope from its aspect (direction it faces relative to the sun), so the sun's altitude doesn't darken flat ground. Flat terrain stays white; slopes facing the sun brighten, slopes facing away darken, and the strength of the effect is proportional to the slope angle.

    Concretely: from central differences on the height field, I compute the slope angle ${tex`\theta = \arctan(z_f \cdot \|\mathbf{n}_{xy}\| / n_z)`} and the aspect alignment ${tex`a = \hat{\mathbf{n}}_{xy} \cdot \hat{\mathbf{L}}_{xy} \in [-1, 1]`}, then shade each pixel as ${tex`v = 1 - \sin(\theta \cdot s) \cdot (1 - \tfrac{1+a}{2}) \cdot 1.8`} where ${tex`s`} is the strength parameter. The z-factor ${tex`z_f = 0.625 \sqrt{\cos \alpha}`} (where ${tex`\alpha`} is the sun's altitude) dampens gentle slopes following the GDAL/maplibre convention, and modulates the perceived slope by sun altitude: at overhead sun the terrain appears flat and the image is white; as the sun lowers, slopes become more visually pronounced, reaching full contrast at the horizon. The computation is performed in sRGB (perceptual) space so that "50% gray" means perceptual midgray.
  </script>

  <script id="relief-sun-dir" type="module">
    const reliefSunDirMut = Mutable({ az: 314.5, alt: 45 });
    const reliefSunDir = reliefSunDirMut;
    const reliefSunDirAccessor = (() => { const m = reliefSunDirMut; return { get: () => m.value, set: (v) => { m.value = v; } }; })();
  </script>

  <script id="relief-controls" type="module">
    const reliefControls = html`<div></div>`;
    function rctrl(input) {
      reliefControls.appendChild(input);
      return Generators.input(input);
    }

    const reliefStrength = rctrl(
      Inputs.range([0, 1], {
        label: "strength",
        value: 0.2,
        step: 0.01,
      }),
    );

    display(reliefControls);
  </script>

  <script id="relief-canvas" type="module">
    const rlN = elevation.N;
    const rlDisp = Math.max(1, Math.floor(512 / rlN));
    const rlPxDisplay = Math.min(rlN * rlDisp, width);
    const reliefCanvas = html`<canvas
      width=${rlN}
      height=${rlN}
      style="display:block; width:${rlPxDisplay}px; height:${rlPxDisplay}px; image-rendering:pixelated;"
    ></canvas>`;

    const reliefFigure = mountSunHandle({
      canvas: reliefCanvas,
      ...reliefSunDirAccessor,
    });
    reliefFigure.appendChild(createSourceToggleBadge());

    display(
      html`<figure>
        ${reliefFigure}
        <figcaption>
          Relief shading from slope/aspect decomposition. Flat terrain stays
          white; slopes darken proportionally to steepness and aspect relative
          to the sun. Drag the yellow handle to change the light direction.
        </figcaption>
      </figure>`,
    );
    reliefCanvas;
  </script>

  <script id="relief-render" type="module">
    const rlCtx = reliefCanvas.getContext("2d");
    const rlN2 = elevation.N;
    const rlImg = rlCtx.createImageData(rlN2, rlN2);
    const rlPx = rlImg.data;
    const rlH = elevation.heights;
    const rlDx = elevation.pixelSizeM;

    const rlAzRad = (reliefSunDir.az * Math.PI) / 180;
    const rlAltRad = (reliefSunDir.alt * Math.PI) / 180;
    const sunLx = Math.cos(rlAltRad) * Math.cos(rlAzRad);
    const sunLy = Math.cos(rlAltRad) * Math.sin(rlAzRad);
    const sunHL = Math.hypot(sunLx, sunLy);
    const sunHx = sunHL > 0.001 ? sunLx / sunHL : 1;
    const sunHy = sunHL > 0.001 ? sunLy / sunHL : 0;

    const str = reliefStrength;

    for (let row = 0; row < rlN2; row++) {
      for (let col = 0; col < rlN2; col++) {
        const rm = Math.max(row - 1, 0);
        const rp = Math.min(row + 1, rlN2 - 1);
        const cm = Math.max(col - 1, 0);
        const cp = Math.min(col + 1, rlN2 - 1);

        const eN = rlH[rm * rlN2 + col];
        const eS = rlH[rp * rlN2 + col];
        const eE = rlH[row * rlN2 + cp];
        const eW = rlH[row * rlN2 + cm];

        let nx = (eW - eE) / ((cp - cm) * rlDx);
        let ny = (eS - eN) / ((rp - rm) * rlDx);
        const nmag = Math.sqrt(nx * nx + ny * ny + 1);
        nx /= nmag;
        ny /= nmag;
        const nz = 1 / nmag;

        // Slope/aspect relief shading matching the tile viewer.
        const slopeMag = Math.hypot(nx, ny);
        const zFactor = 0.625 * Math.sqrt(sunHL);
        const slopeAngle = Math.atan(zFactor * slopeMag / Math.max(nz, 0.001));
        const scaledSlope = Math.min(slopeAngle * str * 2.0, 1.5);
        const aspectAlign = slopeMag > 0.001 && sunHL > 0.001
          ? (nx * sunHx + ny * sunHy) / slopeMag : 0;
        const shade = 0.5 + 0.5 * aspectAlign;
        const reliefDark = Math.sin(scaledSlope) * (1 - shade);
        const v = Math.pow(1 - reliefDark * 0.85, 2.5);

        const idx = (row * rlN2 + col) * 4;
        const b = Math.round(v * 255);
        rlPx[idx] = b;
        rlPx[idx + 1] = b;
        rlPx[idx + 2] = b;
        rlPx[idx + 3] = 255;
      }
    }
    rlCtx.putImageData(rlImg, 0, 0);
  </script>

  <script id="soft-shadow-intro" type="text/markdown">
    ## Soft shadows

    To approximate the penumbra from a finite-diameter sun, I run multiple hard-shadow sweeps at small azimuthal offsets across the sun disk and average the results. The altitude dimension of the penumbra is handled inside each sweep: I sweep at a lowered altitude (offset by three-quarters of the sun diameter) and then smoothstep the shadow bit over the full angular width. That reduces the averaging to one dimension — azimuth — and lets each sweep run in its own web worker in parallel.
  </script>

  <script id="soft-shadow-sun-dir" type="module">
    const softSunDirMut = Mutable({ az: 314.5, alt: 10 });
    const softSunDirAccessor = (() => { const m = softSunDirMut; return { get: () => m.value, set: (v) => { m.value = v; } }; })();
  </script>

  <script id="soft-sampling-analysis" type="module">
    const sampN = Math.round(softAzSamples);
    display(md`
      ### Sampling the sun disk

      Before averaging, it's worth thinking carefully about how to distribute samples across the sun disk. With only ${tex`N = ${sampN}`} samples in the current configuration — each one a full hard-shadow sweep — getting the most information per sample matters.

      The goal is to approximate the integral

      ${tex.block`\int f(x)\,g(x)\,dx \;\approx\; \frac{1}{N}\sum_{i=1}^{N} f(x_i)`}

      where ${tex`g(x) = \frac{1}{\sigma\sqrt{2\pi}}\exp(-x^2/2\sigma^2)`} is the Gaussian intensity profile across the sun disk and ${tex`f(x)`} is the shadow bit as a function of azimuthal offset ${tex`x`}. The right approach is **stratified inverse-CDF sampling**: place the ${tex`i`}th sample at the point where the Gaussian CDF equals ${tex`(i - \tfrac{1}{2})/N`}. Each sample then represents an equal slice of probability mass under the Gaussian, so the desired distribution is baked into the positions and every sample can be weighted equally — no sweep is wasted on a sample the filter will discount.
    `);
  </script>

  <script id="norm-inv" type="module">
    // Acklam's inverse-normal approximation: maps a CDF probability in
    // (0, 1) to the corresponding standard-normal quantile. Shared by the
    // stratified-sampling plot and the soft-shadow driver loop.
    const normInv = (p) => {
      const a = [
        -39.69683028665376, 220.9460984245205, -275.9285104469687,
        138.357751867269, -30.66479806614716, 2.506628277459239,
      ];
      const b = [
        -54.47609879822406, 161.5858368580409, -155.6989798598866,
        66.80131188771972, -13.28068155288572,
      ];
      const c = [
        -0.007784894002430293, -0.3223964580411365, -2.400758277161838,
        -2.549732539343734, 4.374664141464968, 2.938163982698783,
      ];
      const d = [
        0.007784695709041462, 0.3224671290700398, 2.445134137142996,
        3.754408661907416,
      ];
      const plow = 0.02425;
      const phigh = 1 - plow;
      let q, r;
      if (p < plow) {
        q = Math.sqrt(-2 * Math.log(p));
        return (
          (((((c[0] * q + c[1]) * q + c[2]) * q + c[3]) * q + c[4]) * q +
            c[5]) /
          ((((d[0] * q + d[1]) * q + d[2]) * q + d[3]) * q + 1)
        );
      }
      if (p <= phigh) {
        q = p - 0.5;
        r = q * q;
        return (
          ((((((a[0] * r + a[1]) * r + a[2]) * r + a[3]) * r + a[4]) * r +
            a[5]) *
            q) /
          (((((b[0] * r + b[1]) * r + b[2]) * r + b[3]) * r + b[4]) * r + 1)
        );
      }
      q = Math.sqrt(-2 * Math.log(1 - p));
      return (
        -(((((c[0] * q + c[1]) * q + c[2]) * q + c[3]) * q + c[4]) * q + c[5]) /
        ((((d[0] * q + d[1]) * q + d[2]) * q + d[3]) * q + 1)
      );
    };
    normInv;
  </script>

  <script id="soft-sampling-plot" type="module">
    const Npp = Math.round(softAzSamples);
    const xMax = 3;

    const refPts = [];
    for (let i = 0; i <= 200; i++) {
      const x = -xMax + (2 * xMax * i) / 200;
      refPts.push({ x, y: Math.exp(-0.5 * x * x) / Math.sqrt(2 * Math.PI) });
    }
    const yMaxGauss = 1 / Math.sqrt(2 * Math.PI);

    const strat = [];
    for (let i = 0; i < Npp; i++) {
      strat.push({ x: normInv((i + 0.5) / Npp) });
    }

    const plot = Plot.plot({
      width: Math.min(520, width),
      height: 220,
      marginTop: 20,
      marginBottom: 40,
      marginLeft: 20,
      marginRight: 20,
      x: {
        label: "azimuthal offset",
        domain: [-xMax, xMax],
        ticks: [-3, -2, -1, 0, 1, 2, 3],
        tickFormat: (d) => (d === 0 ? "0" : `${d}σ`),
      },
      y: { axis: null, domain: [0, yMaxGauss * 1.08] },
      marks: [
        Plot.areaY(refPts, { x: "x", y: "y", fill: "#e6e6e6", clip: true }),
        Plot.ruleX(strat, {
          x: "x",
          y1: 0,
          y2: yMaxGauss / Npp,
          stroke: "#0366d6",
          strokeWidth: 1.5,
          clip: true,
        }),
        Plot.dot(strat, {
          x: "x",
          y: () => yMaxGauss / Npp,
          fill: "#0366d6",
          r: 3.5,
          clip: true,
        }),
        Plot.ruleY([0]),
      ],
    });

    display(
      html`<figure>
        ${plot}
        <figcaption>
          Stratified inverse-CDF placement of ${tex`N = ${Npp}`} samples across
          the sun disk. Each sample sits at the centre of an equal-probability
          slice under the Gaussian (gray), so averaging with uniform weight
          ${tex`1/N`} reproduces the desired distribution exactly.
        </figcaption>
      </figure>`,
    );
  </script>

  <script id="soft-sweep-fn" type="module">
    import { createSoftSweepPool } from "./soft-sweep.js";
    const { runSoftSweeps } = createSoftSweepPool();
    runSoftSweeps;
  </script>

  <script id="soft-shadow-canvas" type="module">
    const softN = elevation.N;
    const softDisp = Math.max(1, Math.floor(512 / softN));
    const sizePx = Math.min(softN * softDisp, width);

    const softCanvas = html`<canvas

        </figcaption>
