  <script id="1" type="text/markdown">
    # Line-Sweep Terrain Lighting

    <img src="meta.webp">

    Although I don't [work in mapping anymore](https://www.mapbox.com), I'll always have have a soft spot for experimental map rendering techniques. Previously I've built a live [solar terminator map](https://rreusser.github.io/notebooks/night-and-day/) and a [kinda janky 3D map renderer](http://localhost:5173/notebooks/denali/). Inspired by some good posts on the topic, I've also dabbled in heightfield shadowing. This article finally pulls the latter work together into something functional.

    Our goal here is to compute terrain lighting using standard web map terrain tiles as input and producing corresponding 1:1 raster light maps as output. For terrain data, we'll be using the excellent and open [Mapterhorn](https://mapterhorn.com/) tileset. We'll start with a simple horizon visibility algorithm and extend to cover self-shadowing and ambient occlusion. It's definitely not novel, but the devil is in the details.

    ## Inspiration
    
    First of all, the best resource on the topic is Tom Patterson's [shadedrelief.com](http://www.shadedrelief.com/). Any work in map shading could only aspire to convey topography and tell stories in the way his maps do. Alas, I've set myself up to fail in the shadow of such a behemoth. But at any rate, my goal is somewhat focused here, to shade map tiles for real time interactive usage.

    Lighting in computer graphics is usually either complex or expensive. One approach for heightfield shading is to shoot rays. [Rye Terrell's terrain shading](https://wwwtyro.net/2019/03/21/advanced-map-shading.html) marches rays from each pixel along the surface and in the direction of the sun, checking for occlusion along the way. The results are beautiful, but the cost is high and it suffers from tile-boundary discontinuities which Terrell addresses by brute-force rendering 3×3 tiles (768×768) and extracting the center.

    A cheaper alternative is to sweep across the grid, tracking horizon visibility in a stack. [Karim Naaji's Line-Sweep Ambient Occlusion](https://karim.naaji.fr/lsao.html) sweeps rows of the grid, tracking visibility and applying shading in a single pass. However, the technique is limited to eight cardinal directions and still suffers from tile boundary discontinuities.

    This article doesn't offer fundamentally new insight but instead builds on and extends the line-sweep idea to address their shortcomings. In particular it extends the line-sweep to arbitrary directions, uses geometric shadowing to produce soft shadows, and avoids tile boundary discontinuities by prewarming horizon visibility with parent tile data.
  </script>
  <script id="2" type="text/markdown">
    ## Line-sweep horizon visibility

    The core primitive behind this notebook is a 1-D sweep that tracks the upper convex hull of elevations seen so far along each ray. Imagine sweeping along a single slice of terrain elevations. As the sweep advances left to right, we test each new point to see if it's a horizon. If we step uphill far enough that multiple horizons become visible, we pop horizons off of the stack until exactly one horizon remains visible.
  </script>

    ## Self-shadowing

    From here, it's only a small step farther to compute self-shadowing. At each point during the sweep, we compare the horizon angle to the sun angle. If the sun is below the horizon, the terrain is shadowed.

    A particularly nice feature of this algorithm is that we can compute horizon visbility and lighting in the same pass. Neglecting the depth of the stack which generally remains quite small, the algorithm is O(n) in the resolution of terrain data, requiring that we read each terrain value only once. I can't immediately see that we could do significantly better.
  </script>

  <script id="traversal-explanation" type="text/markdown">
    A little more work is necessary before we can apply this to terrain tiles though. The algorithm so far presumes that we're sweeping along a well-defined grid direction. We'd like to be able to compute shadowing in arbitrary directions.

    The solution is simple but requires some finesse. The diagram below illustrates grid traversal in arbitrary directions. We start our first sweep in the upper left corner, seeding subsequent sweeps with remaining pixels along the left edge. For each sweep, we step rightward exactly one pixel and upward by a fractional amount. Once we've exhausted all sweeps starting along the left edge, we step rightward along the bottom edge with a given stride, performing identically the same sweeps from the new seed points.

    This sequence only handles sweep angles in a single octant of the possible ${tex`360^\circ.`} Drag the handle below and observe that for other octants, we simply flip and rotate our canonical octant. In practical terms, this can be implemented with ndarray-style index arithmetic.
  </script>

    ## Soft shadows

    We've been considering hard thresholds, but we're well poised to relax this to a smooth threshold so that we can emulate the soft penumbra of a finite-sized light source like the sun. Realistically, the sun covers about ${tex`0.53^\circ`} degrees in the sky, making it pretty close to a point source, but we can always increase the size for visual effect.
    
    The figure below illustrates a soft shadowing pass using a smoothstep function for horizon visibility occlusion.

  <script id="47" type="text/markdown">
    Sadly though, the sun is a *two*-dimensional source, and we've only discussed softening in *one* dimension. Short of something fancy like mip-maps, all I was able to come up with was to naively average multiple samples of our altitude-wide analytical soft shadows across the azimuthal direction.

    Samples aren't cheap, so it's worth thinking carefully about how to distribute samples across the sun disk. Our altitude-wise analytical soft shadows use a [smoothstep](https://en.wikipedia.org/wiki/Smoothstep) function, so after some consideration, I scaled a Gaussian function to roughly approximate the smoothstep function, then distributed equally-weighted samples in the azimuthal direction using [inverse-CDF sampling](https://en.wikipedia.org/wiki/Inverse_transform_sampling) to approximate the desired Gaussian. 
  </script>
  <script id="50" type="module">
    // Acklam's inverse-normal approximation: maps a CDF probability in
    // (0, 1) to the corresponding standard-normal quantile. Shared by the
    // stratified-sampling plot and the soft-shadow driver loop.
    const normInv = (p) => {
      const a = [
        -39.69683028665376, 220.9460984245205, -275.9285104469687,
        138.357751867269, -30.66479806614716, 2.506628277459239,
      ];
      const b = [
        -54.47609879822406, 161.5858368580409, -155.6989798598866,
        66.80131188771972, -13.28068155288572,
      ];
      const c = [
        -0.007784894002430293, -0.3223964580411365, -2.400758277161838,
        -2.549732539343734, 4.374664141464968, 2.938163982698783,
      ];
      const d = [
        0.007784695709041462, 0.3224671290700398, 2.445134137142996,
        3.754408661907416,
      ];
      const plow = 0.02425;
      const phigh = 1 - plow;
      let q, r;
      if (p < plow) {
        q = Math.sqrt(-2 * Math.log(p));
        return (
          (((((c[0] * q + c[1]) * q + c[2]) * q + c[3]) * q + c[4]) * q +
            c[5]) /
          ((((d[0] * q + d[1]) * q + d[2]) * q + d[3]) * q + 1)
        );
      }
      if (p <= phigh) {
        q = p - 0.5;
        r = q * q;
        return (
          ((((((a[0] * r + a[1]) * r + a[2]) * r + a[3]) * r + a[4]) * r +
            a[5]) *
            q) /
          (((((b[0] * r + b[1]) * r + b[2]) * r + b[3]) * r + b[4]) * r + 1)
        );
      }
      q = Math.sqrt(-2 * Math.log(1 - p));
      return (
        -(((((c[0] * q + c[1]) * q + c[2]) * q + c[3]) * q + c[4]) * q + c[5]) /
        ((((d[0] * q + d[1]) * q + d[2]) * q + d[3]) * q + 1)
      );
    };
    normInv;
  </script>

  <script id="55" type="module">
    // Persistent driver loop: reads the latest sun direction + params
    // directly from the sun-dir accessor and input elements between batches
    // and renders directly to softCanvas. The cell references the input
    // *elements* (not the Generators.input-wrapped values), so it's not
    // reactive on mousemoves — the loop coalesces pending state changes
    // into the next batch, and each completed batch gets drawn even
    // while interaction is ongoing.
    const scN = elevation.N;
    const softCtx = softCanvas.getContext("2d");
    const softImg = softCtx.createImageData(scN, scN);
    const softPx = softImg.data;
    const srH = elevation.heights;
    const srMin = elevation.elevMin;
    const srRange = elevation.elevMax - elevation.elevMin || 1;

    let cancelled = false;
    invalidation.then(() => { cancelled = true; });

    (async function driver() {
      let lastKey = null;
      let idleTick = 0;
      while (!cancelled) {
        const sd = softSunDirAccessor.get();
        const diam = Number(softSunDiameterEl.value);
        const nAzCur = Math.round(Number(softAzSamplesEl.value));
        const key = sd.az + "|" + sd.alt + "|" + diam + "|" + nAzCur;

        if (key === lastKey) {
          // Nothing new to render; wake up periodically to re-check.
          await new Promise((r) => setTimeout(r, 16));
          idleTick++;
          continue;
        }
        idleTick = 0;

        const sunR = diam / 2;
        // Variance-match to the altitude smoothstep. The smoothstep
        // s(t) = 3t² − 2t³ has slope 3/2 at its midpoint; equating to
        // the Gaussian CDF slope 1/(σ√(2π)) gives σ_unit = 1/(1.5·√(2π)).
        // Applied over the altitude half-width of 1.5·sunR (total span 3·sunR),
        // the equivalent Gaussian standard deviation in degrees is
        //   σ = 3·sunR · σ_unit = 2·sunR / √(2π).
        const sigma = (2 * sunR) / Math.sqrt(2 * Math.PI);
        const tasks = [];
        for (let ia = 0; ia < nAzCur; ia++) {
          // Stratified inverse-CDF placement: each sample sits at the
          // centre of an equal-probability slice under the Gaussian.
          const q = nAzCur === 1 ? 0 : normInv((ia + 0.5) / nAzCur);
          const daz = q * sigma;
          tasks.push({
            W: scN,
            H: scN,
            heights: elevation.heights,
            azDeg: sd.az + daz,
            altDeg: sd.alt,
            pxSizeM: elevation.pixelSizeM,
            sunRadiusDeg: sunR,
          });
        }

        const sweeps = await runSoftSweeps(tasks);
        if (cancelled) return;

        const result = new Float32Array(scN * scN);
        const wUnit = 1 / sweeps.length;
        for (let s = 0; s < sweeps.length; s++) {
          const sweep = sweeps[s];
          for (let i = 0; i < sweep.length; i++) {
            result[i] += wUnit * sweep[i];
          }
        }

        for (let i = 0; i < srH.length; i++) {
          const j = i * 4;
          const tone = 0.1 + 0.8 * ((srH[i] - srMin) / srRange);
          const shade = Math.min(1, Math.max(0, result[i]));
          const lit = 1 - 0.94 * shade;
          const v = Math.round(linearToSrgb(tone * lit) * 255);
          softPx[j] = v;
          softPx[j + 1] = v;
          softPx[j + 2] = v;
          softPx[j + 3] = 255;
        }
        softCtx.putImageData(softImg, 0, 0);

        lastKey = key;
      }
    })();
  </script>
  <script id="25" type="text/markdown">
    ## Parent-tile pre-pass

    A natural limitation of per-tile methods is that they have no knowledge of terrain beyond it. Mountains just outside the boundary which would cast shadows onto the tile are never considered, producing visible seams between tiles.

    A natural solution is to generate a half-resolution horizon buffer from four z−1 ancestor tiles, covering the computation tile and one tile width of surrounding terrain in each direction. Before the main sweep, a pre-pass walks each ray through this coarser buffer, warming up the stack so that by the time the ray enters the computation tile, it already carries the horizon contributed by surrounding terrain.

    We could step multiple levels upward in the tile pyramid to extend the range of this pre-warming, but in practice I find that a single level is almost always necessary and almost always sufficient.

    Toggle the parent-tile pre-pass below and observe its effect in the vicinity of tile boundaries.
  </script>

  <script id="27" type="module">
    // Decode a Terrarium-encoded webp tile into a Float32Array of heights.
    async function fetchTerrarium(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`tile fetch failed: ${url} (${res.status})`);
      const blob = await res.blob();
      const bitmap = await createImageBitmap(blob);
      const N = bitmap.width;
      const c = document.createElement("canvas");
      c.width = N;
      c.height = N;
      const cctx = c.getContext("2d");
      cctx.drawImage(bitmap, 0, 0);
      const bytes = cctx.getImageData(0, 0, N, N).data;
      const heights = new Float32Array(N * N);
      let hMin = Infinity,
        hMax = -Infinity;
      for (let i = 0; i < N * N; i++) {
        const r = bytes[i * 4],
          g = bytes[i * 4 + 1],
          b = bytes[i * 4 + 2];
        const h = r * 256 + g + b / 256 - 32768;
        heights[i] = h;
        if (h < hMin) hMin = h;
        if (h > hMax) hMax = h;
      }
      return { N, heights, hMin, hMax };
    }
  </script>
  <script id="28" type="module">
    const tileElevation = await (async () => {
      const url = `https://tiles.mapterhorn.com/${tile.z}/${tile.x}/${tile.y}.webp`;
      const { N, heights, hMin, hMax } = await fetchTerrarium(url);
      const nMerc = Math.PI * (1 - (2 * (tile.y + 0.5)) / (1 << tile.z));
      const lat = Math.atan(Math.sinh(nMerc));

        heights,
        N,
        pixelSizeM,
        elevMin: hMin,
        elevMax: hMax,

    // Fetch four z-1 parent tiles — guaranteed to physically cover the 3×3
    // neighbourhood around our computation tile — and assemble them into a
    // half-resolution horizon buffer of size (3·N/2) × (3·N/2) parent pixels,
    // centred on the computation tile so that comp pixel (0, 0) lands at
    // horizon pixel (N/2, N/2).
    //
    // The computation tile is at parent pixel offset
    //   (tile.x mod 2) * (PN/2), (tile.y mod 2) * (PN/2)
    // within its parent. We extract a 3·PN/2-wide window whose centre aligns
    // with that offset inside the 2·PN-wide block of four parents.
    const tileHorizon = await (async () => {
      const parentZ = tile.z - 1;
      const qx = Math.floor((tile.x - 1) / 2);
      const qy = Math.floor((tile.y - 1) / 2);

      // Tolerate missing parents: if one of the four z−1 tiles isn't
      // in the on-disk pyramid, substitute zero-filled heights. The
      // figures degrade gracefully — the missing quadrants of the
      // parent ring just read as flat ground rather than throwing.
      async function fetchParent(px, py) {
        try {
          const url = `https://tiles.mapterhorn.com/${parentZ}/${px}/${py}.webp`;
          return await fetchTerrarium(url);
        } catch (_) {
          return null;
        }
      }

      const [p00, p10, p01, p11] = await Promise.all([
        fetchParent(qx, qy),
        fetchParent(qx + 1, qy),
        fetchParent(qx, qy + 1),
        fetchParent(qx + 1, qy + 1),

      const ref = p00 || p10 || p01 || p11;
      if (!ref)
        throw new Error(
          `tileHorizon: no z${parentZ} parents downloaded for tile ${tile.z}/${tile.x}/${tile.y}`,

      const BN = 2 * PN;
      const zeroTile = new Float32Array(PN * PN);

      // Assemble the 2×2 parent block into a BN × BN buffer.
      const block = new Float32Array(BN * BN);
      function place(p, bx, by) {
        const ox = bx * PN,
          oy = by * PN;
        const h = p ? p.heights : zeroTile;
        for (let j = 0; j < PN; j++) {
          const src = j * PN;
          const dst = (oy + j) * BN + ox;
          block.set(h.subarray(src, src + PN), dst);

      }
      place(p00, 0, 0);
      place(p10, 1, 0);
      place(p01, 0, 1);
      place(p11, 1, 1);

      // parent-tile-width before the computation tile in both axes.
      const HN = Math.floor((3 * PN) / 2);
      // Position of the computation tile's top-left corner inside the 2×2 block,
      // in parent pixels.
      const compTileXInBlock = (tile.x - 2 * qx) * (PN / 2);
      const compTileYInBlock = (tile.y - 2 * qy) * (PN / 2);
      const startX = compTileXInBlock - PN / 2;
      const startY = compTileYInBlock - PN / 2;

      const heights = new Float32Array(HN * HN);

        hMax = -Infinity;

        const dstRow = j * HN;
        for (let i = 0; i < HN; i++) {
          const h = block[srcRow + i];
          heights[dstRow + i] = h;
          if (h < hMin) hMin = h;
          if (h > hMax) hMax = h;

      return {
        label: `mapterhorn parents of ${tile.z}/${tile.x}/${tile.y}`,

        HN,
        compTileSize: tileElevation.N,
        startX,
        startY,
        hMin,
        hMax,

    const geometryElevation = (() => {

      const pixelSizeM = 0.5;
      const ground = 0;

      // Positions and radii given in metres; the comp tile is 256 m × 256 m.
      const cone = { cx: 80, cy: 92, r: 36 }; // 45° slope, peak == r
      const cyl = { cx: 184, cy: 72, r: 28, h: 36 };
      const hemi = { cx: 132, cy: 180, r: 40 };

      const heights = new Float32Array(N * N);
      let hMax = 0;
      for (let j = 0; j < N; j++) {
        const ym = (j + 0.5) * pixelSizeM;
        for (let i = 0; i < N; i++) {
          const xm = (i + 0.5) * pixelSizeM;
          let h = 0;

          const dxc = xm - cone.cx,
            dyc = ym - cone.cy;
          const rc = Math.sqrt(dxc * dxc + dyc * dyc);

          const dxl = xm - cyl.cx,

      const HN = Math.floor((3 * N) / 2);
      const horizonPxSize = pixelSizeM * 2;

        label: `geometry ${N}×${N}`,
        heights,
        N,
        pixelSizeM,

  <script id="56" type="text/markdown">
    ## Line-sweep ambient occlusion

    The same horizon visibility sweep works for ambient occlusion as well. Ambient occlusion proceeds similarly to shadowing, but instead of illumination by a point source, each pixel is illuminated by the portion of sky visible to it. I extended [Karim Naaji's LSAO](https://karim.naaji.fr/lsao.html) to support parent-tile occlusion and arbitrary sweep directions. That leaves one design knob open: the per-slice visibility function ${tex`V(\alpha)`} that maps each swept horizon angle ${tex`\alpha`} to a shade contribution.

    Naaji uses ${tex`V(\alpha) = e^{-\sin\alpha}`}. It isn't tied to a particular radiometric model; it's shaped by what reads well. The function drops with slope ${tex`-1`} right at ${tex`\alpha = 0`}, so even a shallow horizon produces an immediate darkening — ridges, terraces, and other layered structure separate crisply. The tradeoff is a long tail: even a vertical wall only attenuates the slice to ${tex`e^{-1} \approx 0.37`}, so distant tall features keep contributing, and tile boundaries take extra care.

    A Lambertian sky integral offers a physically motivated alternative. Incident sky radiance from a direction at zenith angle ${tex`\theta`} is weighted by ${tex`\cos\theta`}, so the visible fraction of one azimuthal slice above a horizon at elevation α is

    ${tex.block`V(\alpha) \;=\; \int_{0}^{\pi/2 - \alpha} \cos\theta \cdot \sin\theta \, d\theta \;=\; \tfrac{1}{2}\cos^2\!\alpha,`}

    which normalises to ${tex`\cos^2\!\alpha`}: 1 at a flat horizon, 0 at a vertical wall. Its slope is flat at ${tex`\alpha = 0`} and steepens later, giving a softer, more forgiving response to small horizons. And because ${tex`\cos^2\!\alpha \approx 1 - (\Delta h / d)^2`} for small α, distant tall blockers fall off as ${tex`1/d^2`}, so the effect is strongly local and tile boundaries are less visible.

    Neither is categorically right — the control below toggles between them. Averaging across azimuthally uniform sweeps gives the full ambient-occlusion factor in either case.

    A contrast slider ${tex`c \in [0, 1]`} shapes the response on top of the raw ${tex`\bar{v}`} per pixel. Let ${tex`s = c / (1 - c)`} and ${tex`\text{shade} = 1 - \bar{v}`}; an ${tex`\arctan`} tonemap squashes the scaled shade into ${tex`[0, 1]`}:

    ${tex.block`\text{display} \;=\; 1 - \tfrac{2}{\pi}\arctan\!\left(\tfrac{c}{1-c}\,(1 - \bar{v})\right).`}

    At ${tex`c = 0`} the slider emits solid white; as ${tex`c \to 1`} the scaled shade runs to infinity and the tonemap saturates toward full darkness. Naaji's reference fires eight axis-aligned passes; because our canonical reparameterization handles arbitrary azimuths, we can use any number of directions, and each pass is independent so we run them in the same Web Worker pool as the soft shadows.
  </script>

  <script id="59" type="module">

    const lsaoCanvas = html`<canvas

  <script id="60" type="module">
    const nDirs = Math.round(lsaoSamples);
    const W = elevation.N;
    const H = elevation.N;
    const falloffKey = lsaoFalloff === "e^(−sin α)" ? "exp" : "cos2";
    const tasks = [];
    for (let i = 0; i < nDirs; i++) {
      tasks.push({
        W,
        H,
        elev: elevation.heights,
        azDeg: (i * 360) / nDirs,
        pxSizeM: elevation.pixelSizeM,
        weight: 1 / nDirs,
        lsaoFalloff: falloffKey,
      });
    }
    const sweeps = await runLsao(tasks);

    const ao = new Float32Array(W * H);
    for (let s = 0; s < sweeps.length; s++) {
      const sw = sweeps[s];
      for (let i = 0; i < ao.length; i++) ao[i] += sw[i];
    }

    const lsaoCtx = lsaoCanvas.getContext("2d");
    const lsaoImg = lsaoCtx.createImageData(W, H);
    const lsaoPx = lsaoImg.data;

    // Contrast slider c ∈ [0, 1]:
    //   s = c / (1 − c)                 scale factor, (0, ∞)
    //   shade = 1 − ao_raw               per-pixel linear darkening
    //   display = 1 − (2/π)·atan(s·shade)
    // At c=0, s=0, no darkening, display = 1 (solid white); at c=1,
    // s=∞, display saturates toward 0 everywhere shade > 0.
    const lsaoC = Math.max(0, Math.min(0.999999, lsaoContrast ** 0.1));
    const lsaoS = lsaoC / (1 - lsaoC);
    const lsaoInvPi2 = 2 / Math.PI;
    for (let i = 0; i < ao.length; i++) {
      const aoRaw = Math.max(0, Math.min(1, ao[i]));
      const shade = 1 - aoRaw;
      const squashed = lsaoInvPi2 * Math.atan(lsaoS * shade);
      const visibility = 1 - squashed;
      const v = Math.round(linearToSrgb(visibility) * 255);
      const j = i * 4;
      lsaoPx[j] = v;
      lsaoPx[j + 1] = v;
      lsaoPx[j + 2] = v;
      lsaoPx[j + 3] = 255;
    }
    lsaoCtx.putImageData(lsaoImg, 0, 0);
  </script>
  <script id="42" type="text/markdown">
    ## Relief shading

    The shadow map captures cast shadows, but even fully lit surfaces vary in brightness depending on their orientation. Relief shading separates the terrain slope from its aspect (direction it faces relative to the sun), so the sun's altitude doesn't darken flat ground. Flat terrain stays white; slopes facing the sun brighten, slopes facing away darken, and the strength of the effect is proportional to the slope angle.

    Concretely: from central differences on the height field, I compute the slope angle ${tex`\theta = \arctan(z_f \cdot \|\mathbf{n}_{xy}\| / n_z)`} and the aspect alignment ${tex`a = \hat{\mathbf{n}}_{xy} \cdot \hat{\mathbf{L}}_{xy} \in [-1, 1]`}, then a darkness term ${tex`d = \sin(\min(\theta \cdot 2s,\; 1.5)) \cdot (1 - \tfrac{1+a}{2})`} where ${tex`s`} is the strength parameter. The final relief value is ${tex`v = (1 - 0.85\,d)^{2.5}`}, a gamma curve that maps the linear darkness into perceptual space. The z-factor ${tex`z_f = 0.625 \sqrt{\cos \alpha}`} (where ${tex`\alpha`} is the sun's altitude) dampens gentle slopes following the GDAL convention, and modulates the perceived slope by sun altitude: at overhead sun the terrain appears flat and the image is white; as the sun lowers, slopes become more visually pronounced, reaching full contrast at the horizon.
  </script>

  <script id="46" type="module">
    const rlCtx = reliefCanvas.getContext("2d");
    const rlN2 = elevation.N;
    const rlImg = rlCtx.createImageData(rlN2, rlN2);
    const rlPx = rlImg.data;
    const rlH = elevation.heights;
    const rlDx = elevation.pixelSizeM;

    const rlAzRad = (reliefSunDir.az * Math.PI) / 180;
    const rlAltRad = (reliefSunDir.alt * Math.PI) / 180;
    const sunLx = Math.cos(rlAltRad) * Math.cos(rlAzRad);
    const sunLy = Math.cos(rlAltRad) * Math.sin(rlAzRad);
    const sunHL = Math.hypot(sunLx, sunLy);
    const sunHx = sunHL > 0.001 ? sunLx / sunHL : 1;
    const sunHy = sunHL > 0.001 ? sunLy / sunHL : 0;

    const str = reliefStrength;

    for (let row = 0; row < rlN2; row++) {
      for (let col = 0; col < rlN2; col++) {
        const rm = Math.max(row - 1, 0);
        const rp = Math.min(row + 1, rlN2 - 1);
        const cm = Math.max(col - 1, 0);
        const cp = Math.min(col + 1, rlN2 - 1);

        const eN = rlH[rm * rlN2 + col];
        const eS = rlH[rp * rlN2 + col];
        const eE = rlH[row * rlN2 + cp];
        const eW = rlH[row * rlN2 + cm];

        let nx = (eW - eE) / ((cp - cm) * rlDx);
        let ny = (eS - eN) / ((rp - rm) * rlDx);
        const nmag = Math.sqrt(nx * nx + ny * ny + 1);
        nx /= nmag;
        ny /= nmag;
        const nz = 1 / nmag;

        // Slope/aspect relief shading matching the tile viewer.
        const slopeMag = Math.hypot(nx, ny);
        const zFactor = 0.625 * Math.sqrt(sunHL);
        const slopeAngle = Math.atan(zFactor * slopeMag / Math.max(nz, 0.001));
        const scaledSlope = Math.min(slopeAngle * str * 2.0, 1.5);
        const aspectAlign = slopeMag > 0.001 && sunHL > 0.001
          ? (nx * sunHx + ny * sunHy) / slopeMag : 0;
        const shade = 0.5 + 0.5 * aspectAlign;
        const reliefDark = Math.sin(scaledSlope) * (1 - shade);
        const v = Math.pow(1 - reliefDark * 0.85, 2.5);

        const idx = (row * rlN2 + col) * 4;
        const b = Math.round(v * 255);
        rlPx[idx] = b;
        rlPx[idx + 1] = b;
        rlPx[idx + 2] = b;
        rlPx[idx + 3] = 255;
      }
    }
    rlCtx.putImageData(rlImg, 0, 0);
  </script>
  <script id="61" type="text/markdown">
    ## WebGPU implementation

    Every mode the CPU `sweepCore` supports — hard shadow, soft shadow with stratified azimuth integration, and LSAO — ported to WGSL compute via _dynamic shader specialization_. Each `(mode, prewarm)` permutation is built once into its own `GPUComputePipeline` and cached, so the inner hull-scan loop has no per-pixel mode branch. The parent-tile prewarm is itself a compile-time flag: when off, the shader skips the warmup block entirely and the horizon binding shrinks to a 16-byte stub. Multi-sample averaging (azimuth offsets for soft, uniform directions for LSAO) is dispatched as N successive compute passes that each accumulate `weight · bit · fpScale` into the shared atomic `shadow` buffer.

    A caveat from building this out: the GPU path turned out to be less useful than I'd hoped. It's measurably faster per tile than the CPU worker pool, but only modestly so, and the display compositor shares a queue with the bake — every heavy compute submit stalls the tile viewer's render pass and makes pans and zooms feel gummy. A CPU worker pool is slightly slower per tile but lets the GPU stay idle and responsive to pointer events, which matters more than raw throughput for an interactive viewer. Both paths are kept here for comparison, but the live viewer at the end of the notebook defaults to the CPU bake.
  </script>

  <script id="67" type="module">
    // Persistent driver loop: polls sun-dir + controls, and on every
    // change rebuilds N pipeline dispatches (one per sample) into a
    // single command buffer that clears the shadow buffer, accumulates
    // weighted contributions into it, and renders the final composite.
    if (webgpuRuntime && webgpuPipelinesApi && !webgpuContext.error) {
      const { device, format } = webgpuContext;
      const api = webgpuPipelinesApi;
      const {
        ctx,
        elevBuffer,
        shadowBuffer,
        horizonBuffer,
        horizonStub,
        uniformBuffers,
        renderUniformBuffer,
        N,
        HN,
      } = webgpuRuntime;
      const W = N,
        H = N;
      const pxSizeM = elevation.pixelSizeM;

      // Bump a generation counter so any previous driver loop (from a
      // prior cell run) exits cleanly when its tick sees a mismatch.
      const gen = (window.__wgpuDriverGen || 0) + 1;
      window.__wgpuDriverGen = gen;

      function dispatchOnce({
        mode,
        prewarm,
        samples,
        sunDiameter,
        contrast,
        sd,
      }) {
        const pipeline = api.getOrBuildComputePipeline({
          device,
          mode,
          prewarm,
        });
        const renderPipeline = api.getOrBuildRenderPipeline({
          device,
          format,
          displayMode: mode === "lsao" ? "lsao" : "shaded",
        });

        // Build the per-sample task list. For 'hard' we just do the
        // single point-sun sweep. For 'soft' we stratify N azimuth
        // offsets over a Gaussian variance-matched to the altitude
        // smoothstep, exactly as the soft-shadow CPU driver does. For
        // 'lsao' we use N azimuthally uniform directions starting at
        // the live sun azimuth so the figure responds to the handle.
        const tasks = [];
        if (mode === "hard") {
          tasks.push({ azDeg: sd.az, altDeg: sd.alt });
        } else if (mode === "soft") {
          const sunR = sunDiameter / 2;
          const sigma = (2 * sunR) / Math.sqrt(2 * Math.PI);
          for (let ia = 0; ia < samples; ia++) {
            const q = samples === 1 ? 0 : normInv((ia + 0.5) / samples);
            tasks.push({
              azDeg: sd.az + q * sigma,
              altDeg: sd.alt,
              sunRadiusDeg: sunR,
            });
          }
        } else {
          for (let ia = 0; ia < samples; ia++) {
            tasks.push({ azDeg: sd.az + (ia * 360) / samples });
          }
        }

        const weight = 1 / tasks.length;
        const useHorizon = prewarm;
        const horizonBinding = useHorizon ? horizonBuffer : horizonStub;
        const horizonN = useHorizon ? HN : 0;

        const encoder = device.createCommandEncoder();
        encoder.clearBuffer(shadowBuffer);

        for (let t = 0; t < tasks.length; t++) {
          const task = tasks[t];
          const sweep = api.deriveSweepParams({
            W,
            H,
            azDeg: task.azDeg,
            pxSizeM,
            mode,
            altDeg: task.altDeg || 0,
            sunRadiusDeg: task.sunRadiusDeg || 0,
            weight,
            horizonN,
          });
          const uBytes = api.packUniforms(sweep);
          device.queue.writeBuffer(uniformBuffers[t], 0, uBytes);

          const bindGroup = device.createBindGroup({
            layout: pipeline.getBindGroupLayout(0),
            entries: [
              { binding: 0, resource: { buffer: uniformBuffers[t] } },
              { binding: 1, resource: { buffer: elevBuffer } },
              { binding: 2, resource: { buffer: shadowBuffer } },
              { binding: 3, resource: { buffer: horizonBinding } },
            ],
          });

          const numRays = sweep.bMax - sweep.bMin + 1;
          const numWorkgroups = Math.ceil(numRays / 64);
          const pass = encoder.beginComputePass();
          pass.setPipeline(pipeline);
          pass.setBindGroup(0, bindGroup);
          pass.dispatchWorkgroups(numWorkgroups);
          pass.end();
        }

        // Render uniforms.
        const rBytes = api.packRenderUniforms({
          N,
          hMin: elevation.elevMin,
          hRange: elevation.elevMax - elevation.elevMin || 1,
          contrast: Math.pow(Math.min(0.999999, Math.max(0, contrast)), 0.1),
        });
        device.queue.writeBuffer(renderUniformBuffer, 0, rBytes);

        const renderBindGroup = device.createBindGroup({
          layout: renderPipeline.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: shadowBuffer } },
            { binding: 1, resource: { buffer: elevBuffer } },
            { binding: 2, resource: { buffer: renderUniformBuffer } },
          ],
        });

        const pass = encoder.beginRenderPass({
          colorAttachments: [
            {
              view: ctx.getCurrentTexture().createView(),
              loadOp: "clear",
              clearValue: [0, 0, 0, 1],
              storeOp: "store",
            },
          ],
        });
        pass.setPipeline(renderPipeline);
        pass.setBindGroup(0, renderBindGroup);
        pass.draw(3);
        pass.end();

        device.queue.submit([encoder.finish()]);
      }

      (async function driver() {
        let lastKey = null;
        while (window.__wgpuDriverGen === gen) {
          const sd = webgpuSunDirAccessor.get();
          const mode = window.__wgpuModeEl.value;
          // LSAO with cos²α + parent-tile prewarm produces a visible
          // within-tile band on the sun-facing edge (distant parent
          // blockers stay on the hull contributing graded darkening).
          // In this single-tile showcase figure we always render LSAO
          // without prewarm to keep the kernel clean; the slippy-map
          // tile viewer later in the notebook opts the other way and
          // uses prewarm for cross-tile continuity.
          const prewarmToggle = !!window.__wgpuPrewarmEl.value;
          const prewarm = mode === "lsao" ? false : prewarmToggle;
          const samples = Math.max(
            1,
            Math.round(Number(window.__wgpuSamplesEl.value)),
          );
          const sunDiameter = Number(window.__wgpuSunDiameterEl.value);
          const contrast = Number(window.__wgpuContrastEl.value);
          const effectiveSamples = mode === "hard" ? 1 : samples;
          const key = [
            sd.az,
            sd.alt,
            mode,
            prewarm ? 1 : 0,
            effectiveSamples,
            sunDiameter,
            contrast,
          ].join("|");
          if (key === lastKey) {
            await new Promise((r) => requestAnimationFrame(r));
            continue;
          }
          dispatchOnce({
            mode,
            prewarm,
            samples: effectiveSamples,
            sunDiameter,
            contrast,
            sd,
          });
          lastKey = key;
          await new Promise((r) => requestAnimationFrame(r));
        }
      })();
    }
  </script>
  <script id="75" type="text/markdown">
    ## Zoom-dependent gradient attenuation

    Everything up to this point has worked on a single 512-pixel tile, where the pxSize is whatever it is and the shading math is scale-invariant: a slope of ${tex`\theta`} reads as ${tex`\theta`} regardless of what pxSize happens to be in meters. Put that same machinery into a slippy map and something ugly shows up — zoom out and the terrain turns flat, washing out both the relief and the AO far more than downsampling alone should explain.

    Web map tile pyramids serve downsampled overviews at low zoom, and the downsampling has asymmetric effects on what the shading pipeline sees. *Peak elevations are largely preserved* — a summit pixel survives the pyramid because whatever resampling kernel the tile producer uses (box, bilinear, Lanczos, max-pool) leaves extrema close to their true values when the feature is concentrated. *Gradients are not preserved* — the pyramid's low-pass filter attenuates the height differences between neighboring pixels, which is exactly what relief and LSAO read from.

    Probing AWS's open Terrarium tileset over four major summits makes this quantitative. Peak elevation at the summit's pixel:

    | summit      | truth   | z=14    | z=10    | z=6     | z=4     |
    |-------------|---------|---------|---------|---------|---------|
    | Mt. Peale   | 3879 m  | 3880    | 3855    | 4009    | 3853    |
    | Mt. Whitney | 4421    | 4414    | 4396    | 3931    | 3826    |
    | Mt. Rainier | 4392    | 4393    | 4370    | 3974    | 3200    |
    | Denali      | 6190    | 6167    | 6127    | 5879    | 5056    |

    Mean gradient magnitude ${tex`\langle \|\nabla h\| \rangle`} across the same tiles, measured via central differences in the tile's own pxSize:

    | summit      | z=14    | z=10    | z=8     | z=6     | z=4     |
    |-------------|---------|---------|---------|---------|---------|
    | Mt. Peale   | 0.570   | 0.183   | 0.106   | 0.048   | 0.012   |
    | Mt. Whitney | 0.766   | 0.325   | 0.125   | 0.041   | 0.017   |
    | Mt. Rainier | 0.484   | 0.418   | 0.214   | 0.052   | 0.022   |
    | Denali      | 0.693   | 0.711   | 0.167   | 0.074   | 0.028   |

    Peaks drop by only a few percent out to z=6 and ~15–20% at z=4. Mean gradient drops by an order of magnitude over the same range. Fitting the gradient data to a power law ${tex`\langle \|\nabla h\| \rangle \propto \mathrm{pxSize}^{-\beta}`} gives ${tex`\beta \approx 0.4{-}0.55`} over the z=14→z=4 window, with ${tex`\beta`} approaching ${tex`0.5`} as the window widens. That's the rate at which a central-difference gradient inside a low-pass-filtered height field loses power: the differences in the numerator shrink as high-frequency terrain content gets averaged out, while the pxSize in the denominator grows by a factor of 2 per zoom level.

    This explains the asymmetry with cast shadows. Shadow geometry is driven by peak-to-target elevation differences ${tex`\Delta h`}, which the pyramid preserves, so hard and soft shadows look about right at low zoom without intervention. Relief and LSAO are driven by ${tex`\nabla h`}, which the pyramid doesn't preserve, and they flatten visibly.

    ### The correction

    The fix I landed on is a horizontal contraction, applied at bake time only to the passes whose output depends on ${tex`\nabla h`}:

    ${tex.block`\mathrm{pxSize}_{\text{eff}}(z) = \mathrm{pxSize}(z) \cdot 2^{(z - z_{\text{ref}}) \beta}`}

    where ${tex`z_{\text{ref}}`} is the top of the pyramid (pyramid source at its native resolution). At ${tex`z = z_{\text{ref}}`} the correction is 1×; below that it shrinks the horizontal step used in the central difference for normals and in the ${tex`\mathrm{dStep}`} for the LSAO sweep, which boosts the reported slope and horizon angles. The shadow sweep uses the raw pxSize.

    Contracting pxSize rather than inflating the height buffer keeps the correction narrowly scoped. The elevation array is read by the parent-tile horizon warmup, the LSAO sweep's ${tex`\Delta h`} comparisons, the hypsometric coloring in the debug render, and downstream consumers I don't want to audit — scaling it introduces coupling. pxSize appears only as a finite-difference denominator (normals) and a per-step horizontal distance (sweeps), and in both cases it's exactly the knob that controls "how much rise per run."

    Theoretical ${tex`\beta \approx 0.5`} matches the empirical gradient asymptote but reads as visually overeager — features that look gently rolling at z=8 shouldn't snap to high-zoom contrast. The live viewer below defaults to ${tex`\beta = 0.3`} and exposes a slider across ${tex`[0, 1]`}; ${tex`\beta = 0`} disables the correction entirely, so you can compare.

    A caveat that I haven't resolved: AWS Terrarium and Mapterhorn (the live viewer's source) aren't the same dataset and aren't guaranteed to use the same resampling algorithm, so the ${tex`\beta`} fit transfers only approximately. The slider is the right level at which to dial it in empirically against whatever your actual tileset does.
  </script>
  <script id="68" type="text/markdown">
    ## Live WebGPU tile viewer

    End of the notebook — everything we've built, composited in realtime on the GPU. Each tile goes through a two-phase bake (CPU or GPU). The **static bake** runs once when the tile's elevation data arrives: compute surface normals, 8-pass LSAO, and pack the results into an `rgba8unorm` texture:

    ${tex.block`(R, G) = (\tfrac{n_x + 1}{2},\; \tfrac{n_y + 1}{2}), \quad B = \mathrm{AO}^{\gamma}, \quad A = s_{\text{shadow}}.`}

    The **shadow re-bake** runs whenever the sun direction changes, recomputing just the alpha channel for every visible tile. Normals and AO are preserved. The fragment shader reconstructs ${tex`n_z = \sqrt{1 - n_x^2 - n_y^2}`} and composites relief shading, ambient occlusion, and shadows using the live sun direction. Slider and sun-drag changes that don't move the sun direction are pure uniform-buffer writes — 60 fps with no recomputation. Tile positioning math runs in JS `number` precision so the view stays stable at high zoom.

    The viewer reuses the same WebGPU device as the compute shader earlier in the notebook. Pan with click+drag; zoom with the mouse wheel.
  </script>

  <script id="71" type="module">

    const shadowEl = Inputs.range([0, 1], {

    });
    const sunDiameterEl = Inputs.range([0.5, 30], {
      label: "sun diameter (°)",
      value: 5,
      step: 0.01,
      transform: Math.log,
    });
    const shadowSamplesEl = Inputs.range([1, 16], {
      label: "shadow samples",
      value: 6,
      step: 1,
    });

      label: "AO falloff",
      value: "e^(−sin α)",
    });

    tileViewerControlsDiv.appendChild(bakeModeEl);
    tileViewerControlsDiv.appendChild(strengthEl);
    tileViewerControlsDiv.appendChild(aoEl);
    tileViewerControlsDiv.appendChild(shadowEl);
    tileViewerControlsDiv.appendChild(sunDiameterEl);
    tileViewerControlsDiv.appendChild(shadowSamplesEl);
    tileViewerControlsDiv.appendChild(aoFalloffEl);
    tileViewerControlsDiv.appendChild(zoomExagEl);
    tileViewerControlsDiv.appendChild(sunCalendarEl);
    display(tileViewerControlsDiv);
    const tileViewerControls = {
      bakeModeEl,

  <script id="72" type="module">
    const viewerEl = html`<div
      style="width:100%; height:100%; border:1px solid #888; box-sizing:border-box; position:relative;"
    ></div>`;

    display(expandable(viewerEl, {
      id: 'tile-viewer',
      width: 640,
      height: 600,
      wide: true,
      controls: ['.tile-viewer-controls', '.tile-viewer-sun-overlay'],
    }));

    if (webgpuContext.error) {
      viewerEl.textContent = "WebGPU unavailable: " + webgpuContext.error;
    } else {
      const { device, format } = webgpuContext;
      // Sun handle overlay, wired to the tile-viewer-sun-dir mutable.
      const handleCanvas = html`<canvas
        width="120"
        height="120"
        style="display:block; width:120px; height:120px;"
      ></canvas>`;
      handleCanvas.style.background = "rgba(0,0,0,0.5)";
      const sunOverlay = mountSunHandle({
        canvas: handleCanvas,
        ...tileViewerSunDirAccessor,
        crosshairs: true,
        angle: tileViewerControls.sunDiameterEl,
      });
      sunOverlay.style.overflow = "hidden";
      sunOverlay.style.borderRadius = "6px";
      sunOverlay.style.border = "1px solid rgba(255,255,255,0.25)";

      const sunLabel = document.createElement("label");
      sunLabel.textContent = "sun angle";
      sunLabel.style.display = "none";

      const sunWrapper = document.createElement("div");
      sunWrapper.className = "tile-viewer-sun-overlay";
      sunWrapper.appendChild(sunLabel);
      sunWrapper.appendChild(sunOverlay);

      // Style the wrapper for the map (absolute, upper-right).
      const applyMapStyle = () => {
        sunWrapper.style.cssText = "position:absolute; top:12px; right:12px; z-index:500; pointer-events:auto;";
        sunLabel.style.display = "none";
        handleCanvas.style.background = "rgba(0,0,0,0.5)";
        sunOverlay.style.overflow = "hidden";
        sunOverlay.style.border = "1px solid rgba(255,255,255,0.25)";
      };
      // Style for the expanded controls panel.
      const applyPanelStyle = () => {
        sunWrapper.style.cssText = "display:flex; flex-wrap:nowrap; align-items:start; pointer-events:auto;";
        sunLabel.style.cssText = "display:block; flex-shrink:0; align-self:start; width:var(--label-width,120px); margin-right:var(--length2,6.5px); padding:5px 0 4px 0; font:13px/1.2 var(--sans-serif);";
        handleCanvas.style.background = "rgba(128,128,128,0.15)";
        sunOverlay.style.overflow = "hidden";
        sunOverlay.style.border = "1px solid rgb(133, 133, 133)";
        sunOverlay.style.borderRadius = "4px";
      };
      applyMapStyle();

      // Watch for reparenting between the map and the controls panel.
      new MutationObserver(() => {
        if (sunWrapper.closest(".expandable-controls-panel")) applyPanelStyle();
        else applyMapStyle();
      }).observe(document.body, { childList: true, subtree: true });

      const viewer = createTileViewer({
        container: viewerEl,
        device,
        format,
        tileUrl: "https://tiles.mapterhorn.com/{z}/{x}/{y}.webp",
        tileSize: 256,
        minZoom: 0,
        maxZoom: 15,
        zoom: 14.5,
        center: [
          38.2376607744605508,
          -109.8195024690180048
          //37.0476, -110.1072
        ],
      });
      tileViewerRef.set(viewer);
      viewerEl.appendChild(sunWrapper);

      // Poll the sun mutable and the three sliders each frame; when
      // anything has changed, push the new values through as a single
      // uniform-buffer write. `needsRender` inside the viewer makes
      // the render loop a no-op when there's nothing to update.
      const c = tileViewerControls;
      const tickLighting = () => {
        const sd = tileViewerSunDirAccessor.get();
        const azRad = (sd.az * Math.PI) / 180;
        // Clamp to the horizon for shading/shadow math — a negative
        // altitude would break the sweep kernel. The widget still reads
        // the raw sd.alt so its below-horizon state displays correctly.
        const altRad = (Math.max(0, sd.alt) * Math.PI) / 180;
        const sunX = Math.cos(altRad) * Math.cos(azRad);
        const sunY = Math.cos(altRad) * Math.sin(azRad);
        const sunZ = Math.sin(altRad);
        const reliefStrength = Number(c.strengthEl.value);
        const aoStrength = Number(c.aoEl.value);
        const shadowStrength = Number(c.shadowEl.value);
        const sunDiameter = Number(c.sunDiameterEl.value);
        const shadowSamples = Math.max(
          1,
          Math.round(Number(c.shadowSamplesEl.value)),
        );
        const isDebug = c.bakeModeEl.value === "debug";
        const lsaoFalloff = c.aoFalloffEl.value === "e^(−sin α)" ? "exp" : "cos2";
        const reliefBeta = Number(c.zoomExagEl.value);
        viewer.setLighting({
          sunX,
          sunY,
          sunZ,
          kAmbient: 0,
          kDirect: 0,
          aoStrength,
          shadowStrength,
          sunRadiusDeg: sunDiameter / 2,
          shadowSamples,
          sunInteracting: sunOverlay.isDragging(),
          shadingMode: isDebug ? 2 : 1,
          reliefStrength,
          bakeMode: isDebug ? "cpu" : c.bakeModeEl.value,
          lsaoFalloff,
          reliefBeta,
        });
        requestAnimationFrame(tickLighting);
      };
      requestAnimationFrame(tickLighting);

      viewer;
    }
  </script>
