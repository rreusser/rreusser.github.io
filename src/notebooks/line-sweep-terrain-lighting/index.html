  </script>

  <script id="soft-shadow-compute" type="module">
    // Persistent driver loop: reads the latest sun direction + params
    // from shared refs (window.__softSunDirMut, window.__softSunDiameterEl,
    // window.__softAzSamplesEl) between batches and renders directly to
    // softCanvas. This cell is *not* reactive on sun-dir or controls, so
    // mousemoves don't invalidate it — instead the loop coalesces pending
    // state changes into the next available batch, and each completed
    // batch gets drawn even while interaction is ongoing.
    const scN = elevation.N;
    const softCtx = softCanvas.getContext("2d");
    const softImg = softCtx.createImageData(scN, scN);
    const softPx = softImg.data;
    const srH = elevation.heights;
    const srMin = elevation.elevMin;
    const srRange = elevation.elevMax - elevation.elevMin || 1;

    // Bump the generation counter so any previous driver loop (from a
    // prior cell run — e.g. after an elevation swap) exits cleanly when
    // its iteration sees a mismatch.
    const gen = (window.__softDriverGen || 0) + 1;
    window.__softDriverGen = gen;

    (async function driver() {
      let lastKey = null;
      let idleTick = 0;
      while (window.__softDriverGen === gen) {
        const sd = softSunDirAccessor.get();
        const diamEl = window.__softSunDiameterEl;
        const nEl = window.__softAzSamplesEl;
        const diam = diamEl ? Number(diamEl.value) : 5;
        const nAzCur = Math.round(nEl ? Number(nEl.value) : 8);
        const key = sd.az + "|" + sd.alt + "|" + diam + "|" + nAzCur;

        if (key === lastKey) {
          // Nothing new to render; wake up periodically to re-check.
          await new Promise((r) => setTimeout(r, 16));
          idleTick++;
          continue;
        }
        idleTick = 0;

        const sunR = diam / 2;
        // Variance-match to the altitude smoothstep. The smoothstep
        // s(t) = 3t² − 2t³ has slope 3/2 at its midpoint; equating to
        // the Gaussian CDF slope 1/(σ√(2π)) gives σ_unit = 1/(1.5·√(2π)).
        // Applied over the altitude half-width of 1.5·sunR (total span 3·sunR),
        // the equivalent Gaussian standard deviation in degrees is
        //   σ = 3·sunR · σ_unit = 2·sunR / √(2π).
        const sigma = (2 * sunR) / Math.sqrt(2 * Math.PI);
        const tasks = [];
        for (let ia = 0; ia < nAzCur; ia++) {
          // Stratified inverse-CDF placement: each sample sits at the
          // centre of an equal-probability slice under the Gaussian.
          const q = nAzCur === 1 ? 0 : normInv((ia + 0.5) / nAzCur);
          const daz = q * sigma;
          tasks.push({
            W: scN,
            H: scN,
            heights: elevation.heights,
            azDeg: sd.az + daz,
            altDeg: sd.alt,
            pxSizeM: elevation.pixelSizeM,
            sunRadiusDeg: sunR,
          });
        }

        const sweeps = await runSoftSweeps(tasks);
        if (window.__softDriverGen !== gen) return;

        const result = new Float32Array(scN * scN);
        const wUnit = 1 / sweeps.length;
        for (let s = 0; s < sweeps.length; s++) {
          const sweep = sweeps[s];
          for (let i = 0; i < sweep.length; i++) {
            result[i] += wUnit * sweep[i];
          }
        }

        for (let i = 0; i < srH.length; i++) {
          const j = i * 4;
          const tone = 0.1 + 0.8 * ((srH[i] - srMin) / srRange);
          const shade = Math.min(1, Math.max(0, result[i]));
          const lit = 1 - 0.94 * shade;
          const v = Math.round(linearToSrgb(tone * lit) * 255);
          softPx[j] = v;
          softPx[j + 1] = v;
          softPx[j + 2] = v;
          softPx[j + 3] = 255;
        }
        softCtx.putImageData(softImg, 0, 0);

        lastKey = key;
      }
    })();

    const softResult = null;
    softResult;
  </script>

  <script id="lsao-intro" type="text/markdown">
    ## Line-sweep ambient occlusion

    The same upper-hull-tracking discipline that gives us hard shadows works for **ambient occlusion** too. Following [Karim Naaji's LSAO](https://karim.naaji.fr/lsao.html), for each sweep direction I walk every ray through the terrain and, at each pixel, look up the horizon blocker that maximizes the sky-elevation angle α. Naaji uses an ad-hoc ${tex`e^{-\sin\alpha}`} exponential falloff for the per-direction sky visibility, which works visually but has a long tail — even a target 500 m away from a tall blocker still reads ~11% darkening, so the AO effect bleeds across adjacent tiles.

    There's a more principled choice that happens to be much more local. For a Lambertian receiver, incident sky radiance from a direction at zenith angle ${tex`\theta`} is weighted by ${tex`\cos\theta`}, so the visible fraction of one azimuthal slice above a horizon at elevation α is

    ${tex.block`V(\alpha) \;=\; \int_{0}^{\pi/2 - \alpha} \cos\theta \cdot \sin\theta \, d\theta \;=\; \tfrac{1}{2}\cos^2\!\alpha,`}

    which normalises to ${tex`\cos^2\!\alpha`}: 1 at a flat horizon, 0 at a fully vertical wall. Averaging this over azimuthally uniform sweeps gives the full ambient-occlusion factor. Because ${tex`\cos^2\!\alpha \approx 1 - (\Delta h / d)^2`} for small angles, the contribution of a distant tall blocker falls off like ${tex`1/d^2`} rather than lingering on the exponential's shoulder: the same 500 m target now only sees ~1.5% darkening, and the effect is visibly local.

    A contrast slider ${tex`c \in [0, 1]`} shapes the response on top of the raw ${tex`\bar{v} = \overline{\cos^2\!\alpha}`} per pixel. Let ${tex`s = c / (1 - c)`} and ${tex`\text{shade} = 1 - \bar{v}`}; an ${tex`\arctan`} tonemap squashes the scaled shade into ${tex`[0, 1]`}:

    ${tex.block`\text{display} \;=\; 1 - \tfrac{2}{\pi}\arctan\!\left(\tfrac{c}{1-c}\,(1 - \bar{v})\right).`}

    At ${tex`c = 0`} the slider emits solid white; as ${tex`c \to 1`} the scaled shade runs to infinity and the tonemap saturates toward full darkness. Naaji's reference fires eight axis-aligned passes; because our canonical reparameterization handles arbitrary azimuths, we can use any number of directions, and each pass is independent so we run them in the same Web Worker pool as the soft shadows.
  </script>

  <script id="lsao-sweep-fn" type="module">
    import { createLsaoSweepPool } from "./lsao-sweep.js";
    const { runLsao } = createLsaoSweepPool();
    runLsao;
  </script>

  <script id="lsao-controls" type="module">
    const lsaoControls = html`<div></div>`;
    const lsaoSamplesEl = Inputs.range([1, 32], {
      label: "sweep directions",
      value: 8,
      step: 1,
    });
    const lsaoContrastEl = Inputs.range([0, 0.99], {
      label: "contrast",
      value: 0.6,
      step: 0.01,
    });
    lsaoControls.appendChild(lsaoSamplesEl);
    lsaoControls.appendChild(lsaoContrastEl);
    const lsaoSamples = Generators.input(lsaoSamplesEl);
    const lsaoContrast = Generators.input(lsaoContrastEl);
    display(lsaoControls);
  </script>

  <script id="lsao-canvas" type="module">
    const lsaoN = elevation.N;
    const lsaoDisp = Math.max(1, Math.floor(512 / lsaoN));
    const lsaoPxDisplay = Math.min(lsaoN * lsaoDisp, width);
    const lsaoCanvas = html`<canvas
      width=${lsaoN}
      height=${lsaoN}
      style="display:block; width:${lsaoPxDisplay}px; height:${lsaoPxDisplay}px; image-rendering:pixelated; border:1px solid #888;"
    ></canvas>`;
    const lsaoWrap = html`<div
      style="position:relative; display:inline-block; line-height:0;"
    >
      ${lsaoCanvas}
    </div>`;
    lsaoWrap.appendChild(createSourceToggleBadge());
    display(
      html`<figure>
        ${lsaoWrap}
        <figcaption>
          Ambient occlusion from ${tex`N`} azimuthally uniform line sweeps,
          averaged per pixel. Directions stack additively — more samples smooth
          out azimuth banding. Rendered as AO modulating a uniform gray base so
          the occlusion effect is isolated from elevation coloring.
        </figcaption>
      </figure>`,
    );
    lsaoCanvas;
  </script>

  <script id="lsao-compute" type="module">
    const nDirs = Math.round(lsaoSamples);
    const W = elevation.N;
    const H = elevation.N;
    const tasks = [];
    for (let i = 0; i < nDirs; i++) {
      tasks.push({
        W,
        H,
        elev: elevation.heights,
        azDeg: (i * 360) / nDirs,
        pxSizeM: elevation.pixelSizeM,
        weight: 1 / nDirs,
      });
    }
    const sweeps = await runLsao(tasks);

    const ao = new Float32Array(W * H);
    for (let s = 0; s < sweeps.length; s++) {
      const sw = sweeps[s];
      for (let i = 0; i < ao.length; i++) ao[i] += sw[i];
    }

    const lsaoCtx = lsaoCanvas.getContext("2d");
    const lsaoImg = lsaoCtx.createImageData(W, H);
    const lsaoPx = lsaoImg.data;

    // Contrast slider c ∈ [0, 1]:
    //   s = c / (1 − c)                 scale factor, (0, ∞)
    //   shade = 1 − ao_raw               per-pixel linear darkening
    //   display = 1 − (2/π)·atan(s·shade)
    // At c=0, s=0, no darkening, display = 1 (solid white); at c=1,
    // s=∞, display saturates toward 0 everywhere shade > 0.
    const lsaoC = Math.max(0, Math.min(0.999999, lsaoContrast ** 0.1));
    const lsaoS = lsaoC / (1 - lsaoC);
    const lsaoInvPi2 = 2 / Math.PI;
    for (let i = 0; i < ao.length; i++) {
      const aoRaw = Math.max(0, Math.min(1, ao[i]));
      const shade = 1 - aoRaw;
      const squashed = lsaoInvPi2 * Math.atan(lsaoS * shade);
      const visibility = 1 - squashed;
      const v = Math.round(linearToSrgb(visibility) * 255);
      const j = i * 4;
      lsaoPx[j] = v;
      lsaoPx[j + 1] = v;
      lsaoPx[j + 2] = v;
      lsaoPx[j + 3] = 255;
    }
    lsaoCtx.putImageData(lsaoImg, 0, 0);
  </script>

  <script id="webgpu-intro" type="text/markdown">
    ## WebGPU implementation

    Every mode the CPU `sweepCore` supports — hard shadow, soft shadow with stratified azimuth integration, and LSAO — ported to WGSL compute via _dynamic shader specialization_. Each `(mode, prewarm)` permutation is built once into its own `GPUComputePipeline` and cached, so the inner hull-scan loop has no per-pixel mode branch. The parent-tile prewarm is itself a compile-time flag: when off, the shader skips the warmup block entirely and the horizon binding shrinks to a 16-byte stub. Multi-sample averaging (azimuth offsets for soft, uniform directions for LSAO) is dispatched as N successive compute passes that each accumulate `weight · bit · fpScale` into the shared atomic `shadow` buffer.
  </script>

  <script id="webgpu-device" type="module">
    // One-time device setup. Persists across sun/source changes.
    const webgpuContext = await (async () => {
      if (!navigator.gpu)
        return { error: "WebGPU not supported in this browser." };
      const adapter = await navigator.gpu.requestAdapter();
      if (!adapter) return { error: "No WebGPU adapter available." };
      const device = await adapter.requestDevice();
      const format = navigator.gpu.getPreferredCanvasFormat();
      return { adapter, device, format };
    })();
    if (webgpuContext.error) {
      display(
        html`<div
          style="font:13px ui-monospace,monospace; background:#fee; padding:8px 12px; border-left:3px solid #d33;"
        >
          ${webgpuContext.error}
        </div>`,
      );
    }
    webgpuContext;
  </script>

  <script id="webgpu-pipelines" type="module">
    import {
      getOrBuildComputePipeline,
      getOrBuildRenderPipeline,
      packUniforms,
      packRenderUniforms,
      deriveSweepParams,
      createHorizonStubBuffer,
      UNIFORM_BYTES,
      RENDER_UNIFORM_BYTES,
      FP_SCALE,
    } from "./webgpu-pipelines.js";
    // Re-export everything the dispatch cell needs as a single bundle so
    // the cell isn't reactive on each individual import.
    const webgpuPipelinesApi = (() => {
      if (webgpuContext.error) return null;
      return {
        getOrBuildComputePipeline,
        getOrBuildRenderPipeline,
        packUniforms,
        packRenderUniforms,
        deriveSweepParams,
        createHorizonStubBuffer,
        UNIFORM_BYTES,
        RENDER_UNIFORM_BYTES,
        FP_SCALE,
      };
    })();
    webgpuPipelinesApi;
  </script>

  <script id="webgpu-sun-dir" type="module">
    // Live sun direction for the WebGPU figure. The driver loop polls
    // this mutable rather than taking a reactive dependency on it so
    // mousemoves don't invalidate the cell.
    const webgpuSunDirMut = Mutable({ az: 314.5, alt: 10 });
    const webgpuSunDirAccessor = (() => { const m = webgpuSunDirMut; return { get: () => m.value, set: (v) => { m.value = v; } }; })();
  </script>

  <script id="webgpu-controls" type="module">
    // Mode + sample-count + contrast knobs for the WebGPU figure. Held
    // on `window` so the persistent driver loop can read them without
    // becoming reactive on every keystroke.
    const wgpuControls = html`<div></div>`;
    const wgpuModeEl = Inputs.radio(["hard", "soft", "lsao"], {
      label: "mode",
      value: "hard",
    });
    const wgpuPrewarmEl = Inputs.toggle({
      label: "parent-tile prewarm",
      value: true,
    });
    const wgpuSamplesEl = Inputs.range([1, 32], {
      label: "samples",
      value: 12,
      step: 1,
    });
    const wgpuSunDiameterEl = Inputs.range([0.5, 30], {
      label: "sun diameter (°)",
      value: 10,
      step: 0.01,
      transform: Math.log,
    });
    const wgpuContrastEl = Inputs.range([0, 0.99], {
      label: "LSAO contrast",
      value: 0.6,
      step: 0.01,
    });
    wgpuControls.appendChild(wgpuModeEl);
    wgpuControls.appendChild(wgpuPrewarmEl);
    wgpuControls.appendChild(wgpuSamplesEl);
    wgpuControls.appendChild(wgpuSunDiameterEl);
    wgpuControls.appendChild(wgpuContrastEl);
    window.__wgpuModeEl = wgpuModeEl;
    window.__wgpuPrewarmEl = wgpuPrewarmEl;
    window.__wgpuSamplesEl = wgpuSamplesEl;
    window.__wgpuSunDiameterEl = wgpuSunDiameterEl;
    window.__wgpuContrastEl = wgpuContrastEl;
    display(wgpuControls);
  </script>

  <script id="webgpu-canvas-setup" type="module">
    // Reactive on elevation — recreates canvas + elev/shadow buffers when N or
    // source changes. The WebGPU context is configured on the new canvas.
    const webgpuRuntime = (() => {
      if (webgpuContext.error || !webgpuPipelinesApi) return null;
      const { device, format } = webgpuContext;
      const N = elevation.N;
      const dispScale = Math.max(1, Math.floor(512 / N));
      const dispPx = Math.min(N * dispScale, width);
      const canvas = html`<canvas
        width=${N}
        height=${N}
        style="display:block; width:${dispPx}px; height:${dispPx}px; image-rendering:pixelated;"
      ></canvas>`;
      const wgpuFigure = mountSunHandle({
        canvas,
        ...webgpuSunDirAccessor,
      });
      wgpuFigure.appendChild(createSourceToggleBadge());
      display(
        html`<figure>
          ${wgpuFigure}
          <figcaption>
            WGSL compute kernel exercising every mode the CPU sweepCore
            supports. Drag the yellow handle to move the sun; toggle the
            controls to switch mode, enable/disable the parent-tile prewarm, or
            change sample counts.
          </figcaption>
        </figure>`,
      );

      const ctx = canvas.getContext("webgpu");
      ctx.configure({ device, format });

      const elevBuffer = device.createBuffer({
        size: N * N * 4,
        usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
        label: "elevation",
      });
      device.queue.writeBuffer(elevBuffer, 0, elevation.heights);

      const shadowBuffer = device.createBuffer({
        size: N * N * 4,
        usage:
          GPUBufferUsage.STORAGE |
          GPUBufferUsage.COPY_DST |
          GPUBufferUsage.COPY_SRC,
        label: "shadow (atomic u32)",
      });

      const HN = elevationHorizon.HN;
      const horizonBuffer = device.createBuffer({
        size: HN * HN * 4,
        usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
        label: "horizon (half-res parent pre-pass)",
      });
      device.queue.writeBuffer(horizonBuffer, 0, elevationHorizon.heights);

      const horizonStub = webgpuPipelinesApi.createHorizonStubBuffer(device);

      // One uniform buffer per dispatch is a touch wasteful but sidesteps
      // the synchronization headache of writing N copies into the same
      // buffer between N successive passes in one encoder. Allocated up
      // front for the maximum sample count we expose in the UI (32).
      const MAX_SAMPLES = 32;
      const uniformBuffers = [];
      for (let i = 0; i < MAX_SAMPLES; i++) {
        uniformBuffers.push(
          device.createBuffer({
            size: webgpuPipelinesApi.UNIFORM_BYTES,
            usage:
              GPUBufferUsage.UNIFORM |
              GPUBufferUsage.COPY_DST |
              GPUBufferUsage.COPY_SRC,
            label: `sweepCore uniforms #${i}`,
          }),
        );
      }
      const renderUniformBuffer = device.createBuffer({
        size: webgpuPipelinesApi.RENDER_UNIFORM_BYTES,
        usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
        label: "sweepCore render uniforms",
      });

      return {
        canvas,
        ctx,
        elevBuffer,
        shadowBuffer,
        horizonBuffer,
        horizonStub,
        uniformBuffers,
        renderUniformBuffer,
        N,
        HN,
      };
    })();
    webgpuRuntime;
  </script>

  <script id="webgpu-dispatch" type="module">
    // Persistent driver loop: polls sun-dir + controls, and on every
    // change rebuilds N pipeline dispatches (one per sample) into a
    // single command buffer that clears the shadow buffer, accumulates
    // weighted contributions into it, and renders the final composite.
    if (webgpuRuntime && webgpuPipelinesApi && !webgpuContext.error) {
      const { device, format } = webgpuContext;
      const api = webgpuPipelinesApi;
      const {
        ctx,
        elevBuffer,
        shadowBuffer,
        horizonBuffer,
        horizonStub,
        uniformBuffers,
        renderUniformBuffer,
        N,
        HN,
      } = webgpuRuntime;
      const W = N,
        H = N;
      const pxSizeM = elevation.pixelSizeM;

      // Bump a generation counter so any previous driver loop (from a
      // prior cell run) exits cleanly when its tick sees a mismatch.
      const gen = (window.__wgpuDriverGen || 0) + 1;
      window.__wgpuDriverGen = gen;

      function dispatchOnce({
        mode,
        prewarm,
        samples,
        sunDiameter,
        contrast,
        sd,
      }) {
        const pipeline = api.getOrBuildComputePipeline({
          device,
          mode,
          prewarm,
        });
        const renderPipeline = api.getOrBuildRenderPipeline({
          device,
          format,
          displayMode: mode === "lsao" ? "lsao" : "shaded",
        });

        // Build the per-sample task list. For 'hard' we just do the
        // single point-sun sweep. For 'soft' we stratify N azimuth
        // offsets over a Gaussian variance-matched to the altitude
        // smoothstep, exactly as the soft-shadow CPU driver does. For
        // 'lsao' we use N azimuthally uniform directions starting at
        // the live sun azimuth so the figure responds to the handle.
        const tasks = [];
        if (mode === "hard") {
          tasks.push({ azDeg: sd.az, altDeg: sd.alt });
        } else if (mode === "soft") {
          const sunR = sunDiameter / 2;
          const sigma = (2 * sunR) / Math.sqrt(2 * Math.PI);
          for (let ia = 0; ia < samples; ia++) {
            const q = samples === 1 ? 0 : normInv((ia + 0.5) / samples);
            tasks.push({
              azDeg: sd.az + q * sigma,
              altDeg: sd.alt,
              sunRadiusDeg: sunR,
            });
          }
        } else {
          for (let ia = 0; ia < samples; ia++) {
            tasks.push({ azDeg: sd.az + (ia * 360) / samples });
          }
        }

        const weight = 1 / tasks.length;
        const useHorizon = prewarm;
        const horizonBinding = useHorizon ? horizonBuffer : horizonStub;
        const horizonN = useHorizon ? HN : 0;

        const encoder = device.createCommandEncoder();
        encoder.clearBuffer(shadowBuffer);

        for (let t = 0; t < tasks.length; t++) {
          const task = tasks[t];
          const sweep = api.deriveSweepParams({
            W,
            H,
            azDeg: task.azDeg,
            pxSizeM,
            mode,
            altDeg: task.altDeg || 0,
            sunRadiusDeg: task.sunRadiusDeg || 0,
            weight,
            horizonN,
          });
          const uBytes = api.packUniforms(sweep);
          device.queue.writeBuffer(uniformBuffers[t], 0, uBytes);

          const bindGroup = device.createBindGroup({
            layout: pipeline.getBindGroupLayout(0),
            entries: [
              { binding: 0, resource: { buffer: uniformBuffers[t] } },
              { binding: 1, resource: { buffer: elevBuffer } },
              { binding: 2, resource: { buffer: shadowBuffer } },
              { binding: 3, resource: { buffer: horizonBinding } },
            ],
          });

          const numRays = sweep.bMax - sweep.bMin + 1;
          const numWorkgroups = Math.ceil(numRays / 64);
          const pass = encoder.beginComputePass();
          pass.setPipeline(pipeline);
          pass.setBindGroup(0, bindGroup);
          pass.dispatchWorkgroups(numWorkgroups);
          pass.end();
        }

        // Render uniforms.
        const rBytes = api.packRenderUniforms({
          N,
          hMin: elevation.elevMin,
          hRange: elevation.elevMax - elevation.elevMin || 1,
          contrast: Math.pow(Math.min(0.999999, Math.max(0, contrast)), 0.1),
        });
        device.queue.writeBuffer(renderUniformBuffer, 0, rBytes);

        const renderBindGroup = device.createBindGroup({
          layout: renderPipeline.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: shadowBuffer } },
            { binding: 1, resource: { buffer: elevBuffer } },
            { binding: 2, resource: { buffer: renderUniformBuffer } },
          ],
        });

        const pass = encoder.beginRenderPass({
          colorAttachments: [
            {
              view: ctx.getCurrentTexture().createView(),
              loadOp: "clear",
              clearValue: [0, 0, 0, 1],
              storeOp: "store",
            },
          ],
        });
        pass.setPipeline(renderPipeline);
        pass.setBindGroup(0, renderBindGroup);
        pass.draw(3);
        pass.end();

        device.queue.submit([encoder.finish()]);
      }

      (async function driver() {
        let lastKey = null;
        while (window.__wgpuDriverGen === gen) {
          const sd = webgpuSunDirAccessor.get();
          const mode = window.__wgpuModeEl.value;
          // LSAO with cos²α + parent-tile prewarm produces a visible
          // within-tile band on the sun-facing edge (distant parent
          // blockers stay on the hull contributing graded darkening).
          // In this single-tile showcase figure we always render LSAO
          // without prewarm to keep the kernel clean; the slippy-map
          // tile viewer later in the notebook opts the other way and
          // uses prewarm for cross-tile continuity.
          const prewarmToggle = !!window.__wgpuPrewarmEl.value;
          const prewarm = mode === "lsao" ? false : prewarmToggle;
          const samples = Math.max(
            1,
            Math.round(Number(window.__wgpuSamplesEl.value)),
          );
          const sunDiameter = Number(window.__wgpuSunDiameterEl.value);
          const contrast = Number(window.__wgpuContrastEl.value);
          const effectiveSamples = mode === "hard" ? 1 : samples;
          const key = [
            sd.az,
            sd.alt,
            mode,
            prewarm ? 1 : 0,
            effectiveSamples,
            sunDiameter,
            contrast,
          ].join("|");
          if (key === lastKey) {
            await new Promise((r) => requestAnimationFrame(r));
            continue;
          }
          dispatchOnce({
            mode,
            prewarm,
            samples: effectiveSamples,
            sunDiameter,
            contrast,
            sd,
          });
          lastKey = key;
          await new Promise((r) => requestAnimationFrame(r));
        }
      })();
    }
  </script>

  <script id="tile-viewer-intro" type="text/markdown">
    ## Live WebGPU tile viewer

    End of the notebook — everything we've built, composited in realtime on the GPU. Each tile is a CPU bake: fetch the Terrarium webp, compute surface normals, 8-pass LSAO, and a hard shadow at a fixed reference sun direction. All four fields are packed into one `rgba8unorm` texture:

    ${tex.block`(R, G) = (\tfrac{n_x + 1}{2},\; \tfrac{n_y + 1}{2}), \quad B = \mathrm{AO}, \quad A = s_{\text{bake}}.`}

    The fragment shader reconstructs ${tex`n_z = \sqrt{1 - n_x^2 - n_y^2}`}, takes the dot product with the live sun direction for Lambertian diffuse, and combines it with the baked ambient and shadow masks using the same ${tex`(1 - v̄)`}-style weights as the earlier figures. Sun-drag and slider moves are pure uniform-buffer writes with no CPU recomputation — 60 fps in every pose. The baked shadow stays at a fixed reference direction; only the direct relief term moves when you drag the sun. Tile positioning math runs in JS `number` precision so the view stays stable at high zoom.

    The viewer reuses the same WebGPU device as the compute shader earlier in the notebook. Pan with click+drag; zoom with the mouse wheel.
  </script>

  <script id="tile-viewer-sun-dir" type="module">
    const tileViewerSunDirMut = Mutable({ az: 314.5, alt: 25 });
    const tileViewerSunDirAccessor = (() => { const m = tileViewerSunDirMut; return { get: () => m.value, set: (v) => { m.value = v; } }; })();
  </script>

  <script id="tile-viewer-helper" type="module">
    import { createTileViewer } from "./tile-viewer.js";
    import { expandable } from "./lib/expandable.js";
  </script>

  <script id="tile-viewer-controls" type="module">
    const tileViewerControlsDiv = html`<div class="tile-viewer-controls"></div>`;
    const bakeModeEl = Inputs.radio(
      new Map([["CPU", "cpu"], ["GPU", "gpu"], ["debug", "debug"]]),
      { label: "mode", value: "cpu" },
    );
    const strengthEl = Inputs.range([0, 1], {
      label: "relief strength",
      value: 0.2,
      step: 0.01,
    });
    const aoEl = Inputs.range([0, 1], {
      label: "AO strength",
      value: 0.5,
      step: 0.01,
    });
    const shadowEl = Inputs.range([0, 1], {
      label: "shadow strength",
      value: 0.5,
      step: 0.01,
    });
    const sunDiameterEl = Inputs.range([0.5, 30], {
      label: "sun diameter (°)",
      value: 5,
      step: 0.01,
      transform: Math.log,
    });
    const shadowSamplesEl = Inputs.range([1, 16], {
      label: "shadow samples",
      value: 6,
      step: 1,
    });
    tileViewerControlsDiv.appendChild(bakeModeEl);
    tileViewerControlsDiv.appendChild(strengthEl);
    tileViewerControlsDiv.appendChild(aoEl);
    tileViewerControlsDiv.appendChild(shadowEl);
    tileViewerControlsDiv.appendChild(sunDiameterEl);
    tileViewerControlsDiv.appendChild(shadowSamplesEl);
    display(tileViewerControlsDiv);
    const tileViewerControls = {
      bakeModeEl,
      strengthEl,
      aoEl,
      shadowEl,
      sunDiameterEl,
      shadowSamplesEl,
    };
  </script>

  <script id="tile-viewer" type="module">
    const viewerEl = html`<div
      style="width:100%; height:100%; border:1px solid #888; box-sizing:border-box; position:relative;"
    ></div>`;

    display(expandable(viewerEl, {
      id: 'tile-viewer',
      width: 640,
      height: 600,
      wide: true,
      controls: ['.tile-viewer-controls', '.tile-viewer-sun-overlay'],
    }));

    if (webgpuContext.error) {
      viewerEl.textContent = "WebGPU unavailable: " + webgpuContext.error;
    } else {
      const { device, format } = webgpuContext;
      // Sun handle overlay, wired to the tile-viewer-sun-dir mutable.
      const handleCanvas = html`<canvas
        width="120"
        height="120"
        style="display:block; width:120px; height:120px;"
      ></canvas>`;
      handleCanvas.style.background = "rgba(0,0,0,0.5)";
      const sunOverlay = mountSunHandle({
        canvas: handleCanvas,
        ...tileViewerSunDirAccessor,
        crosshairs: true,
      });
      sunOverlay.style.overflow = "hidden";
      sunOverlay.style.borderRadius = "6px";
      sunOverlay.style.border = "1px solid rgba(255,255,255,0.25)";

      const sunLabel = document.createElement("label");
      sunLabel.textContent = "sun angle";
      sunLabel.style.display = "none";

      const sunWrapper = document.createElement("div");
      sunWrapper.className = "tile-viewer-sun-overlay";
      sunWrapper.appendChild(sunLabel);
      sunWrapper.appendChild(sunOverlay);

      // Style the wrapper for the map (absolute, upper-right).
      const applyMapStyle = () => {
        sunWrapper.style.cssText = "position:absolute; top:12px; right:12px; z-index:500; pointer-events:auto;";
        sunLabel.style.display = "none";
        handleCanvas.style.background = "rgba(0,0,0,0.5)";
        sunOverlay.style.overflow = "hidden";
        sunOverlay.style.border = "1px solid rgba(255,255,255,0.25)";
      };
      // Style for the expanded controls panel.
      const applyPanelStyle = () => {
        sunWrapper.style.cssText = "display:flex; flex-wrap:nowrap; align-items:start; pointer-events:auto;";
        sunLabel.style.cssText = "display:block; flex-shrink:0; align-self:start; width:var(--label-width,120px); margin-right:var(--length2,6.5px); padding:5px 0 4px 0; font:13px/1.2 var(--sans-serif);";
        handleCanvas.style.background = "rgba(128,128,128,0.15)";
        sunOverlay.style.overflow = "hidden";
        sunOverlay.style.border = "1px solid rgb(133, 133, 133)";
        sunOverlay.style.borderRadius = "4px";
      };
      applyMapStyle();

      // Watch for reparenting between the map and the controls panel.
      new MutationObserver(() => {
        if (sunWrapper.closest(".expandable-controls-panel")) applyPanelStyle();
        else applyMapStyle();
      }).observe(document.body, { childList: true, subtree: true });

      const viewer = createTileViewer({
        container: viewerEl,
        device,
        format,
        tileUrl: "https://tiles.mapterhorn.com/{z}/{x}/{y}.webp",
        tileSize: 256,
        minZoom: 0,
        maxZoom: 15,
        zoom: 11,
        center: [36.1, -111.99],
      });
      viewerEl.appendChild(sunWrapper);

      // Poll the sun mutable and the three sliders each frame; when
      // anything has changed, push the new values through as a single
      // uniform-buffer write. `needsRender` inside the viewer makes
      // the render loop a no-op when there's nothing to update.
      const c = tileViewerControls;
      const tickLighting = () => {
        const sd = tileViewerSunDirAccessor.get();
        const azRad = (sd.az * Math.PI) / 180;
        const altRad = (sd.alt * Math.PI) / 180;
        const sunX = Math.cos(altRad) * Math.cos(azRad);
        const sunY = Math.cos(altRad) * Math.sin(azRad);
        const sunZ = Math.sin(altRad);
        const reliefStrength = Number(c.strengthEl.value);
        const aoStrength = Number(c.aoEl.value);
        const shadowStrength = Number(c.shadowEl.value);
        const sunDiameter = Number(c.sunDiameterEl.value);
        const shadowSamples = Math.max(
          1,
          Math.round(Number(c.shadowSamplesEl.value)),
        );
        const isDebug = c.bakeModeEl.value === "debug";
        viewer.setLighting({
          sunX,
          sunY,
          sunZ,
          kAmbient: 0,
          kDirect: 0,
          aoStrength,
          shadowStrength,
          sunRadiusDeg: sunDiameter / 2,
          shadowSamples,
          sunInteracting: sunOverlay.isDragging(),
          shadingMode: isDebug ? 2 : 1,
          reliefStrength,
          bakeMode: isDebug ? "cpu" : c.bakeModeEl.value,
        });
        requestAnimationFrame(tickLighting);
      };
      requestAnimationFrame(tickLighting);

      viewer;
    }
  </script>
