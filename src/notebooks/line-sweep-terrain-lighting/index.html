  <script id="1" type="text/markdown">
    # Line-Sweep Terrain Lighting

    <img src="meta2.webp">

    The goal of this notebook to compute terrain lighting using web map terrain tiles as input and produce corresponding raster light maps as output. For terrain data, we'll be using the excellent and open [Mapterhorn](https://mapterhorn.com/) tileset. We'll start with a simple horizon visibility algorithm and extend it to cover self-shadowing and ambient occlusion. It's definitely not novel, but the devil is in the details.

    Although I don't [work in mapping anymore](https://www.mapbox.com), I'll always have have a soft spot for experimental map rendering techniques. Previously I've built a live [solar terminator map](https://rreusser.github.io/notebooks/night-and-day/) and a [kinda janky 3D map renderer](https://rreusser.github.io/notebooks/denali/). Inspired by some good posts on the topic, I've also dabbled in heightfield shadowing. This article finally pulls the latter work together into something functional.

    ## Inspiration
    
    First of all, the best resource on the topic is Tom Patterson's [shadedrelief.com](http://www.shadedrelief.com/). Any work in map shading can only aspire to convey topography and tell stories in the way his maps do. Alas, I've set myself up to fail in the shadow of such a behemoth. But at any rate, my goal is somewhat focused here, to shade map tiles for real time interactive usage.

    Next is [shadowmap.org](https://shadowmap.org/). It's an excellent product for precise map shadowing. As best as I can tell, they use standard z-buffer shadow mapping techniques to compute shadows, but they do it quite well. Whatever the pros and cons, my interest is different, to compute light maps as *raster* tiles.

    One approach for heightfield shading is to shoot rays. [Rye Terrell's terrain shading](https://wwwtyro.net/2019/03/21/advanced-map-shading.html) marches rays from each pixel along the surface and in the direction of the sun, checking for occlusion along the way. The results are beautiful, but the cost is high and it suffers from tile-boundary discontinuities which Terrell addresses by brute-force rendering 3×3 tiles (768×768) and extracting the center.

    A cheaper alternative is to sweep across the grid, tracking horizon visibility in a stack. [Karim Naaji's Line-Sweep Ambient Occlusion](https://karim.naaji.fr/lsao.html) sweeps rows of the grid, tracking visibility and applying shading in a single pass. However, the technique is limited to eight cardinal directions and still suffers from tile boundary discontinuities.

    This article doesn't offer fundamentally new insight but instead builds on and extends the line-sweep idea to address its shortcomings. In particular it extends the line-sweep to arbitrary directions, uses geometric shadowing to produce soft shadows, and avoids tile boundary discontinuities by prewarming horizon visibility with parent tile data.
  </script>
  <script id="2" type="text/markdown">
    ## Line-sweep horizon visibility

    The core primitive behind this notebook is a 1-D sweep that tracks the upper convex hull of elevations seen so far along each ray. Imagine sweeping along a single slice of terrain elevations. As the sweep advances left to right, we test each new point to see if it's a horizon. If we step uphill far enough that multiple horizons become visible, we pop horizons off of the stack until exactly one horizon remains visible.
  </script>

    ## Self-shadowing

    From here, it's only a small step farther to compute self-shadowing. At each point during the sweep, we compare the horizon angle to the sun angle. If the sun is below the horizon, the terrain is shadowed.

    A particularly nice feature of this algorithm is that we can compute horizon visbility and lighting in the same pass. Neglecting the depth of the stack which generally remains quite small, the algorithm is O(n) in terrain data resolution, requiring that we read each terrain value only once. I can't immediately see that we could do significantly better.
  </script>

  <script id="traversal-explanation" type="text/markdown">
    A little more work is necessary before we can apply this to terrain tiles. The algorithm so far presumes that we're sweeping along a well-defined grid direction. We'd like to be able to compute shadowing in arbitrary directions.

    The solution is simple but requires some finesse. The diagram below illustrates grid traversal in arbitrary directions. We start our first sweep in the upper left corner, seeding subsequent sweeps with remaining pixels along the left edge. For each sweep, we step rightward exactly one pixel and upward by a fractional amount. Once we've exhausted all sweeps starting along the left edge, we step rightward along the bottom edge with a given stride, performing identically the same sweeps from the new seed points.

    This sequence only handles sweep angles in a single octant of the possible ${tex`360^\circ.`} Drag the handle below and observe that for other octants, we simply flip and rotate our canonical octant. In practical terms, this can be implemented with ndarray-style index arithmetic.

    One subtlety is that rays pass between integer pixel rows. We can easily distribute values between adjacent pixels using linear interpolation. Where the rubber really meets the road though is that when we layer the sweep algorithm on top of this, we have to be quite careful about positioning, lest we inaccurately compute the terrain slope and create spurious shadows.
  </script>

    We've been considering hard thresholds, but we're well poised to relax this to a smooth threshold so that we can emulate the soft penumbra of a finite-sized light source like the sun. Realistically, the sun covers about ${tex`0.53^\circ`} degrees in the sky, making it pretty close to a point source, but we can always increase the size for visual effect.

  <script id="47" type="text/markdown">
    Sadly though, the sun is a *two*-dimensional source, and we've only discussed softening in *one* dimension. Short of something fancy like mipmaps, all I was able to come up with was to naively average multiple samples of our altitude-wide analytical soft shadows across the azimuthal direction.

    Samples aren't cheap, so it's worth thinking carefully about how to distribute samples across the sun disk. Our altitude-wise analytical soft shadows use a [smoothstep](https://en.wikipedia.org/wiki/Smoothstep) function, so after some consideration, I scaled a Gaussian function to roughly approximate the smoothstep function, then distributed equally-weighted samples in the azimuthal direction using [inverse-CDF sampling](https://en.wikipedia.org/wiki/Inverse_transform_sampling) to approximate the desired Gaussian.

    The sun isn't really a Gaussian disk, of course. But Gaussians are mathematically separable, which makes the 1D altitude × 1D azimuth factorization work out cleanly, and the resulting penumbra looks smooth enough in practice that the approximation pays off.
  </script>
  <script id="50" type="module">
    // Acklam's inverse-normal approximation: maps a CDF probability in
    // (0, 1) to the corresponding standard-normal quantile. Shared by the
    // stratified-sampling plot and the soft-shadow driver loop.
    const normInv = (p) => {
      const a = [
        -39.69683028665376, 220.9460984245205, -275.9285104469687,
        138.357751867269, -30.66479806614716, 2.506628277459239,
      ];
      const b = [
        -54.47609879822406, 161.5858368580409, -155.6989798598866,
        66.80131188771972, -13.28068155288572,
      ];
      const c = [
        -0.007784894002430293, -0.3223964580411365, -2.400758277161838,
        -2.549732539343734, 4.374664141464968, 2.938163982698783,
      ];
      const d = [
        0.007784695709041462, 0.3224671290700398, 2.445134137142996,
        3.754408661907416,
      ];
      const plow = 0.02425;
      const phigh = 1 - plow;
      let q, r;
      if (p < plow) {
        q = Math.sqrt(-2 * Math.log(p));
        return (
          (((((c[0] * q + c[1]) * q + c[2]) * q + c[3]) * q + c[4]) * q +
            c[5]) /
          ((((d[0] * q + d[1]) * q + d[2]) * q + d[3]) * q + 1)
        );
      }
      if (p <= phigh) {
        q = p - 0.5;
        r = q * q;
        return (
          ((((((a[0] * r + a[1]) * r + a[2]) * r + a[3]) * r + a[4]) * r +
            a[5]) *
            q) /
          (((((b[0] * r + b[1]) * r + b[2]) * r + b[3]) * r + b[4]) * r + 1)
        );
      }
      q = Math.sqrt(-2 * Math.log(1 - p));
      return (
        -(((((c[0] * q + c[1]) * q + c[2]) * q + c[3]) * q + c[4]) * q + c[5]) /
        ((((d[0] * q + d[1]) * q + d[2]) * q + d[3]) * q + 1)
      );
    };
    normInv;
  </script>
  <script id="51" type="module">
    const Npp = Math.round(softAzSamples);
    const sunR = softSunDiameter / 2;
    const sigmaDeg = (2 * sunR) / Math.sqrt(2 * Math.PI);
    // Fixed horizontal range so the Gaussian's width visibly scales with
    // sun diameter rather than the axis re-scaling to hide the change.
    // At the slider's max (30° diameter) σ ≈ 12° and 3σ ≈ 36°, so ±40°
    // keeps the full distribution in frame without wasted whitespace.
    const xMaxDeg = 40;

    // 800-point sample grid (0.1° step) so the bell stays crisp even at
    // the smallest sun diameter, where σ ≈ 0.2° is only a few grid steps.
    const refPts = [];
    for (let i = 0; i <= 800; i++) {
      const x = -xMaxDeg + (2 * xMaxDeg * i) / 800;
      // Unit-peak Gaussian: the y-axis is hidden and we want the bell's
      // height to stay readable at every σ, so we normalize away the
      // density's 1/σ scaling and let the width alone carry the change.
      const y = sigmaDeg > 0 ? Math.exp(-0.5 * (x / sigmaDeg) ** 2) : 0;
      refPts.push({ x, y });
    }

    // All samples carry equal weight 1/N, so they're drawn at a common
    // height (the per-slice weight scaled to the plot). The x position
    // is the one thing that encodes the Gaussian.
    const sampleY = 1 / Npp;
    const strat = [];
    for (let i = 0; i < Npp; i++) {
      const q = Npp === 1 ? 0 : normInv((i + 0.5) / Npp);
      strat.push({ x: q * sigmaDeg });
    }

    const plot = Plot.plot({
      width: Math.min(520, width),
      height: 220,
      marginTop: 20,
      marginBottom: 40,
      marginLeft: 20,
      marginRight: 20,
      x: {
        label: "azimuthal offset (°)",
        domain: [-xMaxDeg, xMaxDeg],
      },
      y: { axis: null, domain: [0, 1.08] },
      marks: [
        Plot.areaY(refPts, { x: "x", y: "y", fill: "#e6e6e6", clip: true }),
        Plot.ruleX(strat, {
          x: "x",
          y1: 0,
          y2: sampleY,
          stroke: "#0366d6",
          strokeWidth: 1.5,
          clip: true,
        }),
        Plot.dot(strat, {
          x: "x",
          y: () => sampleY,
          fill: "#0366d6",
          r: 3.5,
          clip: true,
        }),
        Plot.ruleY([0]),
      ],
    });

    display(
      html`<figure>
        ${plot}
        <figcaption>
          Stratified inverse-CDF placement of ${tex`N = ${Npp}`} samples across
          the Gaussian fit to the sun disk (${tex`\sigma \approx ${sigmaDeg.toFixed(2)}^\circ`}
          at the current sun diameter). Each sample sits at the centre of an
          equal-probability slice under the bell, so averaging with uniform
          weight ${tex`1/N`} reproduces the target distribution exactly.
        </figcaption>
      </figure>`,
    );
  </script>

  <script id="55" type="module">
    // Persistent driver loop: reads the latest sun direction + params
    // directly from the sun-dir accessor and input elements between batches
    // and renders directly to softCanvas. The cell references the input
    // *elements* (not the Generators.input-wrapped values), so it's not

    const scN = elevation.N;
    const softCtx = softCanvas.getContext("2d");
    const softImg = softCtx.createImageData(scN, scN);
    const softPx = softImg.data;
    const srH = elevation.heights;
    const srMin = elevation.elevMin;
    const srRange = elevation.elevMax - elevation.elevMin || 1;

    let cancelled = false;
    invalidation.then(() => { cancelled = true; });

    (async function driver() {
      let lastKey = null;
      let idleTick = 0;
      while (!cancelled) {
        const sd = softSunDirAccessor.get();
        const diam = Number(softSunDiameterEl.value);
        const nAzCur = Math.round(Number(softAzSamplesEl.value));
        const key = sd.az + "|" + sd.alt + "|" + diam + "|" + nAzCur;

        if (key === lastKey) {
          // Nothing new to render; wake up periodically to re-check.
          await new Promise((r) => setTimeout(r, 16));
          idleTick++;
          continue;
        }
        idleTick = 0;

        const sunR = diam / 2;
        // Variance-match to the altitude smoothstep. The smoothstep
        // s(t) = 3t² − 2t³ has slope 3/2 at its midpoint; equating to
        // the Gaussian CDF slope 1/(σ√(2π)) gives σ_unit = 1/(1.5·√(2π)).
        // Applied over the altitude half-width of 1.5·sunR (total span 3·sunR),
        // the equivalent Gaussian standard deviation in degrees is
        //   σ = 3·sunR · σ_unit = 2·sunR / √(2π).
        const sigma = (2 * sunR) / Math.sqrt(2 * Math.PI);
        const tasks = [];
        for (let ia = 0; ia < nAzCur; ia++) {
          // Stratified inverse-CDF placement: each sample sits at the
          // centre of an equal-probability slice under the Gaussian.
          const q = nAzCur === 1 ? 0 : normInv((ia + 0.5) / nAzCur);
          const daz = q * sigma;
          tasks.push({
            W: scN,
            H: scN,
            heights: elevation.heights,
            azDeg: sd.az + daz,
            altDeg: sd.alt,
            pxSizeM: elevation.pixelSizeM,
            sunRadiusDeg: sunR,
          });
        }

        const sweeps = await runSoftSweeps(tasks);
        if (cancelled) return;

        const result = new Float32Array(scN * scN);
        const wUnit = 1 / sweeps.length;
        for (let s = 0; s < sweeps.length; s++) {
          const sweep = sweeps[s];
          for (let i = 0; i < sweep.length; i++) {
            result[i] += wUnit * sweep[i];
          }
        }

        for (let i = 0; i < srH.length; i++) {
          const j = i * 4;
          const tone = 0.1 + 0.8 * ((srH[i] - srMin) / srRange);
          const shade = Math.min(1, Math.max(0, result[i]));
          const lit = 1 - 0.94 * shade;
          const v = Math.round(linearToSrgb(tone * lit) * 255);
          softPx[j] = v;
          softPx[j + 1] = v;
          softPx[j + 2] = v;
          softPx[j + 3] = 255;
        }
        softCtx.putImageData(softImg, 0, 0);

        lastKey = key;

  <script id="25" type="text/markdown">
    ## Parent-tile pre-pass

    A limitation of per-tile methods is that they have no knowledge of terrain beyond their edges. External mountains which would cast shadows onto the tile are not considered, producing visible seams between tiles.  A natural solution is to use lower-resolution parent tile data to build a horizon stack before sweeping across the computation tile.

    In fact we can step multiple levels upward in the tile pyramid to further extend the range of this pre-warming. A 2×2 block of ${tex`z - \Delta z`} parents physically covers ${tex`(2^{\Delta z} + 1)`} tile widths around the computation tile. Thus, a 2×2 block of parent ${tex`z - 1`} tiles always covers a 3×3 area relative to zoom ${tex`z`}, while ${tex`z-2`} grandparent tiles cover a 5×5 area, and ${tex`z-3`} tiles a 9×9 area.

    In practice, ${tex`z-2`} seems a reasonable tradeoff, and we can use the maximum possible projected shadow length to limit the extent of the pre-pass horizon visibility sweep. That is, when the sun is directly overhead, shadows are very short and we don't need to march all the way to the edge of parent to know that features there could not possibly cast a shadow onto the computation tile.

  <script id="27" type="module">
    // Decode a Terrarium-encoded webp tile into a Float32Array of heights.
    async function fetchTerrarium(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`tile fetch failed: ${url} (${res.status})`);
      const blob = await res.blob();
      const bitmap = await createImageBitmap(blob);
      const N = bitmap.width;
      const c = document.createElement("canvas");
      c.width = N;
      c.height = N;
      const cctx = c.getContext("2d");
      cctx.drawImage(bitmap, 0, 0);
      const bytes = cctx.getImageData(0, 0, N, N).data;
      const heights = new Float32Array(N * N);
      let hMin = Infinity,
        hMax = -Infinity;
      for (let i = 0; i < N * N; i++) {
        const r = bytes[i * 4],
          g = bytes[i * 4 + 1],
          b = bytes[i * 4 + 2];
        const h = r * 256 + g + b / 256 - 32768;
        heights[i] = h;
        if (h < hMin) hMin = h;
        if (h > hMax) hMax = h;
      }
      return { N, heights, hMin, hMax };
    }

  <script id="56" type="text/markdown">
    ## Line-sweep ambient occlusion

    The same horizon visibility sweep works for ambient occlusion as well. Ambient occlusion proceeds similarly to shadowing, but instead of illumination by a point source, each pixel is illuminated by the portion of sky visible to it. I extended [Karim Naaji's LSAO](https://karim.naaji.fr/lsao.html) to support parent-tile occlusion and arbitrary sweep directions. That leaves one design knob open: the per-slice visibility function ${tex`V(\alpha)`} that maps each swept horizon angle ${tex`\alpha`} to a shade contribution.

    Naaji uses ${tex`V(\alpha) = e^{-\sin\alpha}`}. The function drops with slope ${tex`-1`} right at ${tex`\alpha = 0`}, so even a shallow horizon produces an immediate darkening. The tradeoff is a long tail, so distant tall features keep contributing, and tile boundaries take extra care.

    A Lambertian sky integral offers a physically motivated alternative. Incident sky radiance from a direction at zenith angle ${tex`\theta`} is weighted by ${tex`\cos\theta`}, so the visible fraction of one azimuthal slice above a horizon at elevation α is

    ${tex.block`V(\alpha) \;=\; \int_{0}^{\pi/2 - \alpha} \cos\theta \cdot \sin\theta \, d\theta \;=\; \tfrac{1}{2}\cos^2\!\alpha,`}

    which normalises to ${tex`\cos^2\!\alpha`}: 1 at a flat horizon, 0 at a vertical wall. Its slope is flat at ${tex`\alpha = 0`} and steepens later, giving a softer, more forgiving response to small horizons. And because ${tex`\cos^2\!\alpha \approx 1 - (\Delta h / d)^2`} for small α, distant tall blockers fall off as ${tex`1/d^2`}, so the effect is strongly local and tile boundaries are less visible.

    Honestly though, I think the particular choice of function is best thought of as an artistic decision. The original function seems to produce better visual separation of features at the cost of less locality.

    In practice, we use a Web Worker pool to compute independent sweeps, then average them to compute pixel value ${tex`\bar{v}`}. For display, a contrast slider ${tex`c \in [0, 1]`} tone-maps the response. For pixel ${tex`\bar{v}`}, an ${tex`\arctan`} tonemap squashes the scaled shade into ${tex`[0, 1]`}:

    ${tex.block`\text{display} \;=\; 1 - \tfrac{2}{\pi}\arctan\!\left(\tfrac{c}{1-c}\,\bar{v}\right).`}

  </script>

  <script id="42" type="text/markdown">
    ## Relief shading

    Lit surfaces vary in brightness depending on their orientation. The most natural lighting choice is diffuse Lambertian shading, but this tends to darken the surface when lit at oblique angles, which isn't necessarily what we want for a map.

    Relief shading separates the terrain slope from its aspect (direction it faces relative to the sun), so the sun's altitude doesn't darken flat ground. Flat terrain stays white, slopes facing the sun brighten, and slopes facing away darken. Strength of the effect is proportional to the slope angle.

    Concretely, I've adapted GDAL's relief shading function, computing the slope angle ${tex`\theta = \arctan(z_f \cdot \|\mathbf{n}_{xy}\| / n_z)`} and the aspect alignment ${tex`a = \hat{\mathbf{n}}_{xy} \cdot \hat{\mathbf{L}}_{xy} \in [-1, 1]`}, then a darkness term ${tex`d = \sin(\min(\theta \cdot 2s,\; 1.5)) \cdot (1 - \tfrac{1+a}{2})`} where ${tex`s`} is the strength parameter. The final relief value is ${tex`v = (1 - 0.85\,d)^{2.5}`}. The z-factor ${tex`z_f = 0.625 \sqrt{\cos \alpha}`} (where ${tex`\alpha`} is the sun's altitude) dampens slopes following the GDAL convention and modulates the perceived slope by sun altitude.
  </script>

  <script id="46" type="module">
    const rlCtx = reliefCanvas.getContext("2d");
    const rlN2 = elevation.N;
    const rlImg = rlCtx.createImageData(rlN2, rlN2);
    const rlPx = rlImg.data;
    const rlH = elevation.heights;
    const rlDx = elevation.pixelSizeM;

    const rlAzRad = (reliefSunDir.az * Math.PI) / 180;
    const rlAltRad = (reliefSunDir.alt * Math.PI) / 180;
    const sunLx = Math.cos(rlAltRad) * Math.cos(rlAzRad);
    const sunLy = Math.cos(rlAltRad) * Math.sin(rlAzRad);
    const sunHL = Math.hypot(sunLx, sunLy);
    const sunHx = sunHL > 0.001 ? sunLx / sunHL : 1;
    const sunHy = sunHL > 0.001 ? sunLy / sunHL : 0;

    const str = reliefStrength;

    for (let row = 0; row < rlN2; row++) {
      for (let col = 0; col < rlN2; col++) {
        const rm = Math.max(row - 1, 0);
        const rp = Math.min(row + 1, rlN2 - 1);
        const cm = Math.max(col - 1, 0);
        const cp = Math.min(col + 1, rlN2 - 1);

        const eN = rlH[rm * rlN2 + col];
        const eS = rlH[rp * rlN2 + col];
        const eE = rlH[row * rlN2 + cp];
        const eW = rlH[row * rlN2 + cm];

        let nx = (eW - eE) / ((cp - cm) * rlDx);
        let ny = (eS - eN) / ((rp - rm) * rlDx);
        const nmag = Math.sqrt(nx * nx + ny * ny + 1);
        nx /= nmag;
        ny /= nmag;
        const nz = 1 / nmag;

        // Slope/aspect relief shading matching the tile viewer.
        const slopeMag = Math.hypot(nx, ny);
        const zFactor = 0.625 * Math.sqrt(sunHL);
        const slopeAngle = Math.atan(zFactor * slopeMag / Math.max(nz, 0.001));
        const scaledSlope = Math.min(slopeAngle * str * 2.0, 1.5);
        const aspectAlign = slopeMag > 0.001 && sunHL > 0.001
          ? (nx * sunHx + ny * sunHy) / slopeMag : 0;
        const shade = 0.5 + 0.5 * aspectAlign;
        const reliefDark = Math.sin(scaledSlope) * (1 - shade);
        const v = Math.pow(1 - reliefDark * 0.85, 2.5);

        const idx = (row * rlN2 + col) * 4;
        const b = Math.round(v * 255);
        rlPx[idx] = b;
        rlPx[idx + 1] = b;
        rlPx[idx + 2] = b;
        rlPx[idx + 3] = 255;
      }
    }

    ## Zoom-dependent gradient attenuation

    One annoyance is that shading fades at low zoom. Peaks survive downsampling well, but decimation reduces the gradient and fails to commute with nonlinearities in the shading function.

    A quick check across a handful of Mapterhorn tiles suggests a rough power-law attenuation of average elevation gradient, so we reduce the horizontal grid spacing at low zoom to steepen gradients and leave shading visually similar in appearance.

    This is one thing I'm not content with since I'd prefer a physicaily accurate function which does not *need* a correction factor. The map on this page uses tiles of the same zoom, but tiles with different zooms, like on a pitched 3D map, would show discontinuous shading due to this inconsistency.

          }
        } else {
          for (let ia = 0; ia < samples; ia++) {
            tasks.push({ azDeg: sd.az + (ia * 360) / samples });
          }
        }

        const weight = 1 / tasks.length;
        const useHorizon = prewarm;
        const horizonBinding = useHorizon ? horizonBuffer : horizonStub;
        const horizonN = useHorizon ? HN : 0;

        const encoder = device.createCommandEncoder();
        encoder.clearBuffer(shadowBuffer);

        for (let t = 0; t < tasks.length; t++) {
          const task = tasks[t];
          const sweep = api.deriveSweepParams({
            W,
            H,
            azDeg: task.azDeg,
            pxSizeM,
            mode,
            altDeg: task.altDeg || 0,
            sunRadiusDeg: task.sunRadiusDeg || 0,
            weight,
            horizonN,
          });
          const uBytes = api.packUniforms(sweep);
          device.queue.writeBuffer(uniformBuffers[t], 0, uBytes);

          const bindGroup = device.createBindGroup({
            layout: pipeline.getBindGroupLayout(0),
            entries: [
              { binding: 0, resource: { buffer: uniformBuffers[t] } },
              { binding: 1, resource: { buffer: elevBuffer } },
              { binding: 2, resource: { buffer: shadowBuffer } },
              { binding: 3, resource: { buffer: horizonBinding } },
            ],
          });

          const numRays = sweep.bMax - sweep.bMin + 1;
          const numWorkgroups = Math.ceil(numRays / 64);
          const pass = encoder.beginComputePass();
          pass.setPipeline(pipeline);
          pass.setBindGroup(0, bindGroup);
          pass.dispatchWorkgroups(numWorkgroups);
          pass.end();
        }

        // Render uniforms.
        const rBytes = api.packRenderUniforms({
          N,
          hMin: elevation.elevMin,
          hRange: elevation.elevMax - elevation.elevMin || 1,
          contrast: Math.pow(Math.min(0.999999, Math.max(0, contrast)), 0.1),
        });
        device.queue.writeBuffer(renderUniformBuffer, 0, rBytes);

        const renderBindGroup = device.createBindGroup({
          layout: renderPipeline.getBindGroupLayout(0),
          entries: [
            { binding: 0, resource: { buffer: shadowBuffer } },
            { binding: 1, resource: { buffer: elevBuffer } },
            { binding: 2, resource: { buffer: renderUniformBuffer } },
          ],
        });

        const pass = encoder.beginRenderPass({
          colorAttachments: [
            {
              view: ctx.getCurrentTexture().createView(),
              loadOp: "clear",
              clearValue: [0, 0, 0, 1],
              storeOp: "store",
            },
          ],
        });
        pass.setPipeline(renderPipeline);
        pass.setBindGroup(0, renderBindGroup);
        pass.draw(3);
        pass.end();

        device.queue.submit([encoder.finish()]);
      }

      (async function driver() {
        let lastKey = null;
        while (window.__wgpuDriverGen === gen) {
          const sd = webgpuSunDirAccessor.get();
          const mode = window.__wgpuModeEl.value;
          // LSAO with cos²α + parent-tile prewarm produces a visible
          // within-tile band on the sun-facing edge (distant parent
          // blockers stay on the hull contributing graded darkening).
          // In this single-tile showcase figure we always render LSAO
          // without prewarm to keep the kernel clean; the slippy-map
          // tile viewer later in the notebook opts the other way and
          // uses prewarm for cross-tile continuity.
          const prewarmToggle = !!window.__wgpuPrewarmEl.value;
          const prewarm = mode === "lsao" ? false : prewarmToggle;
          const samples = Math.max(
            1,
            Math.round(Number(window.__wgpuSamplesEl.value)),
          );
          const sunDiameter = Number(window.__wgpuSunDiameterEl.value);
          const contrast = Number(window.__wgpuContrastEl.value);
          const effectiveSamples = samples;
          const key = [
            sd.az,
            sd.alt,
            mode,
            prewarm ? 1 : 0,
            effectiveSamples,
            sunDiameter,
            contrast,
          ].join("|");
          if (key === lastKey) {
            await new Promise((r) => requestAnimationFrame(r));
            continue;
          }
          dispatchOnce({
            mode,
            prewarm,
            samples: effectiveSamples,
            sunDiameter,
            contrast,
            sd,
          });
          lastKey = key;
          await new Promise((r) => requestAnimationFrame(r));
        }
      })();
    }
  </script>
  <script id="68" type="text/markdown">
    ## Live WebGPU tile viewer

    Finally, we have all the pieces in place to produce a map. In the map below, each tile goes through a two-phase bake (CPU or GPU). The **static bake** runs once when the tile's elevation data arrives: compute surface normals, 8-pass LSAO, and pack the results into an `rgba8unorm` texture:

    ${tex.block`(R, G) = (\tfrac{n_x + 1}{2},\; \tfrac{n_y + 1}{2}), \quad B = \mathrm{AO}^{\gamma}, \quad A = s_{\text{shadow}}.`}

    The **shadow re-bake** runs whenever the sun direction changes, packing shadow values into the alpha channel for use in the final shading step. We can even use Volodymyr Agafonkin's [suncalc](https://www.npmjs.com/package/suncalc) library to compute physically accurate sun angles!

    The map viewer below is thrown together hastily with the help of Claude since I was not able to find another viewer which satisfied my requirements. Although it's not hard to get tiles onto a map, it's tricky if you really care about tile lifecycle, multi-pass computation, and smooth updates. Pan with click+drag; zoom with the mouse wheel.

    Overall, I'm pretty happy with the technique, and at least happy that I probably took this idea and ran with it about as far as one would be advised to do. I wonder if [mipmaps](https://en.wikipedia.org/wiki/Mipmap) would enable soft shadows with a single pass. I'm not sure if it's performant enough to be practical. And at any rate, if you really want good shadowing, you might just be advised to use more standard shadow map techniques for shadowing.
  </script>

  <script id="72" type="module">
    const viewerEl = html`<div
      style="width:100%; height:100%; border:1px solid #888; box-sizing:border-box; position:relative;"
    ></div>`;

    display(expandable(viewerEl, {
      id: 'tile-viewer',
      width: 640,
      height: 600,
      wide: true,
      controls: ['.tile-viewer-controls', '.tile-viewer-sun-overlay'],
    }));

    if (webgpuContext.error) {
      viewerEl.textContent = "WebGPU unavailable: " + webgpuContext.error;
    } else {
      const { device, format } = webgpuContext;
      // Sun handle overlay, wired to the tile-viewer-sun-dir mutable.
      const handleCanvas = html`<canvas
        width="120"
        height="120"
        style="display:block; width:120px; height:120px;"
      ></canvas>`;
      handleCanvas.style.background = "rgba(0,0,0,0.5)";
      const sunOverlay = mountSunHandle({
        canvas: handleCanvas,
        ...tileViewerSunDirAccessor,
        crosshairs: true,
        angle: tileViewerControls.sunDiameterEl,
      });
      sunOverlay.style.overflow = "hidden";
      sunOverlay.style.borderRadius = "6px";
      sunOverlay.style.border = "1px solid rgba(255,255,255,0.25)";

      const sunLabel = document.createElement("label");
      sunLabel.textContent = "sun angle";
      sunLabel.style.display = "none";

      const sunWrapper = document.createElement("div");
      sunWrapper.className = "tile-viewer-sun-overlay";
      sunWrapper.appendChild(sunLabel);
      sunWrapper.appendChild(sunOverlay);

      // Style the wrapper for the map (absolute, upper-right).
      const applyMapStyle = () => {
        sunWrapper.style.cssText = "position:absolute; top:12px; right:12px; z-index:500; pointer-events:auto;";
        sunLabel.style.display = "none";
        handleCanvas.style.background = "rgba(0,0,0,0.5)";
        sunOverlay.style.overflow = "hidden";
        sunOverlay.style.border = "1px solid rgba(255,255,255,0.25)";
      };
      // Style for the expanded controls panel.
      const applyPanelStyle = () => {
        sunWrapper.style.cssText = "display:flex; flex-wrap:nowrap; align-items:start; pointer-events:auto;";
        sunLabel.style.cssText = "display:block; flex-shrink:0; align-self:start; width:var(--label-width,120px); margin-right:var(--length2,6.5px); padding:5px 0 4px 0; font:13px/1.2 var(--sans-serif);";
        handleCanvas.style.background = "rgba(128,128,128,0.15)";
        sunOverlay.style.overflow = "hidden";
        sunOverlay.style.border = "1px solid rgb(133, 133, 133)";
        sunOverlay.style.borderRadius = "4px";
      };
      applyMapStyle();

      // Watch for reparenting between the map and the controls panel.
      new MutationObserver(() => {
        if (sunWrapper.closest(".expandable-controls-panel")) applyPanelStyle();
        else applyMapStyle();
      }).observe(document.body, { childList: true, subtree: true });

      const viewer = createTileViewer({
        container: viewerEl,
        device,
        format,
        tileUrl: "https://tiles.mapterhorn.com/{z}/{x}/{y}.webp",
        tileSize: 256,
        minZoom: 0,
        maxZoom: 15,
        zoom: 14.5,
        center: [
          38.2376607744605508,
          -109.8195024690180048
          //37.0476, -110.1072
        ],
      });
      tileViewerRef.set(viewer);
      viewerEl.appendChild(sunWrapper);

      // Poll the sun mutable and the three sliders each frame; when
      // anything has changed, push the new values through as a single
      // uniform-buffer write. `needsRender` inside the viewer makes
      // the render loop a no-op when there's nothing to update.
      const c = tileViewerControls;
      // In time mode the sun handle visualises the center-of-view sun
      // position (which also feeds the shadow sweep) but is not
      // user-editable — the calendar is authoritative.
      const syncSunHandleStyle = () => {
        const useTime = c.sunModeEl.value === "time";
        sunWrapper.style.pointerEvents = useTime ? "none" : "auto";
        sunWrapper.style.opacity = useTime ? "0.55" : "1";
      };
      c.sunModeEl.addEventListener("input", syncSunHandleStyle);
      syncSunHandleStyle();
      const tickLighting = () => {
        const useTime = c.sunModeEl.value === "time";
        // In time mode the calendar drives az/alt: push the current
        // calendar value into the mutable each frame so the shadow
        // sweep (and the handle visual) track the CPU-computed sun
        // direction at the view centre as the view pans or the
        // time slider moves.
        let solar = null;
        if (useTime) {
          const utcDate = c.sunCalendarEl.getUtcDate();
          if (utcDate) {
            solar = solarTimeQuantities(utcDate.getTime());
            const [lat, lng] = viewer.getCenter();
            const pos = SunCalc.getPosition(utcDate, lat, lng);
            const altDeg = (pos.altitude * 180) / Math.PI;
            const scAzDeg = (pos.azimuth * 180) / Math.PI;
            const azDeg = (((270 - scAzDeg) % 360) + 360) % 360;
            tileViewerSunDirAccessor.set({ az: azDeg, alt: altDeg });
          }
        }
        const sd = tileViewerSunDirAccessor.get();
        const azRad = (sd.az * Math.PI) / 180;
        // Clamp to the horizon for shading/shadow math — a negative
        // altitude would break the sweep kernel. The widget still reads
        // the raw sd.alt so its below-horizon state displays correctly.
        const altRad = (Math.max(0, sd.alt) * Math.PI) / 180;
        const sunX = Math.cos(altRad) * Math.cos(azRad);
        const sunY = Math.cos(altRad) * Math.sin(azRad);
        const sunZ = Math.sin(altRad);
        const reliefStrength = Number(c.strengthEl.value);
        const aoStrength = Number(c.aoEl.value);
        const shadowStrength = Number(c.shadowEl.value);
        const sunDiameter = Number(c.sunDiameterEl.value);
        const shadowSamples = Math.max(
          1,
          Math.round(Number(c.shadowSamplesEl.value)),
        );
        const isDebug = c.bakeModeEl.value === "debug";
        const lsaoFalloff = c.aoFalloffEl.value === "e^(−sin α)" ? "exp" : "cos2";
        const zoomCompensation = Number(c.zoomCompensationEl.value);
        const lightingUpdate = {
          sunX,
          sunY,
          sunZ,
          kAmbient: 0,
          kDirect: 0,
          aoStrength,
          shadowStrength,
          sunRadiusDeg: sunDiameter / 2,
          shadowSamples,
          sunInteracting: sunOverlay.isDragging() || c.sunCalendarEl.isInteracting(),
          shadingMode: isDebug ? 2 : 1,
          reliefStrength,
          bakeMode: isDebug ? "cpu" : c.bakeModeEl.value,
          lsaoFalloff,
          zoomCompensation,
          useTime,
        };
        if (solar) lightingUpdate.solar = solar;
        viewer.setLighting(lightingUpdate);
        requestAnimationFrame(tickLighting);
      };
      requestAnimationFrame(tickLighting);

      viewer;
    }
