  <script id="title" type="text/markdown">
    # The Arnold cat map as a continuous flow
  </script>
  <script id="intro" type="text/markdown">
    Arnold’s cat map is the linear map ${tex`M = \begin{pmatrix} 2 & 1 \\ 1 & 1 \end{pmatrix}`} acting on ${tex`\mathbb{Z}^2`} (and, after wrapping, on the torus ${tex`\mathbb{R}^2 / \mathbb{Z}^2`}). It’s the standard mascot of hyperbolic dynamics: the lattice maps onto itself, the unit cell stretches along one eigenvector and squeezes along the other, and the wrapping back to the torus produces a thoroughly chaotic orbit.

    What if we let the discrete time index ${tex`n \in \mathbb{Z}`} flow continuously? That is, can we draw ${tex`M^t`} for ${tex`t \in [0, 1]`} so that ${tex`t = 0`} is the identity and ${tex`t = 1`} is the cat map? The animation below shows the result. The orbit closes seamlessly: at every integer time, the velocity field has the same value just before and just after.
  </script>
  <script id="imports" type="text/x-typescript">
    import { expandable } from './lib/expandable.js'
    import { createFrameLoop } from './lib/frame-loop.js'
  </script>
  <script id="powMt" type="text/x-typescript">
    // M^t for a 2×2 matrix M = [a, b, c, d], computed as c0(t) I + c1(t) M.
    // Three regimes via disc = tr² − 4 det:
    //   disc > 0  hyperbolic — two real eigenvalues; real flow needs both > 0
    //   disc = 0  parabolic  — repeated eigenvalue λ = tr/2; real flow needs λ > 0
    //   disc < 0  elliptic   — complex conjugate eigenvalues; real flow needs det > 0
    // When the flow can't be made real, fall back to linear interpolation
    // (1−t) I + t M. The animation still works; the loop just won't be C¹.
    function powMt(M: number[], t: number): number[] {
      const [a, b, c, d] = M;
      const tr = a + d;
      const det = a * d - b * c;
      const disc = tr * tr - 4 * det;
      let c0: number, c1: number;
      if (disc > 1e-9) {
        const sD = Math.sqrt(disc);
        const lam1 = (tr + sD) / 2;
        const lam2 = (tr - sD) / 2;
        if (lam1 > 0 && lam2 > 0) {
          const e1 = Math.pow(lam1, t);
          const e2 = Math.pow(lam2, t);
          c1 = (e1 - e2) / sD;
          c0 = (lam1 * e2 - lam2 * e1) / sD;
        } else {
          c1 = t; c0 = 1 - t;
        }
      } else if (disc < -1e-9) {
        if (det <= 0) { c1 = t; c0 = 1 - t; }
        else {
          const r = Math.sqrt(det);
          const theta = Math.atan2(Math.sqrt(-disc) / 2, tr / 2);
          const rT = Math.pow(r, t);
          const sinT = Math.sin(theta);
          c1 = rT * Math.sin(t * theta) / (r * sinT);
          c0 = rT * Math.sin((1 - t) * theta) / sinT;
        }
      } else {
        const lam = tr / 2;
        if (lam > 0) {
          c1 = t * Math.pow(lam, t - 1);
          c0 = (1 - t) * Math.pow(lam, t);
        } else {
          c1 = t; c0 = 1 - t;
        }
      }
      return [c0 + c1 * a, c1 * b, c1 * c, c0 + c1 * d];
    }

    function mul2(A: number[], B: number[]): number[] {
      return [
        A[0] * B[0] + A[1] * B[2], A[0] * B[1] + A[1] * B[3],
        A[2] * B[0] + A[3] * B[2], A[2] * B[1] + A[3] * B[3]
      ];
    }
  </script>
  <script id="params" type="text/x-typescript">
    // Mutable parameters shared with the render loop. Properties are updated
    // from the controls cell; this cell never re-runs.
    const params = {
      M: [2, 1, 1, 1],
      period: 8,
      showEigen: false,
      showPaths: false,
      paused: false,
      matrixDirty: true
    };
  </script>
  <script id="generators-info" type="text/markdown">
    The controls below build ${tex`M`} by composing generators of ${tex`\mathrm{SL}_2(\mathbb{Z})`}. Press a button to multiply on the left: pressing ${tex`L`} after ${tex`T`} produces ${tex`L \cdot T`}, i.e. “first apply ${tex`T`}, then ${tex`L`}.” The cat map factors as ${tex`T \cdot L`}.
  </script>
  <script id="controls" type="text/x-typescript">
    const generators: Record<string, { M: number[], tex: string, desc: string }> = {
      T:  { M: [1, 1, 0, 1], tex: 'T',      desc: 'horizontal shear x ← x + y' },
      Ti: { M: [1,-1, 0, 1], tex: 'T^{-1}', desc: 'inverse horizontal shear' },
      L:  { M: [1, 0, 1, 1], tex: 'L',      desc: 'vertical shear y ← y + x' },
      Li: { M: [1, 0,-1, 1], tex: 'L^{-1}', desc: 'inverse vertical shear' },
      S:  { M: [0,-1, 1, 0], tex: 'S',      desc: '90° rotation' }
    };

    const presets: Record<string, string[]> = {
      "Identity":       [],
      "Arnold cat":     ['L', 'T'],   // T · L applied to v = T(L v)
      "Fibonacci":      ['T', 'L'],
      "Tall":           ['L', 'L', 'T'],
      "Rotation (S)":   ['S']
    };

    const state = { ops: ['L', 'T'] };  // start as Arnold cat

    function computeM(): number[] {
      let m = [1, 0, 0, 1];
      for (const op of state.ops) m = mul2(generators[op].M, m);
      return m;
    }

    function applyOp(name: string) {
      state.ops.push(name);
      pushUpdate();
    }
    function undo() {
      state.ops.pop();
      pushUpdate();
    }
    function reset() {
      state.ops = [];
      pushUpdate();
    }
    function loadPreset(name: string) {
      state.ops = [...(presets[name] ?? [])];
      pushUpdate();
    }

    function pushUpdate() {
      params.M = computeM();
      params.matrixDirty = true;
      renderMatrixDisplay();
    }

    const controlsContainer = html`<div id="cat-map-controls"></div>`;

    function btn(label: string, onClick: () => void, title = ''): HTMLButtonElement {
      const b = html`<button type="button" title="${title}" style="
        font: inherit; font-size: 14px; padding: 4px 10px; margin: 2px;
        border: 1px solid #bbb; border-radius: 4px; background: #fff; cursor: pointer;
      ">${label}</button>` as HTMLButtonElement;
      b.addEventListener('click', onClick);
      return b;
    }

    // Row 1: generators
    const genRow = html`<div style="margin: 0.5rem 0;">
      <span style="font-size: 13px; color: #5f5e5a; margin-right: 0.5rem;">apply:</span>
    </div>`;
    for (const [key, g] of Object.entries(generators)) {
      genRow.appendChild(btn(g.tex.replace('^{-1}', '⁻¹'), () => applyOp(key), g.desc));
    }
    genRow.appendChild(btn('undo', undo, 'remove the last generator'));
    genRow.appendChild(btn('reset', reset, 'reset to the identity'));
    controlsContainer.appendChild(genRow);

    // Row 2: presets
    const presetRow = html`<div style="margin: 0.5rem 0;">
      <span style="font-size: 13px; color: #5f5e5a; margin-right: 0.5rem;">load:</span>
    </div>`;
    for (const name of Object.keys(presets)) {
      presetRow.appendChild(btn(name, () => loadPreset(name)));
    }
    controlsContainer.appendChild(presetRow);

    // Matrix / classification display
    const matrixDisplay = html`<div id="cat-map-matrix" style="margin: 0.5rem 0 0.75rem; min-height: 4em;"></div>`;
    controlsContainer.appendChild(matrixDisplay);

    function classify(M: number[]): { label: string, color: string, real: boolean, periodic: boolean } {
      const [a, b, c, d] = M;
      const tr = a + d;
      const det = a * d - b * c;
      const disc = tr * tr - 4 * det;
      const periodic = det === 1 || det === -1;
      if (det === 0) {
        return { label: 'singular — collapses the plane', color: '#a04030', real: false, periodic: false };
      }
      if (disc > 1e-9) {
        const sD = Math.sqrt(disc);
        const lam1 = (tr + sD) / 2, lam2 = (tr - sD) / 2;
        if (lam1 > 0 && lam2 > 0) {
          return { label: 'hyperbolic, real flow', color: '#185fa5', real: true, periodic };
        }
        return { label: 'hyperbolic but a λ ≤ 0 — no real flow, showing linear interpolation', color: '#a04030', real: false, periodic };
      }
      if (disc < -1e-9) {
        if (det > 0) return { label: 'elliptic, real flow (rotation-like)', color: '#185fa5', real: true, periodic };
        return { label: 'elliptic with det ≤ 0 — no real flow', color: '#a04030', real: false, periodic };
      }
      const lam = tr / 2;
      if (lam > 0) return { label: 'parabolic, real flow (linear in t)', color: '#185fa5', real: true, periodic };
      return { label: 'parabolic with λ ≤ 0 — no real flow', color: '#a04030', real: false, periodic };
    }

    function renderMatrixDisplay() {
      const M = params.M;
      const [a, b, c, d] = M;
      const det = a * d - b * c;
      const tr = a + d;
      const cls = classify(M);
      const word = state.ops.length === 0
        ? 'I'
        : state.ops.map(k => generators[k].tex).reverse().join(' \\cdot ');
      matrixDisplay.replaceChildren(
        tex.block`M = ${word} = \begin{pmatrix} ${a} & ${b} \\ ${c} & ${d} \end{pmatrix}, \quad \det M = ${det}, \quad \operatorname{tr} M = ${tr}`,
        html`<div style="font-size: 13px; color: ${cls.color}; margin-top: 0.25rem;">
          ${cls.label} ·
          ${cls.periodic ? 'lattice bijection, loop closes' : `det = ${det}, not a Z² bijection`}
        </div>`
      );
    }

    function ctrl(input) {
      controlsContainer.appendChild(input);
      return Generators.input(input);
    }
    const period = ctrl(Inputs.range([2, 20], { label: "Period (s)", value: 8, step: 0.5 }));
    const showPaths = ctrl(Inputs.toggle({ label: "Show paths", value: false }));
    const showEigen = ctrl(Inputs.toggle({ label: "Show eigen-directions", value: false }));
    const paused = ctrl(Inputs.toggle({ label: "Pause", value: false }));

    pushUpdate();
    display(controlsContainer);
  </script>
  <script id="sync-params" type="text/x-typescript">
    // The matrix is mutated directly from the button handlers, so we only
    // need to sync the auxiliary controls here.
    params.period = period;
    params.showPaths = showPaths;
    params.showEigen = showEigen;
    params.paused = paused;
    params.matrixDirty = true;
  </script>
  <script id="figure" type="text/x-typescript">
    const ns = 'http://www.w3.org/2000/svg';
    const figureState = { width: 0, height: 0, cellSize: 40 };

    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('id', 'cat-map-svg');
    svg.style.display = 'block';
    svg.style.background = '#fff';
    svg.style.borderRadius = '6px';
    svg.style.border = '0.5px solid rgba(0,0,0,0.15)';

    const eigenG = document.createElementNS(ns, 'g');
    const pathsElement = document.createElementNS(ns, 'path');
    pathsElement.setAttribute('fill', 'none');
    pathsElement.setAttribute('stroke', '#185fa5');
    pathsElement.setAttribute('stroke-width', '0.7');
    pathsElement.setAttribute('stroke-opacity', '0');
    const dotsG = document.createElementNS(ns, 'g');
    const originDot = document.createElementNS(ns, 'circle');
    originDot.setAttribute('r', '3.8');
    originDot.setAttribute('fill', '#185fa5');
    svg.append(eigenG, pathsElement, dotsG, originDot);

    const halfX = 16, halfY = 16;
    const pts: [number, number][] = [];
    for (let i = -halfX; i <= halfX; i++) {
      for (let j = -halfY; j <= halfY; j++) {
        if (i === 0 && j === 0) continue;
        pts.push([i, j]);
      }
    }
    const circles: SVGCircleElement[] = pts.map(() => {
      const c = document.createElementNS(ns, 'circle');
      c.setAttribute('r', '2.3');
      c.setAttribute('fill', '#2c2c2a');
      dotsG.appendChild(c);
      return c;
    });

    const eigenLines: SVGLineElement[] = [0, 1].map(() => {
      const l = document.createElementNS(ns, 'line');
      l.setAttribute('stroke', '#888');
      l.setAttribute('stroke-width', '1');
      l.setAttribute('stroke-dasharray', '4 3');
      eigenG.appendChild(l);
      return l;
    });

    function resizeFigure(w: number, h: number) {
      figureState.width = w;
      figureState.height = h;
      figureState.cellSize = Math.max(20, Math.min(w, h) / 11);
      svg.setAttribute('width', String(w));
      svg.setAttribute('height', String(h));
      svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
      originDot.setAttribute('cx', String(w / 2));
      originDot.setAttribute('cy', String(h / 2));
      params.matrixDirty = true;
    }

    const figure = html`<figure>
      ${svg}
      <figcaption>Continuous flow ${tex`\gamma(t) = M^t`} on the integer lattice. The origin (blue) is the only fixed point; every other lattice point traces a closed orbit that returns to a (different) integer position at ${tex`t = 1`}.</figcaption>
    </figure>`;

    display(expandable(figure, {
      id: 'cat-map',
      width: Math.min(width, 640),
      height: Math.min(480, width),
      controls: '#cat-map-controls',
      onResize(_el, w, h) { resizeFigure(w, h); }
    }));
  </script>
  <script id="render-loop" type="text/x-typescript">
    // Eigenvectors of M for the dashed stable/unstable guide lines. Returns
    // an empty array if eigenvalues are not real and distinct.
    function eigenDirections(M: number[]): [number, number][] {
      const [a, b, c, d] = M;
      const tr = a + d;
      const det = a * d - b * c;
      const disc = tr * tr - 4 * det;
      if (disc <= 1e-9) return [];
      const sD = Math.sqrt(disc);
      const lams = [(tr + sD) / 2, (tr - sD) / 2];
      return lams.map(lam => {
        let vx: number, vy: number;
        if (Math.abs(c) > 1e-9) { vx = lam - d; vy = c; }
        else if (Math.abs(b) > 1e-9) { vx = b; vy = lam - a; }
        else { vx = 1; vy = 0; }
        const n = Math.hypot(vx, vy);
        return [vx / n, vy / n] as [number, number];
      });
    }

    let t = 0;
    let last = performance.now();

    const loop = createFrameLoop((now) => {
      const dt = (now - last) / 1000;
      last = now;
      if (!params.paused) t = (t + dt / params.period) % 1;

      const w = figureState.width, h = figureState.height;
      if (w === 0) return;
      const cx = w / 2, cy = h / 2;
      const cs = figureState.cellSize;

      const Mt = powMt(params.M, t);
      const [a, b, c, d] = Mt;

      for (let k = 0; k < pts.length; k++) {
        const [i, j] = pts[k];
        const qx = a * i + b * j;
        const qy = c * i + d * j;
        circles[k].setAttribute('cx', (cx + qx * cs).toFixed(1));
        circles[k].setAttribute('cy', (cy - qy * cs).toFixed(1));
      }

      if (params.matrixDirty) {
        params.matrixDirty = false;
        const dirs = params.showEigen ? eigenDirections(params.M) : [];
        eigenLines.forEach((line, k) => {
          if (k < dirs.length) {
            const [vx, vy] = dirs[k];
            const L = Math.hypot(w, h);
            line.setAttribute('x1', (cx - vx * L).toFixed(1));
            line.setAttribute('y1', (cy + vy * L).toFixed(1));
            line.setAttribute('x2', (cx + vx * L).toFixed(1));
            line.setAttribute('y2', (cy - vy * L).toFixed(1));
            line.setAttribute('stroke-opacity', '0.6');
          } else {
            line.setAttribute('stroke-opacity', '0');
          }
        });

        if (params.showPaths) {
          // Sample M^t at N+1 instants and apply each sampled matrix to every
          // lattice point. Concatenate into one SVG path with M/L commands
          // separating per-point subpaths — far cheaper than one path element
          // per dot.
          const N = 48;
          const Mts: number[][] = [];
          for (let q = 0; q <= N; q++) Mts.push(powMt(params.M, q / N));
          const parts: string[] = [];
          for (let p = 0; p < pts.length; p++) {
            const [i, j] = pts[p];
            let s = '';
            for (let q = 0; q <= N; q++) {
              const m = Mts[q];
              const qx = m[0] * i + m[1] * j;
              const qy = m[2] * i + m[3] * j;
              s += (q === 0 ? 'M' : 'L') + (cx + qx * cs).toFixed(1) + ' ' + (cy - qy * cs).toFixed(1) + ' ';
            }
            parts.push(s);
          }
          pathsElement.setAttribute('d', parts.join(''));
          pathsElement.setAttribute('stroke-opacity', '0.35');
        } else {
          pathsElement.setAttribute('stroke-opacity', '0');
        }
      }
    });

    invalidation.then(() => loop.cancel());
  </script>
  <script id="discrete-heading" type="text/markdown">
    ## The discrete map
  </script>
  <script id="discrete" type="text/markdown">
    The cat map is a linear self-map of ${tex`\mathbb{Z}^2`} given by

    ${tex.block`M = \begin{pmatrix} 2 & 1 \\ 1 & 1 \end{pmatrix}, \qquad \det M = 1.`}

    Because ${tex`M`} has integer entries and unit determinant, ${tex`M^{-1}`} is integer too, so ${tex`M`} is a bijection ${tex`\mathbb{Z}^2 \to \mathbb{Z}^2`}. Its eigenvalues are ${tex`\lambda_\pm = (3 \pm \sqrt{5})/2`} — one above one, one below — so the unit cell is stretched along the eigenvector for ${tex`\lambda_+ = \varphi^2`} and squeezed by the same factor along the perpendicular direction. Iterating ${tex`M`} on the torus ${tex`\mathbb{R}^2/\mathbb{Z}^2`} is the canonical example of a chaotic, ergodic, mixing dynamical system.

    We won’t use the torus here; we keep the map on all of ${tex`\mathbb{R}^2`} and let the discrete iteration count flow continuously.
  </script>
  <script id="continuous-heading" type="text/markdown">
    ## A continuous flow between ${tex`I`} and ${tex`M`}
  </script>
  <script id="continuous-1" type="text/markdown">
    To interpolate from ${tex`I`} at ${tex`t=0`} to ${tex`M`} at ${tex`t=1`}, we want a one-parameter family ${tex`\gamma(t)`} of matrices with ${tex`\gamma(0)=I`}, ${tex`\gamma(1)=M`}, and ${tex`\gamma(s+t)=\gamma(s)\gamma(t)`} (a one-parameter subgroup of ${tex`\mathrm{GL}_2(\mathbb{R})`}). The unique smooth choice is

    ${tex.block`\gamma(t) \;=\; M^t \;:=\; \exp(t\,\log M),`}

    where ${tex`\log M`} is a real matrix logarithm of ${tex`M`}. For the cat map ${tex`M`} is symmetric with both eigenvalues positive, so ${tex`\log M`} is real and unique.
  </script>
  <script id="continuous-2" type="text/markdown">
    Now let a point ${tex`v_0`} flow according to ${tex`v(t) = \gamma(t)\,v_0`}. Differentiating,

    ${tex.block`
      \frac{dv}{dt} \;=\; \frac{d}{dt}\bigl[\exp(t \log M)\bigr]\,v_0
      \;=\; (\log M)\,\exp(t \log M)\,v_0
      \;=\; (\log M)\,v(t).
    `}

    The velocity at any current position depends only on the current position: it is the linear vector field ${tex`v \mapsto (\log M)\,v`}, with no explicit ${tex`t`}-dependence. The flow is autonomous. The origin is fixed for all ${tex`t`}, distinct trajectories never cross, and for ${tex`\det M = 1`} the flow is area-preserving.
  </script>
  <script id="loop-heading" type="text/markdown">
    ## Why the loop closes seamlessly
  </script>
  <script id="loop-1" type="text/markdown">
    The animation runs ${tex`t`} from ${tex`0`} to ${tex`1`} then snaps back. Why does that look continuous, when each dot really does jump from ${tex`M v_0`} back to ${tex`v_0`} at the reset?

    Because ${tex`M`} is a bijection of ${tex`\mathbb{Z}^2`}, the *set* of integer lattice positions at ${tex`t=1`} equals the *set* at ${tex`t=0`}. Only the labels (which dot is which) get permuted. Visually no dot has moved: every integer site occupied at ${tex`t=1^-`} is still occupied at ${tex`t=0^+`}.

    And by autonomy, the velocity at any point ${tex`p`} is the same function of ${tex`p`} at every instant. So the velocity vectors at every visible lattice site at ${tex`t=1^-`} match those at ${tex`t=0^+`}. The loop is ${tex`C^1`}-smooth at the seam, even though no individual dot’s trajectory is.

    Both ingredients — “lattice bijection” and “autonomous velocity field” — are properties of ${tex`M`}, not of any particular dot.
  </script>
  <script id="exp-heading" type="text/markdown">
    ## Computing ${tex`M^t`} without an eigendecomposition
  </script>
  <script id="exp-1" type="text/markdown">
    Cayley–Hamilton says every analytic function of a 2×2 matrix lies in the span ${tex`\{I, M\}`}. So there exist scalars ${tex`c_0(t), c_1(t)`} with

    ${tex.block`M^t \;=\; c_0(t)\,I + c_1(t)\,M.`}

    Apply both sides to an eigenvector with eigenvalue ${tex`\lambda`}: ${tex`\lambda^t = c_0(t) + c_1(t)\lambda`}. With two eigenvalues ${tex`\lambda_+, \lambda_-`} this is a ${tex`2\times 2`} linear system. Solving,

    ${tex.block`
      c_1(t) = \frac{\lambda_+^t - \lambda_-^t}{\lambda_+ - \lambda_-},
      \qquad
      c_0(t) = \frac{\lambda_+\lambda_-^t - \lambda_-\lambda_+^t}{\lambda_+ - \lambda_-}.
    `}

    We never need an eigenvector — only the eigenvalues, which come from the trace and determinant.
  </script>
  <script id="exp-2" type="text/markdown">
    The same trick handles the parabolic case ${tex`\mathrm{disc} = 0`}: take a derivative in ${tex`\lambda`} to break the indeterminate form, giving ${tex`c_1 = t\lambda^{t-1}`} and ${tex`c_0 = (1-t)\lambda^t`}.

    And the elliptic case ${tex`\mathrm{disc} < 0`} works too: the eigenvalues are complex conjugates ${tex`r e^{\pm i\theta}`}, the imaginary parts cancel in ${tex`c_0`} and ${tex`c_1`}, and we get the real-valued

    ${tex.block`
      c_1(t) = \frac{r^t \sin(t\theta)}{r\,\sin\theta},
      \qquad
      c_0(t) = \frac{r^t \sin((1-t)\theta)}{\sin\theta}.
    `}

    The figure uses all three branches; the classification line under the matrix tells you which one is in play.
  </script>
  <script id="params-heading" type="text/markdown">
    ## Parameterizing the matrix
  </script>
  <script id="params-1" type="text/markdown">
    For the visual loop to close, we need ${tex`M`} to permute ${tex`\mathbb{Z}^2`}. That happens exactly when ${tex`M \in \mathrm{GL}_2(\mathbb{Z})`}: integer entries with ${tex`\det M = \pm 1`}. Picking four independent integers and hoping they satisfy ${tex`ad - bc = \pm 1`} is awkward, since almost every random choice misses.

    A much friendlier handle is the fact that the orientation-preserving lattice automorphisms ${tex`\mathrm{SL}_2(\mathbb{Z})`} are *generated* by a small set of elementary moves. Any element can be built by composing

    ${tex.block`
      T = \begin{pmatrix} 1 & 1 \\ 0 & 1 \end{pmatrix},\quad
      L = \begin{pmatrix} 1 & 0 \\ 1 & 1 \end{pmatrix},\quad
      S = \begin{pmatrix} 0 & -1 \\ 1 & 0 \end{pmatrix}
    `}

    together with their inverses. ${tex`T`} is a unit horizontal shear, ${tex`L`} a unit vertical shear, and ${tex`S`} is a 90° rotation. (Technically ${tex`T`} and ${tex`S`} alone suffice, since ${tex`L = S^{-1} T^{-1} S T^{-1}`}, but having both shears makes the controls more direct.)

    The cat map factors as ${tex`M = T \cdot L`}: apply ${tex`L`} first to nudge ${tex`y`} upward by ${tex`x`}, then ${tex`T`} to nudge ${tex`x`} rightward by ${tex`y`}. Press ${tex`L`} then ${tex`T`} in the controls above to see it.

    This parameterization is constructive: you can only ever produce a valid SL(2,ℤ) matrix, and you can read off the matrix as a word in the generators. If you want orientation-reversing matrices (${tex`\det M = -1`}, still a bijection of ${tex`\mathbb{Z}^2`}), apply an odd number of an additional reflection like ${tex`\begin{pmatrix} 1 & 0 \\ 0 & -1 \end{pmatrix}`}; the controls here stick to ${tex`\mathrm{SL}_2(\mathbb{Z})`}.
  </script>
  <script id="params-2" type="text/markdown">
    Three regimes show up as you compose:

    - **Hyperbolic** (${tex`|\mathrm{tr}\,M| > 2`}): two distinct positive real eigenvalues ${tex`\lambda_+ > 1 > \lambda_-`}; the flow stretches and squeezes. Cat map and its higher-trace cousins live here.
    - **Parabolic** (${tex`\mathrm{tr}\,M = 2`}): repeated eigenvalue ${tex`1`}; the flow is a pure shear linear in ${tex`t`}. A single press of ${tex`T`} or ${tex`L`} from the identity.
    - **Elliptic** (${tex`|\mathrm{tr}\,M| < 2`}): complex conjugate eigenvalues of modulus ${tex`1`}; the flow is a rotation. Pressing ${tex`S`} once gives rotation by ${tex`90°t`}, taking the lattice through ${tex`90°`} over one period.

    “Show paths” traces each lattice point’s orbit through one period. With the cat map you see the saddle structure radiating from the origin; with ${tex`S`} you see concentric circles.
  </script>
  <script id="closing" type="text/markdown">
    The whole construction is a small example of a familiar pattern. A discrete map with the right algebraic structure (an element of a Lie group) embeds into a continuous flow generated by a vector field on the Lie algebra. The visual loop is a nice way to *see* that the discrete cat map is just the time-1 sample of a perfectly tame autonomous linear ODE.
  </script>
