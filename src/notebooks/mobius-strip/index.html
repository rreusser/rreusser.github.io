  <script id="intro-view" type="text/x-typescript">
    // Transparent intro rendering: equilibrium shape when available, initial
    // embedding otherwise. Updates automatically when the FEM solve completes.
    const introModel = createMobiusMesh({ length: 10, width: 1, nu: 64, nv: 10 });
    const introInitX = new Float32Array(initialEmbedding(introModel));
    const introDefaultThickness = 0.03;

    const introCanvas = document.createElement('canvas');
    introCanvas.width = 800;
    introCanvas.height = 500;
    introCanvas.style.width = '100%';
    introCanvas.style.height = '100%';

    const introCamera = createUnifiedCamera(introCanvas, {
      mode: 'arcball',
      distance: 3.0,
      orientation: [0.3305107459432888, -0.06056569963503907, -0.12765066724244317, 0.9331665178285643],
      center: [0, 0, 0],
      near: 0.05,
      far: 100,
      renderContinuously: false,
      observeResize: true,
      wheel: false,
      canvas: introCanvas,
    });

    const introGpuCtx = introCanvas.getContext('webgpu')!;
    introGpuCtx.configure({ device, format: canvasFormat, alphaMode: 'premultiplied' });

    const introRenderer = createPeelRenderer(device, canvasFormat, {
      peel: peelShaderCode,
      composite: compositeShaderCode,
    });
    introRenderer.initMesh(introModel, introInitX, introDefaultThickness);

    const introRenderParams = { opacity: 0.82, specular: 1.0, peelLayers: 3 };

    let introLastBase: any = null;     // last base shape uploaded (skip redundant updates)
    let introPhase = 0;                // hero's own mode-animation phase
    let introLast = performance.now();
    let introBuf = new Float32Array(0); // scratch for the deflected mode shape

    // Only render the hero figure while it is on screen (it shares the single
    // worker solve with the main viewer; rendering it offscreen is wasted GPU).
    let heroVisible = true;
    const heroIO = new IntersectionObserver((entries) => {
      heroVisible = entries.some((e) => e.isIntersecting);
      if (heroVisible) introCamera.triggerRepaint();
    }, { rootMargin: '200px', threshold: 0 });
    // Observe only after the canvas is in the document (it is appended further
    // down this cell, then display()'d), so the first reading reflects real
    // visibility instead of a detached element (which reads as "offscreen" and
    // would wrongly pause the figure).
    requestAnimationFrame(() => heroIO.observe(introCanvas));
    invalidation.then(() => heroIO.disconnect());

    introCamera.on('render', () => {
      if (!heroVisible) return;
      introRenderer.render(introGpuCtx, introRenderParams, introCamera, introCanvas.width, introCanvas.height, true);
    });

    // The hero mirrors the one shared solve, and renders the same shape the main
    // viewer shows: the live iterate while solving, the equilibrium when static,
    // and the animated flexural mode (it computes the deflection X + a*phi itself
    // from state.sim, so it does not depend on the main viewer being on screen).
    const introLoop = createFrameLoop((t) => {
      if (!heroVisible) return; // skip while scrolled out of view
      const dt = Math.min(0.05, (t - introLast) / 1000); introLast = t;
      const model = state.sim.model;
      const thick = state.sim.params?.thickness ?? introDefaultThickness;
      const sameTopology = model?.nu === introModel.nu && model?.nv === introModel.nv;
      let changed = false;         // did the displayed buffer change this frame?
      let introShown: any = null;  // the positions actually on screen this frame
      if (sameTopology) {
        const rp = state.renderParams;
        const modes = state.sim.modes;
        const base = (state.previewing ? state.sim.liveX : state.sim.X) as any;
        const animatingMode = !state.previewing && rp.view === 'Flexural mode'
          && modes && modes.modes.length > 0 && rp.amplitude > 0;
        if (base && base.length === introModel.Nv * 3) {
          introShown = base;
          if (animatingMode) {
            const idx = Math.min(Math.max(rp.modeIndex - 1, 0), modes.modes.length - 1);
            const shape = modes.modes[idx].shape;
            if (introBuf.length !== base.length) introBuf = new Float32Array(base.length);
            const a = rp.amplitude * Math.sin(introPhase);
            for (let i = 0; i < base.length; i++) introBuf[i] = base[i] + a * shape[i];
            introRenderer.update(introBuf, null, 0, thick);
            introPhase += dt * rp.speed * 2.2;
            introLastBase = null; // animating: refresh the static upload next time
            changed = true;
            introShown = introBuf;
          } else if (base !== introLastBase) {
            introRenderer.update(base, null, 0, thick);
            introLastBase = base;
            changed = true;
          }
        }
      }
      // Same one-shot re-framing rule the main viewer follows, but driven from this
      // loop: the hero sits at the top of the page, so it is usually the only
      // viewer on screen when it is dragged, and the main loop stops running while
      // the main viewer is scrolled out of view.
      if (state.camera.easeHero && !state.camera.dragging) {
        const eased = easeCameraToCentroid(introCamera, introShown, introModel.Nv);
        // Stop once it has settled and the spring-back is no longer streaming.
        if (!eased && !state.previewing) state.camera.easeHero = false;
      }
      // Pass `changed` so the updated buffer is actually drawn: render() skips the
      // draw when neither the camera nor this flag is dirty.
      introRenderer.render(introGpuCtx, introRenderParams, introCamera, introCanvas.width, introCanvas.height, changed);
    });

    invalidation.then(() => {
      introLoop.cancel();
      introCamera.destroy();
    });

    const introContainer = html`<div style="position:relative;width:100%;aspect-ratio:7/5;max-height:520px"></div>`;
    introContainer.appendChild(introCanvas);
    introCamera.on('resize', (w: number, h: number) => {
      introCanvas.width = Math.floor(w * devicePixelRatio);
      introCanvas.height = Math.floor(h * devicePixelRatio);
      introCanvas.style.width = `${w}px`;
      introCanvas.style.height = `${h}px`;
      introCamera.triggerRepaint();
    });
    const introFigure = html`<figure style="margin:0 0 2rem"></figure>`;
    introFigure.appendChild(introContainer);
    introFigure.appendChild(html`<figcaption style="margin-top:0.5rem;font:13px/1.5 var(--sans-serif,system-ui,sans-serif);color:var(--theme-foreground-muted,#777);text-align:center">
      An elastic-shell finite-element simulation of a Möbius strip. Drag a vertex to deform it.
    </figcaption>`);
    display(introFigure);
  </script>

  <script id="motivation-paper" type="text/markdown">
    Everyone likes to talk about the topology of a Möbius strip, but you don't usually hear too much about the _geometry_, the shape it would actually make if you assembled it out of a strip of elastic material. Steven Strogatz put this thought in my head in the introduction to a 2025 episode of the Quanta Magazine podcast _The Joy of Why_, [Does Form Really Shape Function?](https://www.quantamagazine.org/does-form-really-shape-function-20250612/). He recalls being charmed that the first work for which he knew his guest [L. Mahadevan](https://www.physics.harvard.edu/people/facpages/mahadevan) was a graduate-school analysis of the equilibrium shape of an elastic Möbius strip.

    The image of an elastic Möbius strip stuck in my head for a couple reasons. First, I studied Engineering Mechanics in school and spent a lot of time computing shapes, bending modes, and wave propagation in rods, bars, plates, and the like. [The details of what I did](thesis.pdf) feel lost to time at this point, but the mechanics of materials will always have a special place in my heart.

    Second, we all labored in school for weeks, sometimes months, over problems and MATLAB or Fortran codes we didn't really understand. Maybe I'm underappreciating the rite of passage that is wrestling with these problems and eventually triumphing, but it never seemed right to me to take a problem that feels---in principle---so viscerally tangible, and reduce it to some opaque Fortran code that spits out `NaN` for some incomprehensible reason. I wanted to interact with the problem until I _felt_ it enough to trust the answer.

    Bret Victor summarizes what gets lost when these feedback loops don't exist:

    <blockquote class="quote">
      <p>If there is any delay in that feedback loop between thinking of something and seeing it and building on it, then there is this whole world of ideas which will never be.</p>
      <p class="quote__attribution">Bret Victor, <cite><a href="https://jamesclear.com/great-speeches/inventing-on-principle-by-bret-victor">Inventing on Principle</a></cite></p>
    </blockquote>

    Fifteen years later, having done little about it myself, I think there's still a lot of opportunity here.

    So, not even finishing the episode, I felt immediately compelled to build something on the web which computes the equilibrium shape and bending modes of a Möbius strip. The equilibrium shape is an energy minimization problem. Bending modes are an eigenvalue problem.

    Already though, I knew exactly where I always hit a brick wall when I try these things. Want to put something on the web that requires eigenvalues? [ML.js](https://mljs.github.io/matrix/classes/EigenvalueDecomposition.html) works great. Maybe plug it into an [Observable](https://observablehq.com/) notebook. But do you need generalized eigenvalues? Eigenvalues of a banded matrix? Of a complex Hermitian matrix? Limited eigenvalues of a banded matrix? Well, good luck. If you want to do any serious analysis, these details matter. One option is to rely on a hosted notebook environment like Google [Colab](https://colab.research.google.com/), but for a variety of reasons, that doesn't suit my particular taste.


    That's no jab at the people who have put a lot of work into these problems. It's genuinely challenging, stubborn work. [BLAS](https://www.netlib.org/blas/) (Basic Linear Algebra Subprograms) and [LAPACK](https://www.netlib.org/lapack/) (Linear Algrebra PACKage) are the bedrock of numerical computing (they still power [NumPy](https://numpy.org/), by the way). LAPACK in particular comprises about 2,200 modules, about half of which are unique up to 32-bit vs. 64-bit precision, but they're written in Fortran which, no matter how you approach it, makes them nontrivial to run on the web. Heavy use of goto-based control flow makes translation delicate and difficult, and [compiling Fortran to WebAssembly](https://gws.phd/posts/fortran_wasm/), opts you into a terrible world of build scripts, opaque errors, and manual memory management.

    My sense has always been that there's no hope but to translate BLAS and LAPACK into idiomatic JavaScript. I'm not alone in thinking this, and there is long-running work under way in the [Stdlib](https://github.com/stdlib-js/stdlib) project to confront this challenge head-on. I've contributed to the project from time to time, but although I've [contributed](https://github.com/stdlib-js/stdlib/pull/4789) [translations](https://github.com/stdlib-js/stdlib/pull/4703) of a [number](https://github.com/stdlib-js/stdlib/pull/4725) of [modules](https://github.com/stdlib-js/stdlib/pull/4738) by [hand](https://github.com/stdlib-js/stdlib/pull/4772), I was on track to finish sometime around 2050.

    Maybe I lack imagination or determination or just the raw technical ability, but even though the [Böhm–Jacopini theorem](https://en.wikipedia.org/wiki/Structured_program_theorem) tells me it's just an exercise for the reader to untangle LAPACK's heavy use of goto, it hasn't actually helped me get the work done. I've tried translating modules by hand, I've tried to automate the translation, and I've tried waiting for someone else to figure it out. Nothing has panned out.

    <figure>
      <img alt="XKCD #292" src="https://imgs.xkcd.com/comics/goto.png">
      <figcaption>Obligatory <a href="https://m.xkcd.com/292/">XKCD #292</a>. How bad can thousands of little <code>gotos</code> be?</figcaption>
    </figure>

    I might lose some readers here, but earlier this year I threw Claude Code at improving the automated translation routines I'd struggled to build a year prior. My code would parse Fortran modules, run a sequence of carefully constructed transforms, and output JavaScript. I figured AI would have an easy time tightening up the details which had eluded me, but after some confusion on my part, Claude politely informed that my code was only getting in its way. Instead, it was just sidestepping me and performing the translation directly.

    I resisted, but darn it if it wasn't right. All I really had to do was ask for the generalized eigenvalues of a real matrix, let it churn through the LAPACK module dependency tree, and confirm the result actually solved the problem I'd asked for. If there were an infinite amount of work, I'd have held my ground and demanded a *process* rather than just working output. It's a finite amount of work though which Claude Code is only becoming increasingly capable of managing.

    That work is accumulating in [blahpack](https://github.com/rreusser/blahpack), which is either a portmanteau or an expression of what it feels like to be a a programmer in 2026, your choice. [Progress currently stands](https://rreusser.github.io/blahpack/progress.html) at about 878 of some 2,200 modules — the double and complex-double variants — though only about half of the 2,200 are unique anyway, since routines come in single- and double-precision twins.

    So new in 2025-2026 is that you can finally just will these capabilities into existence.
  </script>

  <script id="motivation-js" type="text/markdown">
    ## Computing the shape of a Möbius strip

    The shape of a Möbius strip is a problem with some history. Sadowsky [posed its resting shape](https://arxiv.org/abs/1408.3034) as an energy-minimization problem in 1930 but didn't quite get to an answer. Mahadevan and Keller solved it in 1993 in [The Shape of a Möbius Band](https://softmath.seas.harvard.edu/wp-content/uploads/2019/10/pre2000-20.pdf), treating the band as a thin elastic rod and solving the resulting boundary-value problem numerically.

    This notebook starts with the elastic rod solution, using a one-shotted AI JavaScript translation of the same [COLSYS](https://www.netlib.org/ode/) solver used by Mahadevan and Keller. From there, this notebook cuts up the geometry into a mesh of triangles and models the Möbius strip as a thin elastic sheet.  Discrete triangles turn the continuous physics problem into a linear algebra problem.  Using the numerical [finite element method](https://en.wikipedia.org/wiki/Finite_element_method) (FEM), each triangle resists in-plane stretching and bending with respect to its neighbors.

  <script id="state" type="text/x-typescript">
    // Persistent state, kept across reactive re-runs.
    const state = {
      expandedState: { expanded: false },
      sim: {
        model: null as any,
        X: null as Float64Array | null,
        modes: null as any,
        params: null as any,
        topologyKey: '',

      renderParams: {

  <script id="camera-ease" type="text/x-typescript">
    // Neither viewer ever recenters the mesh. Instead each eases its own focal
    // point toward the mesh centroid a little per frame, so a dragged, off-center
    // strip re-frames smoothly without the geometry itself jumping. Returns true
    // (and taints the camera, which renders it) if the focal point moved.
    // This lives in its own cell so both viewers can call it: the main cell
    // already depends on the hero's canvas, so the helper cannot live there.
    const CAMERA_EASE = 0.1;

    function centroidOf(pos: any, Nv: number): number[] | null {
      if (!pos || !Nv || pos.length !== Nv * 3) return null;
      let cx = 0, cy = 0, cz = 0;
      for (let v = 0; v < Nv; v++) { cx += pos[v*3]; cy += pos[v*3+1]; cz += pos[v*3+2]; }
      return [cx / Nv, cy / Nv, cz / Nv];
    }

    function easeCameraToCentroid(cam: any, pos: any, Nv: number): boolean {
      const c = centroidOf(pos, Nv);
      if (!c) return false;
      const cen = cam.state.center;
      const dx = c[0] - cen[0], dy = c[1] - cen[1], dz = c[2] - cen[2];
      if (dx*dx + dy*dy + dz*dz < 1e-7) return false;
      cen[0] += CAMERA_EASE * dx; cen[1] += CAMERA_EASE * dy; cen[2] += CAMERA_EASE * dz;
      cam.taint();
      return true;
    }

    // Hard reset: drop the focal point straight onto the centroid, no easing. For
    // a shape that is *loaded* outright rather than deformed (the Elastic rod
    // button restarts the pipeline), drifting the camera in just reads as lag.
    function snapCameraToCentroid(cam: any, pos: any, Nv: number): void {
      const c = centroidOf(pos, Nv);
      if (!c) return;
      const cen = cam.state.center;
      cen[0] = c[0]; cen[1] = c[1]; cen[2] = c[2];
      cam.taint();
    }
  </script>

  <script id="theory-element" type="text/markdown">
    Adding up the membrane and bending stresses of each triangle yields an overall
    elastic energy ${tex`E(\mathbf{x}),`} where ${tex`\mathbf{x}`} is a vector containing
    the ${tex`3n`} coordinates of all ${tex`n`} vertex positions.
    The equilibrium shape the strip is the one that minimizes energy ${tex`E(\mathbf{x}).`}
    The minimum is found with the [L-BFGS](https://en.wikipedia.org/wiki/Limited-memory_BFGS)
    method which requires the energy ${tex`E`} and its gradient ${tex`\nabla E.`}
    The inner loop uses just dot products and vector sums, correponsing to the `ddot`
    and `daxpy` BLAS methods.
  </script>

  <script id="theory-bending" type="text/markdown">
    Just for fun, I decided to compute the vibrational bending modes as well. Nudge the strip away
    from its resting shape and Newton's law governs what happens next, in terms of two matrices: the
    stiffness ${tex`K = \nabla^2 E`}, the curvature of the energy at the minimum, and a mass matrix
    ${tex`M`} carrying the inertia of the moving vertices. Looking for motions in which every vertex
    oscillates in step at a single frequency turns that into a generalized eigenvalue problem.

    <details style="margin:0.5rem 0 1.75rem;border:1px solid rgba(127,127,127,0.28);border-radius:8px;padding:0.5rem 0.9rem 0.9rem">
    <summary style="cursor:pointer;font-weight:600">The eigenvalue problem for bending modes</summary>

    Expanding the energy to second order in a small displacement ${tex`\mathbf{u}`} away from the
    equilibrium shape gives

    ${tex.block`E(\mathbf{x} + \mathbf{u}) \approx E(\mathbf{x}) + \tfrac{1}{2}\,\mathbf{u}^{\top} K\,\mathbf{u}.`}

    (There is no term linear in ${tex`\mathbf{u}`} since the gradient vanishes at equilibrium.)
    The matrix ${tex`K = \nabla^2 E`} is the curvature of the energy, representing
    restoring force per unit of displacement.

    That is an energy, though, and a vibration is a motion, so it takes one more step to connect the
    two. The elastic force is the negative gradient of the energy, and differentiating the expansion
    above with respect to the displacement drops the constant and leaves the quadratic term,

    ${tex.block`\mathbf{f}(\mathbf{u}) \;=\; -\nabla_{\mathbf{u}} E(\mathbf{x} + \mathbf{u}) \;\approx\; -K\,\mathbf{u},`}

    using ${tex`\nabla_{\mathbf{u}}\!\left(\tfrac{1}{2}\,\mathbf{u}^{\top} K\,\mathbf{u}\right) = K\,\mathbf{u}`}
    for symmetric ${tex`K`}. Equivalently, expand the gradient itself rather than the energy:
    ${tex`\nabla E(\mathbf{x} + \mathbf{u}) = \nabla E(\mathbf{x}) + K\,\mathbf{u} + O(\lVert\mathbf{u}\rVert^2)`},
    whose first term is zero precisely because the strip sits at equilibrium. Either way the strip
    pushes back in proportion to how far it has been displaced, which is Hooke's law with a matrix
    where the spring constant used to be.

    The kinetic energy of the moving vertices,
    ${tex`T = \tfrac{1}{2}\,\dot{\mathbf{u}}^{\top} M\,\dot{\mathbf{u}}`}, supplies their inertia
    through the mass matrix ${tex`M`}. Newton's law for the nudged strip is then simply

    ${tex.block`M\,\ddot{\mathbf{u}} = -K\,\mathbf{u}.`}

    A vibration mode is a motion in which every vertex oscillates in step at one frequency, the
    shape itself held fixed. For harmonic motion at frequency ${tex`\omega`} the acceleration is
    just ${tex`\ddot{\mathbf{u}} = -\omega^2\,\mathbf{u}`}, so the two time derivatives collapse to
    a factor of ${tex`-\omega^2`}, the minus signs cancel from both sides, and what survives is the
    eigenvalue problem below.

    </details>

    ${tex.block`K\,\mathbf{u} = \omega^2 M\,\mathbf{u}.`}

    The eigenvalues ${tex`\omega^2`} are the squared frequencies and the eigenvectors
    ${tex`\mathbf{u}`} are the mode shapes. After some trial and error using different LAPACK solvers which
    exploit different optimizations like the banded and symmetric nature of the matrices,
    I settled on ARPACK's ${tex`\texttt{dsband}`} method for computing the lowest-order
    modes, with the banded ${tex`\texttt{dsbgvx}`} and dense ${tex`\texttt{dsygvx}`} from LAPACK
    kept as cross-checks.
  </script>

  <script id="sparsity-aside" type="text/x-typescript">
    // Optional deep-dive, collapsed by default so it doesn't interrupt the arc.
    // Holds the practical efficiency story end to end: the Mobius seam's effect on
    // the bandwidth, the interactive sparsity pattern (structural only, no FEM
    // solve), the choice of eigensolver, and where the banded approach stops short.
    // The sliders re-render imperatively.
    {
      const details = html`<details style="margin:0.5rem 0 1.75rem;border:1px solid rgba(127,127,127,0.28);border-radius:8px;padding:0.5rem 0.9rem 0.9rem"></details>`;
      details.appendChild(html`<summary style="cursor:pointer;font-weight:600">Some notes on sparsity</summary>`);
      const body = html`<div style="margin-top:0.85rem"></div>`;
      details.appendChild(body);

      body.appendChild(html`<p style="margin:0 0 0.85rem">Since each triangle shares only two vertices with each neighbor, the stiffness matrix is sparse. Gluing the the mesh together where it wraps, though, connects vertices that started out far apart. The obvious vertex numbering therefore scatters the pairings and and ${tex`K`} spreads into a wide band (note entries in the lower-left and upper-right corners of the lefthand matrix below), effectively increasing the bandwidth to the full size of the matrix. Renumbering the vertices so each seam partner sits beside its mate pulls it back into a narrow band, and only a narrow band is cheap enough for the banded LAPACK routines. Drag the sliders to watch the pattern, bandwidth, and density track the mesh.</p>`);

      // Imperative controls (read .value, listen 'input') — no cross-cell reactivity.
      const controls = html`<div style="display:flex;flex-wrap:wrap;gap:12px 24px;align-items:center;margin:0 0 0.85rem"></div>`;
      const nuInput = Inputs.range([8, 128], { label: 'Segments around', step: 1, value: 64 });
      const nvInput = Inputs.range([4, 32], { label: 'Segments across', step: 2, value: 10 });
      controls.append(nuInput, nvInput);
      body.appendChild(controls);

      const figWrap = html`<div></div>`;
      body.appendChild(figWrap);

      // Theme-aware point color, parsed to RGB for direct ImageData writes.
      const probe = document.createElement('div');
      probe.style.cssText = 'position:absolute;color:var(--theme-foreground-focus, #3b82f6)';
      document.body.appendChild(probe);
      const cmatch = getComputedStyle(probe).color.match(/[\d.]+/g) || ['59', '130', '246'];
      probe.remove();
      const pr = +cmatch[0] | 0, pg = +cmatch[1] | 0, pb = +cmatch[2] | 0;

      function spy(px: number, n: number, blocks: Set<number>, Nv: number, orderOf: (d: number) => number): HTMLCanvasElement {
        const dpr = devicePixelRatio || 1;
        const W = Math.max(1, Math.round(px * dpr));
        const cv = document.createElement('canvas');
        cv.width = W; cv.height = W;
        cv.style.cssText = `width:${px}px;height:${px}px;border:1px solid rgba(127,127,127,0.35);border-radius:4px;background:rgba(127,127,127,0.05);max-width:100%`;
        const ctx = cv.getContext('2d')!;
        const img = ctx.createImageData(W, W);
        const data = img.data;
        const s = W / n;
        const dot = Math.max(1, Math.floor(s));
        const plot = (i: number, j: number) => {
          const x0 = Math.min(W - dot, (j * s) | 0), y0 = Math.min(W - dot, (i * s) | 0);
          for (let dy = 0; dy < dot; dy++) {
            let idx = ((y0 + dy) * W + x0) * 4;
            for (let dx = 0; dx < dot; dx++) { data[idx] = pr; data[idx+1] = pg; data[idx+2] = pb; data[idx+3] = 255; idx += 4; }
          }
        };
        for (const key of blocks) {
          const va = Math.floor(key / Nv), vb = key % Nv;
          for (let ci = 0; ci < 3; ci++) { const i = orderOf(va*3+ci); for (let cj = 0; cj < 3; cj++) plot(i, orderOf(vb*3+cj)); }
        }
        ctx.putImageData(img, 0, 0);
        return cv;
      }

      const pct = (x: number) => `${(100 * x).toFixed(1)}%`;
      const panel = (cv: HTMLCanvasElement, heading: string, sub: string) => {
        const wrap = html`<div style="display:flex;flex-direction:column;align-items:center;gap:6px;max-width:100%"></div>`;
        wrap.appendChild(cv);
        wrap.appendChild(html`<div style="text-align:center;font:12px/1.4 var(--sans-serif,system-ui,sans-serif);color:var(--theme-foreground-muted,#777)"><strong style="color:var(--theme-foreground,#222)">${heading}</strong><br>${sub}</div>`);
        return wrap;
      };

      function render() {
        const model = createMobiusMesh({ length: 2 * Math.PI, width: 1, nu: Math.round(nuInput.value as number), nv: Math.round(nvInput.value as number) });
        const { Nv } = model;
        const n = 3 * Nv;
        const { dofPerm, bw } = buildPermutation(model);

        // Structural nonzeros: each vertex couples to its Laplacian 1-ring and,
        // through the quadratic bending residual at each vertex, to every pair
        // within that ring (the 2-ring stencil). Covers the membrane triangles too.
        const nbrs: number[][] = Array.from({ length: Nv }, () => []);
        for (let e = 0; e < model.nLap; e++) { nbrs[model.lapI[e]].push(model.lapJ[e]); nbrs[model.lapJ[e]].push(model.lapI[e]); }
        const blocks = new Set<number>();
        const addPair = (a: number, b: number) => { blocks.add(a * Nv + b); blocks.add(b * Nv + a); };
        for (let v = 0; v < Nv; v++) {
          blocks.add(v * Nv + v);
          const nb = nbrs[v];
          for (let a = 0; a < nb.length; a++) {
            addPair(v, nb[a]);
            for (let b = a + 1; b < nb.length; b++) addPair(nb[a], nb[b]);
          }
        }

        let maxV = 0;
        for (const key of blocks) { const d = Math.abs(Math.floor(key / Nv) - (key % Nv)); if (d > maxV) maxV = d; }
        const natBw = maxV * 3 + 2;
        const nnz = blocks.size * 9;

        const PX = 280;
        const fig = html`<figure style="margin:0"></figure>`;
        const rowEl = html`<div style="display:flex;flex-wrap:wrap;gap:24px;justify-content:center;align-items:flex-start"></div>`;
        rowEl.append(
          panel(spy(PX, n, blocks, Nv, (d) => d), 'Natural ordering', `bandwidth ≈ ${natBw} of ${n}`),
          panel(spy(PX, n, blocks, Nv, (d) => dofPerm[d]), 'Bandwidth-reduced (used)', `bandwidth = ${bw} of ${n}`),
        );
        fig.appendChild(rowEl);
        fig.appendChild(html`<figcaption style="margin-top:0.75rem;font:13px/1.5 var(--sans-serif,system-ui,sans-serif);color:var(--theme-foreground-muted,#777);text-align:center">
          ${model.nu}&times;${model.nv} segments &rarr; ${n}&times;${n} matrix, ${nnz.toLocaleString()} nonzeros (${pct(nnz / (n * n))} dense).
          Reordering shrinks the bandwidth from ${natBw} to ${bw}; even then only ${pct(nnz / (n * (2 * bw + 1)))}
          of the stored band is actually nonzero, which is the room a sparse solver would reclaim.
        </figcaption>`);
        figWrap.replaceChildren(fig);
      }
      render();
      nuInput.addEventListener('input', render);
      nvInput.addEventListener('input', render);

      body.appendChild(html`<p style="margin:0.85rem 0 0">Which eigensolver runs on that band matters as much as the band itself. Only a few of the lowest modes are wanted, yet the classic banded routine (<code>dsbgvx</code>) reduces the entire band to tridiagonal form, and most of that cost goes into accumulating an ${tex`n\times n`} rotation matrix used only to recover those few eigenvectors, work that scales like ${tex`n^3`}. A better fit for a handful of eigenpairs is shift-invert Lanczos (ARPACK's (<code>dsband</code>): factor ${tex`K-\sigma M`} once as a band, then apply its inverse a few dozen times to converge on the lowest frequencies, never forming an ${tex`n\times n`} matrix. On the default mesh the mode solve runs about 9 times faster, and the advantage grows with resolution, past 25 times on a ${tex`96\times16`} mesh, because it is precisely the ${tex`n\times n`} work that shift-invert skips.</p>`);

      body.appendChild(html`<p style="margin:0.85rem 0 0">That narrow band is also where this approach stops short. A banded solver still grinds through every entry inside the band, and most of them are zero. A proper sparse solver would skip them, but the band is small enough here that it was not worth writing one.</p>`);

      display(details);
    }
  </script>

  <script id="controls" type="text/x-typescript">
    const controlsContainer = html`<div id="mobius-controls"></div>`;
    const add = (el: HTMLElement) => { controlsContainer.appendChild(el); return el; };

    // --- Status panel. Defined here, but inserted just below the pipeline
    // buttons (see add(statusEl) after the button row) so the solve readout sits
    // with the controls that drive it. It lives inside the controls container so
    // it follows the figure into the expanded view and wraps rather than
    // truncating, and carries both the live "Solving..." progress and the final
    // summary, with a slim progress bar beneath.
    const statusText = html`<div style="font:12px/1.5 var(--monospace,monospace);color:var(--theme-foreground-muted,#666);white-space:pre-wrap"></div>`;
    const progressBar = html`<div style="height:100%;width:0%;background:var(--theme-foreground-focus,#3b82f6)"></div>` as HTMLElement;
    const progressTrack = html`<div style="display:none;height:5px;border-radius:3px;background:rgba(127,127,127,0.22);overflow:hidden;margin-top:5px"></div>`;
    progressTrack.appendChild(progressBar);
    const statusEl = html`<div id="mobius-status" style="margin:2px 0 10px"></div>`;
    statusEl.appendChild(statusText);
    statusEl.appendChild(progressTrack);
    const setStatus = (s: string) => { statusText.textContent = s; };
    let progressPulse: Animation | null = null;
    function setProgress(text: string | null, frac: number | null) {
      if (text == null) {
        // Solve finished/idle: hide the bar but keep whatever message is shown.
        progressTrack.style.display = 'none';
        if (progressPulse) { progressPulse.cancel(); progressPulse = null; }
        return;
      }
      statusText.textContent = text;
      progressTrack.style.display = 'block';
      if (frac == null) {
        progressBar.style.width = '100%';
        if (!progressPulse) {
          progressPulse = progressBar.animate(
            [{ opacity: 0.25 }, { opacity: 0.7 }, { opacity: 0.25 }],
            { duration: 1100, iterations: Infinity },
          );
        }
      } else {
        if (progressPulse) { progressPulse.cancel(); progressPulse = null; }
        progressBar.style.opacity = '1';
        progressBar.style.width = `${Math.max(0, Math.min(1, frac)) * 100}%`;
      }
    }

    // --- Computation: load the starting shape, run the solver, choose what to
    // compute. "Elastic rod" only LOADS the elastic-rod shape (and shows it);
    // "Relax" is the separate step that actually runs the equilibrium solver
    // from whatever shape is current. Keeping load and solve distinct lets you
    // inspect the elastic-rod guess before settling it, and makes a dragged
    // shape a well-defined starting point.
    add(html`<div style="font-weight:600;margin:2px 0">Computation</div>`);
    const btnStyle = `
      display:inline-flex;align-items:center;gap:6px;
      padding:8px 15px;font:13px/1 var(--sans-serif,system-ui,sans-serif);

    // The three stages of the computation, shown as a pipeline:
    //   Elastic rod  →  Relax  →  Flexural modes
    // "Elastic rod" loads the COLSYS rod shape; "Relax" settles it to the shell
    // equilibrium; "Flexural modes" computes/shows the vibration modes about that
    // equilibrium. One factory builds the row so the SAME pipeline (and its
    // blue-fills-as-you-progress state) can be mirrored on the hero figure; the
    // main cell wires the click handlers and the shared state to every row.
    // Labels carry no icons so all three fit on one line.
    const pipeArrow = () => html`<span style="align-self:center;color:var(--theme-foreground-faint,#bbb);font-size:13px;user-select:none">→</span>`;
    function makePipelineRow() {
      const mk = (label: string, title: string) =>
        html`<button title="${title}" style="${btnStyle}">${label}</button>` as HTMLButtonElement;
      const rod = mk('Elastic rod', 'Load the initial shape from the Mahadevan–Keller elastic-rod (COLSYS) solution');
      const relax = mk('Relax', 'Relax the current shape to elastic equilibrium');
      const flex = mk('Flexural modes', 'Relax to an equilibrium first to compute flexural modes');
      flex.disabled = true;

    const panelPipeline = makePipelineRow();
    panelPipeline.row.style.margin = '6px 0 6px';
    add(panelPipeline.row);
    add(statusEl); // status sits directly under the pipeline buttons

    // Equilibrium solver. L-BFGS is the default: it is much faster and its
    // shape is perfectly adequate here. Newton-CG and the banded direct-solve
    // Newton (via dpbsv) reach a slightly lower-energy, smoother minimum that
    // L-BFGS does not quite settle into, at noticeably higher cost; they are
    // offered for comparison.
    const equilibriumSolverInput = add(Inputs.select(
      ['L-BFGS', 'Newton-CG', 'Banded Newton'],
      { label: 'Equilibrium solver', value: 'L-BFGS' },

    const equilibriumSolverKey = () => {
      const v = equilibriumSolverInput.value as string;
      return v.startsWith('Banded') ? 'banded-newton'
        : v.startsWith('L-BFGS') ? 'lbfgs'
        : 'newton-cg';
    };

    const solverInput = add(Inputs.select(['Banded ARPACK (dsband)', 'Banded (dsbgvx)', 'Dense (dsygvx)'], {
      label: 'Eigensolver', value: 'Banded ARPACK (dsband)',

    const modeInput = add(Inputs.range([1, 20], { label: 'Mode #', value: 1, step: 1 }));

    const lengthInput = add(Inputs.range([2, 16], { label: 'Rest length', value: 2 * Math.PI, step: 0.01 }));

  <script id="main" type="text/x-typescript">

    const renderer = createPeelRenderer(device, canvasFormat, { peel: peelShaderCode, composite: compositeShaderCode });

    state.sim.liveX = dispX;

    function renderNow() {
      if (!mainVisible) return;
      renderer.render(gpuContext, state.renderParams, camera, canvas.width, canvas.height, true);
    }

    // --- Web Worker for heavy computation (equilibrium + modes). ---

    const worker = new Worker(new URL('./fem-worker.js', import.meta.url), { type: 'module' });
