    }

    // Switch between the shape and mode views (only ever called with on=true once
    // modes exist). Keeps the derived renderParams.view in sync and enables the
    // mode-only Mode #/Amplitude controls.
    function setModeView(on: boolean) {
      modeView = on;
      state.renderParams.view = on ? 'Flexural mode' : 'Equilibrium';
      setControlEnabled(modeInput, on);
      setControlEnabled(ampInput, on);
      heroModeWrap.style.display = on ? 'flex' : 'none';
      state.staticDirty = true;
      updateModesButton();
      camera.triggerRepaint();
    }

    function setEquilibrium(on: boolean) {
      atEquilibrium = on;
      if (!on) {
        state.sim.modes = null;
        if (modeView) setModeView(false); // back to the shape view; drops stale modes
        // A modes solve in flight is now about a stale equilibrium: cancel it and
        // bump the generation so its result (if it still arrives) is ignored, so
        // it can never flip the view into a mode about an un-relaxed shape.
        if (computingModes) {
          worker.postMessage({ type: 'cancel' });
          computingModes = false;
          modesGeneration++;
          setProgress(null, null);
        }
      }
      // Relax turns blue once (and only while) the current shape is a converged
      // equilibrium; it goes grey again the moment that shape is left.
      styleAll('relax', on, true);
      updateModesButton();
    }

    // Wire every pipeline row to the same handlers, and set the static "Elastic
    // rod" entry-point blue. (initFromRod / relax / setModeView / startComputeModes
    // are hoisted, so they resolve at click time.)
    styleAll('rod', true, true);
    styleAll('relax', false, true);
    for (const p of pipelines) {
      p.rod.addEventListener('click', () => initFromRod());
      p.relax.addEventListener('click', () => { if (!relaxing) relax(false); });
      p.flex.addEventListener('click', () => {
        if (!atEquilibrium || computingModes) return;
        if (modeView) { setModeView(false); return; }   // toggle back to the shape
        if (state.sim.modes) setModeView(true);          // already computed: just show
        else startComputeModes();                        // compute, then reveal on done
      });
    }

    worker.onerror = (e: ErrorEvent) => {
      setStatus(`Worker error: ${e.message}`);
      setProgress(null, null);
      relaxing = false;
      computingModes = false;
    };

    worker.onmessage = ({ data }: MessageEvent) => {
      switch (data.type) {
        case 'relaxProgress': onRelaxProgress(data); break;
        case 'relaxDone':     onRelaxDone(data);     break;
        case 'relaxCancelled': /* stale; new relax already sent */ break;
        case 'modesProgress': onModesProgress(data); break;
        case 'modesDone':     onModesDone(data);     break;
        case 'modesCancelled': onModesCancelled(data); break;
        case 'error': {
          setStatus(`Worker error: ${data.message}`);
          setProgress(null, null);
          relaxing = false;
          computingModes = false;
          break;
        }
      }
    };

    // Live shape streamed from the worker's continuous solve (whether relaxing
    // to equilibrium or being dragged). The worker can stream faster than the
    // display refreshes, so coalesce to one render per animation frame. While a
    // vertex is being dragged, the highlight ring follows it.
    let pendingProgress: any = null;
    let progressScheduled = false;
    function onRelaxProgress(data: any) {
      if (data.gen !== relaxGeneration) return;
      pendingProgress = data;
      if (progressScheduled) return;
      progressScheduled = true;
      requestAnimationFrame(() => {
        progressScheduled = false;
        const p = pendingProgress;
        if (!p) return;
        pendingProgress = null;
        dispX = new Float32Array(p.liveX);
        state.sim.liveX = dispX;
        pushDisplay(dispX);
        renderNow();
        if (activeDrag) activeDrag.showRing(dispX[activeDrag.v*3], dispX[activeDrag.v*3+1], dispX[activeDrag.v*3+2]);
        setProgress(
          `Solving · iter ${p.iter} · |grad| ${p.gInf.toExponential(1)} · E ${p.f.toExponential(2)}`,
          Math.min(p.iter / (0.6 * p.maxIt), 0.98),
        );
      });
    }

    function onRelaxDone({ gen, X, converged, iterations, ms, gInf, energy, membrane, bending, Nv, nu, nv, solverUsed }: any) {
      if (gen !== relaxGeneration) return;
      const topo = `${nu}x${nv}`;
      state.sim.X = new Float64Array(X);
      state.sim.topologyKey = topo;
      state.sim.modes = null;
      state.previewing = false;
      if (dispX.length === Nv * 3) dispX.set(state.sim.X);
      state.anim.phase = 0;
      state.staticDirty = true;
      pushDisplay(dispX);
      camera.triggerRepaint();
      // Drop any progress frame still queued in the rAF coalescer, so it cannot
      // re-show "Solving..." after the equilibrium summary.
      pendingProgress = null;
      setProgress(null, null);
      const head = converged
        ? `Equilibrium reached in ${ms} ms, ${iterations} iterations.`
        : `NOT converged: stopped at the ${iterations}-iteration cap (${ms} ms).\n` +
          `The displayed shape is the best so far, not a true equilibrium. ` +
          `Reduce the mesh resolution or thickness, or reload Elastic rod and Relax.`;
      setStatus(
        `${head}  [${solverUsed}]\n` +
        `energy = ${energy.toExponential(3)},  vertices = ${Nv},  DOFs = ${3 * Nv}`
      );
      relaxing = false;
      // Only a converged free solve is a valid equilibrium for the mode view.
      setEquilibrium(converged);
      reframeViewers(); // re-frame both viewers onto the settled shape
    }

    function onModesProgress({ gen, phase, frac }: any) {
      if (gen !== modesGeneration) return;
      const model = state.sim.model;
      const n = model ? 3 * model.Nv : 0;
      const sv = solverInput.value as string;
      const solverName = sv.startsWith('Dense') ? 'dsygvx' : sv.startsWith('Banded ARPACK') ? 'dsband' : 'dsbgvx';
      if (phase === 'hessian') {
        setProgress(`Assembling stiffness (FD Hessian) · ${Math.round((frac ?? 0) * 100)}%`, frac);
      } else {
        setProgress(`Running eigensolver ${solverName} (n = ${n})…`, null);
      }
    }

    function onModesDone({ gen, eigenvalues, frequencies, modes: rawModes, rigidCount, bw, ms }: any) {
      if (gen !== modesGeneration) return;
      const modes = rawModes.map((m: any) => ({
        lambda: m.lambda,
        omega: m.omega,
        shape: new Float64Array(m.shape),
      }));
      state.sim.modes = { eigenvalues, frequencies, modes, rigidCount, bw };
      state.anim.phase = 0;
      state.staticDirty = true;
      setProgress(null, null);
      camera.triggerRepaint();
      computingModes = false;
      const svd = solverInput.value as string;
      const solverUsed = svd.startsWith('Dense') ? 'dsygvx (dense)' : svd.startsWith('Banded ARPACK') ? 'dsband (ARPACK shift-invert)' : 'dsbgvx (banded)';
      const model = state.sim.model;
      const n = model ? 3 * model.Nv : 0;
      console.log(`[eigensolver] ${solverUsed}  n=${n}  bw=${bw}  time=${ms} ms`);
      // Per-mode frequencies go to the console; the status line stays a single line.
      console.log(frequencies.map((w: number, k: number) =>
        `  mode ${String(k+1).padStart(2)}:  omega = ${w.toFixed(4)}   (omega^2 = ${modes[k].lambda.toExponential(3)})`
      ).join('\n'));
      setStatus(`Flexural modes in ${ms} ms  [${solverUsed}].`);
      setModeView(true); // reveal the modes now that they are ready
    }

    function onModesCancelled({ gen }: any) {
      if (gen !== modesGeneration) return;
      computingModes = false;
      updateModesButton();
    }

    // --- Relax: find equilibrium shape. ---
    // Cancels any running solve and immediately starts a new one.

    // Fallback cold-start shape: the analytic embedding plus a small,
    // deterministic symmetry-breaking perturbation. Used only if the elastic-rod
    // solve below fails for some extreme parameter set. From the pristine
    // (symmetric) embedding L-BFGS descends into a higher-energy, slightly wavy
    // local minimum; this displacement reliably drops it into the true minimum
    // basin instead. The seed is fixed so the equilibrium is reproducible.
    function coldStartEmbedding(model: any, length: number): Float64Array {
      const X = initialEmbedding(model);
      const amp = 0.08 * length / (2 * Math.PI); // ~8% of the loop radius
      let s = 0x9e3779b9 >>> 0;
      const rnd = () => { s = (s * 1103515245 + 12345) & 0x7fffffff; return s / 0x7fffffff - 0.5; };
      for (let i = 0; i < X.length; i++) X[i] += amp * rnd();
      return X;
    }

    // Default fresh starting shape: the Mahadevan-Keller elastic-rod (COLSYS)
    // solution. It is far closer to the shell equilibrium than the analytic
    // guess (much lower starting energy), so every fresh solve starts from it;
    // the analytic embedding is only a fallback if the rod solve ever fails.
    function freshEmbedding(model: any, params: any, length: number): Float64Array {
      try {
        return rodEmbedding(solveBvp, model, { poisson: params.poisson, alphaMax: 50, samples: 800 }).X;
      } catch (err) {
        console.warn('Elastic-rod init failed; falling back to analytic embedding.', err);
        return coldStartEmbedding(model, length);
      }
    }

    function relax(reinit = false) {
      if (relaxing) worker.postMessage({ type: 'cancel' });

      const params = {
        E: 1.0,
        poisson: poissonInput.value as number,
        thickness: thickInput.value as number,
        density: 1.0,
        bendingMode: 'quadratic' as const,
      };
      const length = lengthInput.value as number;
      const width = 1.0;
      const nu = Math.round(nuInput.value as number);
      const nv = Math.round(nvInput.value as number);
      const topo = `${nu}x${nv}`;

      const model = createMobiusMesh({ length, width, nu, nv });
      // Warm-start only when the exact topology matches. Comparing DOF count
      // alone is unsafe: different (nu, nv) can share the same Nv (e.g. 64x10
      // and 88x7 both give Nv=704), which would warm-start from an unrelated
      // previous shape. A real topology change must cold-start.
      const sameTopo = !!state.sim.X && state.sim.topologyKey === topo
        && state.sim.X.length === model.Nv * 3;
      const X0 = (reinit || !sameTopo)
        ? freshEmbedding(model, params, length)
        : (state.sim.X as Float64Array).slice();

      const topoChanged = topo !== state.sim.topologyKey || dispX.length !== model.Nv * 3;
      if (topoChanged) {
        renderer.initMesh(model, X0, params.thickness);
        dispX = new Float32Array(model.Nv * 3);
        state.sim.liveX = dispX;
      }
      state.sim.model = model;
      state.sim.params = params;
      state.sim.modes = null;
      state.previewing = true;
      setEquilibrium(false);   // solving: not at equilibrium until it converges
      reframeViewers();       // re-frame both viewers onto the new shape
      dispX.set(X0);
      pushDisplay(dispX);
      renderNow();

      setStatus(`Solving  L=${length} w=${width} nu=${nu} nv=${nv} h=${params.thickness} ...`);

      const gen = ++relaxGeneration;
      relaxing = true;

      const X0Buf = X0.buffer;
      const solver = equilibriumSolverKey();
      worker.postMessage({ type: 'relax', gen, params, length, width, nu, nv, X0Buf, solver }, [X0Buf]);
    }

    // --- Initialize the shape (without solving). ---
    // Loading an initial shape and relaxing it are kept separate: an init
    // button only LOADS a shape and shows it; Relax is what runs the solver.
    // Because dragging and relaxing both run in the worker from the worker's own
    // copy of the shape, a loaded shape must be pushed to the worker too -- it
    // sits there idle (held, not iterating) until you drag a vertex or relax.
    // Otherwise the worker would still hold the previous equilibrium and a drag
    // would snap the strip back to it.

    function readParams() {
      const params = {
        E: 1.0,
        poisson: poissonInput.value as number,
        thickness: thickInput.value as number,
        density: 1.0,
        bendingMode: 'quadratic' as const,
      };
      const length = lengthInput.value as number;
      const width = 1.0;
      const nu = Math.round(nuInput.value as number);
      const nv = Math.round(nvInput.value as number);
      return { params, length, width, nu, nv };
    }

    // Show X0 as the current shape (display only -- no solve, no worker seed).
    // Used both for the elastic-rod button and for the live geometry preview.
    function showShape(model: any, X0: Float64Array) {
      const topo = `${model.nu}x${model.nv}`;
      relaxing = false;
      state.previewing = false;
      setEquilibrium(false); // an un-relaxed shape: lock out the modes view
      reframeViewers();     // re-frame both viewers onto it
      setProgress(null, null);

      const topoChanged = topo !== state.sim.topologyKey || dispX.length !== model.Nv * 3;
      if (topoChanged) {
        renderer.initMesh(model, X0, state.sim.params.thickness);
        dispX = new Float32Array(model.Nv * 3);
        state.sim.liveX = dispX;
      }
      state.sim.model = model;
      state.sim.X = X0;
      state.sim.topologyKey = topo;
      state.sim.modes = null;
      state.anim.phase = 0;
      state.staticDirty = true;
      dispX.set(X0);
      pushDisplay(dispX);
      camera.triggerRepaint();
      renderNow();
    }

    // Push the current shape to the worker's live solve as an idle, held shape
    // (so a later drag or relax continues from exactly what is displayed).
    // Supersedes any running solve; the bumped generation makes any in-flight
    // progress/result from the old solve stale.
    function seedWorker(model: any, X0: Float64Array) {
      const gen = ++relaxGeneration;
      const X0Buf = X0.slice().buffer; // transfer a copy; keep state.sim.X intact
      worker.postMessage(
        { type: 'loadShape', gen, params: state.sim.params, length: model.length, width: model.width, nu: model.nu, nv: model.nv, X0Buf, solver: equilibriumSolverKey() },
        [X0Buf],
      );
    }

    // Solve the Mahadevan-Keller rod BVP for the current material/geometry and
    // lay its centerline + cross-section frame onto the FEM mesh (a shape
    // already close to the shell equilibrium). The rod solve is fast (~tens of
    // ms), so it runs inline on the main thread. Returns null on failure.
    function buildRod(): { model: any; X0: Float64Array; info: any } | null {
      const { params, length, width, nu, nv } = readParams();
      const model = createMobiusMesh({ length, width, nu, nv });
      state.sim.params = params;
      try {
        const res = rodEmbedding(solveBvp, model, { poisson: params.poisson, alphaMax: 50, samples: 800 });
        return { model, X0: res.X, info: res.info };
      } catch (err: any) {
        setStatus(`Elastic-rod solve failed: ${err?.message ?? err}`);
        return null;
      }
    }

    // Elastic-rod button: load the rod shape, show it, and seed the worker.
    function initFromRod() {
      const r = buildRod();
      if (!r) return;
      showShape(r.model, r.X0);
      // showShape() arms the ease (it is the shared path for the live geometry
      // preview, where easing is right). Loading the rod is a hard cut back to the
      // pipeline's entry point, so override that and land on the shape at once.
      snapViewers(r.X0, r.model.Nv);
      seedWorker(r.model, r.X0);
      const { alpha, beta, closure } = r.info;
      setStatus(
        `Elastic-rod shape loaded  [Mahadevan–Keller, COLSYS]\n` +
        `α = ${alpha}, β = ${beta.toFixed(3)}, loop closure ${closure.toExponential(1)}.  ` +
        `Press Relax to settle the shell.`);
    }

    // --- Compute modes: small-vibration eigenproblem at equilibrium. ---
    // Only ever entered from the (equilibrium-gated) Flexural modes button.
    function startComputeModes() {
      const { model, X, params } = state.sim;
      if (!atEquilibrium || !model || !X) { setStatus('Relax to an equilibrium first.'); return; }
      if (computingModes) worker.postMessage({ type: 'cancel' });

      const svValue = solverInput.value as string;
      const solver = svValue.startsWith('Dense') ? 'dense' : svValue.startsWith('Banded ARPACK') ? 'arpack' : 'dsbgvx';
      const solverLabel = solver === 'dense' ? 'dsygvx (dense)' : solver === 'arpack' ? 'dsband (ARPACK shift-invert)' : 'dsbgvx (banded)';
      // Use setProgress (with the bar) so the modes solve is visibly "happening"
      // in the same status line/progress bar as the equilibrium computation.
      setProgress(`Computing flexural modes (${solverLabel}, n = ${3 * model.Nv})…`, null);

      const gen = ++modesGeneration;
      computingModes = true;
      updateModesButton();

      const XBuf = (X as Float64Array).slice().buffer;
      worker.postMessage({
        type: 'computeModes', gen,
        modelParams: { length: model.length, width: model.width, nu: model.nu, nv: model.nv, params, solver },
        XBuf,
        opts: { nModes: 20, fdStep: 1e-5 },
      }, [XBuf]);
    }

    // Cheap render controls: read straight from the inputs each change. The view
    // (shape vs mode) is owned by setModeView, not these controls.
    function syncParams() {
      state.renderParams.modeIndex = Math.round(modeInput.value as number);
      // Mirror the panel's Mode # onto the hero slider so the two stay in step.
      heroModeSlider.value = String(state.renderParams.modeIndex);
      heroModeNum.textContent = String(state.renderParams.modeIndex);
      state.renderParams.amplitude = ampInput.value as number;
      state.renderParams.colorBy = colorByInput.value as string;
      state.renderParams.wireframe = wireframeInput.value as boolean;
      state.staticDirty = true;
      camera.triggerRepaint();
    }

    // Geometry/material edits live-preview the elastic-rod shape but do NOT
    // relax automatically: the strip stays at the (cheap, ~tens of ms) rod shape
    // while you drag a slider, and waits for an explicit Relax to settle the
    // shell. Previewing is throttled to one rod solve per animation frame; a
    // short trailing debounce then seeds the worker with the settled shape so a
    // subsequent drag/relax continues from it.
    const geomInputs = [lengthInput, nuInput, nvInput, thickInput, poissonInput];
    let geomRaf = 0;
    let geomSeedTimer = 0;
    let geomPending: { model: any; X0: Float64Array } | null = null;
    function onGeometryInput() {
      if (!geomRaf) {
        geomRaf = requestAnimationFrame(() => {
          geomRaf = 0;
          const r = buildRod();
          if (!r) return;
          showShape(r.model, r.X0);
          geomPending = { model: r.model, X0: r.X0 };
          setStatus('Adjusting geometry…  press Relax to settle the shell.');
        });
      }
      clearTimeout(geomSeedTimer);
      geomSeedTimer = window.setTimeout(() => {
        if (geomPending) seedWorker(geomPending.model, geomPending.X0);
        setStatus('Elastic-rod shape loaded.  Press Relax to settle the shell.');
      }, 200);
    }
    for (const el of geomInputs) el.addEventListener('input', onGeometryInput);

    // (Pipeline button handlers are wired once, for every row, where the rows
    // are created above.)

    // Switching the equilibrium solver re-relaxes the current shape with it.
    equilibriumSolverInput.addEventListener('change', () => { relax(); });

    // Switching the eigensolver invalidates cached modes; recompute with the new
    // one if the modes are currently being shown, otherwise just drop them.
    solverInput.addEventListener('change', () => {
      state.sim.modes = null;
      state.staticDirty = true;
      if (modeView && atEquilibrium) startComputeModes();
      else { if (modeView) setModeView(false); updateModesButton(); }
      camera.triggerRepaint();
    });

    controlsContainer.addEventListener('input', syncParams);
    syncParams();
    setModeView(false); // start in the shape view with Mode #/Amplitude disabled
    updateModesButton(); // and the Flexural modes buttons disabled until relaxed

    // --- Display loop. ---

    // Per-vertex scalar field for the chosen "Color by" mode, evaluated at the
    // currently displayed (possibly animated) positions so stress and bending
    // update live as a mode oscillates.
    function currentScalar(positions: Float32Array) {
      const { model, params, modes } = state.sim;
      const rp = state.renderParams;
      switch (rp.colorBy) {
        case 'Membrane stress':
          return { field: membraneVonMises(model, positions, params), mode: 1 };
        case 'Bending stress':
          return { field: bendingStress(model, positions, params), mode: 1 };
        case 'Gaussian curvature':
          // Near-zero for a developable (ruled) surface; signed (saddle vs dome).
          // The diverging colormap + symmetric range (chosen in onColorByChange)
          // put zero on the neutral midpoint.
          return { field: gaussianCurvature(model, positions), mode: 1 };
        case 'Mode amplitude': {
          if (modes && modes.modes.length > 0) {
            const idx = Math.min(Math.max(rp.modeIndex - 1, 0), modes.modes.length - 1);
            const sh = modes.modes[idx].shape;
            const f = new Float64Array(model.Nv);
            for (let v = 0; v < model.Nv; v++)
              f[v] = Math.hypot(sh[v*3], sh[v*3+1], sh[v*3+2]);
            return { field: f, mode: 1 };
          }
          return { field: null, mode: 0 };
        }
        default:
          return { field: null, mode: 0 };
      }
    }

    function scalarRange(field: Float64Array | null): [number, number] | undefined {
      if (!field) return undefined;
      let lo = Infinity, hi = -Infinity;
      for (let i = 0; i < field.length; i++) {
        const v = field[i];
        if (v < lo) lo = v;
        if (v > hi) hi = v;
      }
      return isFinite(lo) ? [lo, hi] : undefined;
    }

    // Color-scale state shared with the legend. `auto` re-fits the scale to the
    // data each frame (and mirrors it onto the legend); once the user drags or
    // zooms the legend, `auto` turns off and the pinned [min, max] holds. A
    // signed field (Gaussian curvature) fits symmetrically about zero.
    const colorScale = { auto: true, min: 0, max: 1 };
    let colorLegend: any = null;
    const isDivergingColorBy = () => state.renderParams.colorBy === 'Gaussian curvature';

    // Resolve the color range for this frame. `autoField` is the field the auto
    // fit measures (the peak-deflection field while a mode animates, so the scale
    // does not pump as the oscillation crosses zero; the live field otherwise).
    function resolveRange(autoField: Float64Array | null): [number, number] | undefined {
      if (!colorScale.auto) return [colorScale.min, colorScale.max];
      const r = scalarRange(autoField);
      if (!r) return undefined;
      let lo = r[0], hi = r[1];
      if (isDivergingColorBy()) { const a = Math.max(Math.abs(lo), Math.abs(hi)) || 1e-20; lo = -a; hi = a; }
      colorScale.min = lo; colorScale.max = hi;
      if (colorLegend) colorLegend.setRange(lo, hi);
      return [lo, hi];
    }

    // The color field is always evaluated at the displayed `positions` (so values
    // are per-frame). `autoField` (optional) pins the auto fit to a fixed field.
    let peakBuf = new Float32Array(0);
    function pushDisplay(positions: Float32Array, autoField?: Float64Array | null) {
      const { field, mode } = currentScalar(positions);
      const range = resolveRange(autoField !== undefined ? autoField : field);
      renderer.update(positions, field, mode, state.sim.params?.thickness ?? 0.03, range);
    }

    // What is currently shown is an explicit choice (the Display control). When
    // "Flexural mode" is chosen but the modes are still being computed, this is
    // false and the equilibrium is shown until they are ready.
    function showingMode(): boolean {
      const { modes } = state.sim;
      return state.renderParams.view === 'Flexural mode'
        && !!modes && modes.modes.length > 0;
    }

    // Returns true if the vertex buffers changed this frame.
    function computeDisplayed(): boolean {
      const { model, X, modes } = state.sim;
      if (!model || !X || dispX.length !== model.Nv * 3) return false;
      // While relaxing, the convergence preview owns the display.
      if (state.previewing) return false;
      const rp = state.renderParams;
      const mode = showingMode();
      const animating = mode && rp.amplitude > 0;

      if (animating) {
        const idx = Math.min(Math.max(rp.modeIndex - 1, 0), modes.modes.length - 1);
        const shape = modes.modes[idx].shape;
        // Fix the color scale to the peak deflection (X + amplitude*shape) so it
        // does not rescale (and amplify noise) as the oscillation passes through
        // zero, while the color values themselves remain per-frame.
        if (peakBuf.length !== dispX.length) peakBuf = new Float32Array(dispX.length);
        for (let i = 0; i < dispX.length; i++) peakBuf[i] = X[i] + rp.amplitude * shape[i];
        const peakField = currentScalar(peakBuf).field;
        const a = rp.amplitude * Math.sin(state.anim.phase);
        for (let i = 0; i < dispX.length; i++) dispX[i] = X[i] + a * shape[i];
        pushDisplay(dispX, peakField);
        return true;
      }
      if (state.staticDirty) {
        if (mode) {
          // Frozen deflected mode shape, so it can be inspected without motion.
          const idx = Math.min(Math.max(rp.modeIndex - 1, 0), modes.modes.length - 1);
          const shape = modes.modes[idx].shape;
          const a = rp.amplitude;
          for (let i = 0; i < dispX.length; i++) dispX[i] = X[i] + a * shape[i];
        } else {
          dispX.set(X); // equilibrium
        }
        pushDisplay(dispX);
        state.staticDirty = false;
        return true;
      }
      return false;
    }

    const container = html`<div style="position:relative;width:100%;height:100%"></div>`;
    container.appendChild(canvas);

    // ParaView-style color-scale legend, lower-right of the figure. Dragging it
    // pans the color scale and the mouse wheel zooms it; the palette button picks
    // a different colormap. All three feed back into the rendered surface.
    colorLegend = createColorLegend({
      min: colorScale.min, max: colorScale.max,
      colormap: 'turbo',
      label: state.renderParams.colorBy,
      onRangeChange: ({ min, max }: { min: number; max: number }) => {
        colorScale.auto = false;
        colorScale.min = min; colorScale.max = max;
        state.staticDirty = true;
        camera.triggerRepaint();
      },
      onColormapChange: () => {
        renderer.setColormap(colorLegend.getLUT());
        state.staticDirty = true;
        camera.triggerRepaint();
      },
      // Double-click the legend to re-fit the scale to the current data range.
      onReset: () => {
        colorScale.auto = true;
        state.staticDirty = true;
        camera.triggerRepaint();
      },
    });
    colorLegend.element.style.right = '10px';
    colorLegend.element.style.bottom = '10px';
    container.appendChild(colorLegend.element);
    // Seed the renderer's colormap LUT from the legend's initial colormap.
    renderer.setColormap(colorLegend.getLUT());
    invalidation.then(() => colorLegend.destroy());

    // Switching "Color by" re-fits the scale (auto on) and picks a fitting
    // colormap: diverging cool–warm for the signed Gaussian curvature, turbo for
    // the non-negative stress/amplitude fields.
    function onColorByChange() {
      const cb = colorByInput.value as string;
      colorScale.auto = true;
      // Derive from the fresh input value: this listener runs before syncParams
      // (which bubbles to the controls container) updates state.renderParams.
      colorLegend.setColormap(cb === 'Gaussian curvature' ? 'coolwarm' : 'turbo');
      colorLegend.setLabel(cb);
      renderer.setColormap(colorLegend.getLUT());
      state.staticDirty = true;
      camera.triggerRepaint();
    }
    colorByInput.addEventListener('input', onColorByChange);

    camera.on('render', () => {
      if (!mainVisible) return;
      renderer.render(gpuContext, state.renderParams, camera, canvas.width, canvas.height, true);
    });
    camera.on('capture', createWebGPUCaptureHandler({
      canvas,
      render: () => renderer.render(gpuContext, state.renderParams, camera, canvas.width, canvas.height, true),
    }));
    canvas.addEventListener('mousedown', () => {
      if (document.activeElement instanceof HTMLElement) document.activeElement.blur();
    });

    const mainIO = new IntersectionObserver((entries) => {
      mainVisible = entries.some((e) => e.isIntersecting);
      if (mainVisible) camera.triggerRepaint();
    }, { rootMargin: '200px', threshold: 0 });
    // Defer to after display() so the canvas is in the document when first read.
    requestAnimationFrame(() => mainIO.observe(canvas));
    invalidation.then(() => mainIO.disconnect());

    state.anim.last = performance.now();
    const loop = createFrameLoop((t) => {
      const dt = Math.min(0.05, (t - state.anim.last) / 1000);
      state.anim.last = t;
      if (!mainVisible) return; // don't render while scrolled out of view
      const animating = showingMode() && state.renderParams.amplitude > 0;
      const changed = computeDisplayed();
      // Re-frame this viewer by easing toward the mesh centroid, only once armed
      // and only until it settles. It is a one-shot, not a perpetual ease, so it
      // never fights the user panning/zooming into part of the model afterward.
      // The hero runs the same rule from its own loop.
      let easedMain = false;
      if (state.camera.easeMain && !state.camera.dragging) {
        easedMain = easeCameraToCentroid(camera, dispX, state.sim.model?.Nv ?? 0); // renders via taint
        // Stop once it has settled and the spring-back is no longer streaming.
        if (!easedMain && !state.previewing) state.camera.easeMain = false;
      }
      if (!easedMain) renderer.render(gpuContext, state.renderParams, camera, canvas.width, canvas.height, changed);
      if (animating) state.anim.phase += dt * state.renderParams.speed * 2.2;
    });
    invalidation.then(() => loop.cancel());

    // --- Interactive vertex dragging. ---------------------------------------
    //
    // Hover highlights the nearest mesh vertex (an SVG ring overlay) so the
    // interaction is discoverable. Press-drag grabs that vertex and moves it in
    // the camera plane while a stiff pin spring + L-BFGS relax the rest of the
    // strip live on the main thread. Releasing hands the dragged shape to the
    // worker solve, which springs the strip back to its true (unloaded)
    // equilibrium. Picking is done against the thickness-centered mid-surface
    // (model.tris over the FEM vertex positions), not the extruded render
    // geometry, so a hit maps directly to a solver DOF.
    //
    // The geometry (model + equilibrium X) lives in the shared state.sim, so the
    // same factory drives both the main viewer and the intro hero figure; only
    // the canvas/camera/container and the live-display hook differ.
    {
      const PICK_PX = 14;        // max screen distance (px) to accept a vertex hover
      const SVGNS = 'http://www.w3.org/2000/svg';

      // Positions currently on screen: the live iterate while a solve streams,
      // otherwise the committed equilibrium. Picking and grabbing use these so a
      // grab matches what is drawn and can interrupt an in-progress solve.
      function displayedX(): any {
        const m = state.sim.model;
        if (!m) return null;
        const lx = state.sim.liveX;
        if (state.previewing && lx && lx.length === m.Nv * 3) return lx;
        return (state.sim.X && state.sim.X.length === m.Nv * 3) ? state.sim.X : null;
      }

      // BVH/picking buffers over the displayed shape (camera independent),
      // rebuilt when those positions change.
      let pickCache: any = null;
      function getPicker() {
        const model = state.sim.model;
        const X = displayedX();
        if (!model || !X) return null;
        if (pickCache && pickCache.X === X) return pickCache;
        const Nv = model.Nv;
        const vd = new Float32Array(Nv * 8); // pos(3)+normal(3)+uv(2); only pos used
        for (let v = 0; v < Nv; v++) { vd[v*8] = X[v*3]; vd[v*8+1] = X[v*3+1]; vd[v*8+2] = X[v*3+2]; }
        const idx = Uint32Array.from(model.tris);
        pickCache = { X, model, vd, idx, bvh: buildMeshBVH(vd, idx) };
        return pickCache;
      }

      // Nearest mesh vertex under the cursor for a given camera/canvas, or -1.
      function pickVertex(cam: any, cnv: HTMLCanvasElement, clientX: number, clientY: number): number {
        const p = getPicker();
        if (!p) return -1;
        const m = cam.update(cnv.width / cnv.height);
        const { origin, direction } = screenToRay(clientX, clientY, cnv, m.view, m.projection);
        const hit = raycastMesh(p.bvh, p.vd, p.idx, origin[0], origin[1], origin[2], direction[0], direction[1], direction[2], { doubleSided: true });
        if (!hit) return -1;
        const t = hit.triIndex * 3;
        let best = -1, bestd = Infinity;
        for (let c = 0; c < 3; c++) {
          const v = p.idx[t + c];
          const dx = p.vd[v*8] - hit.pos[0], dy = p.vd[v*8+1] - hit.pos[1], dz = p.vd[v*8+2] - hit.pos[2];
          const d = dx*dx + dy*dy + dz*dz;
          if (d < bestd) { bestd = d; best = v; }
        }
        return best;
      }

      // Project a world point to CSS pixels within a figure, or null if behind.
      function projectToScreen(cam: any, cnv: HTMLCanvasElement, x: number, y: number, z: number): [number, number] | null {
        const m = cam.update(cnv.width / cnv.height).projView;
        const cx = m[0]*x + m[4]*y + m[8]*z + m[12];
        const cy = m[1]*x + m[5]*y + m[9]*z + m[13];
        const cw = m[3]*x + m[7]*y + m[11]*z + m[15];
        if (cw <= 0) return null;
        const rect = cnv.getBoundingClientRect();
        return [(cx/cw*0.5 + 0.5) * rect.width, (0.5 - cy/cw*0.5) * rect.height];
      }

      // Attach hover + drag to one figure. Picking/highlight run on the main
      // thread; the actual relaxation runs in the worker (so the main thread
      // stays free and the interaction is smooth, and the solve keeps converging
      // with persistent L-BFGS history). enabled() gates interaction.
      function attachDragging(cam: any, cnv: HTMLCanvasElement, host: HTMLElement, enabled: () => boolean) {
        const overlay = document.createElementNS(SVGNS, 'svg');
        overlay.setAttribute('style', 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible');
        const ring = document.createElementNS(SVGNS, 'circle');
        ring.setAttribute('r', '6');
        ring.setAttribute('fill', 'rgba(255,255,255,0.15)');
        ring.setAttribute('stroke', '#ffffff');
        ring.setAttribute('stroke-width', '2');
        ring.setAttribute('visibility', 'hidden');
        overlay.appendChild(ring);
        host.appendChild(overlay);

        const showRingAt = (x: number, y: number, z: number) => {
          const s = projectToScreen(cam, cnv, x, y, z);
          if (!s) { ring.setAttribute('visibility', 'hidden'); return; }
          ring.setAttribute('cx', String(s[0]));
          ring.setAttribute('cy', String(s[1]));
          ring.setAttribute('visibility', 'visible');
        };
        const hideRing = () => ring.setAttribute('visibility', 'hidden');

        // Map the cursor's screen delta into the camera plane at the grabbed
        // vertex's depth and send it to the live solve as the pin target.
        function sendTarget() {
          const m = cam.update(cnv.width / cnv.height);
          const right = [m.view[0], m.view[4], m.view[8]];
          const up = [m.view[1], m.view[5], m.view[9]];
          const fwd = [-m.view[2], -m.view[6], -m.view[10]];
          const eye = m.eye;
          const g = activeDrag.grabPos;
          const depth = (g[0]-eye[0])*fwd[0] + (g[1]-eye[1])*fwd[1] + (g[2]-eye[2])*fwd[2];
          const fov = cam.getState().fov;
          const rect = cnv.getBoundingClientRect();
          const perPx = (2 * Math.abs(depth) * Math.tan(fov/2)) / rect.height;
          const ddx = (activeDrag.curX - activeDrag.startX) * perPx;
          const ddy = (activeDrag.curY - activeDrag.startY) * perPx;
          const t = [g[0] + right[0]*ddx - up[0]*ddy, g[1] + right[1]*ddx - up[1]*ddy, g[2] + right[2]*ddx - up[2]*ddy];
          worker.postMessage({ type: 'movePin', target: t });
        }

        // Shared grab/move/release used by both mouse and touch. Grabbing just
        // pins a vertex on the already-running continuous solve; it does not start
        // a separate solve, so the iteration mechanism (and the status readout) is
        // the same whether or not a vertex is being dragged. Returns true if a
        // vertex was actually grabbed at (clientX, clientY).
        function beginDrag(clientX: number, clientY: number): boolean {
          const v = pickVertex(cam, cnv, clientX, clientY);
          if (v < 0) return false; // missed: caller lets the camera handle it
          state.previewing = true;                 // the live solve owns the display
          setEquilibrium(false);                   // deforming: leave equilibrium (modes lock out)
          const X = displayedX();                  // grab from the shape currently on screen
          const grabPos = [X[v*3], X[v*3+1], X[v*3+2]];
          activeDrag = {
            v, grabPos,
            startX: clientX, startY: clientY, curX: clientX, curY: clientY,
            showRing: showRingAt,
          };
          state.camera.dragging = true; // both viewers hold off re-framing mid-drag
          cnv.style.cursor = 'grabbing';
          showRingAt(grabPos[0], grabPos[1], grabPos[2]); // touch has no hover, so show it now
          worker.postMessage({ type: 'setPin', v, target: grabPos });
          return true;
        }

        function moveDrag(clientX: number, clientY: number) {
          if (!activeDrag) return;
          activeDrag.curX = clientX; activeDrag.curY = clientY;
          sendTarget();
        }

        function endDrag() {
          if (!activeDrag) return;
          // Release the pin; the same continuous solve relaxes back to the true
          // equilibrium and reports it (no separate spring-back pass).
          worker.postMessage({ type: 'clearPin' });
          activeDrag = null;
          state.camera.dragging = false;
          pickCache = null; // shape changes as it springs back
          cnv.style.cursor = 'grab';
          hideRing();
          reframeViewers(); // re-frame once toward the (now off-center) mesh
        }

        // Suppress browser touch gestures (scroll/zoom) over the figure so a
        // vertex drag — and the camera's own touch controls — get the events.
        cnv.style.touchAction = 'none';

        // mousedown / touchstart (capture phase on the host) run before the
        // camera's own handlers on the canvas, so a vertex grab can suppress
        // camera rotation. A miss (or multi-touch) falls through to the camera.
        host.addEventListener('mousedown', (e: MouseEvent) => {
          if (e.button !== 0 || activeDrag || !enabled()) return;
          // Let clicks on overlay controls (e.g. buttons, the color legend) through.
          if ((e.target as HTMLElement).closest('button, .color-legend')) return;
          if (!beginDrag(e.clientX, e.clientY)) return;
          e.preventDefault();
          e.stopImmediatePropagation();
          window.addEventListener('mousemove', onDragMove);
          window.addEventListener('mouseup', onDragUp);
        }, true);

        function onDragMove(e: MouseEvent) {
          if (!activeDrag) return;
          moveDrag(e.clientX, e.clientY);
          e.preventDefault();
        }

        function onDragUp() {
          window.removeEventListener('mousemove', onDragMove);
          window.removeEventListener('mouseup', onDragUp);
          endDrag();
        }

        host.addEventListener('touchstart', (e: TouchEvent) => {
          // Extra fingers added mid-drag would otherwise reach the camera and
          // start a pinch on top of the vertex drag — swallow them.
          if (activeDrag) { e.preventDefault(); e.stopImmediatePropagation(); return; }
          if (!enabled()) return;
          if (e.touches.length !== 1) return; // multi-touch → let the camera pinch/zoom
          if ((e.target as HTMLElement).closest('button, .color-legend')) return;
          const t = e.touches[0];
          if (!beginDrag(t.clientX, t.clientY)) return; // miss → camera rotates
          e.preventDefault();
          e.stopImmediatePropagation();
          window.addEventListener('touchmove', onTouchDragMove, { passive: false });
          window.addEventListener('touchend', onTouchDragEnd);
          window.addEventListener('touchcancel', onTouchDragEnd);
        }, { capture: true, passive: false });

        function onTouchDragMove(e: TouchEvent) {
          if (!activeDrag) return;
          const t = e.touches[0];
          if (!t) return;
          moveDrag(t.clientX, t.clientY);
          e.preventDefault(); // hold the gesture (no page scroll) while dragging
        }

        function onTouchDragEnd(e: TouchEvent) {
          if (e.touches && e.touches.length > 0) return; // wait until the last finger lifts
          window.removeEventListener('touchmove', onTouchDragMove);
          window.removeEventListener('touchend', onTouchDragEnd);
          window.removeEventListener('touchcancel', onTouchDragEnd);
          endDrag();
        }

        // Hover: highlight the nearest vertex (only when nothing is being dragged).
        cnv.addEventListener('mousemove', (e: MouseEvent) => {
          if (activeDrag || !enabled()) return;
          const v = pickVertex(cam, cnv, e.clientX, e.clientY);
          if (v < 0) { hideRing(); cnv.style.cursor = ''; return; }
          const p = getPicker();
          const s = projectToScreen(cam, cnv, p.vd[v*8], p.vd[v*8+1], p.vd[v*8+2]);
          const rect = cnv.getBoundingClientRect();
          if (s && Math.hypot(s[0] - (e.clientX - rect.left), s[1] - (e.clientY - rect.top)) <= PICK_PX) {
            showRingAt(p.vd[v*8], p.vd[v*8+1], p.vd[v*8+2]);
            cnv.style.cursor = 'grab';
          } else { hideRing(); cnv.style.cursor = ''; }
        });
        cnv.addEventListener('mouseleave', () => { if (!activeDrag) { hideRing(); cnv.style.cursor = ''; } });

        invalidation.then(() => {
          window.removeEventListener('mousemove', onDragMove);
          window.removeEventListener('mouseup', onDragUp);
          window.removeEventListener('touchmove', onTouchDragMove);
          window.removeEventListener('touchend', onTouchDragEnd);
          window.removeEventListener('touchcancel', onTouchDragEnd);
          overlay.remove();
        });
      }

      // Main viewer: drag in the Equilibrium view.
      attachDragging(
        camera, canvas, container,
        () => state.renderParams.view === 'Equilibrium' && !!displayedX(),
      );

      // Intro hero figure: same shared geometry, its own camera/renderer. Gated
      // on matching topology (it only mirrors state.sim when nu/nv agree).
      attachDragging(
        introCamera, introCanvas, introContainer,
        () => !!state.sim.model && state.sim.model.nu === introModel.nu
          && state.sim.model.nv === introModel.nv && !!displayedX(),
      );

      // (The hero figure carries the mirrored pipeline buttons, created and wired
      // with the controls-panel row above, so it needs no separate Reset button.)
    }

    let expandableContainer: HTMLElement;
    expandableContainer = expandable(container, {
      id: 'mobius-viewer',
      wide: true,
      width: 720,
      height: 540,
      controls: controlsContainer,
      state: state.expandedState,
      buttons: [
        {
          icon: camera.getMode() === 'orbit' ? ICON_ORBIT : ICON_ARCBALL,
          title: 'Toggle camera mode (orbit/arcball)',
          onClick: (_content, _expanded, button) => {
            const m = camera.getMode() === 'orbit' ? 'arcball' : 'orbit';
            camera.setMode(m);
            camera.triggerRepaint();
            if (button) button.innerHTML = m === 'orbit' ? ICON_ORBIT : ICON_ARCBALL;
          },
        },
        createCameraSnapshotButton(camera, { filename: 'mobius-strip.png' }),
      ],
      onResize(_el, w, h) {
        canvas.width = Math.floor(w * devicePixelRatio);
        canvas.height = Math.floor(h * devicePixelRatio);
        canvas.style.width = `${w}px`;
        canvas.style.height = `${h}px`;
        camera.triggerRepaint();
      },
    });

    display(expandableContainer);
    display(controlsContainer); // includes the status line, so it follows into the expanded panel

    // Load the elastic-rod shape on startup, but do NOT relax: the heavy solve
    // is a user action (press Relax). This keeps page load cheap and leaves the
    // pipeline at its first stage (Elastic rod blue, Relax grey).
    initFromRod();
    camera.triggerRepaint();
  </script>

  <script id="numerics-note" type="text/markdown">
    The simulation is validated in a number of different ways. The elastic rod solution
    is validated against the paper. Multiple algorithms are compared for the equilibrium and
    bending mode steps of the computation. The linear algebra routines are compared to the
    original Fortran throughout the translation process and error residuals checked for
    converence. The elastic energy is validated for a flat strip and for an untwisted ring as
    well as across mesh resolutions and triangle aspect ratios.

    A few problems were found. A number of linear algebra routines had errors, for example
    containing a 0- vs 1-indexed integer error in a branch which covered larger matrices.
    The first attempt at finite element problem setup only worked for equilateral triangular
    elements and had to be upgraded.

    The button below runs a series of checks using the same functions as the above simulation.
  </script>

  <script id="validation-checks" type="text/x-typescript">
    // Live validation table for the "Is it right?" section. Each row is one
    // invariant of the elastic model with an analytic expectation; the checks
    // run on small meshes in the main thread (well under a second total) and
    // exercise exactly the energyAndGradient code the simulation uses.
    const valBtnStyle = `
      display:inline-flex;align-items:center;gap:6px;
      padding:8px 15px;font:13px/1 var(--sans-serif,system-ui,sans-serif);
      color:var(--theme-foreground,#222);background:var(--theme-background-alt,rgba(127,127,127,0.14));
      border:1px solid var(--theme-foreground-faint,rgba(0,0,0,0.18));
      border-radius:7px;cursor:pointer`;
    const valCellStyle = `padding:5px 10px;border-bottom:1px solid var(--theme-foreground-faint,rgba(127,127,127,0.25));font:13px/1.45 var(--sans-serif,system-ui,sans-serif)`;
    const valNumStyle = `${valCellStyle};font-family:var(--monospace,monospace);font-size:12px;white-space:nowrap`;

    const validationButton = html`<button style="${valBtnStyle}">Run validation checks</button>` as HTMLButtonElement;
    const validationTableWrap = html`<div style="overflow-x:auto;margin-top:10px"></div>`;
    const validationRoot = html`<div style="margin:0.75rem 0"></div>`;
    validationRoot.append(validationButton, validationTableWrap);

    function runValidationChecks() {
      const params = { E: 1, poisson: 0.35, thickness: 0.03 };
      const h = params.thickness;
      const D = (params.E * h * h * h) / (12 * (1 - params.poisson * params.poisson));
      const L = 2 * Math.PI, W = 1;
      const maxAbs = (a: Float64Array) => { let m = 0; for (const v of a) m = Math.max(m, Math.abs(v)); return m; };

      // Flat unglued rectangle at its flat embedding: the rest state.
      function flatRest() {
        const m = createFlatStrip({ length: L, width: W, nu: 48, nv: 8 });
        const g = new Float64Array(m.Nv * 3);
        const r = energyAndGradient(m, m.flatEmbedding(), params, g);
        return { E: Math.abs(r.energy), g: maxAbs(g) };
      }

      // Rest metric of the Mobius mesh: total area, and each interior edge's
      // rest length recomputed from BOTH incident triangles' unwrapped charts
      // (the seam triangles use different charts of the same flat strip).
      function restMetric() {
        const m = createMobiusMesh({ length: L, width: W, nu: 64, nv: 10 });
        let area = 0;
        for (const a of m.triRestArea) area += a;
        const lens = new Map<number, number[]>();
        const key = (p: number, q: number) => (p < q ? p * m.Nv + q : q * m.Nv + p);
        for (let k = 0; k < m.nT; k++) {
          const m0 = m.triDmInv[k * 4], m1 = m.triDmInv[k * 4 + 1];
          const m2 = m.triDmInv[k * 4 + 2], m3 = m.triDmInv[k * 4 + 3];
          const det = m0 * m3 - m1 * m2;
          const e1x = m3 / det, e1y = -m2 / det;   // rest edge r1 - r0
          const e2x = -m1 / det, e2y = m0 / det;   // rest edge r2 - r0
          const i0 = m.tris[k * 3], i1 = m.tris[k * 3 + 1], i2 = m.tris[k * 3 + 2];
          const push = (p: number, q: number, len: number) => {
            const kk = key(p, q);
            if (!lens.has(kk)) lens.set(kk, []);
            lens.get(kk)!.push(len);
          };
          push(i0, i1, Math.hypot(e1x, e1y));
          push(i0, i2, Math.hypot(e2x, e2y));
          push(i1, i2, Math.hypot(e2x - e1x, e2y - e1y));
        }
        let mismatch = 0;
        for (const ll of lens.values())
          if (ll.length === 2) mismatch = Math.max(mismatch, Math.abs(ll[0] - ll[1]) / Math.max(ll[0], ll[1]));
        return { areaErr: Math.abs(area - L * W) / (L * W), mismatch };
      }

      // Energy of a bent configuration must not change under rigid motion.
      function rigidInvariance() {
        const m = createMobiusMesh({ length: L, width: W, nu: 64, nv: 10 });
        const X = initialEmbedding(m);
        const E0 = energyAndGradient(m, X, params, null).energy;
        const c = Math.cos(0.7), s = Math.sin(0.7), t = 1 - c;
        const [ax, ay, az] = [1 / Math.sqrt(14), 2 / Math.sqrt(14), 3 / Math.sqrt(14)];
        const Y = new Float64Array(X.length);
        for (let v = 0; v < m.Nv; v++) {
          const x = X[v * 3], y = X[v * 3 + 1], z = X[v * 3 + 2];
          Y[v * 3]     = (t*ax*ax + c)    * x + (t*ax*ay - s*az) * y + (t*ax*az + s*ay) * z + 0.3;
          Y[v * 3 + 1] = (t*ax*ay + s*az) * x + (t*ay*ay + c)    * y + (t*ay*az - s*ax) * z - 0.2;
          Y[v * 3 + 2] = (t*ax*az - s*ay) * x + (t*ay*az + s*ax) * y + (t*az*az + c)    * z + 0.5;
        }
        const E1 = energyAndGradient(m, Y, params, null).energy;
        return Math.abs(E1 - E0) / E0;
      }

      // Analytic gradient vs central finite differences of the energy, at a
      // randomly perturbed (deterministic seed) configuration.
      function gradientVsFD() {
        const m = createMobiusMesh({ length: L, width: W, nu: 24, nv: 6 });
        const X = initialEmbedding(m);
        let seed = 42;
        const rnd = () => ((seed = (seed * 1103515245 + 12345) & 0x7fffffff) / 0x7fffffff - 0.5);
        for (let i = 0; i < X.length; i++) X[i] += 0.05 * rnd();
        const g = new Float64Array(X.length);
        energyAndGradient(m, X, params, g);
        const eps = 1e-6;
        let worst = 0;
        for (let sIdx = 0; sIdx < 45; sIdx++) {
          const i = (sIdx * 37) % X.length;
          const save = X[i];
          X[i] = save + eps; const fp = energyAndGradient(m, X, params, null).energy;
          X[i] = save - eps; const fm = energyAndGradient(m, X, params, null).energy;
          X[i] = save;
          const fd = (fp - fm) / (2 * eps);
          worst = Math.max(worst, Math.abs(fd - g[i]) / Math.max(1e-8, Math.abs(fd)));
        }
        return worst;
      }

      // Rolling the flat strip onto a cylinder of radius R is an isometry, so
      // the bending energy must reproduce the plate value (D/2) * area / R^2
      // regardless of the mesh cell aspect (the quadrature area is the interior
      // vertices' share, since free-boundary vertices carry no bending energy).
      function cylinderRatio(aspect: number) {
        const R = 1.5, nu = 64, nv = 10;
        const dv = W / nv, du = dv * aspect, len = nu * du;
        const m = createFlatStrip({ length: len, width: W, nu, nv });
        const flat = m.flatEmbedding();
        const X = new Float64Array(m.Nv * 3);
        for (let v = 0; v < m.Nv; v++) {
          const u = flat[v * 3];
          X[v * 3] = R * Math.sin(u / R);
          X[v * 3 + 1] = flat[v * 3 + 1];
          X[v * 3 + 2] = R * (1 - Math.cos(u / R));
        }
        const r = energyAndGradient(m, X, params, null);
        let aInt = 0;
        for (let v = 0; v < m.Nv; v++) if (m.bendInterior[v]) aInt += m.bendAreaBar[v];
        return r.bending / (0.5 * D * aInt / (R * R));
      }

      type Row = { name: string, expected: string, run: () => { value: string, ok: boolean } };
      const fmt = (x: number) => x === 0 ? '0' : x.toExponential(1);
      const checks: Row[] = [
        { name: 'Flat rectangle: energy', expected: '0 (it is the rest state)',
          run: () => { const r = flatRest(); return { value: fmt(r.E), ok: r.E < 1e-24 }; } },
        { name: 'Flat rectangle: gradient', expected: '0 (no residual force)',
          run: () => { const r = flatRest(); return { value: fmt(r.g), ok: r.g < 1e-14 }; } },
        { name: 'Total rest area vs L·w (relative)', expected: '0 (round-off)',
          run: () => { const r = restMetric(); return { value: fmt(r.areaErr), ok: r.areaErr < 1e-12 }; } },
        { name: 'Seam rest lengths, both charts (relative)', expected: '0 (round-off)',
          run: () => { const r = restMetric(); return { value: fmt(r.mismatch), ok: r.mismatch < 1e-12 }; } },
        { name: 'Energy change under rigid motion (relative)', expected: '0 (round-off)',
          run: () => { const r = rigidInvariance(); return { value: fmt(r), ok: r < 1e-10 }; } },
        { name: 'Analytic gradient vs finite differences (relative)', expected: '0 (to FD accuracy, ~1e-6)',
          run: () => { const r = gradientVsFD(); return { value: fmt(r), ok: r < 1e-5 }; } },
        { name: 'Rolled cylinder / plate energy, square cells (du/dv = 1)', expected: '1 within 2%',
          run: () => { const r = cylinderRatio(1); return { value: r.toFixed(4), ok: Math.abs(r - 1) < 0.02 }; } },
        { name: 'Rolled cylinder / plate energy, stretched cells (du/dv = 2)', expected: '1 within 2%',
          run: () => { const r = cylinderRatio(2); return { value: r.toFixed(4), ok: Math.abs(r - 1) < 0.02 }; } },
      ];

      const table = html`<table style="border-collapse:collapse;min-width:480px">
        <thead><tr>
          <th style="${valCellStyle};text-align:left">Check</th>
          <th style="${valCellStyle};text-align:right">Computed</th>
          <th style="${valCellStyle};text-align:left">Expected</th>
          <th style="${valCellStyle};text-align:left"></th>
        </tr></thead>
      </table>`;
      const tbody = html`<tbody></tbody>`;
      table.appendChild(tbody);
      validationTableWrap.replaceChildren(table);

      let allOk = true;
      for (const check of checks) {
        let value = 'error', ok = false;
        try {
          ({ value, ok } = check.run());
        } catch (err) {
          value = String(err);
        }
        allOk = allOk && ok;
        tbody.appendChild(html`<tr>
          <td style="${valCellStyle}">${check.name}</td>
          <td style="${valNumStyle};text-align:right">${value}</td>
          <td style="${valCellStyle};color:var(--theme-foreground-muted,#777)">${check.expected}</td>
          <td style="${valCellStyle};font-weight:600;color:${ok ? '#2ea043' : '#e5534b'}">${ok ? 'PASS' : 'FAIL'}</td>
        </tr>`);
      }
      tbody.appendChild(html`<tr><td colspan="4" style="${valCellStyle};font-weight:600;color:${allOk ? '#2ea043' : '#e5534b'}">
        ${allOk ? 'All checks passed.' : 'Some checks FAILED.'}</td></tr>`);
    }

    validationButton.addEventListener('click', runValidationChecks);
    display(validationRoot);
  </script>


  <script type="text/markdown" id="modules-explanation">>
    Including modules and their dependents for all variants of the algorithms implemented above, this page uses ${depsCount} translated routines, though only about ten are called directly. They've been validated and optimized. Additionally, about [899 of 1111](https://rreusser.github.io/blahpack/progress.html) BLAS/LAPACK algorithms have been translated in the blahpack repository.

    The figure below shows all modules and the dependency chains. Click a node to navigate to the source code.
  </script>

  <script id="deps-data" type="text/x-typescript">
    // Every BLAS / LAPACK / ARPACK / COLSYS routine this page actually runs, and
    // which calls which. Node set and edges are derived from the Fortran sources
    // (CALL statements + EXTERNAL declarations) and cross-checked against the
    // routines physically present in the shipped bundles: every routine on disk
    // appears here, and nothing here is absent from disk.
    import depsGraph from './deps-graph.json';
    const depsCount = depsGraph.nodes.length;
  </script>

  <script id="deps-graph" type="text/x-typescript">
    // The call graph is a pure DAG (the one exception is dpotrf2, LAPACK's
    // recursive Cholesky, which calls itself), so it is drawn as a layered stack
    // rather than a force-directed hairball: a routine always sits below every
    // routine that calls it. Row 0 is what the notebook calls directly; the BLAS
    // kernels settle to the bottom, which is exactly what "BLAS is the bottom of
    // the stack" means. No force simulation, so the layout is deterministic.
    {
      const dark = matchMedia('(prefers-color-scheme: dark)').matches
        || document.documentElement.dataset.theme === 'dark';
      // Categorical slots 1/3/4/6 of the validated palette: blue, yellow, green,
      // red. ARPACK was violet, but against BLAS blue that is a colourblind ΔE of
      // 2.5 in dark mode — the same colour, in effect. Green scores 104.2 against
      // the same blue. The weakest remaining pair is green vs yellow (ΔE 10.3 in
      // dark), which is inside the floor band and so is legal only because every
      // node carries a direct label and the roster below is a table view.
      const PKG: any = {
        blas:   { label: 'BLAS',   color: dark ? '#3987e5' : '#2a78d6' },
        lapack: { label: 'LAPACK', color: dark ? '#c98500' : '#eda100' },
        arpack: { label: 'ARPACK', color: '#008300' },
        colsys: { label: 'COLSYS', color: dark ? '#e66767' : '#e34948' },
      };

      // Labels alternate above/below within a row, so same-side neighbours get two
      // slots of clearance. In the widest row (27 nodes across the main band) that
      // is ~57 units per label, which is what lets the type be this large.
      const W = 1000, H = 780, PAD_X = 16, TOP = 46, BOT = 42;
      const nodes = depsGraph.nodes.map((d: any) => ({ ...d }));
      const byId = new Map<string, any>(nodes.map((n: any) => [n.id, n]));
      const dag = depsGraph.edges.filter(([a, b]: any) => a !== b); // drop dpotrf2's self-call
      const selfCalls = depsGraph.edges.filter(([a, b]: any) => a === b).map(([a]: any) => a);

      const callees = new Map<string, string[]>(nodes.map((n: any) => [n.id, []]));
      const callers = new Map<string, string[]>(nodes.map((n: any) => [n.id, []]));
      for (const [a, b] of dag) { callees.get(a)!.push(b); callers.get(b)!.push(a); }

      // Longest-path layering: a routine sits one row below its deepest caller.
      const level = new Map<string, number>(nodes.map((n: any) => [n.id, 0]));
      for (let i = 0; i < nodes.length; i++) {
        let changed = false;
        for (const [a, b] of dag) {
          const want = level.get(a)! + 1;
          if (want > level.get(b)!) { level.set(b, want); changed = true; }
        }
        if (!changed) break;
      }
      const maxLevel = Math.max(...level.values());
      for (const n of nodes) n.level = level.get(n.id)!;

      // COLSYS shares no routine with the other three (it carries its own
      // almost-block-diagonal solver), so it is a separate connected component.
      // Give it its own band on the right instead of letting it interleave.
      const isColsys = (n: any) => n.pkg === 'colsys';
      const mainBand = [PAD_X, W * 0.79];
      const colBand = [W * 0.835, W - PAD_X];

      const rows: any[][] = Array.from({ length: maxLevel + 1 }, () => []);
      for (const n of nodes) rows[n.level].push(n);

      const spread = (list: any[], [x0, x1]: number[]) => {
        list.forEach((n, i) => { n.x = x0 + ((i + 0.5) * (x1 - x0)) / list.length; });
      };
      const layoutRow = (row: any[]) => {
        spread(row.filter((n) => !isColsys(n)), mainBand);
        spread(row.filter(isColsys), colBand);
      };
      for (const row of rows) {
        row.sort((a, b) => (isColsys(a) ? 1 : 0) - (isColsys(b) ? 1 : 0) || a.id.localeCompare(b.id));
        layoutRow(row);
      }

      // Barycenter sweeps: order each row by the mean x of its neighbours in the
      // adjacent row, which is the standard way to pull the edge crossings out.
      const meanX = (ids: string[]) =>
        ids.length ? ids.reduce((s, id) => s + byId.get(id)!.x, 0) / ids.length : null;
      for (let pass = 0; pass < 12; pass++) {
        const down = pass % 2 === 0;
        const order = down ? [...rows.keys()] : [...rows.keys()].reverse();
        for (const L of order) {
          const row = rows[L];
          if (!row.length) continue;
          const key = (n: any) => meanX(down ? callers.get(n.id)! : callees.get(n.id)!) ?? n.x;
          const k = new Map(row.map((n) => [n.id, key(n)]));
          row.sort((a, b) =>
            (isColsys(a) ? 1 : 0) - (isColsys(b) ? 1 : 0) || k.get(a.id)! - k.get(b.id)!);
          layoutRow(row);
        }
      }

      const rowH = (H - TOP - BOT) / Math.max(1, maxLevel);
      for (const n of nodes) n.y = TOP + n.level * rowH;
      // Stagger labels above/below alternately so neighbours get twice the room.
      for (const row of rows) row.forEach((n, i) => { n.up = i % 2 === 0; });

      const radius = (d: any) => (d.entry ? 7 : 4) + Math.sqrt(d.fanIn) * 1.5;
      const edges = dag.map(([a, b]: any) => ({ s: byId.get(a)!, t: byId.get(b)! }));

      const svg = d3.create('svg')
        .attr('viewBox', `0 0 ${W} ${H}`)
        .style('width', '100%')
        .style('height', 'auto')
        .style('display', 'block')
        .style('font-family', 'var(--sans-serif, system-ui, sans-serif)');

      const linkSel = svg.append('g')
        .attr('fill', 'none')
        .attr('stroke', 'currentColor')
        .selectAll('path')
        .data(edges)
        .join('path')
        .attr('d', (e: any) => {
          const y1 = e.s.y + radius(e.s), y2 = e.t.y - radius(e.t), my = (y1 + y2) / 2;
          return `M${e.s.x},${y1} C${e.s.x},${my} ${e.t.x},${my} ${e.t.x},${y2}`;
        })
        .attr('stroke-width', 0.7)
        .attr('stroke-opacity', 0.14);

      // dpotrf2 calls itself: draw the recursion rather than quietly dropping it.
      const loopSel = svg.append('g')
        .attr('fill', 'none')
        .attr('stroke', 'currentColor')
        .selectAll('path')
        .data(selfCalls.map((id: string) => byId.get(id)!))
        .join('path')
        .attr('d', (d: any) => {
          const r = radius(d) + 4;
          return `M${d.x - r * 0.7},${d.y - r * 0.7} A${r},${r} 0 1 1 ${d.x + r * 0.7},${d.y - r * 0.7}`;
        })
        .attr('stroke-width', 1)
        .attr('stroke-opacity', 0.55);

      const nodeSel = svg.append('g')
        .selectAll('a')
        .data(nodes)
        .join('a')
        .attr('href', (d: any) => d.url)
        .attr('target', '_blank')
        .attr('rel', 'noopener')
        .attr('transform', (d: any) => `translate(${d.x},${d.y})`)
        .style('cursor', 'pointer');

      // Invisible hit target, larger than the mark itself.
      nodeSel.append('circle').attr('r', 11).attr('fill', 'transparent');

      nodeSel.append('circle')
        .attr('r', radius)
        .attr('fill', (d: any) => PKG[d.pkg].color)
        .attr('stroke', 'var(--theme-background, #fff)')
        .attr('stroke-width', 1); // surface ring, so overlapping marks stay separable

      // The ten routines the notebook calls itself wear a detached ring. The old
      // cue was a 2px vs 1px stroke, which is invisible at this size and made the
      // legend's ring swatch point at nothing.
      nodeSel.filter((d: any) => !!d.entry)
        .append('circle')
        .attr('r', (d: any) => radius(d) + 4)
        .attr('fill', 'none')
        .attr('stroke', 'var(--theme-foreground, #111)')
        .attr('stroke-width', 1.5);

      nodeSel.append('text')
        .text((d: any) => d.id)
        .attr('text-anchor', 'middle')
        .attr('y', (d: any) => (d.up ? -radius(d) - (d.entry ? 10 : 7) : radius(d) + (d.entry ? 19 : 16)))
        .attr('font-size', (d: any) => (d.entry ? 17 : 14))
        .attr('font-weight', 600)
        // Text wears text tokens, never the series colour.
        .attr('fill', 'var(--theme-foreground, #111)')
        .attr('paint-order', 'stroke')
        .attr('stroke', 'var(--theme-background, #fff)')
        .attr('stroke-width', 2.5)
        .attr('stroke-linejoin', 'round');

      // --- Hover. The status block is a FIXED height with single-line, clipped
      // rows. If it grew with its content it would reflow the page, shifting the
      // SVG out from under the cursor, firing mouseleave, and flickering forever.
      const line = 'white-space:nowrap;overflow:hidden;text-overflow:ellipsis';
      const status = html`<div style="height:4.65em;margin:0 0 0.4rem;font:13px/1.55 var(--sans-serif,system-ui,sans-serif);color:var(--theme-foreground-muted,#777);pointer-events:none"></div>`;
      const l1 = html`<div style="${line}"></div>`;
      // The routine's own description, harvested from each module's package.json in
      // blahpack (and from the netlib-ode doc comments for COLSYS), so this line is
      // the library's own words rather than anything restated here.
      const l2 = html`<div style="${line};color:var(--theme-foreground,#111)"></div>`;
      const l3 = html`<div style="${line}"></div>`;
      status.append(l1, l2, l3);

      const fmt = (ids: string[]) => ids.slice().sort().map((s) => `<code>${s}</code>`).join(', ');
      const BLURB: any = {
        blas: 'Basic Linear Algebra Subprograms: the vector and matrix kernels everything else stands on',
        lapack: 'Linear Algebra PACKage: factorizations, solvers and eigensolvers, built on BLAS',
        arpack: 'Implicitly restarted Lanczos, for a few eigenpairs of a large sparse or banded matrix',
        colsys: 'Collocation solver for boundary-value ODEs, carrying its own block-structured linear algebra',
      };
      function resetStatus() {
        l1.innerHTML = 'Hover a routine to isolate it. Click to open the translated source.';
        l2.innerHTML = '';
        l3.innerHTML = '';
      }
      function focus(d: any | null) {
        if (!d) {
          linkSel.attr('stroke-opacity', 0.14).attr('stroke-width', 0.7);
          loopSel.attr('stroke-opacity', 0.55);
          nodeSel.style('opacity', 1);
          resetStatus();
          return;
        }
        const outs = callees.get(d.id)!, ins = callers.get(d.id)!;
        const near = new Set([d.id, ...outs, ...ins]);
        nodeSel.style('opacity', (n: any) => (near.has(n.id) ? 1 : 0.1));
        linkSel
          .attr('stroke-opacity', (e: any) => (e.s.id === d.id || e.t.id === d.id ? 0.8 : 0.03))
          .attr('stroke-width', (e: any) => (e.s.id === d.id || e.t.id === d.id ? 1.3 : 0.7));
        loopSel.attr('stroke-opacity', (n: any) => (n.id === d.id ? 0.9 : 0.06));
        l1.innerHTML = `<strong style="color:var(--theme-foreground,#111)">${d.id}</strong>`
          + ` &middot; ${PKG[d.pkg].label}`
          + (d.entry ? ` &middot; called by the notebook: ${d.entry}` : '')
          + (selfCalls.includes(d.id) ? ' &middot; recursive' : '');
        l2.textContent = d.desc ?? '';
        // Say nothing about empty sides: an absent "calls" line already says it
        // calls nothing, and naming it a leaf adds no information.
        l3.innerHTML = [
          outs.length ? `calls ${fmt(outs)}` : '',
          ins.length ? `called by ${fmt(ins)}` : '',
        ].filter(Boolean).join(' &nbsp;|&nbsp; ');
      }
      resetStatus();
      nodeSel.on('mouseenter', (_e: any, d: any) => focus(d)).on('mouseleave', () => focus(null));

      // --- Legend. Identity is never carried by colour alone, and each swatch is
      // also a filter: hovering one isolates that library.
      function filterPkg(key: string | null) {
        if (!key) { focus(null); return; }
        nodeSel.style('opacity', (n: any) => (n.pkg === key ? 1 : 0.08));
        // Keep an edge lit only when it lies wholly inside the library, so what
        // survives is that library's own internal structure.
        linkSel
          .attr('stroke-opacity', (e: any) => (e.s.pkg === key && e.t.pkg === key ? 0.5 : 0.03))
          .attr('stroke-width', 0.7);
        loopSel.attr('stroke-opacity', (n: any) => (n.pkg === key ? 0.9 : 0.06));
        const entries = nodes.filter((n: any) => n.pkg === key && n.entry).map((n: any) => n.id);
        l1.innerHTML = `<strong style="color:var(--theme-foreground,#111)">${PKG[key].label}</strong>`
          + ` &middot; ${counts[key]} routines`;
        l2.textContent = BLURB[key];
        l3.innerHTML = entries.length ? `called by the notebook: ${fmt(entries)}` : '';
      }

      const counts: any = {};
      for (const n of nodes) counts[n.pkg] = (counts[n.pkg] ?? 0) + 1;
      const legend = html`<div style="display:flex;flex-wrap:wrap;gap:6px 18px;margin:0 0 0.5rem;font:13px/1.4 var(--sans-serif,system-ui,sans-serif);color:var(--theme-foreground-muted,#777)"></div>`;
      for (const key of ['blas', 'lapack', 'arpack', 'colsys']) {
        const item = html`<span style="display:inline-flex;align-items:center;gap:6px;cursor:default"><span style="width:10px;height:10px;border-radius:50%;background:${PKG[key].color};display:inline-block"></span>${PKG[key].label} <strong style="color:var(--theme-foreground,#222)">${counts[key]}</strong></span>`;
        item.addEventListener('mouseenter', () => filterPkg(key));
        item.addEventListener('mouseleave', () => filterPkg(null));
        legend.appendChild(item);
      }
      // Swatch drawn to match the node mark exactly: filled dot, detached ring.
      legend.appendChild(html`<span style="display:inline-flex;align-items:center;gap:6px"><svg width="16" height="16" style="display:block;overflow:visible"><circle cx="8" cy="8" r="3.4" fill="var(--theme-foreground-muted,#777)"/><circle cx="8" cy="8" r="6.4" fill="none" stroke="var(--theme-foreground,#222)" stroke-width="1.5"/></svg>called by the notebook directly</span>`);

      // width:100% is load-bearing. A bare <figure> here shrink-to-fits, so the
      // nowrap status line below would widen it whenever the hover text got long,
      // which widens the width:100% svg, which grows its height, which slides the
      // node out from under the cursor -> mouseleave -> text resets -> figure
      // shrinks -> mouseenter. That is an infinite hover flicker. Pinning the
      // width makes the figure's geometry independent of the status text.
      const fig = html`<figure style="margin:0 0 2rem;width:100%"></figure>`;
      fig.append(legend, status, svg.node()!);

      display(fig);
    }
  </script>

  <script id="coda" type="text/markdown">
    ## Conclusion

    In the end, it's exciting and unnerving. I tried for quite a while to translate and
    enable this sort of computation, failing repeatedly to maintain enough velocity
    to get very far. On one hand, AI enables so much of what I always wanted to explore
    and present, on the other hand it devalues it.

    I have a hard time understanding the availablity of BLAS and LAPACK on the web as *evil*,
    so I probably continue validating and optimizing the routines. They need to be wrapped
    up in more convenient interfaces. They need human judgement. Or more precisely, I guess,
    they need a human to unleash a wave of agents to tend to them, as if farming.

    The future is weird.
