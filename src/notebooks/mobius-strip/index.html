    // Transparent intro rendering: equilibrium shape when available, initial

    const introInitX = new Float32Array(initialEmbedding(introModel));
    const introDefaultThickness = 0.03;

    const introCanvas = document.createElement('canvas');
    introCanvas.width = 800;
    introCanvas.height = 500;
    introCanvas.style.width = '100%';
    introCanvas.style.height = '100%';

    const introCamera = createUnifiedCamera(introCanvas, {
      mode: 'arcball',
      distance: 3.0,
      orientation: [0.3305107459432888, -0.06056569963503907, -0.12765066724244317, 0.9331665178285643],
      center: [0, 0, 0],
      near: 0.05,
      far: 100,
      renderContinuously: false,
      observeResize: true,
      wheel: false,
      canvas: introCanvas,
    });

    const introGpuCtx = introCanvas.getContext('webgpu')!;
    introGpuCtx.configure({ device, format: canvasFormat, alphaMode: 'premultiplied' });

    const introRenderer = createPeelRenderer(device, canvasFormat, {
      peel: peelShaderCode,
      composite: compositeShaderCode,
    });
    introRenderer.initMesh(introModel, introInitX, introDefaultThickness);

    const introRenderParams = { opacity: 0.82, specular: 1.0, peelLayers: 3 };

    let introLastBase: any = null;     // last base shape uploaded (skip redundant updates)
    let introPhase = 0;                // hero's own mode-animation phase
    let introLast = performance.now();
    let introBuf = new Float32Array(0); // scratch for the deflected mode shape

    // Only render the hero figure while it is on screen (it shares the single
    // worker solve with the main viewer; rendering it offscreen is wasted GPU).
    let heroVisible = true;
    const heroIO = new IntersectionObserver((entries) => {
      heroVisible = entries.some((e) => e.isIntersecting);
      if (heroVisible) introCamera.triggerRepaint();
    }, { rootMargin: '200px', threshold: 0 });
    // Observe only after the canvas is in the document (it is appended further
    // down this cell, then display()'d), so the first reading reflects real
    // visibility instead of a detached element (which reads as "offscreen" and
    // would wrongly pause the figure).
    requestAnimationFrame(() => heroIO.observe(introCanvas));
    invalidation.then(() => heroIO.disconnect());

    introCamera.on('render', () => {
      if (!heroVisible) return;
      introRenderer.render(introGpuCtx, introRenderParams, introCamera, introCanvas.width, introCanvas.height, true);
    });

    // The hero mirrors the one shared solve, and renders the same shape the main
    // viewer shows: the live iterate while solving, the equilibrium when static,
    // and the animated flexural mode (it computes the deflection X + a*phi itself
    // from state.sim, so it does not depend on the main viewer being on screen).
    const introLoop = createFrameLoop((t) => {
      if (!heroVisible) return; // skip while scrolled out of view
      const dt = Math.min(0.05, (t - introLast) / 1000); introLast = t;
      const model = state.sim.model;
      const thick = state.sim.params?.thickness ?? introDefaultThickness;
      const sameTopology = model?.nu === introModel.nu && model?.nv === introModel.nv;
      let changed = false; // did the displayed buffer change this frame?
      if (sameTopology) {
        const rp = state.renderParams;
        const modes = state.sim.modes;
        const base = (state.previewing ? state.sim.liveX : state.sim.X) as any;
        const animatingMode = !state.previewing && rp.view === 'Flexural mode'
          && modes && modes.modes.length > 0 && rp.amplitude > 0;
        if (base && base.length === introModel.Nv * 3) {
          if (animatingMode) {
            const idx = Math.min(Math.max(rp.modeIndex - 1, 0), modes.modes.length - 1);
            const shape = modes.modes[idx].shape;
            if (introBuf.length !== base.length) introBuf = new Float32Array(base.length);
            const a = rp.amplitude * Math.sin(introPhase);
            for (let i = 0; i < base.length; i++) introBuf[i] = base[i] + a * shape[i];
            introRenderer.update(introBuf, null, 0, thick);
            introPhase += dt * rp.speed * 2.2;
            introLastBase = null; // animating: refresh the static upload next time
            changed = true;
          } else if (base !== introLastBase) {
            introRenderer.update(base, null, 0, thick);
            introLastBase = base;
            changed = true;
          }
        }
      }
      // Pass `changed` so the updated buffer is actually drawn: render() skips the
      // draw when neither the camera nor this flag is dirty.
      introRenderer.render(introGpuCtx, introRenderParams, introCamera, introCanvas.width, introCanvas.height, changed);
    });

    invalidation.then(() => {
      introLoop.cancel();
      introCamera.destroy();
    });

    const introContainer = html`<div style="position:relative;width:100%;aspect-ratio:7/5;max-height:520px"></div>`;

  <script id="motivation-paper" type="text/markdown">
    Everyone likes to talk about the topology of a Möbius strip, but you don't usually hear too much about the *geometry*, the shape it would actually make if you assembled it out of a strip of elastic material. That observation comes from Steven Strogatz in a 2025 episode of the Quanta Magazine podcast *The Joy of Why*, [Does Form Really Shape Function?](https://www.quantamagazine.org/does-form-really-shape-function-20250612/), in which he recalls being charmed that the first work he knew his guest [L. Mahadevan](https://www.physics.harvard.edu/people/facpages/mahadevan) for was a graduate-school analysis of the equilibrium shape of an elastic Möbius strip.

    This struck a nerve for a couple reasons. First, I studied Engineering Mechanics in school and spent a lot of time computing shapes, bending modes, and wave propagation in rods, bars, plates, and the like. [The details of what I did](thesis.pdf) feel lost to the sands of time at this point, but the mechanics of materials will always have a special place in my heart.

    Second, we all labored in school for weeks, sometimes months, over problems and MATLAB or Fortran codes we didn't really understand. Maybe I'm underappreciating the rite of passage that is wrestling with these problems and eventually triumphing, but it never seemed right to me to take a problem that feels---in principle---so viscerally tangible, and reduce it to some opaque Fortran code that spits out `NaN` for some incomprehensible reason. I wanted to interact with the problem until I *felt* it enough to trust the answer.

    Bret Victor summarizes what gets lost when these feedback loops don't exist:

    <blockquote class="quote">
      <p>If there is any delay in that feedback loop between thinking of something and seeing it and building on it, then there is this whole world of ideas which will never be.</p>
      <p class="quote__attribution">Bret Victor, <cite><a href="https://jamesclear.com/great-speeches/inventing-on-principle-by-bret-victor">Inventing on Principle</a></cite></p>
    </blockquote>

    Fifteen years later, having done little about it myself, I think there's still a lot of opportunity here.

    Not even finishing the episode, I felt immediately compelled to build something on the web which computes the equilibrium shape and bending modes of a Möbius strip, just to see if I could. The equilibrium shape is an energy minimization problem. Bending modes are an eigenvalue problem.

    Already though, I knew exactly where I always hit a brick wall when I had these urges. Want to put something on the web that requires eigenvalues? [ML.js](https://mljs.github.io/matrix/classes/EigenvalueDecomposition.html) works great. Maybe plug it into an [Observable](https://observablehq.com/) notebook. But do you need generalized eigenvalues? Eigenvalues of a banded matrix? Of a complex Hermitian matrix? Limited eigenvalues of a banded matrix? Well, good luck. If you want to do any serious analysis, these details matter. Unless you rely on a hosted, Python-based notebook environment like [Colab](https://colab.research.google.com/), you'll probably have to [compile Fortran to WebAssembly](https://gws.phd/posts/fortran_wasm/), if you can manage.

    That's no jab at the people who have put lots of work into these problems. It's genuinely challenging, stubborn work. [BLAS](https://www.netlib.org/blas/) (Basic Linear Algebra Subprograms) and [LAPACK](https://www.netlib.org/lapack/) (Linear Algrebra PACKage) are the bedrock of numerical computing (they still power [NumPy](https://numpy.org/), by the way), but they're written in Fortran which, no matter how you approach it, makes them nontrivial---and even if you can, just sorta *awful*---to run on the web.

    My sense has always been that there's no hope but to translate BLAS and LAPACK into idiomatic JavaScript. I know exactly where they belong: in [Stdlib](https://github.com/stdlib-js/stdlib), the only project I'm aware of that takes rigorous numerical computing in JavaScript seriously. I [contributed](https://github.com/stdlib-js/stdlib/pull/4789) [translations](https://github.com/stdlib-js/stdlib/pull/4703) of a [number](https://github.com/stdlib-js/stdlib/pull/4725) of [modules](https://github.com/stdlib-js/stdlib/pull/4738) by [hand](https://github.com/stdlib-js/stdlib/pull/4772), but I was on track to finish sometime around 2050.

    Maybe I lacked imagination or insight or just the raw technical chops, but even though the [Böhm–Jacopini theorem](https://en.wikipedia.org/wiki/Structured_program_theorem) told me it was trivially feasible to untangle LAPACK's heavy use of goto, it didn't actually help me get the work done on a reasonable timeline. I tried translating modules by hand, I tried to write programs to automate it, and I tried waiting for someone else to figure it out. None of it has panned out.

    <figure>
      <img alt="XKCD #292" src="https://imgs.xkcd.com/comics/goto.png">
      <figcaption>Obligatory <a href="https://m.xkcd.com/292/">XKCD #292</a>. How bad can thousands of little <code>gotos</code> be?</figcaption>
    </figure>

    I might lose some readers here, but earlier this year I threw Claude Code at improving my automated translator. I had written a program a year prior which would parse Fortran code, run a sequence of carefully constructed transforms, and output JavaScript. It worked, but only sort of. I figured AI would have an easy time navigating a tight translation loop with a clear reference implementation and easily demonstrable correctness, but after some confusion on my part, Claude politely informed that my code was only getting in its way. Instead, it was just sidestepping me and performing the translation directly.

    I resisted, but darn it if it wasn't right. For the first time, I could simply ask for the generalized eigenvalues of a real matrix, let it churn through the LAPACK module dependency tree, and confirm the result actually solved the problem I'd asked for.

    That work is accumulating in [blahpack](https://github.com/rreusser/blahpack), a haphazardly chosen project name that stuck. [Progress currently stands](https://rreusser.github.io/blahpack/progress.html) at about 878 of some 2,200 modules — the double and complex-double variants — though only about half of the 2,200 are unique anyway, since routines come in single- and double-precision twins.

    So new in 2025-2026 is that you can finally just will these capabilities into existence.
  </script>

  <script id="motivation-js" type="text/markdown">
    ## Computing the shape of a Möbius strip

    The shape of a Möbius strip is a problem with some history. Sadowsky [posed its resting shape](https://arxiv.org/abs/1408.3034) as an energy-minimization problem in 1930 but didn't quite get to an answer. Mahadevan and Keller solved it in 1993 in [The Shape of a Möbius Band](https://softmath.seas.harvard.edu/wp-content/uploads/2019/10/pre2000-20.pdf), treating the band as a thin elastic rod — a one-dimensional idealization that reduces the strip to its centerline — and solving the resulting boundary-value problem with [COLSYS](https://www.netlib.org/ode/), a Fortran collocation solver from Netlib.

    This notebook starts in the same place, with the same tool: a JavaScript translation of that very COLSYS solves the same rod equations, continuation scheme and all, and its solution is the strip's starting shape — the "Elastic rod" stage of the pipeline in the figures.

    But a rod knows only its centerline. A real strip has width: it stretches and shears across its surface, and its stresses vary from the center out to the free edge. For a more physically faithful answer, this notebook models the strip as a thin elastic sheet. Cut the sheet into triangles, let every corner move freely in space, and ask it to find the shape that stores the least elastic energy. Two things push back. The sheet strongly resists being stretched in its own plane, its membrane response, and it resists folding much more gently, its bending response. A flat rectangle is perfectly content. But glue its two short ends together with a half-twist and it can no longer lie flat, so it buckles into the Möbius shape entirely on its own.

  <script id="intro" type="text/markdown">
    ## It's a linear algebra problem

    The triangles turn the physics into linear algebra. Stack every vertex
    coordinate into one long vector ${tex`x`}. The elastic energy ${tex`E(x)`} is
    the sum of the membrane and bending terms from the figure above, and the
    resting strip is the ${tex`x`} that makes it smallest. Settling the sheet means
    solving large systems of equations over and over, and the gentle modes the
    strip would wobble in if you flicked it are an eigenvalue problem. In Python
    this is a non-event: SciPy hands the matrices to LAPACK, the Fortran library
    that has quietly sat under NumPy, MATLAB, and most scientific computing for
    forty years. In the browser there is nothing of the kind.

    The solvers running below are AI-assisted translations of that Fortran, checked
    number for number against the reference. The whole computation happens in the
    page you are reading: no server, no Python, no WebAssembly black box.
  </script>

  <script id="theory-element" type="text/markdown">
    ## Finding the shape and its modes

    The energy minimum is found by default with
    [L-BFGS](https://en.wikipedia.org/wiki/Limited-memory_BFGS), a quasi-Newton
    method that needs only the energy ${tex`E`} and its gradient ${tex`\nabla E`}
    and never forms a matrix at all. Its inner loop is nothing heavier than dot
    products and scaled vector sums, the ${tex`\texttt{ddot}`} and
    ${tex`\texttt{daxpy}`} level of BLAS.

    Two Newton solvers are offered alongside it. Both aim each step with the
    stiffness matrix ${tex`K`} — the curvature of the energy — by solving
    ${tex`K p = -\nabla E`}: one matrix-free (Newton-CG), and one that assembles
    ${tex`K`} as a banded matrix for the banded Cholesky routine
    ${tex`\texttt{dpbsv}`}, the same kind of direct banded factorization the
    eigensolver below relies on.
  </script>

  <script id="theory-bending" type="text/markdown">
    Once the strip is at rest, the shapes it would naturally ring in, its
    vibration modes, are the solutions of a generalized eigenvalue problem

    ${tex.block`K\,\phi = \omega^2 M\,\phi,`}

    with the same stiffness ${tex`K`} and a mass matrix ${tex`M`}. The eigenvalues
    ${tex`\omega^2`} are the squared frequencies and the eigenvectors ${tex`\phi`}
    are the mode shapes. This goes to a symmetric eigensolver,
    ${tex`\texttt{dsbgvx}`} for the banded case or ${tex`\texttt{dsygvx}`} for the
    dense one, again translated from Fortran. The lowest six eigenvalues come out
    near zero, the rigid-body motions of a strip floating freely in space; the
    modes worth looking at are the next ones up.
  </script>

  <script id="theory-modes" type="text/markdown">
    ## The Möbius seam

    One wrinkle deserves a mention. Gluing the two ends of the mesh together connects
    vertices that started out far apart, so in the obvious numbering the stiffness
    matrix ${tex`K`} spreads into a wide band and the solvers crawl. Renumbering the
    vertices so the glued partners sit next to each other pulls it back into a narrow
    band, which is what keeps the banded routines fast.

    That narrow band is also where the approach stops short: a banded solver still
    grinds through every entry inside the band, and most of them are zero. A proper
    sparse solver would skip them — but the band is small enough here that it wasn't
    worth writing one, a compromise the aside below makes concrete.
  </script>

  <script id="sparsity-aside" type="text/x-typescript">

    {
      const details = html`<details style="margin:0.5rem 0 1.75rem;border:1px solid rgba(127,127,127,0.28);border-radius:8px;padding:0.5rem 0.9rem 0.9rem"></details>`;

      function spy(px: number, n: number, blocks: Set<number>, Nv: number, orderOf: (d: number) => number): HTMLCanvasElement {

        const W = Math.max(1, Math.round(px * dpr));
