<!doctype html>
<notebook theme="ink">
  <title>Boy's Surface</title>

  <script id="title" type="text/markdown">
# Boy's Surface
  </script>

  <script id="imports" type="text/x-typescript">
import { createWebGPUContext } from './lib/webgpu-canvas.js';
import { createUnifiedCamera } from './lib/unified-camera.js';
import { expandable, ICON_ORBIT, ICON_ARCBALL } from './lib/expandable.js';
import { createCameraSnapshotButton } from './lib/snapshot.js';
import { createWebGPUCaptureHandler } from './lib/webgpu-snapshot.js';
import { createFrameLoop } from './lib/frame-loop.js';
import { meshFromFunction } from './mesh.js';
import { peelShaderCode, compositeShaderCode } from './shaders.js';
import { createRenderer } from './renderer.js';
import { interval } from './lib/range-slider.js';
  </script>

  <script id="intro" type="text/markdown">
An implementation of [Boy's surface](https://en.wikipedia.org/wiki/Boy%27s_surface), an immersion of the real projective plane in three-dimensional Euclidean space. The parameterization is based on a formula by Robert Bryant and Rob Kusner. This is a WebGPU port of [an earlier version](https://rreusser.github.io/boys-surface/).
  </script>

  <script id="gpu-context" type="text/x-typescript">
const { device, canvasFormat } = await createWebGPUContext();
  </script>

  <script id="state" type="text/x-typescript">
const state = {
  canvas: null as HTMLCanvasElement | null,
  gpuContext: null as GPUCanvasContext | null,
  camera: null as ReturnType<typeof createUnifiedCamera> | null,
  frame: null as { cancel: () => void } | null,
  dirty: true,
  expandedState: { expanded: false },
  renderer: null as ReturnType<typeof createRenderer> | null,
  renderParams: {
    rmin: 0,
    rmax: 1,
    opacity: 0.9,
    gridOpacity: 0.25,
    gridWidth: 0.5,
    cartoonEdgeWidth: 1.5,
    cartoonEdgeOpacity: 1,
    specular: 1,
    uClipMin: 0,
    uClipMax: 1,
    vClipMin: -3.15,
    vClipMax: 3.15,
    invertClipU: 0,
    invertClipV: 0,
    peelLayers: 4,
  }
};
  </script>



  <script id="controls" type="text/x-typescript">
const controlsContainer = html`<div id="surface-controls"></div>`;

function addControl(input: HTMLElement) {
  controlsContainer.appendChild(input);
  return input;
}

const rRangeInput = addControl(interval([0, 1], { label: "r range", value: [0, 1], step: 0.001, invertible: true }));
const vClipInput = addControl(interval([-3.15, 3.15], { label: "θ range", value: [-3.15, 3.15], step: 0.01, invertible: true }));
const opacityInput = addControl(Inputs.range([0, 1], { label: "Surface opacity", value: 0.9, step: 0.01 }));
  </script>

  <script id="camera" type="text/x-typescript">
const canvas = document.createElement('canvas');
canvas.width = 800;
canvas.height = 600;
canvas.style.width = '100%';
canvas.style.height = '100%';

const camera = createUnifiedCamera(canvas, {
  mode: 'orbit',
  distance: 5,
  phi: 5.5,
  theta: 0.2,
  center: [0, -1, 0],
  renderContinuously: false,
  observeResize: true,
  canvas: canvas,
});

invalidation.then(() => {
  camera.destroy();
});
  </script>

  <script id="sync-params" type="text/x-typescript">
function syncParams() {
  const rRange = rRangeInput.value as { range: [number, number]; invert: boolean };
  const vClip = vClipInput.value as { range: [number, number]; invert: boolean };
  state.renderParams.uClipMin = rRange.range[0];
  state.renderParams.uClipMax = rRange.range[1];
  state.renderParams.invertClipU = rRange.invert ? 1 : 0;
  state.renderParams.vClipMin = vClip.range[0];
  state.renderParams.vClipMax = vClip.range[1];
  state.renderParams.invertClipV = vClip.invert ? 1 : 0;
  state.renderParams.opacity = opacityInput.value as number;
  camera.triggerRepaint();
}

controlsContainer.addEventListener('input', syncParams);
syncParams();
  </script>

  <script id="main" type="text/x-typescript">
const mesh = meshFromFunction((u, v) => [u, v], {
  resolution: [401, 401],
  uDomain: [1e-4, 1 - 1e-4],
  vDomain: [-Math.PI, Math.PI]
});

const gpuContext = canvas.getContext('webgpu')!;
gpuContext.configure({ device, format: canvasFormat, alphaMode: 'premultiplied' });

const renderer = createRenderer(device, canvasFormat, {
  peel: peelShaderCode,
  composite: compositeShaderCode
});
renderer.initMesh(mesh);

const container = html`<div style="position: relative; width: 100%; height: 100%;"></div>`;
container.appendChild(canvas);

function renderFrame() {
  renderer.render(gpuContext, state.renderParams, camera, canvas.width, canvas.height, false);
}

camera.on('render', renderFrame);

// Register WebGPU capture handler: renders a frame then immediately calls
// toDataURL() in the same microtask (before the swap-chain texture is presented).
camera.on('capture', createWebGPUCaptureHandler({
  canvas,
  render: () => renderer.render(gpuContext, state.renderParams, camera, canvas.width, canvas.height, true),
}));

canvas.addEventListener('mousedown', () => {
  if (document.activeElement instanceof HTMLElement) {
    document.activeElement.blur();
  }
});

camera.triggerRepaint();

let expandableContainer;
expandableContainer = expandable(container, {
  id: 'surface-viewer',
  width: 640,
  height: 480,
  controls: controlsContainer,
  state: state.expandedState,
  buttons: [
    {
      icon: camera.getMode() === 'orbit' ? ICON_ORBIT : ICON_ARCBALL,
      title: 'Toggle camera mode (orbit/arcball)',
      onClick: (content, expanded, button) => {
        const newMode = camera.getMode() === 'orbit' ? 'arcball' : 'orbit';
        camera.setMode(newMode);
        camera.triggerRepaint();
        if (button) button.innerHTML = newMode === 'orbit' ? ICON_ORBIT : ICON_ARCBALL;
      }
    },
    createCameraSnapshotButton(camera, { filename: 'boys-surface.png' }),
  ],
});

display(expandableContainer);
display(controlsContainer);
  </script>

  <script id="equations" type="text/markdown">
Given a complex variable ${tex`w = r e^{i\theta}`} parameterizing a disk in the complex plane, the surface coordinates are

${tex.block`\begin{aligned}
g_1 &= -\tfrac{3}{2}\,\mathrm{Im}\!\left[\frac{w(1 - w^4)}{w^6 + \sqrt{5}\,w^3 - 1}\right] \\[6pt]
g_2 &= -\tfrac{3}{2}\,\mathrm{Re}\!\left[\frac{w(1 + w^4)}{w^6 + \sqrt{5}\,w^3 - 1}\right] \\[6pt]
g_3 &= \mathrm{Im}\!\left[\frac{1 + w^6}{w^6 + \sqrt{5}\,w^3 - 1}\right] - \tfrac{1}{2}
\end{aligned}`}

The final surface position is then normalized:

${tex.block`(x, y, z) = \frac{1}{g_1^2 + g_2^2 + g_3^2}\begin{pmatrix} g_1 \\ g_2 \\ g_3 \end{pmatrix}`}
  </script>

  <script id="notes" type="text/markdown">
The vertex shader receives a surface parameterized by ${tex`(r, \theta)`} coordinates, where ${tex`r`} is the radial distance and ${tex`\theta`} is the angle in the complex plane. It evaluates Boy's surface function using complex arithmetic and normalizes the result. Transparency is achieved through depth peeling.
  </script>
