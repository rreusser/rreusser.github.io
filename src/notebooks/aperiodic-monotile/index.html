  <script id="intro" type="text/markdown">
    # Rendering the Aperiodic Monotile

    A work-in-progress notebook for rendering the *spectre* — the chiral aperiodic monotile of [Smith, Myers, Kaplan, and Goodman-Strauss](https://arxiv.org/abs/2305.17743) — and the rest of the Tile(a, b) family it belongs to (the [hat](https://arxiv.org/abs/2303.10798) and turtle).

    The plan is to walk the spectre substitution from [Kaplan's `spectre.js`](https://cs.uwaterloo.ca/~csk/spectre/spectre.js) to some depth, then render the resulting tiles using instanced WebGPU. Each tile's translation is split into separate (*a*, *b*) components so the hat ↔ spectre ↔ turtle morph is a per-frame projection rather than a fresh substitution at every slider value.
  </script>

  <script id="spectre-section" type="text/markdown">
    ## The spectre

    The spectre is a 14-gon. Every edge has unit length and every interior angle is a multiple of 30°. Two consecutive edges (here at vertex 10) are collinear, which is what allows this same combinatorial polygon to deform into the *hat* and *turtle* by giving the two collinear edges different lengths.
  </script>

  <script id="spectre-vertices" type="text/x-typescript">
    const s = Math.sqrt(3) / 2;
    const spectreVertices: [number, number][] = [
      [0,         0       ],
      [1,         0       ],
      [1.5,      -s       ],
      [1.5 + s,   0.5 - s ],
      [1.5 + s,   1.5 - s ],
      [2.5 + s,   1.5 - s ],
      [3 + s,     1.5     ],
      [3,         2       ],
      [3 - s,     1.5     ],
      [2.5 - s,   1.5 + s ],
      [1.5 - s,   1.5 + s ],
      [0.5 - s,   1.5 + s ],
      [-s,        1.5     ],
      [0,         1       ],
    ];
  </script>

  <script id="spectre-demo-control" type="text/x-typescript">
    // Slider that drives the labeled-vertices figure below. Independent of
    // the main render slider so you can poke at the polygon without
    // disturbing the WebGPU view at the top.
    const _spectreDemoSlider = Inputs.range([-2, 2], {
      value: 0,
      step: 0.005,
      label: "Morph",
    });
    const spectreDemoMorph = Generators.input(_spectreDemoSlider);

  <script id="spectre-svg" type="text/x-typescript">
    // Walk the spectre boundary at the slider's (a, b). Same edge-type
    // partition and same morph parameterization as the WebGPU pipeline.
    const _ssEdgeDirs = [0, 10, 1, 3, 0, 2, 5, 7, 4, 6, 6, 8, 11, 9];
    const _ssAMask = [true, true, false, false, true, true, false, false,
                      true, true, true, true, false, false];
    const _ssAbs = Math.abs(spectreDemoMorph);
    let _ssAR: number, _ssBR: number;
    if (_ssAbs <= 1) {
      _ssAR = 1 + (Math.sqrt(3) - 1) * Math.max(0,  spectreDemoMorph);
      _ssBR = 1 + (Math.sqrt(3) - 1) * Math.max(0, -spectreDemoMorph);
    } else {
      const _t = _ssAbs - 1;
      const _long = Math.sqrt(3) + (2 - Math.sqrt(3)) * _t;
      const _short = 1 - _t;
      [_ssAR, _ssBR] = spectreDemoMorph > 0 ? [_long, _short] : [_short, _long];
    }
    const _ssNorm = 2 / Math.max(1e-9, _ssAR + _ssBR);
    const _ssA = _ssAR * _ssNorm, _ssB = _ssBR * _ssNorm;

    const _ssVerts: [number, number][] = [[0, 0]];
    {
      let x = 0, y = 0;
      for (let i = 0; i < 13; i++) {
        const ang = _ssEdgeDirs[i] * Math.PI / 6;
        const len = _ssAMask[i] ? _ssA : _ssB;
        x += len * Math.cos(ang);
        y += len * Math.sin(ang);
        _ssVerts.push([x, y]);
      }
    }
    // Center on the polygon's actual bbox each frame and pick a square
    // viewBox big enough to contain the largest dimension at this morph.
    // The degenerate spike at morph = +2 reaches ~6 units across (spike
    // length 2a = 4 plus the rest of the outline), so a fixed side under
    // ~6 would clip the tile at the edges.
    let _ssMnX = Infinity, _ssMxX = -Infinity, _ssMnY = Infinity, _ssMxY = -Infinity;
    for (const [x, y] of _ssVerts) {
      if (x < _ssMnX) _ssMnX = x; if (x > _ssMxX) _ssMxX = x;
      if (y < _ssMnY) _ssMnY = y; if (y > _ssMxY) _ssMxY = y;
    }
    const _ssCx = (_ssMnX + _ssMxX) / 2;
    const _ssCy = (_ssMnY + _ssMxY) / 2;
    const _ssMaxDim = Math.max(_ssMxX - _ssMnX, _ssMxY - _ssMnY);
    // Floor at 4.8 keeps the polygon a comfortable size at the spectre
    // case; otherwise track the actual extent with a little breathing
    // room around the vertices and labels.
    const _ssSide = Math.max(4.8, _ssMaxDim + 0.6);
    const _ssVbX = _ssCx - _ssSide / 2;
    const _ssVbY = -_ssCy - _ssSide / 2;
    const _ssVbW = _ssSide;
    const _ssVbH = _ssSide;
    const _ssPts = _ssVerts.map(([x, y]) => `${x},${-y}`).join(" ");
    const _ssSize = Math.min(360, width);

    display(html`<figure style="margin: 0 auto; text-align: center;">
      <svg viewBox="${_ssVbX} ${_ssVbY} ${_ssVbW} ${_ssVbH}"
           width="${_ssSize}" height="${_ssSize}"
           style="display: block; margin: 0 auto;">
        <polygon points="${_ssPts}"
                 fill="#cfe1f5" stroke="#222" stroke-width="0.03"
                 stroke-linejoin="round" />
        ${_ssVerts.map(([x, y], i) => html`
          <circle cx="${x}" cy="${-y}" r="0.06" fill="#222" />
          <text x="${x}" y="${-y}" dy="-0.16" font-size="0.22"
                text-anchor="middle" fill="#666">${i}</text>
        `)}
      </svg>
      <figcaption style="font-size: 0.85em; color: #666;">
        Vertices of the spectre tile, indexed 0–13. Drag the slider to morph between hat, spectre, turtle, and the degenerate endpoints.
      </figcaption>
    </figure>`);
  </script>

  <script id="morph-strip-section" type="text/markdown">
    The same 14-vertex polygon is part of a one-parameter family Tile(*a*, *b*). The 14 edges have fixed directions (multiples of 30°) and fixed types — eight *a*-edges and six *b*-edges — and only their lengths change as you slide *a* and *b*. The five named stops along the morph slider above:
  </script>

  <script id="morph-strip" type="text/x-typescript">
    // Walk the spectre boundary at any (a, b). The 14 edges have fixed
    // directions (multiples of 30°) and a fixed type (a-edge or b-edge);
    // varying (a, b) just rescales each edge in place — which is exactly
    // what the morph slider above does.
    const _edgeDirs = [0, 10, 1, 3, 0, 2, 5, 7, 4, 6, 6, 8, 11, 9];
    const _aMask = [true, true, false, false, true, true, false, false,
                    true, true, true, true, false, false];
    function _polyAt(a: number, b: number): [number, number][] {
      const verts: [number, number][] = [[0, 0]];
      let x = 0, y = 0;
      for (let i = 0; i < 13; i++) {
        const ang = _edgeDirs[i] * Math.PI / 6;
        const len = _aMask[i] ? a : b;
        x += len * Math.cos(ang);
        y += len * Math.sin(ang);
        verts.push([x, y]);
      }
      return verts;
    }
    // Same piecewise parameterization as render-morph; sample any slider
    // position deterministically.
    function _morphToAB(m: number): [number, number] {
      const absM = Math.abs(m);
      let aR: number, bR: number;
      if (absM <= 1) {
        aR = 1 + (Math.sqrt(3) - 1) * Math.max(0,  m);
        bR = 1 + (Math.sqrt(3) - 1) * Math.max(0, -m);
      } else {
        const t = absM - 1;
        const long  = Math.sqrt(3) + (2 - Math.sqrt(3)) * t;
        const short = 1 - t;
        [aR, bR] = m > 0 ? [long, short] : [short, long];
      }
      const norm = 2 / Math.max(1e-9, aR + bR);
      return [aR * norm, bR * norm];
    }

    const _stops = [
      { m: -2, name: "hexagon",  detail: "a → 0" },
      { m: -1, name: "hat",      detail: "b / a = √3" },
      { m:  0, name: "spectre",  detail: "a = b" },
      { m: +1, name: "turtle",   detail: "a / b = √3" },
      { m: +2, name: "7-gon",    detail: "b → 0" },
    ];
    type _MorphStop = { m: number; name: string; detail: string; verts: [number, number][] };
    const _shapes: _MorphStop[] = _stops.map(({ m, name, detail }) => {
      const [a, b] = _morphToAB(m);
      const verts = _polyAt(a, b);
      // Centre on bbox so all shapes sit at the same screen origin and a
      // single shared viewBox can hold them at the same scale.
      let mnx = Infinity, mxx = -Infinity, mny = Infinity, mxy = -Infinity;
      for (const [x, y] of verts) {
        if (x < mnx) mnx = x; if (x > mxx) mxx = x;
        if (y < mny) mny = y; if (y > mxy) mxy = y;
      }
      const cx = (mnx + mxx) / 2, cy = (mny + mxy) / 2;
      return { m, name, detail, verts: verts.map(([x, y]) => [x - cx, y - cy]) };
    });
    // Shared viewBox sized to the largest cluster so the spectre's *intrinsic*
    // size variation across the morph is visible.
    let _gMinX = Infinity, _gMaxX = -Infinity, _gMinY = Infinity, _gMaxY = -Infinity;
    for (const s of _shapes) for (const [x, y] of s.verts) {
      if (x < _gMinX) _gMinX = x; if (x > _gMaxX) _gMaxX = x;
      if (y < _gMinY) _gMinY = y; if (y > _gMaxY) _gMaxY = y;
    }
    const _pad = 0.3;
    const _vbX = _gMinX - _pad;
    const _vbY = -_gMaxY - _pad;
    const _vbW = (_gMaxX - _gMinX) + 2 * _pad;
    const _vbH = (_gMaxY - _gMinY) + 2 * _pad;
    const _wpx = Math.min(116, Math.floor((width - 40) / _shapes.length));

    display(html`<figure style="margin: 1em 0; text-align: center;">
      <div style="display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; align-items: flex-start;">
        ${_shapes.map((s) => html`
          <div style="display: flex; flex-direction: column; align-items: center;">
            <svg viewBox="${_vbX} ${_vbY} ${_vbW} ${_vbH}"
                 width="${_wpx}" height="${_wpx * _vbH / _vbW}"
                 style="display: block;">
              <polygon points="${s.verts.map(([x, y]) => `${x},${-y}`).join(' ')}"
                       fill="#cfe1f5" stroke="#222" stroke-width="0.04"
                       stroke-linejoin="round" />
            </svg>
            <div style="font-size: 0.85em; margin-top: 4px;"><strong>${s.name}</strong></div>
            <div style="font-size: 0.72em; color: #666;">${s.detail}</div>
            <div style="font-size: 0.7em; color: #999;">slider = ${s.m}</div>
          </div>
        `)}
      </div>
      <figcaption style="font-size: 0.85em; color: #666; margin-top: 8px; max-width: 580px; margin-left: auto; margin-right: auto;">
        Two pairs of consecutive collinear edges fuse into one at the endpoints, dropping the polygon from a 14-gon down to a hexagon (left) or a 7-gon with a long spike (right). Substitution still tiles the plane all the way through.
      </figcaption>
    </figure>`);
  </script>

  <script id="lattice-section" type="text/markdown">
    ## Coordinates

    Spectre vertices are stored as 2-D cartesian points. The substitution recurrence only ever combines them through four operations — add, subtract, rotate by a multiple of 30°, and mirror across the x-axis — all closed under simple float vector math. Coordinates accumulate sub-micropixel float drift across all 17 M tiles at depth 8; below the resolution of a single pixel even at extreme zoom.

    The Tile(*a*, *b*) morph (hat → spectre → turtle) requires one extra wrinkle: every position carries an **a-component** and a **b-component**, both 2-D points. Cartesian projection is

    ${tex.block`(x, y) = a \cdot p_a + b \cdot p_b,`}

    and is the only place the morph parameters appear. Substitution arithmetic acts on the two halves component-wise — the recursion never sees *a* or *b*. That's the **LP²** type used throughout the code below.
  </script>

  <script id="lattice-math" type="text/x-typescript">
    // LP is a 2-D point in cartesian coordinates. The substitution rules
    // only ever combine these via add / subtract / 30°-rotate / mirror —
    // all closed under simple float vector math. (Earlier revisions of
    // this notebook used a 4-int cyclotomic representation; floats are
    // half the memory and indistinguishable at typical zoom levels.)
    type LP = [number, number];

    const lpAdd = (p: LP, q: LP): LP => [p[0] + q[0], p[1] + q[1]];
    const lpSub = (p: LP, q: LP): LP => [p[0] - q[0], p[1] - q[1]];
    const lpNeg = (p: LP): LP        => [-p[0], -p[1]];
    const lpConj = (p: LP): LP       => [p[0], -p[1]]; // mirror across x-axis

    // Pre-computed cos / sin for the 12 multiples of 30°.
    const SQRT3_2 = Math.sqrt(3) / 2;
    const _LPCOS = new Float64Array(12);
    const _LPSIN = new Float64Array(12);
    for (let k = 0; k < 12; k++) {
      _LPCOS[k] = Math.cos(k * Math.PI / 6);
      _LPSIN[k] = Math.sin(k * Math.PI / 6);
    }

    function lpRotate(p: LP, k: number): LP {
      k = ((k % 12) + 12) % 12;
      const c = _LPCOS[k], s = _LPSIN[k];
      return [c * p[0] - s * p[1], s * p[0] + c * p[1]];
    }

    // Already cartesian — exposed for API compatibility with downstream code.
    const lpToXY = (p: LP): [number, number] => [p[0], p[1]];

    // ─── LP² ─────────────────────────────────────────────────────────────
    // To support the Tile(a, b) family (hat, spectre, turtle) every
    // position is split into an a-component and a b-component. Cartesian
    // projection is (x, y) = a · p.a + b · p.b, and is the only place the
    // real numbers a, b appear. Substitution arithmetic acts component-
    // wise on the two halves — the morph parameters never touch the
    // recursion.
    type LP2 = { a: LP; b: LP };
    const LP_ZERO: LP = [0, 0];
    const LP2_ZERO: LP2 = { a: LP_ZERO, b: LP_ZERO };

    const lp2Add  = (p: LP2, q: LP2): LP2 => ({ a: lpAdd(p.a, q.a), b: lpAdd(p.b, q.b) });
    const lp2Sub  = (p: LP2, q: LP2): LP2 => ({ a: lpSub(p.a, q.a), b: lpSub(p.b, q.b) });
    const lp2Neg  = (p: LP2): LP2          => ({ a: lpNeg(p.a),     b: lpNeg(p.b) });
    // Mirror across x-axis preserves edge-direction parity, so a-edges
    // stay a-edges and b-edges stay b-edges — no component swap.
    const lp2Conj = (p: LP2): LP2          => ({ a: lpConj(p.a),    b: lpConj(p.b) });
    // Rotation by k·30° flips edge-direction parity when k is odd. a-edges
    // live at even world directions (length a), b-edges at odd (length b);
    // an odd rotation moves every a-direction to an odd direction and vice
    // versa, so the rotated a-component physically becomes the new b-
    // component. Rotate both halves, swap them when k is odd. At a = b the
    // swap is invisible, which is why the spectre case worked without it.
    const lp2Rotate = (p: LP2, k: number): LP2 => {
      const ra = lpRotate(p.a, k);
      const rb = lpRotate(p.b, k);
      const odd = ((k % 2) + 2) % 2 === 1;
      return odd ? { a: rb, b: ra } : { a: ra, b: rb };
    };

    const lp2ToXY = (p: LP2, a: number, b: number): [number, number] =>
      [a * p.a[0] + b * p.b[0], a * p.a[1] + b * p.b[1]];
  </script>

  <script id="spectre-lattice-vertices" type="text/x-typescript">
    // The 14 spectre vertices as cartesian (x, y) — same data as the
    // hand-coded spectreVertices in the previous cell, just re-aliased
    // here so downstream code that historically expected a "lattice
    // vertex" array still finds it.
    const spectreLatticeVertices: LP[] = spectreVertices.map(([x, y]) => [x, y]);

    // ─── Edge type partition for the Tile(a, b) family ───────────────────
    // Each of the 14 edges is either an "a-edge" (length a) or a "b-edge"
    // (length b). The partition that works for every tile in the
    // substitution tiling is just edge-direction parity: edges in an
    // *even* multiple of 30° are one type, edges in an *odd* multiple
    // are the other.
    //
    // Walking the spectre boundary, the 14 edge directions in 30° units are
    //   [0, 10, 1, 3, 0, 2, 5, 7, 4, 6, 6, 8, 11, 9].
    // The eight even directions are e{0,1,4,5,8,9,10,11} (a-edges) and the
    // six odd directions are e{2,3,6,7,12,13} (b-edges). Both subsets sum
    // to the zero vector, so the polygon closes at every (a, b) ≥ 0.
    //
    // The collinear "spike" at vertex 10 is e9 + e10, both type a, so the
    // spike has length 2a (= 2 in the hat, = 2√3 in the turtle, = 2 in the
    // spectre) — not a + b.
    const SPECTRE_A_EDGES: ReadonlySet<number> = new Set([0, 1, 4, 5, 8, 9, 10, 11]);

    // Spectre vertices in LP² form: walk the boundary, accumulating each
    // edge's direction into the a- or b-component depending on its type.
    // At (a, b) = (1, 1) the sum of the two halves reproduces the
    // original cartesian vertex (verified in the next cell).
    const spectreLatticeVertices2: LP2[] = (() => {
      const vs: LP2[] = [{ a: [0, 0], b: [0, 0] }];
      let accA: LP = [0, 0], accB: LP = [0, 0];
      for (let i = 0; i < 13; i++) {
        const dir = lpSub(spectreLatticeVertices[i + 1], spectreLatticeVertices[i]);
        if (SPECTRE_A_EDGES.has(i)) accA = lpAdd(accA, dir);
        else                        accB = lpAdd(accB, dir);
        vs.push({ a: accA, b: accB });
      }
      return vs;
    })();
  </script>

  <script id="spectre-lattice-check" type="text/x-typescript">
    // Sanity checks for the (a, b) edge-type partition:
    //  1. Hat (a = 1, b = √3): polygon closes after 14 edges.
    //  2. Turtle (a = √3, b = 1): closes too.
    //  3. Every spectre edge has unit length at a = b = 1.
    const tol = 1e-12;

    function closureError(a: number, b: number): number {
      const last = spectreLatticeVertices2[13];
      const dirLast = lpSub(spectreLatticeVertices[0], spectreLatticeVertices[13]);
      const closed: LP2 = SPECTRE_A_EDGES.has(13)
        ? { a: lpAdd(last.a, dirLast), b: last.b }
        : { a: last.a, b: lpAdd(last.b, dirLast) };
      const [x, y] = lp2ToXY(closed, a, b);
      return Math.hypot(x, y);
    }
    const SQRT3 = Math.sqrt(3);
    const hatErr    = closureError(1, SQRT3);
    const turtleErr = closureError(SQRT3, 1);

    const edgeLengths = spectreLatticeVertices.map((_, i) => {
      const a = spectreLatticeVertices[i];
      const b = spectreLatticeVertices[(i + 1) % 14];
      return Math.hypot(a[0] - b[0], a[1] - b[1]);
    });
    const maxEdgeError = Math.max(...edgeLengths.map((l) => Math.abs(l - 1)));

    const ok = maxEdgeError < tol && hatErr < tol && turtleErr < tol;
    display(html`<div style="font-size: 0.9em; padding: 0.5em 0.8em; border-radius: 4px;
                              background: ${ok ? '#e7f5ea' : '#fbe9e9'};
                              color: ${ok ? '#1d5b2c' : '#7a1414'}; font-family: monospace;">
      hat closure error (1, √3): ${hatErr.toExponential(2)}<br>
      turtle closure error (√3, 1): ${turtleErr.toExponential(2)}<br>
      edge length max deviation from 1: ${maxEdgeError.toExponential(2)}
    </div>`);
  </script>

  <script id="transform-section" type="text/markdown">
    ## Transforms

    A rigid placement of a tile is the composition of a rotation by ${tex`30°k`}, an optional chirality mirror, and a lattice translation:

    ${tex.block`T(p) = \omega^k \cdot \big(\text{mirror}? \,\overline{p} : p\big) + t,`}

    with ${tex`k \in \{0, \dotsc, 11\}`}, mirror ${tex`\in \{0, 1\}`}, and ${tex`t \in \mathbb{Z}[\omega]`}. Composing two such transforms stays in this group, with the only subtlety that a mirror flips the sign of the next rotation: ${tex`F R = R^{-1} F`}.
  </script>

  <script id="transform-math" type="text/x-typescript">
    type Transform = { rot: number; mirror: 0 | 1; t: LP2 };

    const txIdentity: Transform = { rot: 0, mirror: 0, t: LP2_ZERO };

    function txApply(T: Transform, p: LP2): LP2 {
      const q = T.mirror ? lp2Conj(p) : p;
      return lp2Add(lp2Rotate(q, T.rot), T.t);
    }

    // Apply just the linear (rotation+mirror) part to a lattice vector.
    function txApplyLinear(T: Transform, p: LP2): LP2 {
      const q = T.mirror ? lp2Conj(p) : p;
      return lp2Rotate(q, T.rot);
    }

    // (T1 ∘ T2)(p) = T1(T2(p)).
    // Rotations and mirrors compose as M1·M2 = R^(r1 + (-1)^m1·r2) · F^(m1 ⊕ m2);
    // translation is M1·t2 + t1.
    function txCompose(T1: Transform, T2: Transform): Transform {
      const sign = T1.mirror ? -1 : 1;
      const rot = (((T1.rot + sign * T2.rot) % 12) + 12) % 12;
      const mirror = (T1.mirror ^ T2.mirror) as 0 | 1;
      const t = lp2Add(txApplyLinear(T1, T2.t), T1.t);
      return { rot, mirror, t };

    const txTranslate = (t: LP2): Transform => ({ rot: 0, mirror: 0, t });

    const txRotate = (k: number): Transform =>

  <script id="substitution-section" type="text/markdown">
    ## Substitution rules

    The substitution machinery here is a port of [Craig S. Kaplan's `spectre.js`](https://cs.uwaterloo.ca/~csk/spectre/spectre.js), the p5.js reference implementation linked from the spectre paper page. Used directly:

    - The 14 spectre vertex coordinates (his `spectre` array in `buildSpectreBase`) and the quad-handle indices `[3, 5, 7, 11]` (his `spectre_keys`).
    - The nine metatile names Γ, Δ, Θ, Λ, Ξ, Π, Σ, Φ, Ψ (his `tile_names`).
    - The two rule tables: `transformationRules` (his `t_rules`, with rotations rewritten in 30°-unit increments instead of degrees) and `superRules` (his `super_rules` verbatim).
    - The recursion in `buildSpectreBase` and `buildSupertiles`, including the final reflection across the y-axis that closes the supertile cluster.

    Adapted: each transform's translation is stored as an LP² (separate (*a*, *b*) components) instead of a single (*x*, *y*), so the hat ↔ spectre ↔ turtle morph is a per-frame projection rather than a fresh substitution at every slider value. The point algebra (`lpAdd`, `lpRotate`, `txCompose`, ...) is our own, replacing his matrix helpers (`mul`, `trot`, `ttrans`, `transPt`); his `buildHatTurtleBase` and `buildHexBase` are unused since the (*a*, *b*) split covers the whole Tile family.

    Each metatile carries a *quad* (the four distinguished points indexed 3, 5, 7, 11 of the spectre) that it uses to glue to its neighbours. To inflate the tiling one level, every metatile is replaced by a fixed sequence of eight smaller metatiles, each placed by one of seven inter-tile transforms (the first slot is the identity).

    The two tables below: `transformationRules` is a sequence of `[rotation in 30° units, source quad index, target quad index]` triples that build up the seven non-identity transforms; `superRules` selects which of the nine metatile types fills each of the eight slots for each parent type. The Γ entry has `null` in slot 2: Γ supertiles only take seven children, not eight.
  </script>

  <script id="substitution-data" type="text/x-typescript">
    const TILE_NAMES = ["Gamma", "Delta", "Theta", "Lambda", "Xi", "Pi", "Sigma", "Phi", "Psi"] as const;
    type TileName = typeof TILE_NAMES[number];

    // [rotation in units of 30°, from-quad index, to-quad index]
    const transformationRules: [number, number, number][] = [
      [ 2, 3, 1],
      [ 0, 2, 0],
      [ 2, 3, 1],
      [ 2, 3, 1],
      [ 0, 2, 0],
      [ 2, 3, 1],
      [-4, 3, 3],
    ];

    const superRules: Record<TileName, (TileName | null)[]> = {
      Gamma:  ["Pi",  "Delta", null,  "Theta", "Sigma", "Xi",  "Phi",    "Gamma"],
      Delta:  ["Xi",  "Delta", "Xi",  "Phi",   "Sigma", "Pi",  "Phi",    "Gamma"],
      Theta:  ["Psi", "Delta", "Pi",  "Phi",   "Sigma", "Pi",  "Phi",    "Gamma"],
      Lambda: ["Psi", "Delta", "Xi",  "Phi",   "Sigma", "Pi",  "Phi",    "Gamma"],
      Xi:     ["Psi", "Delta", "Pi",  "Phi",   "Sigma", "Psi", "Phi",    "Gamma"],
      Pi:     ["Psi", "Delta", "Xi",  "Phi",   "Sigma", "Psi", "Phi",    "Gamma"],
      Sigma:  ["Xi",  "Delta", "Xi",  "Phi",   "Sigma", "Pi",  "Lambda", "Gamma"],
      Phi:    ["Psi", "Delta", "Psi", "Phi",   "Sigma", "Pi",  "Phi",    "Gamma"],
      Psi:    ["Psi", "Delta", "Psi", "Phi",   "Sigma", "Psi", "Phi",    "Gamma"],
    };

    // The four spectre indices that act as a metatile's "quad" handles.
    const QUAD_INDICES = [3, 5, 7, 11] as const;
    const baseQuad: LP2[] = QUAD_INDICES.map((i) => spectreLatticeVertices2[i]);
  </script>

  <script id="metatile-section" type="text/markdown">
    ## Building supertiles

    `buildSpectreBase` returns the nine starting metatiles. Eight are bare spectres; Γ is the special "mystic" pair (two overlapping spectres that lock the chirality). Each call to `buildSupertiles` consumes the current cluster of nine metatiles and produces the next-level cluster, applying the seven transforms derived from the rule table and a final reflection across the y-axis. The metatile data type is a TypeScript discriminated union (`{ kind: "leaf"; ... } | { kind: "meta"; ... }`) instead of Kaplan's Shape/Meta class hierarchy; the algorithm is otherwise identical.
  </script>

  <script id="metatile-build" type="text/x-typescript">
    type LeafLabel = TileName | "Gamma1" | "Gamma2";
    type MetaTile =
      | { kind: "leaf"; label: LeafLabel; quad: LP2[] }
      | { kind: "meta"; name: TileName; geometries: { child: MetaTile; transform: Transform }[]; quad: LP2[] };

    function buildSpectreBase(): Record<TileName, MetaTile> {
      const cluster = {} as Record<TileName, MetaTile>;
      for (const label of TILE_NAMES) {
        if (label !== "Gamma") {
          cluster[label] = { kind: "leaf", label, quad: baseQuad };
        }
      }
      // Mystic Γ: two spectres glued with a 30° rotation about vertex 8.
      cluster.Gamma = {
        kind: "meta",
        name: "Gamma",
        quad: baseQuad,
        geometries: [
          {
            child: { kind: "leaf", label: "Gamma1", quad: baseQuad },
            transform: txIdentity,
          },
          {
            child: { kind: "leaf", label: "Gamma2", quad: baseQuad },
            transform: txCompose(
              txTranslate(spectreLatticeVertices2[8]),
              txRotate(1),
            ),
          },
        ],
      };
      return cluster;
    }

    function buildSupertiles(prev: Record<TileName, MetaTile>): Record<TileName, MetaTile> {
      const quad = prev.Delta.quad;

      // Build the seven non-identity transforms by walking the rule table.
      const transformations: Transform[] = [txIdentity];
      let totalRot = 0;
      let rotation: Transform = txIdentity;
      let rotatedQuad: LP2[] = quad;

      for (const [deltaRot, fromIdx, toIdx] of transformationRules) {
        if (deltaRot !== 0) {
          totalRot = (((totalRot + deltaRot) % 12) + 12) % 12;
          rotation = txRotate(totalRot);
          rotatedQuad = quad.map((p) => txApplyLinear(rotation, p));
        }
        const target = txApply(transformations[transformations.length - 1], quad[fromIdx]);
        const source = rotatedQuad[toIdx];
        const delta = lp2Sub(target, source);
        transformations.push({ rot: rotation.rot, mirror: 0, t: delta });
      }

      // Reflect everything across the y-axis: R(x, y) = (-x, y) = ω⁶ · conj.
      const R: Transform = { rot: 6, mirror: 1, t: LP2_ZERO };
      const finalTransforms = transformations.map((T) => txCompose(R, T));

      // The supertile's own quad is built from specific child quad points.
      const superQuad: LP2[] = [
        txApply(finalTransforms[6], quad[2]),
        txApply(finalTransforms[5], quad[1]),
        txApply(finalTransforms[3], quad[2]),
        txApply(finalTransforms[0], quad[1]),
      ];

      const next = {} as Record<TileName, MetaTile>;
      for (const label of TILE_NAMES) {
        const subs = superRules[label];
        const geometries: { child: MetaTile; transform: Transform }[] = [];
        for (let i = 0; i < subs.length; i++) {
          const sub = subs[i];
          if (sub === null) continue;
          geometries.push({ child: prev[sub], transform: finalTransforms[i] });
        }
        next[label] = { kind: "meta", name: label, quad: superQuad, geometries };
      }
      return next;
    }
  </script>

  <script id="render-section" type="text/markdown">

  </script>

    function emitQuad(quad: LP2[], level: number, mystic: boolean): void {
      for (let i = 0; i < 4; i++) {
        const q = quad[i];
        outlineQuadsList.push(q.a[0], q.a[1], q.b[0], q.b[1]);
      }
      outlineLevelsList.push(level);
      outlineMysticList.push(mystic ? 1 : 0);
      outlineCount.value++;
    }

    function walkOutlines(mt: MetaTile, parent: Transform, level: number): void {
      const absoluteQuad: LP2[] = mt.quad.map((q) => txApply(parent, q));
      emitQuad(absoluteQuad, level, _isMystic(mt));
      if (mt.kind === "leaf" || level >= outlineCap) return;
      for (const { child, transform: T } of mt.geometries) {
        walkOutlines(child, txCompose(parent, T), level + 1);
      }
    }
    walkOutlines(renderCluster[renderStartingTile], txIdentity, 0);

    const outlineQuadsLP2 = new Float32Array(outlineQuadsList);
    const outlineLevelsArr = new Float32Array(outlineLevelsList);
    const outlineMysticArr = new Uint8Array(outlineMysticList);
    const outlineN = outlineCount.value;
  </script>

  <script id="render-poses" type="text/x-typescript">
    // Morph-driven cell: project each LP² translation to cartesian using the
    // current (a, b) and pack pose floats. Re-runs whenever the morph slider
    // moves but not when only colors change.
    const _tPoses = performance.now();
    const renderPoses = new Float32Array(renderRaw.length * 5);
    // Inline lp2ToXY so we don't allocate [ax,ay], [bx,by], [tx,ty] per leaf.
    // Precompute the 12 (cos, sin) rotations indexed by t.rot ∈ [0, 12).
    const _cosTab = new Float64Array(12);
    const _sinTab = new Float64Array(12);
    for (let k = 0; k < 12; k++) {
      _cosTab[k] = Math.cos(k * Math.PI / 6);
      _sinTab[k] = Math.sin(k * Math.PI / 6);
    }
    // Pin the cluster centroid's *direction* to a depth-independent target
    // (the angle of the (1, 1) centroid at ORIENTATION_REFERENCE_DEPTH) so
    // (a) sliding the morph doesn't visibly rotate, and (b) bumping the depth
    // slider doesn't jump-rotate by the per-level ~10°. Magnitude is left to
    // the existing scale compensation in render-morph; here we only set the
    // rotation that brings C(a, b)(renderDepth)'s direction onto the target
    // direction. Translation still lands the centroid on its (1, 1) position
    // so the precomputed bounds continue to fit.
    const _CaX = renderClusterCwLP2.a[0] / renderClusterMass;
    const _CaY = renderClusterCwLP2.a[1] / renderClusterMass;
    const _CbX = renderClusterCwLP2.b[0] / renderClusterMass;
    const _CbY = renderClusterCwLP2.b[1] / renderClusterMass;
    const _CabX = renderA * _CaX + renderB * _CbX;
    const _CabY = renderA * _CaY + renderB * _CbY;
    const _C11X = _CaX + _CbX;
    const _C11Y = _CaY + _CbY;
    // Reference-depth (1, 1) centroid → depth-independent target direction.
    const _RaX = orientationRefCwLP2.a[0] / orientationRefMass;
    const _RaY = orientationRefCwLP2.a[1] / orientationRefMass;
    const _RbX = orientationRefCwLP2.b[0] / orientationRefMass;
    const _RbY = orientationRefCwLP2.b[1] / orientationRefMass;
    const _TgtX = _RaX + _RbX;
    const _TgtY = _RaY + _RbY;
    const _Lab2 = _CabX * _CabX + _CabY * _CabY;
    const _Ltgt2 = _TgtX * _TgtX + _TgtY * _TgtY;
    let _cosA = 1, _sinA = 0;
    if (_Lab2 > 1e-12 && _Ltgt2 > 1e-12) {
      const _inv = 1 / Math.sqrt(_Lab2 * _Ltgt2);
      _cosA = (_CabX * _TgtX + _CabY * _TgtY) * _inv;
      _sinA = (_CabX * _TgtY - _CabY * _TgtX) * _inv;
    }
    // Compose an extra 90° CCW so the cluster's tall axis lays out
    // horizontally — better fit on wide screens. R(α + 90°): cos → −sin,
    // sin → cos.
    {
      const _baseC = _cosA, _baseS = _sinA;
      _cosA = -_baseS;
      _sinA =  _baseC;
    }
    {
      const _N = renderRaw.length;
      const _rotA = renderRaw.rot, _mirA = renderRaw.mir;
      const _taX = renderRaw.taX, _taY = renderRaw.taY;
      const _tbX = renderRaw.tbX, _tbY = renderRaw.tbY;
      for (let i = 0; i < _N; i++) {
        const rawX = renderA * _taX[i] + renderB * _tbX[i];
        const rawY = renderA * _taY[i] + renderB * _tbY[i];
        // Pivot rotation about the (a, b) centroid, then translate so the
        // centroid lands at its (1, 1) location: cluster centroid is screen-stable.
        const sX = rawX - _CabX, sY = rawY - _CabY;
        const r = _rotA[i];
        const ct = _cosTab[r], st = _sinTab[r];
        const base = i * 5;
        renderPoses[base + 0] = (_cosA * sX - _sinA * sY) + _C11X;
        renderPoses[base + 1] = (_sinA * sX + _cosA * sY) + _C11Y;
        renderPoses[base + 2] = _cosA * ct - _sinA * st;
        renderPoses[base + 3] = _sinA * ct + _cosA * st;
        renderPoses[base + 4] = _mirA[i] ? -1 : 1;

    console.log(`[perf] render-poses (${renderRaw.length.toLocaleString()} tiles): ${(performance.now() - _tPoses).toFixed(1)} ms`);
  </script>

  <script id="outlines-pack" type="text/x-typescript">
    // Morph-driven cell: project each metatile's LP² quad to cartesian using
    // the current (a, b) and the same rotation/translation compensation as
    // render-poses, then emit a closed polyline per metatile (5 vertices for
    // p0–p3–p0 plus a break vertex to terminate). The break vertex carries
    // breakFlag = 0 so the line shader zeroes its width and clip.w.
    const _oCaX = renderClusterCwLP2.a[0] / renderClusterMass;
    const _oCaY = renderClusterCwLP2.a[1] / renderClusterMass;
    const _oCbX = renderClusterCwLP2.b[0] / renderClusterMass;
    const _oCbY = renderClusterCwLP2.b[1] / renderClusterMass;
    const _oCabX = renderA * _oCaX + renderB * _oCbX;
    const _oCabY = renderA * _oCaY + renderB * _oCbY;
    const _oC11X = _oCaX + _oCbX;
    const _oC11Y = _oCaY + _oCbY;
    const _oRaX = orientationRefCwLP2.a[0] / orientationRefMass;
    const _oRaY = orientationRefCwLP2.a[1] / orientationRefMass;
    const _oRbX = orientationRefCwLP2.b[0] / orientationRefMass;
    const _oRbY = orientationRefCwLP2.b[1] / orientationRefMass;
    const _oTgtX = _oRaX + _oRbX;
    const _oTgtY = _oRaY + _oRbY;
    const _oLab2 = _oCabX * _oCabX + _oCabY * _oCabY;
    const _oLtgt2 = _oTgtX * _oTgtX + _oTgtY * _oTgtY;
    let _oCosA = 1, _oSinA = 0;
    if (_oLab2 > 1e-12 && _oLtgt2 > 1e-12) {
      const _oInv = 1 / Math.sqrt(_oLab2 * _oLtgt2);
      _oCosA = (_oCabX * _oTgtX + _oCabY * _oTgtY) * _oInv;
      _oSinA = (_oCabX * _oTgtY - _oCabY * _oTgtX) * _oInv;

    // tile mesh instead of detaching from it.

      _oSinA =  _baseC;

    // widthPx). The line shader's getVertex synthesises 7 logical indices
    // per quad (4 corners + 2 wrap helpers + 1 break) on top of these 4

    // join instead of an end-cap. See the lineVertexShaderBody comment.

    // table; each finer tier steps to a smaller value, clamped at 1 px.
    // That keeps the visual hierarchy consistent even when renderDepth is
    // small (e.g., depth 1 still shows the top quad at 9 px, not 1 px).
    // Render order = level descending so coarser (wider) outlines land
    // *on top* of the finer ones they enclose.

    const QUAD_WIDTHS = [9, 7, 5, 4, 3, 2];

      for (let j = 0; j < 4; j++) {
        const off = (src * 4 + j) * 4;

        const bx = outlineQuadsLP2[off + 2], by = outlineQuadsLP2[off + 3];

        const rawY = renderA * ay + renderB * by;

        const y = (_oSinA * sX + _oCosA * sY) + _oC11Y;

        outlineVertexBuf[o + 0] = x;
        outlineVertexBuf[o + 1] = y;
        outlineVertexBuf[o + 2] = paletteIdx;

      }

    gpuState.setOutlines(outlineVertexBuf, outlineN * 7, _outlineMaxW);
  </script>

  <script id="outlines-uniforms" type="text/x-typescript">
    // Toggle drives only an enabled flag; the per-vertex widths are baked
    // into the storage buffer in outlines-pack, so there's no uniform to
    // push when the toggle flips.
    gpuState.setOutlinesEnabled(renderShowOutlines);
  </script>

  <script id="spectre-mesh-projected" type="text/x-typescript">
    // Per-morph mesh data, one polygon per parity. Even-parity tiles (the
    // majority — every tile outside a Γ subtree has even rotation) project
    // the canonical lattice at (a, b); odd-parity tiles project at (b, a),
    // which gives the parity-flipped tile shape (turtle if even is hat).
    // At a = b both meshes coincide and the morph is invisible. We also
    // re-triangulate the polygon every frame so the morph can extend past
    // hat/turtle to the degenerate endpoints, where vertices coincide and
    // the original triangulation would flip / overlap.
    const meshEvenData = new Float32Array(28);
    const meshOddData  = new Float32Array(28);
    for (let i = 0; i < 14; i++) {
      const [ex, ey] = lp2ToXY(spectreLatticeVertices2[i], renderA, renderB);
      const [ox, oy] = lp2ToXY(spectreLatticeVertices2[i], renderB, renderA);
      meshEvenData[i * 2]     = ex; meshEvenData[i * 2 + 1] = ey;
      meshOddData [i * 2]     = ox; meshOddData [i * 2 + 1] = oy;
    }
    gpuState.uploadMeshes(meshEvenData, meshOddData);
    // Triangulate per parity. At intermediate morph values both polygons
    // share topology and earcut gives identical results; at the ±2 ends one
    // is a hexagon and the other a 7-gon-with-spike, so they need their
    // own triangulations. earcut may return < 36 indices when the polygon
    // is degenerate; pad with index 0 so the drawIndexed(36, …) call still
    // fires (the resulting collapsed triangles are zero-area).
    const _earcutInto = (verts: Float32Array): Uint16Array => {
      const idx = earcut(Array.from(verts));
      const out = new Uint16Array(36);
      for (let i = 0; i < idx.length && i < 36; i++) out[i] = idx[i];
      return out;
    };
    gpuState.uploadFillIndices(_earcutInto(meshEvenData), _earcutInto(meshOddData));
  </script>

  <script id="gpu-render" type="text/x-typescript">
    // Color-driven cell: re-blends RGB at the current color level and uploads
    // the combined instance buffer. Re-runs on morph (poses changed) or color
    // (rgb changed). Bounds are stable across both, so gpuState.draw skips
    // refitting and the user's pan/zoom is preserved.
    const _tGpuRender = performance.now();
    const N = renderRaw.length;
    // Pack into the compact 16 B layout via three views over one ArrayBuffer:
    // float32x2 (tx, ty), snorm16x2 (cos, sin), unorm8x4 (r, g, b, mirror).
    const gpuInstancesBuf = new ArrayBuffer(N * INSTANCE_STRIDE);
    const gpuInstancesF32 = new Float32Array(gpuInstancesBuf);
    const gpuInstancesI16 = new Int16Array(gpuInstancesBuf);
    const gpuInstancesU8  = new Uint8Array(gpuInstancesBuf);

    // string-keyed lookups.
    const _maxAncestry = renderDepth + 1;
    // Map the range slider to (center, σ) for the Gaussian: bar midpoint
    // picks the peak ancestor level, half-width sets σ so the bar's edges
    // sit at ±1σ. Floor σ at 0.05 so a fully collapsed bar still picks
    // out a single tier instead of dividing by zero.
    const _crLo = renderColorRange.range[0];
    const _crHi = renderColorRange.range[1];
    const _crCenter = (_crLo + _crHi) * 0.5;
    const _crSigma  = Math.max(0.05, (_crHi - _crLo) * 0.5);
    const _wts = new Float64Array(_maxAncestry + 1);
    for (let d = 0; d <= _maxAncestry; d++) {

    // Per-tile lightness jitter via R₁ low-discrepancy sequence
    // x[i] = (0.5 + i/φ) mod 1 — breaks up flat regions with a couple

    // counter so the inner loop pays one fp add (and a rare branch) per
    // tile instead of an fp modulo.
    const PHI_INV = 0.6180339887498949;
    const LIGHT_JITTER = 0.12;
    let _phase = 0.5;
    for (let i = 0; i < N; i++) {
      const w0 = _wts[0];
      const c0 = rawLabelIdx[i] * 3;
      let r = paletteRGB[c0    ] * w0;
      let g = paletteRGB[c0 + 1] * w0;
      let b = paletteRGB[c0 + 2] * w0;
      let tot = w0;
      const ancStart = rawAncestryStart[i];
      const ancLen   = rawAncestryLen[i];
      for (let j = ancLen - 1; j >= 0; j--) {
        const w = _wts[ancLen - j];
        const cIdx = rawAncestryFlat[ancStart + j] * 3;
        r += paletteRGB[cIdx    ] * w;
        g += paletteRGB[cIdx + 1] * w;
        b += paletteRGB[cIdx + 2] * w;
        tot += w;

      const jitter = _phase - 0.5;
      _phase += PHI_INV;
      if (_phase >= 1) _phase -= 1;
      const inv = (1 + jitter * LIGHT_JITTER) / tot;
      const ip = i * 5;
      // float32x2 at byte 0
      gpuInstancesF32[i * 4 + 0] = renderPoses[ip + 0];
      gpuInstancesF32[i * 4 + 1] = renderPoses[ip + 1];
      // snorm16x2 at byte 8 — multiply [-1, 1] by 32767, truncate.
      gpuInstancesI16[i * 8 + 4] = (renderPoses[ip + 2] * 32767) | 0;
      gpuInstancesI16[i * 8 + 5] = (renderPoses[ip + 3] * 32767) | 0;

      const ri = (r * inv * 255) | 0;
      const gi = (g * inv * 255) | 0;
      const bi = (b * inv * 255) | 0;

      gpuInstancesU8[i * 16 + 13] = gi < 0 ? 0 : gi > 255 ? 255 : gi;
      gpuInstancesU8[i * 16 + 14] = bi < 0 ? 0 : bi > 255 ? 255 : bi;

    console.log(`[perf] gpu-render pack (${N.toLocaleString()} tiles): ${(performance.now() - _tGpuRender).toFixed(1)} ms`);
    const _tDraw = performance.now();
    gpuState.draw(gpuInstancesU8, renderBounds, renderEvenCount);
    console.log(`[perf] gpu-render draw: ${(performance.now() - _tDraw).toFixed(1)} ms`);
  </script>
