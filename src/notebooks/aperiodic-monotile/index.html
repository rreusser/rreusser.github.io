    # Rendering the Aperiodic Monotile

    A work-in-progress notebook for rendering the *spectre* — the chiral aperiodic monotile of [Smith, Myers, Kaplan, and Goodman-Strauss](https://arxiv.org/abs/2305.17743) — and the rest of the Tile(a, b) family it belongs to (the [hat](https://arxiv.org/abs/2303.10798) and turtle).

    The plan is to build the substitution system in exact integer arithmetic over ℤ[ω] (ω = e<sup>iπ/6</sup>), then render the resulting tiles using instanced WebGPU.
