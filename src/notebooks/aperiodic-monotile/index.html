  <script id="intro" type="text/markdown">
    ## Summary

    A WebGPU rendering of the *spectre* — the chiral aperiodic monotile of [Smith, Myers, Kaplan, and Goodman-Strauss](https://arxiv.org/abs/2305.17743) — and the rest of the Tile(*a*, *b*) family it belongs to (the [hat](https://arxiv.org/abs/2303.10798) and turtle).

    The substitution machinery is a port of [Craig S. Kaplan's `spectre.js`](https://cs.uwaterloo.ca/~csk/spectre/spectre.js), the p5.js reference linked from the paper page; specific attribution is in the substitution section below.

    What's added on top: tile translations are split into separate (*a*, *b*) components so the hat ↔ spectre ↔ turtle morph is a per-frame projection rather than a fresh substitution; the figure is counter-rotated each frame so depth changes and morph changes don't spin it; and the cluster is drawn with WebGPU instancing — a single 16-byte transform per tile — that scales to ~17 M tiles at depth 8.
  </script>


  <script id="spectre-section" type="text/markdown">
    ## The spectre

    The spectre is a 14-gon. Every edge has unit length and every interior angle is a multiple of 30°. Two consecutive edges (here at vertex 10) are collinear, which is what allows this same combinatorial polygon to deform into the *hat* and *turtle* by giving the two collinear edges different lengths.
  </script>

  <script id="spectre-vertices" type="text/x-typescript">

      [2.5 + s,   1.5 - s ],
      [3 + s,     1.5     ],

      [3 - s,     1.5     ],
      [2.5 - s,   1.5 + s ],
      [1.5 - s,   1.5 + s ],
      [0.5 - s,   1.5 + s ],
      [-s,        1.5     ],
      [0,         1       ],

  <script id="spectre-svg" type="text/x-typescript">
    // Walk the spectre boundary at the slider's (a, b). Same edge-type
    // partition and same morph parameterization as the WebGPU pipeline.
    const _ssEdgeDirs = [0, 10, 1, 3, 0, 2, 5, 7, 4, 6, 6, 8, 11, 9];
    const _ssAMask = [true, true, false, false, true, true, false, false,
                      true, true, true, true, false, false];
    const _ssAbs = Math.abs(spectreDemoMorph);
    let _ssAR: number, _ssBR: number;
    if (_ssAbs <= 1) {
      _ssAR = 1 + (Math.sqrt(3) - 1) * Math.max(0,  spectreDemoMorph);
      _ssBR = 1 + (Math.sqrt(3) - 1) * Math.max(0, -spectreDemoMorph);
    } else {
      const _t = _ssAbs - 1;
      const _long = Math.sqrt(3) + (2 - Math.sqrt(3)) * _t;
      const _short = 1 - _t;
      [_ssAR, _ssBR] = spectreDemoMorph > 0 ? [_long, _short] : [_short, _long];
    }
    const _ssNorm = 2 / Math.max(1e-9, _ssAR + _ssBR);
    const _ssA = _ssAR * _ssNorm, _ssB = _ssBR * _ssNorm;

    const _ssVerts: [number, number][] = [[0, 0]];
    {
      let x = 0, y = 0;
      for (let i = 0; i < 13; i++) {
        const ang = _ssEdgeDirs[i] * Math.PI / 6;
        const len = _ssAMask[i] ? _ssA : _ssB;
        x += len * Math.cos(ang);
        y += len * Math.sin(ang);
        _ssVerts.push([x, y]);
      }
    }
    // Center on the polygon's actual bbox each frame and pick a square
    // viewBox big enough to contain the largest dimension at this morph.
    // The degenerate spike at morph = +2 reaches ~6 units across (spike
    // length 2a = 4 plus the rest of the outline), so a fixed side under
    // ~6 would clip the tile at the edges.
    let _ssMnX = Infinity, _ssMxX = -Infinity, _ssMnY = Infinity, _ssMxY = -Infinity;
    for (const [x, y] of _ssVerts) {
      if (x < _ssMnX) _ssMnX = x; if (x > _ssMxX) _ssMxX = x;
      if (y < _ssMnY) _ssMnY = y; if (y > _ssMxY) _ssMxY = y;
    }
    const _ssCx = (_ssMnX + _ssMxX) / 2;
    const _ssCy = (_ssMnY + _ssMxY) / 2;
    const _ssMaxDim = Math.max(_ssMxX - _ssMnX, _ssMxY - _ssMnY);
    // Floor at 4.8 keeps the polygon a comfortable size at the spectre
    // case; otherwise track the actual extent with a little breathing
    // room around the vertices and labels.
    const _ssSide = Math.max(4.8, _ssMaxDim + 0.6);
    const _ssVbX = _ssCx - _ssSide / 2;
    const _ssVbY = -_ssCy - _ssSide / 2;
    const _ssVbW = _ssSide;
    const _ssVbH = _ssSide;
    const _ssPts = _ssVerts.map(([x, y]) => `${x},${-y}`).join(" ");
    const _ssSize = Math.min(360, width);

    display(html`<figure style="margin: 0 auto; text-align: center;">
      <svg viewBox="${_ssVbX} ${_ssVbY} ${_ssVbW} ${_ssVbH}"
           width="${_ssSize}" height="${_ssSize}"
           style="display: block; margin: 0 auto;">
        <polygon points="${_ssPts}"
                 fill="#cfe1f5" stroke="#222" stroke-width="0.03"
                 stroke-linejoin="round" />
        ${_ssVerts.map(([x, y], i) => html`
          <circle cx="${x}" cy="${-y}" r="0.06" fill="#222" />
          <text x="${x}" y="${-y}" dy="-0.16" font-size="0.22"
                text-anchor="middle" fill="#666">${i}</text>
        `)}
      </svg>
      <figcaption>
        Vertices of the spectre tile, indexed 0–13. Drag the slider to morph between hat, spectre, turtle, and the degenerate endpoints.
      </figcaption>
    </figure>`);
  </script>

  <script id="edge-editor-section" type="text/markdown">
    ### Curving the edges

    The chiral spectre tiles aperiodically when each edge is replaced by a single shared cubic-Bézier curve, applied identically in every edge's local frame and made invariant under 180° rotation about its own midpoint. The same curve covers both *a*-edges (length *a*) and *b*-edges (length *b*) — the matching condition forces them to be one and the same. That collapses the editor to a single master handle (its mate on the same edge follows from the symmetry); two free numbers in total.

    The editor lives in the figure's controls panel above so you see the WebGPU tiling update as you drag. Only edge 0 (the bottom horizontal *a*-edge) carries handles, since every other edge is forced to use the same shape; the curves still render on all 14 edges so you can see the resulting tile.
  </script>

  <script id="tile-edge-geometry" type="text/x-typescript">
    // Shared geometry helpers for the curved-edge editor and the mesh
    // build below. Lives in its own cell so both consumers (the SVG
    // editor and the per-morph polygon refinement) reuse the same
    // definition of "control points for edge i" — keeping the editor's
    // visual handles consistent with the rendered triangulation.
    //
    // The matching condition for the chiral spectre's curved edges is:
    // every edge — a-edge and b-edge alike — uses the same curve in
    // its own edge-local frame, and that curve is point-symmetric
    // about its midpoint. The mirror tile from the substitution rule
    // ties a- and b-edges together, so they can't be set independently;
    // anything else leaves visible mismatches at the mystic's overlap.
    // One free handle (its mate inside the same edge falls out of the
    // symmetry), 2 DOF total.
    //
    // Handles live in edge-local fractional coords (t along the edge in
    // units of edge length, n perpendicular in the same units). Default
    // = (1/3, 0) and (2/3, 0), the equally-spaced control points of a
    // straight cubic; midpoint symmetry is satisfied for free, so the
    // resting state is the original straight-edge spectre.
    type EdgeHandles = { h1t: number; h1n: number; h2t: number; h2n: number };
    const DEFAULT_HANDLES: EdgeHandles = { h1t: 1/3, h1n: 0, h2t: 2/3, h2n: 0 };

    function projectSpectreVerts(a: number, b: number): [number, number][] {
      return spectreLatticeVertices2.map((p) =>
        [a * p.a[0] + b * p.b[0], a * p.a[1] + b * p.b[1]] as [number, number]);
    }
    // Edge i: V(i) → V((i+1) mod 14). Returns origin, unit tangent, unit
    // normal (90° CW from tangent → outward), and length.
    function edgeFrame(verts: [number, number][], i: number) {
      const p0 = verts[i];
      const p1 = verts[(i + 1) % 14];
      const dx = p1[0] - p0[0], dy = p1[1] - p0[1];
      const len = Math.hypot(dx, dy);
      const tx = dx / len, ty = dy / len;
      const nx = ty, ny = -tx;
      return { p0, p1, tx, ty, nx, ny, len };
    }
    // World-space control points for edge i. Even-indexed edges
    // apply the master curve forward; odd-indexed edges apply it
    // reversed in edge-local coords:
    //   forward:  C1 = (h1t, h1n),     C2 = (h2t, h2n)
    //   reverse:  C1 = (1 − h2t, h2n), C2 = (1 − h1t, h1n)
    // i.e. swap c1↔c2 and flip t. That's the "even/odd parity"
    // hypothesis for the spectre's edge-matching partition.
    function controlPointsFor(
      i: number,
      handlesByEdge: Record<number, EdgeHandles>,
      verts: [number, number][],
    ): { c1: [number, number]; c2: [number, number] } {
      const h = handlesByEdge[i];
      const reversed = (i & 1) === 1;
      const ht1 = reversed ? 1 - h.h2t : h.h1t;
      const hn1 = reversed ? h.h2n     : h.h1n;
      const ht2 = reversed ? 1 - h.h1t : h.h2t;
      const hn2 = reversed ? h.h1n     : h.h2n;
      const f = edgeFrame(verts, i);
      const c1: [number, number] = [
        f.p0[0] + ht1 * (f.p1[0] - f.p0[0]) + hn1 * f.len * f.nx,
        f.p0[1] + ht1 * (f.p1[1] - f.p0[1]) + hn1 * f.len * f.ny,
      ];
      const c2: [number, number] = [
        f.p0[0] + ht2 * (f.p1[0] - f.p0[0]) + hn2 * f.len * f.nx,
        f.p0[1] + ht2 * (f.p1[1] - f.p0[1]) + hn2 * f.len * f.ny,
      ];
      return { c1, c2 };
    }
  </script>

  <script id="edge-editor" type="text/x-typescript">
    // SVG editor for the spectre's single cubic-Bézier shape. All 14
    // edges share one EdgeHandles object (in edge-local fractional
    // coords) — both a-edges and b-edges, since the substitution's
    // mirror tile forces them to be the same curve. Within the curve
    // the c2 handle mirrors c1 through the edge midpoint:
    //   h2t = 1 − h1t,  h2n = −h1n
    // and the defaults (1/3, 0) / (2/3, 0) already satisfy that, so
    // the resting state is the original straight-edge spectre.
    //
    // The editor lives in the WebGPU figure's controls panel
    // (#spectre-controls) so the tiling redraws as the user drags;
    // the markdown introduction above sits in document position and
    // explains the colour tinting (a-edges orange, b-edges blue) —
    // visual only, every handle drives the same shared curve.

    // One curve, 14 references to it. _handleStore lets controlPointsFor
    // / the mesh build index by raw edge number without knowing about
    // the linkage.
    const _curve: EdgeHandles = { ...DEFAULT_HANDLES };
    const _handleStore: Record<number, EdgeHandles> = {};
    for (let i = 0; i < 14; i++) _handleStore[i] = _curve;
    function checkDefault(): boolean {
      const tol = 1e-9;
      return Math.abs(_curve.h1t - 1/3) < tol && Math.abs(_curve.h1n) < tol
          && Math.abs(_curve.h2t - 2/3) < tol && Math.abs(_curve.h2n) < tol;
    }
    // Mirror the dragged handle through the edge midpoint to keep the
    // shared curve point-symmetric. (1/2, 0) is the midpoint in
    // edge-local fractional coords, so the rotation is (t, n) →
    // (1 − t, −n).
    function syncSymmetry(curve: EdgeHandles, handle: 'c1' | 'c2'): void {
      if (handle === 'c1') { curve.h2t = 1 - curve.h1t; curve.h2n = -curve.h1n; }
      else                 { curve.h1t = 1 - curve.h2t; curve.h1n = -curve.h2n; }
    }

    // ─── SVG editor ───────────────────────────────────────────────────────
    // Single cell that drives both the visual editor and the downstream
    // tileEdges generator. The editor is appended into the WebGPU
    // figure's #spectre-controls panel so dragging gives immediate
    // feedback; pointer events on the root <svg> update the dragged
    // edge's type-shared curve, mirror inside the curve via syncSymmetry,
    // and emit 'input' so dependent cells re-run.
    // The single edge whose handles are draggable. Every other edge
    // shares this curve, so the rest are redundant and would just clutter
    // the editor; the curves are still rendered on all 14 edges.
    const EDITABLE_EDGE = 0;

    const _editorRoot = document.createElement('div');
    _editorRoot.style.cssText = 'margin: 4px auto; max-width: 100%;';
    // Flat single-edge layout: P0 at (0,0), P3 at (1,0), with vertical
    // headroom above and below for handles dragged off-axis. ViewBox
    // and element aspect ratios match (1.4 × 0.8 world ↔ 280 × 160 px,
    // both 1.75:1) so SVG's default uniform scaling doesn't stretch
    // the content — and a 1-pixel mouse move translates to the same
    // world delta in both axes, which fixes drag-tracking.
    const _editorW = 280;
    const _editorH = 160;
    const _eVbX = -0.2, _eVbY = -0.4;
    const _eVbW = 1.4,  _eVbH = 0.8;

    const _svgNS = 'http://www.w3.org/2000/svg';
    const _svg = document.createElementNS(_svgNS, 'svg');
    _svg.setAttribute('viewBox', `${_eVbX} ${_eVbY} ${_eVbW} ${_eVbH}`);
    _svg.setAttribute('width', String(_editorW));
    _svg.setAttribute('height', String(_editorH));
    _svg.style.cssText = 'display: block; margin: 0 auto; touch-action: none; user-select: none; cursor: default;';

    // Color coding for the two edge types: a-edges (length a) in
    // orange, b-edges (length b) in blue, so the user can see at a
    // glance which handles are linked together.
    const A_COLOR = '#cc7a00';
    const B_COLOR = '#2c6fb3';
    function edgeColor(i: number): string {
      return SPECTRE_A_EDGES.has(i) ? A_COLOR : B_COLOR;
    }

    function rerender(): void {
      while (_svg.firstChild) _svg.removeChild(_svg.firstChild);
      const c = _curve;
      // Light-on-dark palette so the editor reads on the controls
      // panel's dark background.
      const CHORD_COL = '#666', CURVE_COL = '#e8e8e8';
      const STEM = '#aaa', PT = '#e8e8e8', HANDLE_COL = A_COLOR;

      // Faint chord from P0=(0,0) to P3=(1,0).
      const chord = document.createElementNS(_svgNS, 'line');
      chord.setAttribute('x1', '0');  chord.setAttribute('y1', '0');
      chord.setAttribute('x2', '1');  chord.setAttribute('y2', '0');
      chord.setAttribute('stroke', CHORD_COL);
      chord.setAttribute('stroke-width', '0.012');
      chord.setAttribute('stroke-dasharray', '0.04 0.03');
      _svg.appendChild(chord);

      // Curve: cubic from (0,0) to (1,0) through (h1t, h1n) and
      // (h2t, h2n). SVG y is flipped relative to edge-local n.
      const path = document.createElementNS(_svgNS, 'path');
      path.setAttribute('d',
        `M 0 0 C ${c.h1t} ${-c.h1n}, ${c.h2t} ${-c.h2n}, 1 0`);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', CURVE_COL);
      path.setAttribute('stroke-width', '0.025');
      _svg.appendChild(path);

      // Endpoint and midpoint markers (informational; not draggable).
      for (const [x, y] of [[0, 0], [1, 0], [0.5, 0]] as const) {
        const dot = document.createElementNS(_svgNS, 'circle');
        dot.setAttribute('cx', String(x));
        dot.setAttribute('cy', String(-y));
        dot.setAttribute('r', '0.04');
        dot.setAttribute('fill', PT);
        _svg.appendChild(dot);
      }

      // Two handle stems + dots. Dots in a second pass so they sit on top.
      const handles: Array<['c1' | 'c2', [number, number], [number, number]]> = [
        ['c1', [0, 0], [c.h1t, c.h1n]],
        ['c2', [1, 0], [c.h2t, c.h2n]],
      ];
      for (const [, anchor, to] of handles) {
        const ln = document.createElementNS(_svgNS, 'line');
        ln.setAttribute('x1', String(anchor[0])); ln.setAttribute('y1', String(-anchor[1]));
        ln.setAttribute('x2', String(to[0]));     ln.setAttribute('y2', String(-to[1]));
        ln.setAttribute('stroke', STEM);
        ln.setAttribute('stroke-width', '0.014');
        ln.setAttribute('stroke-dasharray', '0.04 0.03');
        _svg.appendChild(ln);
      }
      for (const [which, , to] of handles) {
        const dot = document.createElementNS(_svgNS, 'circle');
        dot.setAttribute('cx', String(to[0])); dot.setAttribute('cy', String(-to[1]));
        dot.setAttribute('r', '0.05');
        dot.setAttribute('fill', HANDLE_COL);
        dot.setAttribute('stroke', '#222');
        dot.setAttribute('stroke-width', '0.012');
        dot.setAttribute('cursor', 'grab');
        (dot as any).dataset.handle = which;
        _svg.appendChild(dot);
      }
    }

    // Pointer-to-SVG-coord conversion.
    function svgPoint(ev: PointerEvent): [number, number] {
      const rect = _svg.getBoundingClientRect();
      const fx = (ev.clientX - rect.left) / rect.width;
      const fy = (ev.clientY - rect.top)  / rect.height;
      return [_eVbX + fx * _eVbW, _eVbY + fy * _eVbH];
    }

    function emit(): void {
      const isDef = checkDefault();
      _resetBtn.disabled = isDef;
      // Fresh wrapper each tick so dependents that compare by identity see
      // a change. byEdge still points at the live store; consumers read
      // it as a snapshot during the cell run.
      (_editorRoot as any).value = { byEdge: _handleStore, isDefault: isDef };
      _editorRoot.dispatchEvent(new Event('input', { bubbles: true }));
    }

    let _drag: { handle: 'c1' | 'c2'; pointerId: number } | null = null;
    _svg.addEventListener('pointerdown', (ev) => {
      const target = ev.target as HTMLElement | null;
      if (!target || target.tagName.toLowerCase() !== 'circle') return;
      const handle = (target as any).dataset.handle;
      if (handle !== 'c1' && handle !== 'c2') return;
      _drag = { handle, pointerId: ev.pointerId };
      _svg.setPointerCapture(ev.pointerId);
      target.setAttribute('cursor', 'grabbing');
      ev.preventDefault();
    });
    _svg.addEventListener('pointermove', (ev) => {
      if (!_drag || ev.pointerId !== _drag.pointerId) return;
      // SVG coords are already in edge-local (t, n). Y is flipped:
      // n = −y_svg.
      const [sx, sy] = svgPoint(ev);
      const t = sx, n = -sy;
      if (_drag.handle === 'c1') { _curve.h1t = t; _curve.h1n = n; }
      else                       { _curve.h2t = t; _curve.h2n = n; }
      rerender();
      emit();
    });
    const _endDrag = (ev: PointerEvent): void => {
      if (!_drag || ev.pointerId !== _drag.pointerId) return;
      _drag = null;
      try { _svg.releasePointerCapture(ev.pointerId); } catch {}
    };
    _svg.addEventListener('pointerup', _endDrag);
    _svg.addEventListener('pointercancel', _endDrag);

    // Reset button.
    const _btnRow = document.createElement('div');
    _btnRow.style.cssText = 'display: flex; justify-content: center; margin-top: 4px; font-family: var(--sans-serif); font-size: 13px;';
    const _resetBtn = document.createElement('button');
    _resetBtn.type = 'button';
    _resetBtn.textContent = 'Reset to straight edges';
    _resetBtn.style.cssText = 'padding: 3px 10px; font-size: 12px; cursor: pointer;';
    _resetBtn.disabled = true;
    _resetBtn.addEventListener('click', () => {
      Object.assign(_curve, DEFAULT_HANDLES);
      rerender();
      emit();
    });
    _btnRow.appendChild(_resetBtn);

    _editorRoot.appendChild(_svg);
    _editorRoot.appendChild(_btnRow);
    rerender();
    (_editorRoot as any).value = { byEdge: _handleStore, isDefault: true };
    // Append into the WebGPU figure's controls panel (the same element
    // that hosts the depth / morph / palette controls) so dragging a
    // handle gives immediate feedback in the tiling. The cell's
    // dependency on `controlsContainer` makes Observable run this cell
    // after `render-controls` even though we're earlier in document
    // order.
    controlsContainer.appendChild(_editorRoot);
    const tileEdges = Generators.input(_editorRoot);
  </script>

  <script id="morph-strip-section" type="text/markdown">
    The same 14-vertex polygon is part of a one-parameter family Tile(*a*, *b*). The 14 edges have fixed directions (multiples of 30°) and fixed types — eight *a*-edges and six *b*-edges — and only their lengths change as you slide *a* and *b*. The five named stops along the morph slider above:
  </script>

  <script id="morph-strip" type="text/x-typescript">
    // Walk the spectre boundary at any (a, b). The 14 edges have fixed
    // directions (multiples of 30°) and a fixed type (a-edge or b-edge);
    // varying (a, b) just rescales each edge in place — which is exactly
    // what the morph slider above does.
    const _edgeDirs = [0, 10, 1, 3, 0, 2, 5, 7, 4, 6, 6, 8, 11, 9];
    const _aMask = [true, true, false, false, true, true, false, false,
                    true, true, true, true, false, false];
    function _polyAt(a: number, b: number): [number, number][] {
      const verts: [number, number][] = [[0, 0]];
      let x = 0, y = 0;
      for (let i = 0; i < 13; i++) {
        const ang = _edgeDirs[i] * Math.PI / 6;
        const len = _aMask[i] ? a : b;
        x += len * Math.cos(ang);
        y += len * Math.sin(ang);
        verts.push([x, y]);
      }
      return verts;
    }
    // Same piecewise parameterization as render-morph; sample any slider
    // position deterministically.
    function _morphToAB(m: number): [number, number] {
      const absM = Math.abs(m);
      let aR: number, bR: number;
      if (absM <= 1) {
        aR = 1 + (Math.sqrt(3) - 1) * Math.max(0,  m);
        bR = 1 + (Math.sqrt(3) - 1) * Math.max(0, -m);
      } else {
        const t = absM - 1;
        const long  = Math.sqrt(3) + (2 - Math.sqrt(3)) * t;
        const short = 1 - t;
        [aR, bR] = m > 0 ? [long, short] : [short, long];
      }
      const norm = 2 / Math.max(1e-9, aR + bR);
      return [aR * norm, bR * norm];
    }

    const _stops = [
      { m: -2, name: "hexagon",  detail: "a → 0" },
      { m: -1, name: "hat",      detail: "b / a = √3" },
      { m:  0, name: "spectre",  detail: "a = b" },
      { m: +1, name: "turtle",   detail: "a / b = √3" },
      { m: +2, name: "7-gon",    detail: "b → 0" },
    ];
    type _MorphStop = { m: number; name: string; detail: string; verts: [number, number][] };
    const _shapes: _MorphStop[] = _stops.map(({ m, name, detail }) => {
      const [a, b] = _morphToAB(m);
      const verts = _polyAt(a, b);
      // Centre on bbox so all shapes sit at the same screen origin and a
      // single shared viewBox can hold them at the same scale.
      let mnx = Infinity, mxx = -Infinity, mny = Infinity, mxy = -Infinity;
      for (const [x, y] of verts) {
        if (x < mnx) mnx = x; if (x > mxx) mxx = x;
        if (y < mny) mny = y; if (y > mxy) mxy = y;
      }
      const cx = (mnx + mxx) / 2, cy = (mny + mxy) / 2;
      return { m, name, detail, verts: verts.map(([x, y]) => [x - cx, y - cy]) };
    });
    // Shared viewBox sized to the largest cluster so the spectre's *intrinsic*
    // size variation across the morph is visible.
    let _gMinX = Infinity, _gMaxX = -Infinity, _gMinY = Infinity, _gMaxY = -Infinity;
    for (const s of _shapes) for (const [x, y] of s.verts) {
      if (x < _gMinX) _gMinX = x; if (x > _gMaxX) _gMaxX = x;
      if (y < _gMinY) _gMinY = y; if (y > _gMaxY) _gMaxY = y;
    }
    const _pad = 0.3;
    const _vbX = _gMinX - _pad;
    const _vbY = -_gMaxY - _pad;
    const _vbW = (_gMaxX - _gMinX) + 2 * _pad;
    const _vbH = (_gMaxY - _gMinY) + 2 * _pad;
    const _wpx = Math.min(116, Math.floor((width - 40) / _shapes.length));

    display(html`<figure style="margin: 1em 0; text-align: center;">
      <div style="display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; align-items: flex-start;">
        ${_shapes.map((s) => html`
          <div style="display: flex; flex-direction: column; align-items: center;">
            <svg viewBox="${_vbX} ${_vbY} ${_vbW} ${_vbH}"
                 width="${_wpx}" height="${_wpx * _vbH / _vbW}"
                 style="display: block;">
              <polygon points="${s.verts.map(([x, y]) => `${x},${-y}`).join(' ')}"
                       fill="#cfe1f5" stroke="#222" stroke-width="0.04"
                       stroke-linejoin="round" />
            </svg>
            <div style="font-size: 0.85em; margin-top: 4px;"><strong>${s.name}</strong></div>
            <div style="font-size: 0.72em; color: var(--theme-foreground-alt);">${s.detail}</div>
            <div style="font-size: 0.7em; color: var(--theme-foreground-muted);">slider = ${s.m}</div>
          </div>
        `)}
      </div>
      <figcaption>
        Two pairs of consecutive collinear edges fuse into one at the endpoints, dropping the polygon from a 14-gon down to a hexagon (left) or a 7-gon with a long spike (right). Substitution still tiles the plane all the way through.
      </figcaption>
    </figure>`);
  </script>

  <script id="lattice-section" type="text/markdown">
    ## The (*a*, *b*) split

    The hat ↔ spectre ↔ turtle morph happens *after* the substitution, not during it. Every tile position is stored as a pair of 2-D vectors — one **a-component** ${tex`p_a`} and one **b-component** ${tex`p_b`} — and the cartesian point that gets drawn is a per-frame mix:

    ${tex.block`(x, y) = a \cdot p_a + b \cdot p_b.`}

    Substitution arithmetic acts on the two halves component-wise — the recursion never sees *a* or *b* — so moving the morph slider is a fresh projection over the existing tile list, not a re-substitution.
  </script>

  <script id="lattice-math" type="text/x-typescript">
    // LP is a 2-D point in cartesian coordinates. The substitution rules
    // only ever combine these via add / subtract / 30°-rotate / mirror —
    // all closed under simple float vector math. (Earlier revisions of
    // this notebook used a 4-int cyclotomic representation; floats are
    // half the memory and indistinguishable at typical zoom levels.)
    type LP = [number, number];

    const lpAdd = (p: LP, q: LP): LP => [p[0] + q[0], p[1] + q[1]];
    const lpSub = (p: LP, q: LP): LP => [p[0] - q[0], p[1] - q[1]];
    const lpNeg = (p: LP): LP        => [-p[0], -p[1]];
    const lpConj = (p: LP): LP       => [p[0], -p[1]]; // mirror across x-axis

    // Pre-computed cos / sin for the 12 multiples of 30°.
    const SQRT3_2 = Math.sqrt(3) / 2;
    const _LPCOS = new Float64Array(12);
    const _LPSIN = new Float64Array(12);
    for (let k = 0; k < 12; k++) {
      _LPCOS[k] = Math.cos(k * Math.PI / 6);
      _LPSIN[k] = Math.sin(k * Math.PI / 6);
    }

    function lpRotate(p: LP, k: number): LP {
      k = ((k % 12) + 12) % 12;
      const c = _LPCOS[k], s = _LPSIN[k];
      return [c * p[0] - s * p[1], s * p[0] + c * p[1]];
    }

    // Already cartesian — exposed for API compatibility with downstream code.
    const lpToXY = (p: LP): [number, number] => [p[0], p[1]];

    // ─── LP² ─────────────────────────────────────────────────────────────
    // To support the Tile(a, b) family (hat, spectre, turtle) every
    // position is split into an a-component and a b-component. Cartesian
    // projection is (x, y) = a · p.a + b · p.b, and is the only place the
    // real numbers a, b appear. Substitution arithmetic acts component-
    // wise on the two halves — the morph parameters never touch the
    // recursion.
    type LP2 = { a: LP; b: LP };
    const LP_ZERO: LP = [0, 0];
    const LP2_ZERO: LP2 = { a: LP_ZERO, b: LP_ZERO };

    const lp2Add  = (p: LP2, q: LP2): LP2 => ({ a: lpAdd(p.a, q.a), b: lpAdd(p.b, q.b) });
    const lp2Sub  = (p: LP2, q: LP2): LP2 => ({ a: lpSub(p.a, q.a), b: lpSub(p.b, q.b) });
    const lp2Neg  = (p: LP2): LP2          => ({ a: lpNeg(p.a),     b: lpNeg(p.b) });
    // Mirror across x-axis preserves edge-direction parity, so a-edges
    // stay a-edges and b-edges stay b-edges — no component swap.
    const lp2Conj = (p: LP2): LP2          => ({ a: lpConj(p.a),    b: lpConj(p.b) });
    // Rotation by k·30° flips edge-direction parity when k is odd. a-edges
    // live at even world directions (length a), b-edges at odd (length b);
    // an odd rotation moves every a-direction to an odd direction and vice
    // versa, so the rotated a-component physically becomes the new b-
    // component. Rotate both halves, swap them when k is odd. At a = b the
    // swap is invisible, which is why the spectre case worked without it.
    const lp2Rotate = (p: LP2, k: number): LP2 => {
      const ra = lpRotate(p.a, k);
      const rb = lpRotate(p.b, k);
      const odd = ((k % 2) + 2) % 2 === 1;
      return odd ? { a: rb, b: ra } : { a: ra, b: rb };
    };

    const lp2ToXY = (p: LP2, a: number, b: number): [number, number] =>
      [a * p.a[0] + b * p.b[0], a * p.a[1] + b * p.b[1]];
  </script>

  <script id="spectre-lattice-vertices" type="text/x-typescript">
    // The 14 spectre vertices as cartesian (x, y) — same data as the
    // hand-coded spectreVertices in the previous cell, just re-aliased
    // here so downstream code that historically expected a "lattice
    // vertex" array still finds it.
    const spectreLatticeVertices: LP[] = spectreVertices.map(([x, y]) => [x, y]);

    // ─── Edge type partition for the Tile(a, b) family ───────────────────
    // Each of the 14 edges is either an "a-edge" (length a) or a "b-edge"
    // (length b). The partition that works for every tile in the
    // substitution tiling is just edge-direction parity: edges in an
    // *even* multiple of 30° are one type, edges in an *odd* multiple
    // are the other.
    //
    // Walking the spectre boundary, the 14 edge directions in 30° units are
    //   [0, 10, 1, 3, 0, 2, 5, 7, 4, 6, 6, 8, 11, 9].
    // The eight even directions are e{0,1,4,5,8,9,10,11} (a-edges) and the
    // six odd directions are e{2,3,6,7,12,13} (b-edges). Both subsets sum
    // to the zero vector, so the polygon closes at every (a, b) ≥ 0.
    //
    // The collinear "spike" at vertex 10 is e9 + e10, both type a, so the
    // spike has length 2a (= 2 in the hat, = 2√3 in the turtle, = 2 in the
    // spectre) — not a + b.
    const SPECTRE_A_EDGES: ReadonlySet<number> = new Set([0, 1, 4, 5, 8, 9, 10, 11]);

    // Spectre vertices in LP² form: walk the boundary, accumulating each
    // edge's direction into the a- or b-component depending on its type.
    // At (a, b) = (1, 1) the sum of the two halves reproduces the
    // original cartesian vertex (verified in the next cell).
    const spectreLatticeVertices2: LP2[] = (() => {
      const vs: LP2[] = [{ a: [0, 0], b: [0, 0] }];
      let accA: LP = [0, 0], accB: LP = [0, 0];
      for (let i = 0; i < 13; i++) {
        const dir = lpSub(spectreLatticeVertices[i + 1], spectreLatticeVertices[i]);
        if (SPECTRE_A_EDGES.has(i)) accA = lpAdd(accA, dir);
        else                        accB = lpAdd(accB, dir);
        vs.push({ a: accA, b: accB });
      }
      return vs;
    })();
  </script>

  <script id="spectre-lattice-check" type="text/x-typescript">
    // Sanity checks for the (a, b) edge-type partition:
    //  1. Hat (a = 1, b = √3): polygon closes after 14 edges.
    //  2. Turtle (a = √3, b = 1): closes too.
    //  3. Every spectre edge has unit length at a = b = 1.
    const tol = 1e-12;

    function closureError(a: number, b: number): number {
      const last = spectreLatticeVertices2[13];
      const dirLast = lpSub(spectreLatticeVertices[0], spectreLatticeVertices[13]);
      const closed: LP2 = SPECTRE_A_EDGES.has(13)
        ? { a: lpAdd(last.a, dirLast), b: last.b }
        : { a: last.a, b: lpAdd(last.b, dirLast) };
      const [x, y] = lp2ToXY(closed, a, b);
      return Math.hypot(x, y);
    }
    const SQRT3 = Math.sqrt(3);
    const hatErr    = closureError(1, SQRT3);
    const turtleErr = closureError(SQRT3, 1);

    const edgeLengths = spectreLatticeVertices.map((_, i) => {
      const a = spectreLatticeVertices[i];
      const b = spectreLatticeVertices[(i + 1) % 14];
      return Math.hypot(a[0] - b[0], a[1] - b[1]);
    });
    const maxEdgeError = Math.max(...edgeLengths.map((l) => Math.abs(l - 1)));

    const ok = maxEdgeError < tol && hatErr < tol && turtleErr < tol;
    display(html`<div style="font-size: 0.9em; padding: 0.5em 0.8em; border-radius: 4px;
                              background: ${ok ? '#e7f5ea' : '#fbe9e9'};
                              color: ${ok ? '#1d5b2c' : '#7a1414'}; font-family: monospace;">
      hat closure error (1, √3): ${hatErr.toExponential(2)}<br>
      turtle closure error (√3, 1): ${turtleErr.toExponential(2)}<br>
      edge length max deviation from 1: ${maxEdgeError.toExponential(2)}
    </div>`);
  </script>

  <script id="transform-math" type="text/x-typescript">
    type Transform = { rot: number; mirror: 0 | 1; t: LP2 };

    const txIdentity: Transform = { rot: 0, mirror: 0, t: LP2_ZERO };

    function txApply(T: Transform, p: LP2): LP2 {
      const q = T.mirror ? lp2Conj(p) : p;
      return lp2Add(lp2Rotate(q, T.rot), T.t);
    }

    // Apply just the linear (rotation+mirror) part to a lattice vector.
    function txApplyLinear(T: Transform, p: LP2): LP2 {
      const q = T.mirror ? lp2Conj(p) : p;
      return lp2Rotate(q, T.rot);
    }

    // (T1 ∘ T2)(p) = T1(T2(p)).
    // Rotations and mirrors compose as M1·M2 = R^(r1 + (-1)^m1·r2) · F^(m1 ⊕ m2);
    // translation is M1·t2 + t1.
    function txCompose(T1: Transform, T2: Transform): Transform {
      const sign = T1.mirror ? -1 : 1;
      const rot = (((T1.rot + sign * T2.rot) % 12) + 12) % 12;
      const mirror = (T1.mirror ^ T2.mirror) as 0 | 1;
      const t = lp2Add(txApplyLinear(T1, T2.t), T1.t);
      return { rot, mirror, t };
    }

    // Translation-only transform.
    const txTranslate = (t: LP2): Transform => ({ rot: 0, mirror: 0, t });

    // Pure rotation by k·30°.
    const txRotate = (k: number): Transform =>
      ({ rot: ((k % 12) + 12) % 12, mirror: 0, t: LP2_ZERO });
  </script>

  <script id="substitution-section" type="text/markdown">
    ## Substitution rules

    The tiling is built by *substitution*: the unit of recursion is a *metatile* — a labelled group of one or more spectres — and at each level, fixed sequences of metatiles are glued together at distinguished spectre vertices into single metatiles of the next level up. There are nine metatile types (Γ, Δ, Θ, Λ, Ξ, Π, Σ, Φ, Ψ); Γ is the "mystic" pair of two overlapping spectres that locks the tiling's chirality, the other eight are bare spectres.

    The vertex coordinates, the two rule tables, and the recursion are taken from [Kaplan's `spectre.js`](https://cs.uwaterloo.ca/~csk/spectre/spectre.js) — almost verbatim, with one adaptation: each transform's translation is the (*a*, *b*) pair from above instead of a single (*x*, *y*) so the morph projection can run per-frame.
  </script>

  <script id="substitution-data" type="text/x-typescript">
    const TILE_NAMES = ["Gamma", "Delta", "Theta", "Lambda", "Xi", "Pi", "Sigma", "Phi", "Psi"] as const;
    type TileName = typeof TILE_NAMES[number];

    // [rotation in units of 30°, from-quad index, to-quad index]
    const transformationRules: [number, number, number][] = [
      [ 2, 3, 1],
      [ 0, 2, 0],
      [ 2, 3, 1],
      [ 2, 3, 1],
      [ 0, 2, 0],
      [ 2, 3, 1],
      [-4, 3, 3],
    ];

    const superRules: Record<TileName, (TileName | null)[]> = {
      Gamma:  ["Pi",  "Delta", null,  "Theta", "Sigma", "Xi",  "Phi",    "Gamma"],
      Delta:  ["Xi",  "Delta", "Xi",  "Phi",   "Sigma", "Pi",  "Phi",    "Gamma"],
      Theta:  ["Psi", "Delta", "Pi",  "Phi",   "Sigma", "Pi",  "Phi",    "Gamma"],
      Lambda: ["Psi", "Delta", "Xi",  "Phi",   "Sigma", "Pi",  "Phi",    "Gamma"],
      Xi:     ["Psi", "Delta", "Pi",  "Phi",   "Sigma", "Psi", "Phi",    "Gamma"],
      Pi:     ["Psi", "Delta", "Xi",  "Phi",   "Sigma", "Psi", "Phi",    "Gamma"],
      Sigma:  ["Xi",  "Delta", "Xi",  "Phi",   "Sigma", "Pi",  "Lambda", "Gamma"],
      Phi:    ["Psi", "Delta", "Psi", "Phi",   "Sigma", "Pi",  "Phi",    "Gamma"],
      Psi:    ["Psi", "Delta", "Psi", "Phi",   "Sigma", "Psi", "Phi",    "Gamma"],
    };

    // The four spectre indices that act as a metatile's "quad" handles.
    const QUAD_INDICES = [3, 5, 7, 11] as const;
    const baseQuad: LP2[] = QUAD_INDICES.map((i) => spectreLatticeVertices2[i]);
  </script>

  <script id="metatile-build" type="text/x-typescript">
    type LeafLabel = TileName | "Gamma1" | "Gamma2";
    type MetaTile =
      | { kind: "leaf"; label: LeafLabel; quad: LP2[] }
      | { kind: "meta"; name: TileName; geometries: { child: MetaTile; transform: Transform }[]; quad: LP2[] };

    function buildSpectreBase(): Record<TileName, MetaTile> {
      const cluster = {} as Record<TileName, MetaTile>;
      for (const label of TILE_NAMES) {
        if (label !== "Gamma") {
          cluster[label] = { kind: "leaf", label, quad: baseQuad };
        }
      }
      // Mystic Γ: two spectres glued with a 30° rotation about vertex 8.
      cluster.Gamma = {
        kind: "meta",
        name: "Gamma",
        quad: baseQuad,
        geometries: [
          {
            child: { kind: "leaf", label: "Gamma1", quad: baseQuad },
            transform: txIdentity,
          },
          {
            child: { kind: "leaf", label: "Gamma2", quad: baseQuad },
            transform: txCompose(
              txTranslate(spectreLatticeVertices2[8]),
              txRotate(1),
            ),
          },
        ],
      };
      return cluster;
    }

    function buildSupertiles(prev: Record<TileName, MetaTile>): Record<TileName, MetaTile> {
      const quad = prev.Delta.quad;

      // Build the seven non-identity transforms by walking the rule table.
      const transformations: Transform[] = [txIdentity];
      let totalRot = 0;
      let rotation: Transform = txIdentity;
      let rotatedQuad: LP2[] = quad;

      for (const [deltaRot, fromIdx, toIdx] of transformationRules) {
        if (deltaRot !== 0) {
          totalRot = (((totalRot + deltaRot) % 12) + 12) % 12;
          rotation = txRotate(totalRot);
          rotatedQuad = quad.map((p) => txApplyLinear(rotation, p));
        }
        const target = txApply(transformations[transformations.length - 1], quad[fromIdx]);
        const source = rotatedQuad[toIdx];
        const delta = lp2Sub(target, source);
        transformations.push({ rot: rotation.rot, mirror: 0, t: delta });
      }

      // Reflect everything across the y-axis: R(x, y) = (-x, y) = ω⁶ · conj.
      const R: Transform = { rot: 6, mirror: 1, t: LP2_ZERO };
      const finalTransforms = transformations.map((T) => txCompose(R, T));

      // The supertile's own quad is built from specific child quad points.
      const superQuad: LP2[] = [
        txApply(finalTransforms[6], quad[2]),
        txApply(finalTransforms[5], quad[1]),
        txApply(finalTransforms[3], quad[2]),
        txApply(finalTransforms[0], quad[1]),
      ];

      const next = {} as Record<TileName, MetaTile>;
      for (const label of TILE_NAMES) {
        const subs = superRules[label];
        const geometries: { child: MetaTile; transform: Transform }[] = [];
        for (let i = 0; i < subs.length; i++) {
          const sub = subs[i];
          if (sub === null) continue;
          geometries.push({ child: prev[sub], transform: finalTransforms[i] });
        }
        next[label] = { kind: "meta", name: label, quad: superQuad, geometries };
      }
      return next;
    }
  </script>

  <script id="render-section" type="text/markdown">
    ## Rendering

    Inflate a Δ supertile to the chosen depth, flatten the metatile tree to a list of `(transform, label, color)` placements, and draw the lot with WebGPU instancing — one tile mesh, one quad outline mesh, one buffer of per-tile transforms. Each placement's color is a Gaussian-weighted blend of the leaf and ancestor colors centered at the chosen "color level": at level 0 the leaf dominates and adjacent tiles look distinct; raising the level shifts weight to deeper supertiles, so larger blocks of similar color reveal the macro structure.

    ### Visual stability

    The substitution's natural cluster orientation drifts by ~10° per level, and at *a* ≠ *b* the inflation isn't even conformal — so increasing the substitution depth or sliding between hat and turtle would otherwise spin the figure on every change. As a purely visual convenience we counter that: each metatile type's mass-weighted centroid is tracked through the substitution (a 9 × 8 × depth recurrence, independent of the 17 M leaves below), and per frame the whole cluster is rotated around its centroid to a depth-independent orientation target. The cluster centroid stays pinned to the same screen position too, so depth and morph changes feel like the figure refining in place rather than swinging around.
  </script>

  <script id="render-controls" type="text/x-typescript">
    import { interval } from './lib/range-slider.js';
    const controlsContainer = html`<div id="spectre-controls"></div>`;
    function addControl<T extends HTMLElement>(input: T): AsyncGenerator<unknown> {
      controlsContainer.appendChild(input);
      return Generators.input(input);
    }
    // Of the 9 metatile types only Γ and Δ are structurally distinct as
    // starting clusters: every supertile shares the same superQuad and the
    // same 8 child positions, so the 8 non-Γ types differ only in *which*
    // depth-(k − 1) metatile fills each slot — same outline, reshuffled
    // colors. Γ is the exception because its rule has a `null` slot, which
    // leaves a real geometric notch.
    const TILE_GLYPH: Record<string, string> = {
      Gamma: "Γ", Delta: "Δ", Theta: "Θ", Lambda: "Λ", Xi: "Ξ",
      Pi:    "Π", Sigma: "Σ", Phi:   "Φ", Psi:    "Ψ",
    };
    const renderStartingTile = addControl(Inputs.select([...TILE_NAMES], {
      value: "Delta",
      label: "Starting metatile",
      format: (s: string) => TILE_GLYPH[s] ?? s,
    }));
    // Depth 8 needs ~270 MB GPU buffer, which only works when the adapter
    // honoured raised limits at init time. Cap the slider at 7 otherwise.
    const _depthMax = webgpuMaxBuffersAvailable ? 8 : 7;
    const _depthSliderEl = Inputs.range([0, _depthMax], {
      value: 5,
      step: 1,
      label: "Substitution depth",
    });
    // Intercept the input event before Generators.input sees it: depth 8 is
    // big enough to crash on memory-tight machines, so confirm before
    // letting downstream cells re-evaluate at that depth. Listener runs
    // first because it's registered before addControl wires Generators.
    let _depth8Confirmed = false;
    _depthSliderEl.addEventListener('input', (e) => {
      const rangeIn = _depthSliderEl.querySelector('input[type="range"]') as HTMLInputElement | null;
      const numIn   = _depthSliderEl.querySelector('input[type="number"]') as HTMLInputElement | null;
      const v = parseInt((rangeIn ?? numIn ?? (_depthSliderEl as any))?.value ?? '0', 10);
      if (v >= 8) {
        if (_depth8Confirmed) return;
        e.stopImmediatePropagation();
        const ok = confirm(
          'Depth 8 builds ~17 million spectres and uses ~270 MB of GPU memory. ' +
          'On devices with limited RAM this can hang or crash the browser. Continue?'
        );
        if (ok) {
          _depth8Confirmed = true;
          // Re-emit so Generators sees value 8 cleanly.
          (rangeIn ?? _depthSliderEl).dispatchEvent(new Event('input', { bubbles: true }));
        } else {
          // Sync both inputs back to 7 — Observable's Inputs.range form
          // mirrors number ↔ range internally on each child's input event,
          // so dispatch from the range input (a child) so that internal
          // listener runs and updates the number input too.
          if (rangeIn) rangeIn.value = '7';
          if (numIn)   numIn.value   = '7';
          (rangeIn ?? _depthSliderEl).dispatchEvent(new Event('input', { bubbles: true }));
        }
      } else {
        _depth8Confirmed = false;
      }
    });
    const renderDepth = addControl(_depthSliderEl);
