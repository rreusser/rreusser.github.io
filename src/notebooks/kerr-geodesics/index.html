  <script id="intro" type="text/markdown">
Geodesics in Kerr spacetime are the free-fall paths of particles and light around a spinning black hole. Unlike the Schwarzschild case, they are not confined to a plane: orbits precess and oscillate in latitude, and photons can orbit multiple times before escaping. This notebook integrates those trajectories and renders the gravitational lensing they produce.
  </script>

  <script id="compute-geodesic" type="text/x-typescript">
function computeAndUpload() {
  const a = spinInput.value as number;
  const kappa = kappaInput.value as number;
  const preset = PRESETS[presetInput.value];
  const config = {
    M: 1, a,
    E: energyInput.value as number,
    L: angMomInput.value as number,
    Q: carterInput.value as number,
    kappa,
    r0: r0Input.value as number,
    theta0: theta0Input.value as number,
    signR: state.signR,
    signTheta: state.signTheta,
    h: preset?.h ?? 0.1,
    nSteps: nStepsInput.value as number,
    tolerance: 1e-8,
  };

  const result = integrateGeodesic(config);
  renderer.setGeodesics([result.positions]);

  state.renderParams.M = config.M;
  state.renderParams.a = config.a;
  state.renderParams.surfaceColor = theme.isDark ? [1, 1, 1] : [0.25, 0.25, 0.25];
  state.renderParams.isDark = theme.isDark;
  camera.triggerRepaint();

  Object.assign(state.diagnostics, result.diagnostics);
}

computeAndUpload();

controlsContainer.addEventListener('input', () => {
  computeAndUpload();
});

  <script id="velocity-arrow" type="text/x-typescript">
import { velocityToConstants, constantsToVelocity, blToCartesian, blVelocityToCartesian, cartesianVelocityToBL, cartesianToBL } from './velocity-utils.js';
import { createArrowInteraction } from './arrow-interaction.js';

// Compute initial velocity arrow from current constants of motion
function updateArrow() {
  const M = 1;
  const a = spinInput.value as number;
  const kappa = kappaInput.value as number;
  const E = energyInput.value as number;
  const L = angMomInput.value as number;
  const Q = carterInput.value as number;
  const r0 = r0Input.value as number;
  const theta0 = theta0Input.value as number;

  const vel = constantsToVelocity(r0, theta0, E, L, Q, M, a, kappa, state.signR, state.signTheta);
  if (!vel) return;

  const origin = blToCartesian(r0, theta0, 0, a);
  const cartVel = blVelocityToCartesian(r0, theta0, 0, a, vel.ur, vel.utheta, vel.uphi);

  // Scale arrow for visibility (proper velocity can be small)
  const speed = Math.sqrt(cartVel[0] ** 2 + cartVel[1] ** 2 + cartVel[2] ** 2);
  const arrowScale = 5 / Math.max(speed, 0.01);
  const dir = [cartVel[0] * arrowScale, cartVel[1] * arrowScale, cartVel[2] * arrowScale];

  renderer.setArrow(origin, dir, true);

  return { origin, dir, cartVel, arrowScale, vel };
}

let arrowState = updateArrow();

const arrowInteraction = createArrowInteraction(canvas, camera, {
  getArrowState: () => {
    if (!arrowState) return null;
    const tip = [
      arrowState.origin[0] + arrowState.dir[0],
      arrowState.origin[1] + arrowState.dir[1],
      arrowState.origin[2] + arrowState.dir[2],
    ];
    return { origin: arrowState.origin, tip, visible: true };
  },
  onDrag: (newTip) => {
    if (!arrowState) return;
    const newDir = [
      newTip[0] - arrowState.origin[0],
      newTip[1] - arrowState.origin[1],
      newTip[2] - arrowState.origin[2],
    ];

    // Convert dragged direction to BL velocity, preserving original speed
    const r0 = r0Input.value as number;
    const theta0 = theta0Input.value as number;
    const a = spinInput.value as number;
    const M = 1;
    const kappa = kappaInput.value as number;

    // Use direction only — normalize to original velocity magnitude
    const dirLen = Math.sqrt(newDir[0] ** 2 + newDir[1] ** 2 + newDir[2] ** 2);
    if (dirLen < 1e-6) return;
    const origSpeed = Math.sqrt(arrowState.cartVel[0] ** 2 + arrowState.cartVel[1] ** 2 + arrowState.cartVel[2] ** 2);
    const newCartVel = [
      newDir[0] / dirLen * origSpeed,
      newDir[1] / dirLen * origSpeed,
      newDir[2] / dirLen * origSpeed,
    ];

    const blVel = cartesianVelocityToBL(r0, theta0, 0, a, newCartVel[0], newCartVel[1], newCartVel[2]);

    // Update signs from dragged velocity direction
    if (blVel.ur !== 0) state.signR = blVel.ur > 0 ? 1 : -1;
    if (blVel.utheta !== 0) state.signTheta = blVel.utheta > 0 ? 1 : -1;

    const constants = velocityToConstants(r0, theta0, blVel.ur, blVel.utheta, blVel.uphi, M, a, kappa);

    if (constants && isFinite(constants.E) && isFinite(constants.L) && isFinite(constants.Q)) {
      // Update slider values silently (no dispatch — avoid triggering listener)
      energyInput.value = Math.max(0.8, Math.min(1.2, constants.E));
      angMomInput.value = Math.max(-5, Math.min(5, constants.L));
      carterInput.value = Math.max(0, Math.min(20, constants.Q));
    }

    // Recompute geodesic; show arrow at fixed length in dragged direction
    computeAndUpload();
    const arrowLen = 5.0;
    const displayDir = [newDir[0] / dirLen * arrowLen, newDir[1] / dirLen * arrowLen, newDir[2] / dirLen * arrowLen];
    renderer.setArrow(arrowState.origin, displayDir, true);
    camera.triggerRepaint();
  },
  onBodyDrag: (newOrigin) => {
    if (!arrowState) return;
    const a = spinInput.value as number;
    const kappa = kappaInput.value as number;
    const M = 1;

    // Convert new world-space origin to Boyer-Lindquist
    const bl = cartesianToBL(newOrigin[0], newOrigin[1], newOrigin[2], a);

    // Clamp to slider ranges
    const newR = Math.max(2, Math.min(30, bl.r));
    const newTheta = Math.max(0.1, Math.min(3.04, bl.theta));

    // Update sliders silently
    r0Input.value = newR;
    theta0Input.value = newTheta;

    // Recompute geodesic with new position, same constants of motion
    computeAndUpload();

    // Show arrow at new position with current velocity direction
    const vel = constantsToVelocity(newR, newTheta, energyInput.value, angMomInput.value, carterInput.value, M, a, kappa, state.signR, state.signTheta);
    if (vel) {
      const origin = blToCartesian(newR, newTheta, 0, a);
      const cartVel = blVelocityToCartesian(newR, newTheta, 0, a, vel.ur, vel.utheta, vel.uphi);
      const speed = Math.sqrt(cartVel[0] ** 2 + cartVel[1] ** 2 + cartVel[2] ** 2);
      const arrowLen = 5.0;
      const s = arrowLen / Math.max(speed, 0.01);
      renderer.setArrow(origin, [cartVel[0] * s, cartVel[1] * s, cartVel[2] * s], true);
    }
    camera.triggerRepaint();
  },
  onDragEnd: () => {
    arrowState = updateArrow();
    camera.triggerRepaint();
  },
});

// Update arrow when controls change
controlsContainer.addEventListener('input', () => {
  arrowState = updateArrow();
});

invalidation.then(() => arrowInteraction.destroy());
  </script>

  <script id="glossary" type="text/markdown">
<details><summary>Glossary</summary>

| Symbol | Meaning |
|--------|---------|
| ${tex`M`} | Black hole mass |
| ${tex`a`} | Spin parameter (${tex`0 \leq a < M`}); ${tex`a = 0`} is Schwarzschild |
| ${tex`\lambda`} | Mino time (affine parameter rescaled by ${tex`\Sigma`}) |
| ${tex`E`} | Specific energy (conserved; ${tex`E < 1`} bound, ${tex`E \geq 1`} unbound) |
| ${tex`L`} | Specific angular momentum (conserved; prograde ${tex`> 0`}, retrograde ${tex`< 0`}) |
| ${tex`Q`} | Carter constant (conserved; ${tex`0`} for equatorial, ${tex`> 0`} for off-plane) |
| ${tex`\kappa`} | Normalization: 1 for massive particles, 0 for photons |
| ${tex`\Delta`} | ${tex`r^2 - 2Mr + a^2`}; vanishes at the horizons |
| ${tex`\Sigma`} | ${tex`r^2 + a^2\cos^2\theta`}; the oblate scale factor |

</details>
  </script>

  <script id="equations" type="text/markdown">
## Equations of Motion

The [Kerr metric](https://en.wikipedia.org/wiki/Kerr_metric) has three conserved quantities along every geodesic: energy ${tex`E`}, angular momentum ${tex`L`}, and the [Carter constant](https://doi.org/10.1103/PhysRev.174.1559) ${tex`Q`}. With all three in hand the equations *separate*, with ${tex`r`} and ${tex`\theta`} decoupling completely:

${tex.block`\frac{dr}{d\lambda} = \pm\sqrt{R(r)}, \qquad \frac{d\theta}{d\lambda} = \pm\sqrt{\Theta(\theta)}`}

where

${tex.block`R(r) = P^2 - \Delta\!\left[\kappa r^2 + (L - aE)^2 + Q\right]`}

${tex.block`P = E(r^2 + a^2) - aL, \qquad \Delta = r^2 - 2Mr + a^2`}

${tex.block`\Theta(\theta) = Q + a^2(E^2 - \kappa)\cos^2\!\theta - L^2\cot^2\!\theta`}

[Mino][mino2003] showed that reparameterizing by *Mino time* — absorbing ${tex`\Sigma = r^2 + a^2\cos^2\theta`} into the affine parameter — fully decouples the ${tex`r`} and ${tex`\theta`} equations, making each an independent 1D problem. Energy ${tex`E`} and angular momentum ${tex`L`} follow from Killing symmetries (time-translation and axial); ${tex`E < 1`} for bound orbits. ${tex`Q = 0`} confines motion to the equatorial plane; ${tex`Q > 0`} allows polar oscillation. The normalization ${tex`\kappa = 1`} for massive particles, ${tex`0`} for photons.

[mino2003]: https://doi.org/10.1103/PhysRevD.67.084027
  </script>

  <script id="integrator-description" type="text/markdown">
## Integration Method

At *turning points* — where ${tex`R = 0`} or ${tex`\Theta = 0`} — the radial and polar velocities must reverse sign. Rather than tracking sign changes explicitly, we differentiate once more and integrate the second-order system:

${tex.block`\dot{v}_r = \tfrac{1}{2}R'(r), \qquad \dot{v}_\theta = \tfrac{1}{2}\Theta'(\theta)`}

Now ${tex`v_r`} and ${tex`v_\theta`} pass smoothly through zero with no root-finding required. The full state ${tex`(r, \theta, \varphi, t, v_r, v_\theta)`} is integrated with an adaptive [Cash–Karp RK4(5)](https://doi.org/10.1145/79505.79507) scheme at relative tolerance ${tex`10^{-8}`}.

[Boyer-Lindquist coordinates](https://en.wikipedia.org/wiki/Boyer%E2%80%93Lindquist_coordinates) become singular at the event horizon (${tex`\Delta = 0`}), so integration stops there. The outer shaded surface is the **ergosphere** — the region inside which frame-dragging is so strong that no observer can remain stationary, and from which rotational energy can be extracted via the [Penrose process](https://en.wikipedia.org/wiki/Penrose_process).
  </script>

  <script id="rt-lensing-intro" type="text/markdown">
## Gravitational Lensing

The same geodesic equations render what a Kerr black hole with an accretion disk actually *looks like*. A WebGPU fragment shader traces one null geodesic per pixel backward from the camera. Rays crossing the equatorial plane within the disk are shaded with a temperature profile ${tex`T \propto r^{-3/4}`} and Doppler-beamed by the orbiting gas. The approach follows [James et al. (2015)](https://doi.org/10.1088/0264-9381/32/6/065001).
  </script>

  <script id="rt-render-loop" type="text/x-typescript">
let rtDebounceTimer: ReturnType<typeof setTimeout> | null = null;
let rtInteracting = false;
let rtFrameRequested = false;
let rtDiskTime = 0.0;
let rtLastTimestamp: number | null = null;
let rtAnimFrameId: number | null = null;

function rtRenderActual(timestamp?: number) {
  const w = rtCanvas.width;
  const h = rtCanvas.height;
  if (w === 0 || h === 0) return;

  // Advance disk time when animating
  if (rtSpeedInput.value > 0 && timestamp != null) {
    if (rtLastTimestamp != null) {
      rtDiskTime += (timestamp - rtLastTimestamp) / 1000 * rtSpeedInput.value;
    }
    rtLastTimestamp = timestamp;
  }

  const animating = rtSpeedInput.value > 0;
  const scale = (rtInteracting || animating) ? 1 / rtDownsampleInput.value : 1;
  rayTracer.render(rtGpuContext, {
    a: rtSpinInput.value,
    M: 1,
    diskOuter: rtDiskOuterInput.value,
    exposure: rtExposureInput.value,
    bloomIntensity: rtBloomInput.value,
    showStars: rtStarsInput.value,
    debugDisk: rtDebugDiskInput.value,
    doppler: rtDopplerInput.value,
    diskTime: rtDiskTime,
    maxTime: rtMaxTimeInput.value,
    stepSize: rtInteracting ? Math.min(rtStepSizeInput.value * 4, 0.5) : rtStepSizeInput.value,
    renderWidth: Math.max(1, Math.floor(w * scale)),
    renderHeight: Math.max(1, Math.floor(h * scale)),
  }, rtCamera, w, h);
}

// Animation loop: runs continuously while speed > 0
function rtAnimLoop(timestamp: number) {
  if (rtSpeedInput.value <= 0) {
    rtAnimFrameId = null;
    rtLastTimestamp = null;
    return;
  }
  rtRenderActual(timestamp);
  rtAnimFrameId = requestAnimationFrame(rtAnimLoop);
}

function rtStartAnimIfNeeded() {
  if (rtSpeedInput.value > 0 && rtAnimFrameId == null) {
    rtAnimFrameId = requestAnimationFrame(rtAnimLoop);
  }
}

// Coalesce on-demand renders (camera/controls) through rAF
function rtRender() {
  if (rtSpeedInput.value > 0) return;  // animation loop handles it
  if (rtFrameRequested) return;
  rtFrameRequested = true;
  requestAnimationFrame((ts) => {
    rtFrameRequested = false;
    rtRenderActual(ts);
  });
}

rtCamera.on('render', rtRender);

// When speed changes, start or stop the loop
rtSpeedInput.addEventListener('input', () => {
  if (rtSpeedInput.value > 0) {
    rtStartAnimIfNeeded();
  } else {
    rtLastTimestamp = null;
    rtCamera.triggerRepaint();
  }
});

function rtBeginInteraction() {
  rtInteracting = true;
  if (rtDebounceTimer) clearTimeout(rtDebounceTimer);
  rtDebounceTimer = setTimeout(() => {
    rtInteracting = false;
    rtCamera.triggerRepaint();
  }, 300);
}

function rtOnPointerDown() { rtBeginInteraction(); }
function rtOnPointerMove(e: PointerEvent) { if (e.buttons === 0) return; rtBeginInteraction(); }
function rtOnWheel() { rtBeginInteraction(); }
function rtOnTouchMove() { rtBeginInteraction(); }

rtCanvas.addEventListener('pointerdown', rtOnPointerDown);
rtCanvas.addEventListener('pointermove', rtOnPointerMove);
rtCanvas.addEventListener('wheel', rtOnWheel, { passive: true });
rtCanvas.addEventListener('touchmove', rtOnTouchMove, { passive: true });

rtControlsContainer.addEventListener('input', () => {
  rtBeginInteraction();
  if (rtSpeedInput.value <= 0) rtCamera.triggerRepaint();
});

invalidation.then(() => {
  if (rtDebounceTimer) clearTimeout(rtDebounceTimer);
  if (rtAnimFrameId != null) cancelAnimationFrame(rtAnimFrameId);

  <script id="rt-method" type="text/markdown">
### Ray tracing method

The ray tracer uses the same Carter equations, specialized to null rays (${tex`\kappa = 0`}, so only ${tex`b = L/E`} and ${tex`q^2 = Q/E^2`} matter). Each pixel's ray direction is converted from Cartesian to Boyer-Lindquist, the null condition ${tex`g_{\mu\nu}\dot{x}^\mu\dot{x}^\nu = 0`} fixes ${tex`u^t`}, and ${tex`(b, q^2)`} are read off. The same second-order Mino-time formulation handles all ${tex`\theta`}-bounces automatically; the 5D state ${tex`(r, v_r, \theta, v_\theta, \varphi)`} is advanced with fixed-step RK4, with step size shrinking as ${tex`h \propto (r - r_+)/r`} near the horizon.

The brightness asymmetry comes from the relativistic Doppler factor ${tex`g = 1/\bigl(u^t_\text{emit}(1 - \Omega b)\bigr)`}, where ${tex`\Omega = \sqrt{M}/(r^{3/2} + a\sqrt{M})`} is the prograde Keplerian frequency. On the approaching side ${tex`g > 1`} and the disk blazes; on the receding side it fades. Observed intensity scales as ${tex`g^3`} from the Lorentz invariant ${tex`I_\nu/\nu^3`} ([Cunningham 1975](https://doi.org/10.1086/154033)). The thin bright ring at the shadow edge is the **photon ring** — light that has orbited once or more before escaping.
  </script>

- [Bardeen, Press & Teukolsky (1972)](https://doi.org/10.1086/151796) — locally non-rotating frames in Kerr spacetime; Keplerian orbital velocity and ISCO formula used in the disk model
- [Cunningham (1975)](https://doi.org/10.1086/154033) — relativistic transfer function for Kerr accretion disks; source of the ${tex`g^3`} intensity scaling from the Lorentz invariant ${tex`I_\nu/\nu^3`}
- [Mino (2003)](https://doi.org/10.1103/PhysRevD.67.084027) — Mino-time reparameterization that fully decouples the radial and polar equations
