  <script id="intro" type="text/markdown">
Geodesics of the [Kerr metric](https://en.wikipedia.org/wiki/Kerr_metric) describe the paths of particles and light in the spacetime around a rotating black hole. This notebook integrates the geodesic equations in Mino time using an adaptive Cash-Karp RK4(5) scheme, which adjusts the step size to maintain accuracy near the horizon where Boyer-Lindquist coordinates become singular.

  <script id="compute-geodesic" type="text/x-typescript">
function computeAndUpload() {
  const a = spinInput.value as number;
  const kappa = kappaInput.value as number;
  const preset = PRESETS[presetInput.value];
  const config = {
    M: 1, a,
    E: energyInput.value as number,
    L: angMomInput.value as number,
    Q: carterInput.value as number,
    kappa,
    r0: r0Input.value as number,
    theta0: theta0Input.value as number,
    signR: state.signR,
    signTheta: state.signTheta,
    h: preset?.h ?? 0.1,
    nSteps: nStepsInput.value as number,
    tolerance: 1e-8,
  };

  const result = integrateGeodesic(config);
  renderer.setGeodesics([result.positions]);

  state.renderParams.M = config.M;
  state.renderParams.a = config.a;
  state.renderParams.surfaceColor = theme.isDark ? [1, 1, 1] : [0.25, 0.25, 0.25];
  state.renderParams.isDark = theme.isDark;
  camera.triggerRepaint();

  Object.assign(state.diagnostics, result.diagnostics);
}

computeAndUpload();

controlsContainer.addEventListener('input', () => {
  computeAndUpload();
});

  <script id="velocity-arrow" type="text/x-typescript">
import { velocityToConstants, constantsToVelocity, blToCartesian, blVelocityToCartesian, cartesianVelocityToBL, cartesianToBL } from './velocity-utils.js';
import { createArrowInteraction } from './arrow-interaction.js';

// Compute initial velocity arrow from current constants of motion
function updateArrow() {
  const M = 1;
  const a = spinInput.value as number;
  const kappa = kappaInput.value as number;
  const E = energyInput.value as number;
  const L = angMomInput.value as number;
  const Q = carterInput.value as number;
  const r0 = r0Input.value as number;
  const theta0 = theta0Input.value as number;

  const vel = constantsToVelocity(r0, theta0, E, L, Q, M, a, kappa, state.signR, state.signTheta);
  if (!vel) return;

  const origin = blToCartesian(r0, theta0, 0, a);
  const cartVel = blVelocityToCartesian(r0, theta0, 0, a, vel.ur, vel.utheta, vel.uphi);

  // Scale arrow for visibility (proper velocity can be small)
  const speed = Math.sqrt(cartVel[0] ** 2 + cartVel[1] ** 2 + cartVel[2] ** 2);
  const arrowScale = 5 / Math.max(speed, 0.01);
  const dir = [cartVel[0] * arrowScale, cartVel[1] * arrowScale, cartVel[2] * arrowScale];

  renderer.setArrow(origin, dir, true);

  return { origin, dir, cartVel, arrowScale, vel };
}

let arrowState = updateArrow();

const arrowInteraction = createArrowInteraction(canvas, camera, {
  getArrowState: () => {
    if (!arrowState) return null;
    const tip = [
      arrowState.origin[0] + arrowState.dir[0],
      arrowState.origin[1] + arrowState.dir[1],
      arrowState.origin[2] + arrowState.dir[2],
    ];
    return { origin: arrowState.origin, tip, visible: true };
  },
  onDrag: (newTip) => {
    if (!arrowState) return;
    const newDir = [
      newTip[0] - arrowState.origin[0],
      newTip[1] - arrowState.origin[1],
      newTip[2] - arrowState.origin[2],
    ];

    // Convert dragged direction to BL velocity, preserving original speed
    const r0 = r0Input.value as number;
    const theta0 = theta0Input.value as number;
    const a = spinInput.value as number;
    const M = 1;
    const kappa = kappaInput.value as number;

    // Use direction only — normalize to original velocity magnitude
    const dirLen = Math.sqrt(newDir[0] ** 2 + newDir[1] ** 2 + newDir[2] ** 2);
    if (dirLen < 1e-6) return;
    const origSpeed = Math.sqrt(arrowState.cartVel[0] ** 2 + arrowState.cartVel[1] ** 2 + arrowState.cartVel[2] ** 2);
    const newCartVel = [
      newDir[0] / dirLen * origSpeed,
      newDir[1] / dirLen * origSpeed,
      newDir[2] / dirLen * origSpeed,
    ];

    const blVel = cartesianVelocityToBL(r0, theta0, 0, a, newCartVel[0], newCartVel[1], newCartVel[2]);

    // Update signs from dragged velocity direction
    if (blVel.ur !== 0) state.signR = blVel.ur > 0 ? 1 : -1;
    if (blVel.utheta !== 0) state.signTheta = blVel.utheta > 0 ? 1 : -1;

    const constants = velocityToConstants(r0, theta0, blVel.ur, blVel.utheta, blVel.uphi, M, a, kappa);

    if (constants && isFinite(constants.E) && isFinite(constants.L) && isFinite(constants.Q)) {
      // Update slider values silently (no dispatch — avoid triggering listener)
      energyInput.value = Math.max(0.8, Math.min(1.2, constants.E));
      angMomInput.value = Math.max(-5, Math.min(5, constants.L));
      carterInput.value = Math.max(0, Math.min(20, constants.Q));
    }

    // Recompute geodesic; show arrow at fixed length in dragged direction
    computeAndUpload();
    const arrowLen = 5.0;
    const displayDir = [newDir[0] / dirLen * arrowLen, newDir[1] / dirLen * arrowLen, newDir[2] / dirLen * arrowLen];
    renderer.setArrow(arrowState.origin, displayDir, true);
    camera.triggerRepaint();
  },
  onBodyDrag: (newOrigin) => {
    if (!arrowState) return;
    const a = spinInput.value as number;
    const kappa = kappaInput.value as number;
    const M = 1;

    // Convert new world-space origin to Boyer-Lindquist
    const bl = cartesianToBL(newOrigin[0], newOrigin[1], newOrigin[2], a);

    // Clamp to slider ranges
    const newR = Math.max(2, Math.min(30, bl.r));
    const newTheta = Math.max(0.1, Math.min(3.04, bl.theta));

    // Update sliders silently
    r0Input.value = newR;
    theta0Input.value = newTheta;

    // Recompute geodesic with new position, same constants of motion
    computeAndUpload();

    // Show arrow at new position with current velocity direction
    const vel = constantsToVelocity(newR, newTheta, energyInput.value, angMomInput.value, carterInput.value, M, a, kappa, state.signR, state.signTheta);
    if (vel) {
      const origin = blToCartesian(newR, newTheta, 0, a);
      const cartVel = blVelocityToCartesian(newR, newTheta, 0, a, vel.ur, vel.utheta, vel.uphi);
      const speed = Math.sqrt(cartVel[0] ** 2 + cartVel[1] ** 2 + cartVel[2] ** 2);
      const arrowLen = 5.0;
      const s = arrowLen / Math.max(speed, 0.01);
      renderer.setArrow(origin, [cartVel[0] * s, cartVel[1] * s, cartVel[2] * s], true);
    }
    camera.triggerRepaint();
  },
  onDragEnd: () => {
    arrowState = updateArrow();
    camera.triggerRepaint();
  },
});

// Update arrow when controls change
controlsContainer.addEventListener('input', () => {
  arrowState = updateArrow();
});

invalidation.then(() => arrowInteraction.destroy());
  </script>

  <script id="parameter-glossary" type="text/markdown">
### Parameters

- **Particle type** — massive particles (${tex`\kappa = 1`}, timelike geodesics) or photons (${tex`\kappa = 0`}, null geodesics)
- **Spin** ${tex`a/M`} — the black hole's angular momentum per unit mass, ranging from 0 (Schwarzschild) to 1 (extremal Kerr)
- **Energy** ${tex`E`} — the conserved energy per unit rest mass; ${tex`E < 1`} for bound orbits, ${tex`E = 1`} for marginally bound, ${tex`E > 1`} for unbound
- **Ang. mom.** ${tex`L`} — the conserved axial angular momentum per unit rest mass; positive is prograde (co-rotating), negative is retrograde
- **Carter** ${tex`Q`} — the Carter constant, governing motion out of the equatorial plane; ${tex`Q = 0`} for equatorial orbits, ${tex`Q > 0`} allows polar oscillation
- **Initial** ${tex`r_0`} — the starting Boyer-Lindquist radial coordinate
- **Initial** ${tex`\theta_0`} — the starting polar angle; ${tex`\theta = \pi/2`} is the equatorial plane
- **Steps** — the number of integration steps in Mino time
  </script>

  <script id="equations" type="text/markdown">
## Separated Equations of Motion

The Kerr metric in Boyer-Lindquist coordinates has two Killing symmetries giving conserved energy ${tex`E = -p_t`} and angular momentum ${tex`L = p_\varphi`}. A remarkable hidden symmetry yields a third constant, the Carter constant ${tex`Q`}, which fully separates the geodesic equations. The Mino-time transformation ${tex`d\tau/d\lambda = \Sigma`} (where ${tex`\Sigma = r^2 + a^2\cos^2\theta`}) then decouples the radial and polar motions into independent first-order equations:

${tex.block`\frac{dr}{d\lambda} = \pm\sqrt{R(r)}, \qquad \frac{d\theta}{d\lambda} = \pm\sqrt{\Theta(\theta)}`}

where

${tex.block`R(r) = P^2 - \Delta\!\left[\kappa r^2 + (L - aE)^2 + Q\right], \quad P = E(r^2 + a^2) - aL`}

and ${tex`\Theta(\theta) = Q + a^2(E^2 - \kappa)\cos^2\!\theta - L^2\cot^2\!\theta`}, with ${tex`\Delta = r^2 - 2Mr + a^2`}. Coordinate time and azimuthal angle are recovered from known functions of ${tex`r`} and ${tex`\theta`} alone.
  </script>

  <script id="integrator-description" type="text/markdown">
## Integration Method

Rather than tracking the signs of ${tex`dr/d\lambda`} and ${tex`d\theta/d\lambda`} through turning points (where ${tex`R`} or ${tex`\Theta`} vanish), we recast the system as smooth second-order equations using velocities ${tex`v_r = dr/d\lambda`}, ${tex`v_\theta = d\theta/d\lambda`}:

${tex.block`\dot{v}_r = \tfrac{1}{2}R'(r), \qquad \dot{v}_\theta = \tfrac{1}{2}\Theta'(\theta)`}

The velocities pass smoothly through zero at turning points, eliminating the need for sign tracking or root-finding. This 6-dimensional system ${tex`(t, r, \theta, \varphi, v_r, v_\theta)`} is integrated with an adaptive Cash-Karp RK4(5) scheme that adjusts the step size to maintain a relative tolerance of ${tex`10^{-8}`}.
  </script>

  <script id="carter-constant" type="text/markdown">
## Constants of Motion

Each geodesic is characterized by four constants which serve as inputs to the radial and polar potentials above:

- **Energy** ${tex`E = -p_t`}, conserved by time-translation symmetry
- **Angular momentum** ${tex`L = p_\varphi`}, conserved by axial symmetry
- **Carter constant** ${tex`Q`}, arising from a hidden symmetry (Killing tensor) of the Kerr metric, which enables the separation of ${tex`r`} and ${tex`\theta`}
- **Mass shell** ${tex`\kappa = -g_{\mu\nu}\dot{x}^\mu\dot{x}^\nu`} (1 for massive particles, 0 for photons)
  </script>

  <script id="notes" type="text/markdown">
The Boyer-Lindquist coordinates become singular at the event horizon ${tex`r_+ = M + \sqrt{M^2 - a^2}`} where ${tex`\Delta = 0`}. Integration is terminated when the particle approaches the horizon. The ergosphere boundary is at ${tex`r_\text{ergo} = M + \sqrt{M^2 - a^2\cos^2\theta}`}.
  </script>

  <script id="rt-lensing-intro" type="text/markdown">
## Gravitational Lensing

The same geodesic equations can be used to render what a Kerr black hole with an accretion disk actually *looks like*. The fragment shader below traces one null geodesic per pixel, following each light ray backward from the camera through the curved spacetime. Rays that cross the equatorial plane within the disk's radial extent (from the ISCO to ${tex`20M`}) are shaded with a temperature profile ${tex`T \propto r^{-3/4}`} and Doppler-beamed by the orbital motion of the accreting matter.
  </script>

let rtInteracting = false;
let rtFrameRequested = false;

function rtRenderActual() {

  const scale = rtInteracting ? 0.25 : 1;
  rayTracer.render(rtGpuContext, {

    renderWidth: Math.max(1, Math.floor(w * scale)),
    renderHeight: Math.max(1, Math.floor(h * scale)),
  }, rtCamera, w, h);
}

// Coalesce renders: the camera fires emitRender synchronously on every
// input event, so multiple wheel/pointer events per frame each trigger a
// render listener call. Gate through rAF so at most one GPU submission
// per display frame.
function rtRender() {
  if (rtFrameRequested) return;
  rtFrameRequested = true;
  requestAnimationFrame(() => {
    rtFrameRequested = false;
    rtRenderActual();
  });
}

rtCamera.on('render', rtRender);

function rtBeginInteraction() {
  rtInteracting = true;
  if (rtDebounceTimer) clearTimeout(rtDebounceTimer);
  rtDebounceTimer = setTimeout(() => {

    rtCamera.triggerRepaint();
  }, 300);
}

function rtOnPointerDown() {

}

function rtOnPointerMove(e: PointerEvent) {

}

function rtOnWheel() {

  <script id="rt-method" type="text/markdown">
### Ray tracing method

The ray tracer uses the same Carter equations as the geodesic integrator above, specialized to null rays (${tex`\kappa = 0`}) and normalized so that ${tex`E = 1`}. Each ray is parameterized by its impact parameter ${tex`b = L/E`} and reduced Carter constant ${tex`q^2 = Q/E^2`}, extracted from the camera ray direction via the Jacobian of the Boyer-Lindquist coordinate map and the null condition.

The integration uses the **second-order Carter equations** in affine parameter ${tex`\lambda`}, with Mino-time velocities ${tex`v_r = \pm\sqrt{R}`} and ${tex`v_\theta = \pm\sqrt{\Theta}`} as state variables:

${tex.block`\frac{dv_r}{d\lambda} = \frac{R'(r)}{2\Sigma}, \qquad \frac{dv_\theta}{d\lambda} = \frac{\Theta'(\theta)}{2\Sigma}`}

The velocities pass smoothly through zero at turning points — the acceleration terms ${tex`R'/2`} and ${tex`\Theta'/2`} push them through without any sign tracking or root-finding. (First-order sign-tracking, where ${tex`\sqrt{\max(\Theta, 0)}`} goes to zero at turning points, stalls the integrator for rays that need to bounce in ${tex`\theta`}.) Dividing by ${tex`\Sigma`} converts to affine time, bounding all rates at large ${tex`r`} so the step size needs only a simple horizon-proximity factor ${tex`h \propto (r - r_+)/r`}. The 5D state ${tex`(r, v_r, \theta, v_\theta, \varphi)`} is advanced with a single **RK4** step per iteration.
  </script>

  <script id="rt-doppler" type="text/markdown">
### Doppler beaming and disk appearance

The characteristic brightness asymmetry arises from the relativistic Doppler effect. Disk gas orbits at the Keplerian angular velocity ${tex`\Omega = \sqrt{M}/(r^{3/2} + a\sqrt{M})`}, and the observed frequency of a photon is shifted by a factor ${tex`g = 1/\bigl(u^t_\text{emit}(1 - \Omega L/E)\bigr)`} that combines gravitational redshift with the orbital Doppler shift. On the approaching side of the disk, ${tex`g > 1`} and photons are blueshifted and beamed brighter; on the receding side, ${tex`g < 1`} and they are dimmed.

The disk temperature follows ${tex`T \propto r^{-3/4}`}, and the observed specific intensity scales as ${tex`g^3`} (the Lorentz-invariant ${tex`I_\nu/\nu^3`}, appropriate since we apply a fixed color ramp rather than integrating a shifted blackbody spectrum). The thin bright ring just outside the black hole shadow is the **photon ring**: light that has completed one or more half-orbits around the black hole before escaping to the camera.
  </script>

  <script id="references" type="text/markdown">
## References

The geodesic integrator uses the Carter constant and separated equations of motion from [Carter (1968)](https://doi.org/10.1103/PhysRev.174.1559), reparameterized in the Mino time of [Mino (2003)](https://doi.org/10.1103/PhysRevD.67.084027) which decouples the radial and polar systems. The pedagogical derivation in [Bini et al.](https://www.roma1.infn.it/) was a useful reference for the Carter equations and Hamilton-Jacobi separation, while [Garnier (2022)](https://hal.science/hal-03762454) and [Wu et al. (2022)](https://doi.org/10.3847/1538-4357/ac9c5w) informed the choice of integration scheme. The gravitational lensing ray tracer draws on the approach described in [James et al. (2015)](https://arxiv.org/abs/1502.03808) for the Interstellar visual effects, adapted here as a per-pixel null geodesic integrator.
