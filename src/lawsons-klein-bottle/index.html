<!doctype html>
<notebook theme="ink">
  <title>Lawson's Klein Bottle</title>

  <script id="title" type="text/markdown">
# Lawson's Klein Bottle
  </script>

  <script id="imports" type="text/x-typescript">
import { createWebGPUContext } from './lib/webgpu-canvas.js';
import { createUnifiedCamera } from './lib/unified-camera.js';
import { expandable } from './lib/expandable.js';
import { cameraButtons } from './lib/camera-buttons.js';
import { meshFromFunction } from './mesh.js';
import { peelShaderCode, compositeShaderCode } from './shaders.js';
import { createRenderer } from './renderer.js';
import { interval } from './lib/range-slider.js';
  </script>

  <script id="intro" type="text/markdown">
Based on the equations described in [Lawson's Minimal Surfaces and the Sudanese Mobius Band](http://wordpress.discretization.de/ddg2019/2019/04/29/tutorial-3-lawsons-minimal-surfaces-and-the-sudanese-mobius-band/). This notebook is modified after receiving some help from Dan Piker in [this notebook](https://observablehq.com/d/2cb69c9cdda31ed9), which is in turn a modification of [my original attempt](https://observablehq.com/d/7f3a7829668597a2), after inspiration by [Dan Piker's tweet](https://twitter.com/KangarooPhysics/status/1437478868156358667).
  </script>

  <script id="gpu-context" type="text/x-typescript">
const { device, canvasFormat } = await createWebGPUContext();
  </script>

  <script id="state" type="text/x-typescript">
const state = {
  dirty: true,
  expandedState: { expanded: false },
  renderParams: {
    tau: 2,
    rotationPhi: Math.PI * 0.5,
    opacity: 0.95,
    gridOpacity: 0.6,
    gridWidth: 0.5,
    cartoonEdgeWidth: 1.5,
    cartoonEdgeOpacity: 1,
    specular: 1,
    uClipMin: -3.15,
    uClipMax: 3.15,
    vClipMin: -1.575,
    vClipMax: 1.575,
    invertClipU: 0,
    invertClipV: 0,
    peelLayers: 4,
  }
};
  </script>

  <script id="main" type="text/x-typescript">
const mesh = meshFromFunction((u, v) => [u * 0.99999, v * 0.99999], {
  resolution: [301, 301],
  uDomain: [-Math.PI, Math.PI],
  vDomain: [-Math.PI * 0.5, Math.PI * 0.5]
});

const canvas = document.createElement('canvas');
canvas.id = 'surface-canvas';
canvas.width = 800;
canvas.height = 600;
canvas.style.width = '100%';
canvas.style.height = '100%';

const gpuContext = canvas.getContext('webgpu')!;
gpuContext.configure({ device, format: canvasFormat, alphaMode: 'premultiplied' });

const renderer = createRenderer(device, canvasFormat, {
  peel: peelShaderCode,
  composite: compositeShaderCode
});
renderer.initMesh(mesh);

const container = html`<div id="surface-container" style="position: relative; width: 100%; height: 100%;"></div>`;
container.appendChild(canvas);

const camera = createUnifiedCamera(canvas, {
  mode: 'orbit',
  distance: 10,
  phi: 3.5,
  theta: 0.2,
  renderContinuously: false,
  observeResize: true,
});

camera.on('render', () => {
  renderer.render(gpuContext, state.renderParams, camera, canvas.width, canvas.height, state.dirty);
  state.dirty = false;
});

canvas.addEventListener('mousedown', () => {
  if (document.activeElement instanceof HTMLElement) {
    document.activeElement.blur();
  }
});

invalidation.then(() => {
  camera.destroy();
});

camera.triggerRepaint();

const figure = html`
  <figure id="main-figure" style="max-width: 100%; margin: 0; height: 100%;">
    ${container}
  </figure>
`;

const figureWidth = Math.min(width, 640);
const figureHeight = Math.round(Math.max(500, figureWidth * 1.0));

let expandableContainer;
expandableContainer = expandable(figure, {
  wide: true,
  width: figureWidth,
  height: figureHeight,
  controls: '#surface-controls',
  state: state.expandedState,
  buttons: cameraButtons({
    camera,
    canvas,
    filename: 'lawsons-klein-bottle.png',
    getContainer: () => expandableContainer,
  }),
  onResize: (content, w, h, expanded) => {
    container.style.width = `${w}px`;
    container.style.height = `${h}px`;
  }
});

display(expandableContainer);
  </script>

  <script id="controls" type="text/x-typescript">
const controlsContainer = html`<div id="surface-controls" class="controls-panel"></div>`;

function addControl(input: HTMLElement) {
  controlsContainer.appendChild(input);
  return input;
}

const tauInput = addControl(Inputs.range([0, 3], { label: "τ", value: 2, step: 0.1 }));
const rotationPhiInput = addControl(Inputs.range([0, Math.PI + 1e-4], { label: "φ", value: 1.1, step: Math.PI / 100 }));
const uClipInput = addControl(interval([-3.15, 3.15], { label: "u range", value: [-3.15, 3.15], step: 0.01, invertible: true }));
const vClipInput = addControl(interval([-1.575, 1.575], { label: "v range", value: [-1.575, 1.575], step: 0.01, invertible: true }));
const opacityInput = addControl(Inputs.range([0, 1], { label: "Surface opacity", value: 0.9, step: 0.01 }));

function syncParams() {
  const uClip = uClipInput.value as { range: [number, number]; invert: boolean };
  const vClip = vClipInput.value as { range: [number, number]; invert: boolean };
  state.renderParams.tau = tauInput.value as number;
  state.renderParams.rotationPhi = rotationPhiInput.value as number;
  state.renderParams.opacity = opacityInput.value as number;
  state.renderParams.uClipMin = uClip.range[0];
  state.renderParams.uClipMax = uClip.range[1];
  state.renderParams.vClipMin = vClip.range[0];
  state.renderParams.vClipMax = vClip.range[1];
  state.renderParams.invertClipU = uClip.invert ? 1 : 0;
  state.renderParams.invertClipV = vClip.invert ? 1 : 0;
  state.dirty = true;
  camera.triggerRepaint();
}

controlsContainer.addEventListener('input', syncParams);
syncParams();

display(controlsContainer);
  </script>

  <script id="equations" type="text/markdown">
We start with a generalization of a Clifford torus in 4D space. ${tex`\tau`} below is a parameter of this surface, while ${tex`\phi`} applies a four-dimensional rotation before the final stereographic projection into 3D space.

${tex.block`\mathbf{p}(u, v) = \begin{pmatrix} \cos v \cos u \\ \cos v \sin u \\ \sin v \cos \tau u \\ \sin v \sin \tau u \end{pmatrix}`}

When ${tex`\tau = 1`} this is the standard Clifford torus. When ${tex`\tau = 2`} it is Lawson's Klein bottle. A rotation by ${tex`\phi`} is applied in the ${tex`(p_1, p_4)`}-plane to yield ${tex`\mathbf{q}`}:

${tex.block`\mathbf{q} = \begin{pmatrix} p_2 \\ p_3 \\ p_1 \cos\phi - p_4 \sin\phi \\ p_1 \sin\phi + p_4 \cos\phi \end{pmatrix}`}

The result is then projected stereographically into three dimensions:

${tex.block`(x,\, y,\, z) = \frac{(q_2,\, q_1,\, q_3)}{1 - q_4}`}
  </script>

  <script id="notes" type="text/markdown">
The vertex shader receives a surface in ${tex`(u, v)`} coordinates and evaluates the parametric surface function, computing the 4D Clifford torus, applying a 4D rotation parameterized by ${tex`\phi`}, and projecting stereographically into 3D.
  </script>
