  <script id="10" type="text/markdown">
    A pass-through for creating a shader which throw errors so that Observable prints them to the notebook page (rather than silently logging to the console on error).
  </script>
  <script id="3" type="application/vnd.observable.javascript">
    async function createShaderModule(
      device,
      { label, code, compilationHints = [] } = {}
    ) {
      const module = device.createShaderModule({ label, code, compilationHints });
      const info = await module.getCompilationInfo();
      const messages = info.messages;
      if (messages.length) {
        const lines = code.split("\n");
        const errors = [];
        for (let i = 0; i < messages.length; i++) {
          const { message, lineNum, linePos, length } = messages[i];
          errors.push(
            `:${lineNum}:${linePos} error: ${message}\n${lines[lineNum - 1]}\n${""
              .padStart(length, "^")
              .padStart(linePos + length - 1, " ")}`
          );
        }
        const error = new Error("\n" + errors.join("\n\n"));
        error.name = "Error while parsing WGSL";
        throw error;
      }
      return module;
    }
  </script>

  <script id="1125" type="text/markdown">
    A helper to streamline passing an encoder to multiple passes, then submitting to the queue.
  </script>
  <script id="19" type="application/vnd.observable.javascript">
    function queuePasses(device, cb) {
      const encoder = device.createCommandEncoder();
      if (Array.isArray(cb)) {
        cb.forEach((c) => c(encoder));
      } else {
        cb(encoder);
      }
      device.queue.submit([encoder.finish()]);
    }
  </script>

  <script id="1143" type="text/markdown">
    A helper for visualizing memory layout of a WGSL struct.
  </script>
  <script id="1170" type="application/vnd.observable.javascript">
    function visualizeStruct(
      structs,
      { width: wid = Math.min(640, width), indent = 35, spacing = 40 } = {}
    ) {
      const byteHeight = 32;
      const colors = d3.schemeTableau10;
      const svg = d3.create("svg");
      let yOffset = 0;
      let colorIndex = 0;

      const topLevelColor = {};

      function getColor(topLevelName) {
        if (!topLevelColor[topLevelName]) {
          topLevelColor[topLevelName] = colors[colorIndex++ % colors.length];
        }
        return topLevelColor[topLevelName];
      }

      function flattenMembers(members, baseOffset = 0, path = [], topLevel = null) {
        const flat = [];
        for (const member of members) {
          const offset = baseOffset + (member.offset || 0);
          const name = [...path, member.name].join(".");

          // Remember top-level owner
          const owner = member.name; //topLevel ?? member.name;

          if (member.type?.name === "array" && member.type.format?.members) {
            const count = member.type.count || 1;
            const stride = member.type.stride || member.type.format.size || 0;
            for (let i = 0; i < count; i++) {
              const label = `${member.name}[${i}]`;
              const elOffset = offset + i * stride;
              flat.push(
                ...flattenMembers(
                  member.type.format.members,
                  elOffset,
                  [...path, `${member.name}[${i}]`],
                  member.name
                )
              );
            }
          } else if (member.type?.members) {
            flat.push(
              ...flattenMembers(
                member.type.members,
                offset,
                [...path, member.name],
                member.name
              )
            );
          } else {
            flat.push({
              name,
              type: member.type?.name || "?",
              offset,
              size: member.size,
              topLevel: owner
            });
          }
        }
        return flat;
      }

      function drawStruct(struct, yOffset) {
        const align = 16; //struct.align ?? 16;
        const size = struct.size ?? align;
        const byteWidth = (wid - indent - 1) / align;

        const flatMembers = flattenMembers(struct.members || []);
        const group = svg.append("g").attr("transform", `translate(0,${yOffset})`);
        const labelsToDraw = [];

        flatMembers.forEach((member) => {
          const color = getColor(member.topLevel);
          const end = member.offset + member.size;
          let offset = member.offset;

          while (offset < end) {
            const r = Math.floor(offset / align);
            const c = offset % align;
            const span = Math.min(align - c, end - offset);

            group
              .append("rect")
              .attr("x", c * byteWidth + indent)
              .attr("y", r * byteHeight + 20)
              .attr("width", span * byteWidth)
              .attr("height", byteHeight)
              .attr("fill", color)
              .attr("stroke", "black")
              .attr("stroke-width", 1)
              .attr("opacity", 0.8);

            labelsToDraw.push({
              name: member.name,
              type: member.type,
              x: (c + span / 2) * byteWidth + indent,
              y: r * byteHeight + 20 + byteHeight / 2
            });

            offset += span;
          }
        });

        const rowCount = Math.ceil(size / align);

        // grid
        for (let r = 0; r <= rowCount; r++) {
          group
            .append("line")
            .attr("x1", indent)
            .attr("y1", r * byteHeight + 20)
            .attr("x2", align * byteWidth + indent)
            .attr("y2", r * byteHeight + 20)
            .style(
              "stroke",
              r === 0 || r === rowCount ? "black" : "rgb(0 0 0 / 30%)"
            );
        }

        for (let r = 0; r < rowCount; r++) {
          for (let c = 0; c <= align; c++) {
            group
              .append("line")
              .attr("x1", c * byteWidth + indent)
              .attr("y1", r * byteHeight + 20)
              .attr("x2", c * byteWidth + indent)
              .attr("y2", (r + 1) * byteHeight + 20)
              .style(
                "stroke",
                c === 0 || c === align ? "black" : "rgb(0 0 0 / 8%)"
              );
          }
        }

        // field labels
        labelsToDraw.forEach((label) => {
          group
            .append("text")
            .attr("x", label.x)
            .attr("y", label.y - 6)
            .text(label.name)
            .style("fill", "black")
            .style("font-size", 12)
            .style("font-weight", "bold")
            .style("text-anchor", "middle")
            .style("font-family", "monospace")
            .style("dominant-baseline", "middle")
            .style("pointer-events", "none");

          group
            .append("text")
            .attr("x", label.x)
            .attr("y", label.y + 10)
            .text(label.type)
            .style("fill", "#222")
            .style("font-size", 10)
            .style("font-style", "italic")
            .style("text-anchor", "middle")
            .style("font-family", "monospace")
            .style("dominant-baseline", "middle")
            .style("pointer-events", "none");
        });

        // byte offset labels
        for (let i = 0; i < size; i += align) {
          const row = i / align;
          group
            .append("text")
            .attr("x", 10)
            .attr("y", row * byteHeight + 20 + byteHeight / 2)
            .attr("dominant-baseline", "middle")
            .style("font-family", "monospace")
            .style("font-size", 12)
            .text(i);
        }

        // struct name label
        group
          .append("text")
          .attr("x", indent)
          .attr("y", 14)
          .text(struct.name)
          .style("font-family", "monospace")
          .style("font-size", 14)
          .style("font-weight", "bold");

        return rowCount * byteHeight + spacing;
      }

      for (const struct of structs) {
        yOffset += drawStruct(struct, yOffset);
      }

      svg.attr("height", yOffset);
      svg.attr("width", wid);

      return svg.node();
    }
  </script>

  <script id="1151" type="application/vnd.observable.javascript">
    writeStruct = {
      function writeScalar(dv, t, offset, value) {
        switch (t) {
          case "u":
            dv.setUint32(offset, value, true);
            break;
          case "i":
            dv.setInt32(offset, value, true);
            break;
          case "f":
            dv.setFloat32(offset, value, true);
            break;
          case "h":
            dv.setUint16(offset, toFloat16(value), true);
            break;
          default:
            throw new Error(`Unknown scalar type: ${t}`);
        }
      }

      function parseTypeName(name) {
        const vecMatch = name.match(/^vec([2-4])([uifh])$/);
        const matMatch = name.match(/^mat([2-4])x([2-4])([fh])$/);
        if (vecMatch) {
          return {
            kind: "vec",
            len: parseInt(vecMatch[1]),
            scalarType: vecMatch[2]
          };
        } else if (matMatch) {
          return {
            kind: "mat",
            cols: parseInt(matMatch[1]),
            rows: parseInt(matMatch[2]),
            scalarType: matMatch[3]
          };
        } else if (/^(u32|i32|f32|f16)$/.test(name)) {
          const typeMap = { u32: "u", i32: "i", f32: "f", f16: "h" };
          return { kind: "scalar", scalarType: typeMap[name] };
        } else {
          throw new Error(`Unsupported type name: ${name}`);
        }
      }

      return function writeStruct(buffer, values, struct) {
        const dv = new DataView(buffer);

        for (const member of struct.members) {
          const offset = member.offset;
          const value = values[member.name];
          if (value === undefined) continue;

          const typeInfo = parseTypeName(member.type.name);
          let currentOffset = offset;

          if (typeInfo.kind === "scalar") {
            writeScalar(dv, typeInfo.scalarType, currentOffset, value);
          } else if (typeInfo.kind === "vec") {
            const stride = typeInfo.scalarType === "h" ? 2 : 4;
            for (let i = 0; i < typeInfo.len; i++) {
              writeScalar(
                dv,
                typeInfo.scalarType,
                currentOffset + i * stride,
                value[i]
              );
            }
          } else if (typeInfo.kind === "mat") {
            const stride = typeInfo.scalarType === "h" ? 2 : 4;
            for (let c = 0; c < typeInfo.cols; c++) {
              for (let r = 0; r < typeInfo.rows; r++) {
                const i = c * typeInfo.rows + r;
                writeScalar(
                  dv,
                  typeInfo.scalarType,
                  currentOffset + i * stride,
                  value[i]
                );
              }
            }
          }
        }
      };
    }
  </script>

  <script id="823" type="application/vnd.observable.javascript">
    function calculateLayout(ast) {
      const alignUp = (offset, alignment) =>
        Math.ceil(offset / alignment) * alignment;

      const typeInfo = (type) => {
        if (typeof type.size === "number") {
          // Scalars or vectors
          const base = type.type;
          let baseAlign = base === "f16" ? 2 : 4;
          let baseSize = base === "f16" ? 2 : 4;

          if (type.size === 1) {
            return { align: baseAlign, size: baseSize };
          } else if (type.size === 2) {
            return { align: baseAlign * 2, size: baseSize * 2 };
          } else if (type.size === 3) {
            return { align: baseAlign * 4, size: baseSize * 4 }; // vec3 padded to vec4
          } else if (type.size === 4) {
            return { align: baseAlign * 4, size: baseSize * 4 };
          }
        } else if (Array.isArray(type.size)) {
          // Matrices: size = columns × size of vecM<T>, alignment = alignment of vecM<T>
          const [cols, rows] = type.size;
          let baseAlign = 4; // only f32 supported for matrices
          let vecAlign = baseAlign * 4;
          let vecSize = baseAlign * 4;
          return {
            align: vecAlign,
            size: cols * vecSize
          };
        }
        throw new Error("Unhandled type: " + JSON.stringify(type));
      };

      let offset = 0;
      let structAlign = 1;
      const result = [];

      for (const member of ast.members) {
        let { align, size } = typeInfo(member.type);

        for (const attr of member.attrs) {
          if (attr.value.value % 2 !== 0) continue; // ignore malformed attrs
          if (attr.value.value >= align) align = attr.value.value;
          if (attr.value.value >= size) size = attr.value.value;
        }

        offset = alignUp(offset, align);
        result.push({
          name: member.name.value,
          offset,
          size,
          align
        });

        offset += size;
        if (align > structAlign) structAlign = align;
      }

      const totalSize = alignUp(offset, structAlign);
      return { layout: result, size: totalSize, align: structAlign };
    }
